closed"},{"id":"broadwaybar","h":"downtown","n":"Broadway Bar","t":"Bar & Nightclub","c":"nightlife","lat":34.0428699,"lng":-118.255175,"a":"830 S Broadway","i":"🍸","d":"A second-floor bar on Broadway that became one of the anchors of the downtown nightlife revival in the mid-2000s. Opened around 2005 in the theater district, with a rooftop patio overlooking Broadway's historic neon signs. DJ nights, reggae Sundays, and a crowd that mixed downtown residents with Eastside spillover. Part of the wave that proved people would actually go out in downtown LA. Final night was New Year's Eve 2024.","ys":2005,"ye":2025,"tl":[{"y":"2005","x":"Opens on Broadway — early DTLA nightlife revival"},{"y":"2010","x":"Rooftop and DJ nights anchor the Broadway corridor"}],"tags":["Downtown","Broadway","Rooftop","Revival"],"rel":["sevengrand","goldengopher","kingeddy"],"s":"closed"},{"id":"bar107","h":"downtown","n":"Bar 107","t":"Dive Bar","c":"nightlife","lat":34.0486054,"lng":-118.247345,"a":"107 W 4th St","i":"🍺","d":"A downtown dive bar that opened July 6, 2005 and became one of the original anchors of the DTLA nightlife scene. Cheap drinks, a dance floor, walls covered in random ephemera, and a crowd that was genuinely diverse before that word became a branding strategy. The kind of place where PBR tallboys and flip-flops were the dress code. Closed June 1, 2015 after a dispute with the building's owners.","ys":2005,"ye":2015,"tl":[{"y":"2005","x":"Opens July 6 — cheap drinks, diverse crowd, DTLA pioneer"},{"y":"2010","x":"Anchor of early downtown nightlife alongside Golden Gopher and Seven Grand"},{"y":"2015","x":"Closes June 1 — building dispute"}],"tags":["Dive Bar","DTLA","Cheap Drinks","Pioneer"],"rel":["goldengopher","sevengrand","montybar"],"s":"closed"},{"id":"cowboysandpoodles","h":"fairfax","n":"Cowboys and Poodles","t":"Vintage Boutique","c":"shop","lat":34.08371,"lng":-118.35083,"a":"7379 Melrose Ave","i":"🤠","d":"The throwback boutique at 7379 Melrose — affectionately called CowPoo — was designed to resemble a 1950s car wash. It sold 1960s collectibles, Beatles-inspired boots, pointy-toed snakeskin pumps, vintage ties, rockabilly fashions, and Paco Rabanne earrings. Belinda Carlisle of the Go-Go's was a regular. The cowpunk look it helped define — cowboy gear through the technicolor lens of 1980s neons — influenced X, Wall of Voodoo, and The Cramps. Jeremy Scott named his Fall 2016 collection after it. A vintage shop in East Berlin called itself Cowboyz & Poodles in 2003, proof the aesthetic traveled the world.","ys":1982,"ye":1993,"tl":[{"y":"1982","x":"Opens at 7379 Melrose — 1950s car wash aesthetic"},{"y":"1984","x":"Belinda Carlisle, Go-Go's era — cowpunk peaks"},{"y":"2016","x":"Jeremy Scott names his Fall collection Cowboys and Poodles"}],"tags":["Cowpunk","Rockabilly","Vintage","Melrose","Go-Gos"],"rel":["poseur","retailslut","vinylfetish","koalablue"],"s":"closed"},{"id":"neo80","h":"fairfax","n":"Neo 80","t":"Fashion Boutique","c":"shop","lat":34.0832925,"lng":-118.3501442,"a":"7356 Melrose Ave","i":"👗","d":"Owned by fashion visionaries Klaus Wille and designer Lisa Elliot. Neo 80 designed clothes for The Tubes and Olivia Newton-John in Xanadu. It was Klaus who encouraged ONJ to open Koala Blue next door at 7366. One of the earliest businesses on the Melrose strip — part of the first wave alongside Vinyl Fetish, Flip, and l.a.Eyeworks that turned a bland stretch of stucco into a subcultural capital.","ys":1980,"ye":1992,"tl":[{"y":"1980","x":"Opens at 7356 Melrose — among the first wave of punk/new wave shops"},{"y":"1980","x":"Designs costumes for Xanadu — ONJ connection"},{"y":"1983","x":"Encourages ONJ to open Koala Blue next door"}],"tags":["Fashion","Xanadu","The Tubes","Melrose Pioneer"],"rel":["koalablue","vinylfetish","laeyeworksmelrose"],"s":"closed"},{"id":"flipmelrose","h":"fairfax","n":"Flip","t":"Vintage Clothing Store","c":"shop","lat":34.0838921,"lng":-118.3555822,"a":"7607 Melrose Ave","i":"👕","d":"One of the first stores to make old clothing — and the thrill of hunting for it — hip. Large selection of second-hand shirts, jackets, black jeans, cool postcards and knick-knacks. The music was always blasting the latest cool stuff. They also opened a successful discount store. The enormous space at 7607 Melrose is now occupied by several boutiques. Part of the original punk/new wave Melrose ecosystem — mentioned in the same breath as Poseur, Retail Slut, and Cowboys and Poodles.","ys":1981,"ye":1995,"tl":[{"y":"1981","x":"Opens at 7607 Melrose — vintage clothing pioneer"},{"y":"1984","x":"Peak Melrose era — always blasting music"}],"tags":["Vintage","Clothing","Melrose","Punk"],"rel":["poseur","retailslut","cowboysandpoodles","aardvarks"],"s":"closed"},{"id":"industrialrev","h":"fairfax","n":"Industrial Revolution","t":"Design Store","c":"shop","lat":34.0834992,"lng":-118.354737,"a":"7560 Melrose Ave","i":"⚙️","d":"One of the first stores to sell industrial-style furnishings and stationery items made of plastic and chrome. Most products were black, white, or red. At the time, hi-tech was a fairly new trendy phrase and their buyers epitomized this sleek fashion. Part of the Melrose strip's diverse ecosystem where punk boutiques sat next to design stores and record shops.","ys":1982,"ye":1993,"tl":[{"y":"1982","x":"Opens at 7560 Melrose — hi-tech industrial design"}],"tags":["Design","Hi-Tech","Industrial","Melrose"],"rel":["neo80","vinylfetish","poseur"],"s":"closed"},{"id":"renesallears","h":"fairfax","n":"Rene's All Ears","t":"Record Store","c":"shop","lat":34.0839562,"lng":-118.3574719,"a":"7701 Melrose Ave","i":"💿","d":"Independent new-and-used record shop just east of Aron's on Melrose. Run by siblings Rene Cortes Jr. and Rita Cortes — right behind the store on Spaulding was Rene's Body Works and Auto Painting, an auto body shop run by their father. Part of the constellation of Melrose record stores alongside Aron's, Bleeker Bob's, and Vinyl Fetish that made the avenue a music pilgrimage.","ys":1980,"ye":1995,"tl":[{"y":"1980","x":"Opens at 7701 Melrose — next to Aron's Records"}],"tags":["Record Store","Melrose","Independent","Vinyl"],"rel":["aronsrec","vinylfetish","headlinerec"],"s":"closed"},{"id":"bleekerbobsmelrose","h":"fairfax","n":"Bleeker Bob's","t":"Record Store","c":"shop","lat":34.0839313,"lng":-118.3546184,"a":"7555½ Melrose Ave","i":"💿","d":"The LA outpost of the legendary New York record store. Amazing old punk records on the wall to gape at, but nothing most kids could afford. This was their third Melrose location. Part of the record store ecosystem alongside Aron's, Rene's, and Vinyl Fetish that made Melrose Avenue a music destination in the 1980s.","ys":1982,"ye":1995,"tl":[{"y":"1982","x":"Opens on Melrose — third location at 7555½"}],"tags":["Record Store","Punk","Melrose","New York Import"],"rel":["aronsrec","vinylfetish","renesallears"],"s":"closed"},{"id":"nucleusnuance","h":"fairfax","n":"Nucleus Nuance","t":"Supper Club & Jazz Venue","c":"music","lat":34.0836393,"lng":-118.348062,"a":"7267 Melrose Ave","i":"🎷","d":"A supper club and hangout open for lunch and dinner. At night they featured live music and dancing to live jazz for a colorful clientele. One of the older establishments on the strip — open since the 1960s, decades before punk arrived on Melrose. It held on through the entire punk/new wave era and closed in 1993, having witnessed the avenue's complete transformation from quiet side street to international fashion destination.","ys":1965,"ye":1993,"tl":[{"y":"1965","x":"Opens at 7267 Melrose — supper club with live jazz"},{"y":"1984","x":"Survives punk era surrounded by boutiques and record stores"},{"y":"1993","x":"Closes after nearly three decades"}],"tags":["Jazz","Supper Club","Melrose","Pre-Punk Era"],"rel":["vinylfetish","groundlings","poseur"],"s":"closed"},{"id":"wastelandmelrose","h":"fairfax","n":"Wasteland","t":"Consignment Clothing","c":"shop","lat":34.0833278,"lng":-118.351992,"a":"7428 Melrose Ave","i":"👗","d":"A sprawling consignment shop on Melrose packed with rack upon rack of lightly-worn designer clothing and accessories — Marc Jacobs, Diane von Furstenberg, Helmut Lang, all for less than lunch at The Ivy. They also buy from sellers, and celebrities are frequently spotted among the selling crowd with garbage bags full of swag. Part of the second wave of Melrose retail that emerged in the late 1980s alongside the punk boutiques.","ys":1987,"tl":[{"y":"1987","x":"Opens on Melrose Ave — consignment for the fashion-forward"}],"tags":["Consignment","Designer","Melrose","Still Open"],"rel":["aardvarks","flipmelrose","poseur"],"s":"active"},{"id":"changocoffee","h":"echopark","n":"Chango Coffee / Canyon Coffee","t":"Coffee Shop","c":"food","lat":34.0815,"lng":-118.2548,"a":"1559 Echo Park Ave","i":"☕","d":"Chango Coffee opened next to El Batey market on Echo Park Avenue and became a neighborhood fixture during the gentrification wave of the 2000s-2010s. When El Batey closed in 2014, Chango was right there — the old guard and the new guard sharing a wall. The space later became Canyon Coffee, a roaster and cafe that continues at the same address. The transition from Chango to Canyon mirrors Echo Park's identity shift.","ys":2008,"tl":[{"y":"2008","x":"Chango Coffee opens next to El Batey on Echo Park Ave"},{"y":"2014","x":"El Batey closes next door — gentrification marker"},{"y":"2020","x":"Becomes Canyon Coffee — same address, new identity"}],"tags":["Coffee","Echo Park","Gentrification","Canyon Coffee"],"rel":["elbatey","echoparklake","shortstop"],"s":"active"},{"id":"sunsetbeerco","h":"echopark","n":"Sunset Beer Company","t":"Craft Beer Shop & Bar","c":"nightlife","lat":34.0754443,"lng":-118.2553539,"a":"1498 Sunset Blvd","i":"🍺","d":"A craft beer shop and tasting room on Sunset Blvd in Echo Park that became one of the neighborhood's beloved gathering spots. Hundreds of bottles and cans, rotating taps, board games, and a big screen for sports. The staff was knowledgeable and the prices fair. One of the few places in Echo Park where you could sit, drink good beer, and not feel like you were in a scene. Announced closure — a casualty of rising rents and shifting neighborhood economics.","ys":2011,"ye":2025,"tl":[{"y":"2011","x":"Opens on Sunset Blvd — craft beer shop and tasting room"},{"y":"2020","x":"Survives COVID"},{"y":"2025","x":"Announces closure — rising costs"}],"tags":["Craft Beer","Echo Park","Sunset Blvd","Closing"],"rel":["shortstop","littlejoy","echo"],"s":"closed"},{"id":"thegarage","h":"silverlake","n":"The Garage","t":"Rock Club","c":"music","lat":34.0910898,"lng":-118.2870892,"a":"4519 Santa Monica Blvd","i":"🔧","d":"Steve Edelson bought a bar on the corner of Santa Monica Blvd and Virgil and named it The Garage. It became the longest legal after-hours club in LA history — closing at 2 AM, reopening at 6 AM, running until two in the afternoon, making as much as five thousand dollars a day from patrons who had already been up all night. The weekly Kiss or Kill club night brought rock bands from across the country. Rock City News listed it as a launching ground for bands. When The Garage closed around 2004, the Ryans of Temple Bar Concepts reopened it as Little Temple, a lounge with soul music and DJ nights. In 2012, they gutted it again and reopened as The Virgil — craft cocktails, live music, comedy, and a jukebox considered the best on the eastside. Featured in the 2018 A Star Is Born as the club where Bradley Cooper discovers Lady Gaga. The same family now runs Los Globos, El Cid, and Catch One.","ys":1998,"ye":2004,"tl":[{"y":"1998","x":"Steve Edelson opens The Garage — after-hours rock club"},{"y":"2003","x":"Kiss or Kill weekly, late-night scene peaks"},{"y":"2004","x":"Closes — becomes Little Temple under Temple Bar Concepts"},{"y":"2012","x":"Reopens as The Virgil — craft cocktails and live entertainment"},{"y":"2018","x":"Featured in A Star Is Born"}],"tags":["Rock Club","After-Hours","Kiss or Kill","Now The Virgil"],"rel":["sllounge","satellite","echo","losglobos","elcid"],"s":"closed"},{"id":"circlebar","h":"santamonica","n":"Circle Bar","t":"Dance Bar","c":"nightlife","lat":33.9988215,"lng":-118.4807269,"a":"2926 Main St, Santa Monica","i":"🪩","d":"Named for its long oval-shaped bar in the center of the room. Established in 1949, making it the oldest bar in Santa Monica. The building dates to 1948. Jim Morrison and Truman Capote were regulars. During the Jack Garner years from 1975 to 1991, bartender Juanita 'Gypsy' Gary — a former circus ticket taker whose husband was shot dead in Alabama — became the legendary soul of the place, tending bar into her seventies. Penelope Spheeris grew up nearby. Strong drinks and a crowded dance floor kept locals and newly legal drinkers coming back for decades. Howard Alpert ran it from the early 2000s until he transferred ownership to the landlord in August 2023. The building sold for nearly two million dollars in December 2025.","ys":1949,"ye":2023,"tl":[{"y":"1949","x":"Established as a bar on Main Street"},{"y":"1962","x":"Bar begins at 2926 Main St in newly built commercial building"},{"y":"1975","x":"Jack Garner era — Gypsy Gary tends bar for 16 years"},{"y":"2023","x":"Closes in August — ownership transferred to landlord"},{"y":"2025","x":"Building sold for $1.975M"}],"tags":["Dance Bar","Santa Monica","Main Street","Jim Morrison","Oldest Bar"],"rel":["chezjay","thegalley","smpier"],"w":"Circle_Bar","s":"closed"},{"id":"gaslite","h":"santamonica","n":"The GasLite","t":"Karaoke Dive Bar","c":"nightlife","lat":34.0318861,"lng":-118.4822575,"a":"2030 Wilshire Blvd, Santa Monica","i":"🎤","d":"A windowless dive bar on Wilshire Boulevard that opens at 6 AM every single day and has been doing so since 1962. Claire Ragge took over in January 1998 and turned it into one of the most famous karaoke bars in Los Angeles. Elle Magazine, the LA Times, and Fox 11 have all raved about it. The karaoke runs nightly and the wait list fills fast — the host sings between sets, which either delights or infuriates depending on your tolerance. Free popcorn. Happy hour all day until 9 PM. Survived COVID because the landlord and Ragge had been friends for twenty years and worked it out. Lost a regular not to the virus but to the isolation — he had a breakdown during lockdown and died in the hospital. The GasLite reopened in June 2021 with outdoor seating for the first time ever.","ys":1962,"tl":[{"y":"1962","x":"Opens on Wilshire Blvd — dive bar from day one"},{"y":"1998","x":"Claire Ragge takes over — karaoke era begins"},{"y":"2020","x":"Closes for COVID — lost a regular to the isolation"},{"y":"2021","x":"Reopens with first-ever outdoor patio"}],"tags":["Karaoke","Dive Bar","Santa Monica","Opens 6 AM"],"rel":["circlebar","chezjay","kingshead"],"s":"active"},{"id":"rickstavern","h":"santamonica","n":"Rick's Tavern on Main","t":"Neighborhood Bar","c":"nightlife","lat":33.999443,"lng":-118.48069,"a":"2907 Main St, Santa Monica","i":"🍺","d":"A bar has occupied this address on Main Street since the 1930s, when it was called Willie T's. Howard Alpert ran it as Rick's Tavern on Main for 25 years, making it a locals-driven dive with industry night specials, taco Tuesdays, and a Cheers-like atmosphere where everyone knew your name. Alpert closed it April 17, 2022, citing health issues. The bar was bought by the Van Gessels and Lance Sellers, who reopened it as Tavern on Main in July 2022 with breakfast service and a refreshed interior but the same marble bar and neighborhood spirit.","ys":1997,"ye":2022,"tl":[{"y":"1930s","x":"Willie T's operates as a bar at this address"},{"y":"1997","x":"Howard Alpert opens Rick's Tavern on Main"},{"y":"2022","x":"Closes April 17 after 25 years — health issues"},{"y":"2022","x":"Reopens July as Tavern on Main under new ownership"}],"tags":["Neighborhood Bar","Santa Monica","Main Street","Closed"],"rel":["circlebar","chezjay","gaslite"],"s":"closed"},{"id":"caseysirishpub","h":"downtown","n":"Casey's Irish Pub","t":"Irish Pub","c":"nightlife","lat":34.0484808,"lng":-118.2557888,"a":"613 S Grand Ave","i":"☘️","d":"Opened in 1971 in the basement of a 1916 building on Grand Avenue when the Financial District was coming of age. The two-story space was designed to resemble a turn-of-the-century Irish pub and immediately became the after-work destination for downtown professionals. The sprawling dark-wood interior has been used as a film and TV set for decades — the X-Files movie, Mr. Deeds, and countless television productions chose Casey's because it reads as a New York pub despite being in Los Angeles. The annual St. Patrick's Day Street Festival became the largest in the city. Pouring with Heart gave it an old-meets-new reboot. Still open, though recent reviews suggest the glory days may be fading.","ys":1971,"tl":[{"y":"1916","x":"Building constructed — originally a general store and Turkish bath"},{"y":"1971","x":"Casey's Irish Pub opens in the basement"},{"y":"1998","x":"Featured in The X-Files movie as a D.C. bar"},{"y":"2020","x":"St. Patrick's Day festival canceled — COVID"}],"tags":["Irish Pub","Film Location","St. Patrick's Day","Financial District"],"rel":["sevengrand","goldengopher","kingeddy"],"w":"Casey%27s_Irish_Pub_(Los_Angeles)","s":"active"},{"id":"canarumbar","h":"downtown","n":"Caña Rum Bar","t":"Members-Only Rum Bar","c":"nightlife","lat":34.0441294,"lng":-118.2632598,"a":"714 W Olympic Blvd","i":"🍹","d":"Tucked inside a parking structure on Olympic Boulevard near Crypto.com Arena, Caña occupies the former office of oil baron Edward Doheny — his wife's greenhouse became the cigar patio. A members-only rum bar with over 300 rums, salsa lessons on Thursdays, cumbia on Wednesdays, and DJ sets on weekends. Part of the 213 Hospitality group. Thirty-dollar annual membership buys access to events, tastings, and a Caribbean escape in the middle of downtown. Cigar Aficionado profiled the smoking lounge. PUNCH called it a virtual museum to rum. The frozen piña colada slushies and the Brazilian Necktie cocktail are signature drinks. Open since 2010.","ys":2010,"tl":[{"y":"2010","x":"Opens in former Edward Doheny office space — members-only rum bar"},{"y":"2017","x":"PUNCH profiles the 350-rum collection"},{"y":"2024","x":"Continues expanding rum library and event programming"}],"tags":["Rum Bar","Members Only","Cigars","213 Hospitality"],"rel":["sevengrand","goldengopher","thevarnish"],"s":"active"},{"id":"loadedbar","h":"hollywood","n":"Loaded / Tiny's K.O.","t":"Rock Bar & Dive Bar","c":"nightlife","lat":34.1019009,"lng":-118.3290743,"a":"6377 Hollywood Blvd","i":"🎸","d":"Two dive bars occupied the same address on Hollywood Boulevard at different times. Tiny's K.O. came first — a small punk-rock bar where tramps, junkies, celebrities, rock stars, and bored housewives all bellied up to the bar. Regulars sat outside watching LAPD cruisers circle and pounce on jaywalkers. A drive-by shooting across the street once sent everyone to the ground. Tiny's closed and Loaded took over, filling the space with worn leather couches, angry graffiti, and black-and-white posters of sweaty punk icons. A rocker's paradise — one of the only real rock bars left on the boulevard. Both are gone now. The address is currently Scum and Villainy Cantina, a Star Wars-themed bar.","ys":2004,"ye":2020,"tl":[{"y":"2004","x":"Tiny's K.O. operates as a punk dive on Hollywood Blvd"},{"y":"2010","x":"Loaded Rock Bar takes over — rock and roll dive"},{"y":"2020","x":"Loaded closes during COVID — never reopens"},{"y":"2016","x":"Address becomes Scum and Villainy Cantina"}],"tags":["Rock Bar","Dive Bar","Hollywood Blvd","Punk"],"rel":["burgundyroom","powerhouse","frolicroom"],"s":"closed"}];

// ===== UTILS (ES5 safe) =====
function hdist(lat1,lng1,lat2,lng2){
  var R=3958.8,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fd(mi){return mi<0.15?Math.round(mi*5280)+'ft':mi.toFixed(1)+'mi'}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function hn(h){return HOODS[h]||h}

// Safe querySelectorAll iteration
function qsa(sel,fn){
  var els=document.querySelectorAll(sel);
  for(var i=0;i<els.length;i++) fn(els[i],i);
}

// Safe closest polyfill
function findParent(el,cls){
  var node=el;
  while(node&&node!==document){
    if(node.className&&node.className.indexOf(cls)>=0) return node;
    if(node.dataset&&node.dataset.id!==undefined&&cls==='lv-item') return node;
    node=node.parentNode;
  }
  return null;
}

// ===== FILTER =====
var STATUS_LABELS={active:'Still here',closed:'Gone',demolished:'Demolished',transformed:'Transformed'};
function slabel(v){return STATUS_LABELS[v.s]||'Unknown'}

function getFiltered(){
  var s=searchTerm.toLowerCase();
  var out=[];
  for(var i=0;i<V.length;i++){
    var v=V[i];
    v._d=hdist(userLat,userLng,v.lat,v.lng);
    v._ghost=false;
    // Time filter — hide venues not yet founded
    if(v.ys>activeYear) continue;
    // Mark as ghost if closed before slider year
    v._ghost=!!(v.ye&&v.ye<activeYear);
    if(activeStatus!=='all'&&v.s!==activeStatus) continue;
    if(v._d>radius&&radius<900) continue;
    if(activeCat!=='all'&&v.c!==activeCat) continue;
    if(s){
      var hay=(v.n+' '+(v.t||'')+' '+hn(v.h)+' '+(v.a||'')).toLowerCase();
      if(hay.indexOf(s)<0) continue;
    }
    out.push(v);
  }
  out.sort(function(a,b){return a._d-b._d});
  return out;
}

// ===== ADDRESS LINEAGE =====
function findVenueById(id){for(var i=0;i<V.length;i++){if(V[i].id===id) return V[i];}return null;}

function buildLineage(venueId){
  var v=findVenueById(venueId);
  if(!v) return [];
  var seen={};
  var chain=[];
  // Walk prev chain backwards
  var cur=v;
  while(cur&&cur.prev&&!seen[cur.prev]){
    var pv=findVenueById(cur.prev);
    if(!pv) break;
    seen[pv.id]=true;
    chain.unshift(pv);
    cur=pv;
  }
  // Add current
  seen[v.id]=true;
  chain.push(v);
  // Walk next chain forwards
  cur=v;
  while(cur&&cur.next&&!seen[cur.next]){
    var nv=findVenueById(cur.next);
    if(!nv) break;
    seen[nv.id]=true;
    chain.push(nv);
    cur=nv;
  }
  // Chain is now in correct transformation order
  // Assign ordinals so chain order is preserved in final sort
  var chainOrder={};
  for(var ci=0;ci<chain.length;ci++) chainOrder[chain[ci].id]=ci;
  // Find co-located venues by proximity (~25m)
  var thresh=0.00025;
  var extras=[];
  for(var i=0;i<V.length;i++){
    if(seen[V[i].id]) continue;
    var dlat=Math.abs(V[i].lat-v.lat);
    var dlng=Math.abs(V[i].lng-v.lng);
    if(dlat<thresh&&dlng<thresh){
      seen[V[i].id]=true;
      extras.push(V[i]);
    }
  }
  // Sort extras by year
  extras.sort(function(a,b){return (a.ys||9999)-(b.ys||9999);});
  // Merge: chain in order, then extras sorted chronologically
  // Insert extras at correct chronological position relative to chain
  var result=chain.slice();
  for(var ei=0;ei<extras.length;ei++){
    var eyr=extras[ei].ys||9999;
    var inserted=false;
    for(var ri=0;ri<result.length;ri++){
      // Insert before the first chain item that started after this extra
      if(chainOrder[result[ri].id]!==undefined&&(result[ri].ys||9999)>eyr){
        result.splice(ri,0,extras[ei]);
        inserted=true;
        break;
      }
    }
    if(!inserted) result.push(extras[ei]);
  }
  return result;
}

  h+='<div class="sh-type">'+esc(v.t)+' · '+hn(v.h)+'</div>';
  h+='<div class="sh-addr">'+esc(v.a)+(ds?' ('+ds+')':'')+'</div></div></div>';
  h+='<div class="sh-status sh-s-'+v.s+'">';
  h+=slabel(v)+(v.ye?' '+v.ye:'')+' · Est. '+(v.ys||'?')+'</div>';
  // Address lineage
  var lineage=buildLineage(id);
  if(lineage.length>=2){
    h+='<div class="sh-lineage"><div class="sh-lineage-title">What was here</div>';
    h+='<ul class="sh-lin-list">';
    for(var li=0;li<lineage.length;li++){
      var lv=lineage[li];
      var isCurrent=lv.id===id;
      var cls='sh-lin-item era-'+lv.s+(isCurrent?' current':'');
      var yrs=(lv.ys||'?')+(lv.ye?' – '+lv.ye:'');
      h+='<div class="'+cls+'" data-id="'+lv.id+'">';
      h+='<div class="sh-lin-name">'+esc(lv.n)+'</div>';
      h+='<div class="sh-lin-meta"><span class="sh-lin-years">'+yrs+'</span>';
      h+='<span class="sh-lin-status s-'+lv.s+'">'+slabel(lv)+'</span>';
      h+='</div></div>';
      if(li<lineage.length-1){
        // Check if this is a prev/next chain link or just co-located
        var isChain=(lv.next&&lv.next===lineage[li+1].id)||(lineage[li+1].prev&&lineage[li+1].prev===lv.id);
        h+='<div class="sh-lin-arrow">'+(isChain?'↓ became':'·')+'</div>';
      }
    }
    h+='</ul></div>';
  }
  h+='<div class="sh-desc">'+esc(v.d)+'</div>';

  if(v.tl&&v.tl.length){
    h+='<div class="sh-section">Timeline</div><ul class="sh-tl">';
    for(var i=0;i<v.tl.length;i++) h+='<li><span>'+esc(v.tl[i].y)+'</span>'+esc(v.tl[i].x)+'</li>';
    h+='</ul>';
  }
  if(v.tags&&v.tags.length){
    h+='<div class="sh-section">Tags</div><div class="sh-tags">';
    for(var i=0;i<v.tags.length;i++) h+='<span class="sh-tag">#'+esc(v.tags[i])+'</span>';
    h+='</div>';
  }
  if(v.w) h+='<a class="sh-wiki" href="https://en.wikipedia.org/wiki/'+v.w+'" target="_blank" rel="noopener">Wikipedia →</a>';
  h+='<br><a class="sh-dir" href="https://maps.apple.com/?daddr='+v.lat+','+v.lng+'&dirflg=w" target="_blank" rel="noopener">Get Directions</a>';
  if(v.rel&&v.rel.length){
    h+='<div class="sh-section">Related</div><div class="sh-related">';
    for(var i=0;i<v.rel.length;i++){
      var rv=null;
      for(var j=0;j<V.length;j++){if(V[j].id===v.rel[i]){rv=V[j];break;}}
      if(rv) h+='<button class="sh-rel" data-id="'+rv.id+'">'+esc(rv.n)+'</button>';
    }
    h+='</div>';
  }
  document.getElementById('sheetBody').innerHTML=h;
  document.getElementById('sheet').className='open';
  document.getElementById('sheetBody').scrollTop=0;
}

// ===== UPDATE =====
function update(){
  var f=getFiltered();
  var open=0,ghosts=0;
  for(var i=0;i<f.length;i++){if(f[i]._ghost)ghosts++;else open++;}
  var badge=open+' of 702';
  if(ghosts) badge+=' · '+ghosts+' 👻';
  document.getElementById('countBadge').textContent=badge;
  renderList(f);
  if(mapReady) updateMapMarkers(f);
}

// ===== MAP (progressive enhancement) =====
function updateMapMarkers(filtered){
  try{
    var nv={};
    var ghostSet={};
    for(var i=0;i<filtered.length;i++){
      nv[filtered[i].id]=true;
      if(filtered[i]._ghost) ghostSet[filtered[i].id]=true;
    }
    // Remove markers no longer in filtered
    var oldKeys=Object.keys(visibleIds);
    for(var i=0;i<oldKeys.length;i++){
      if(!nv[oldKeys[i]]&&markers[oldKeys[i]]) mapObj.removeLayer(markers[oldKeys[i]]);
    }
    // Add new markers or update ghost state on existing
    var newKeys=Object.keys(nv);
    for(var i=0;i<newKeys.length;i++){
      var kid=newKeys[i];
      if(!markers[kid]) continue;
      var mel=markers[kid].getElement();
      if(mel){
        if(ghostSet[kid]){
          if(mel.className.indexOf(' ghost')<0) mel.className+=' ghost';
        }else{
          mel.className=mel.className.replace(/\s*ghost/g,'');
        }
      }
      if(!visibleIds[kid]) markers[kid].addTo(mapObj);
    }
    visibleIds=nv;
  }catch(e){}
}

function placeUserDot(){
  if(!mapReady||typeof L==='undefined') return;
  try{
    if(userDotMarker){
      userDotMarker.setLatLng([userLat,userLng]);
      userPulseMarker.setLatLng([userLat,userLng]);
    }else{
      userPulseMarker=L.marker([userLat,userLng],{icon:L.divIcon({className:'user-pulse',iconSize:[40,40],iconAnchor:[20,20]}),zIndexOffset:9999}).addTo(mapObj);
      userDotMarker=L.marker([userLat,userLng],{icon:L.divIcon({className:'user-dot',iconSize:[14,14],iconAnchor:[7,7]}),zIndexOffset:10000}).addTo(mapObj);
    }
  }catch(e){}
}

function tryInitMap(){
  if(mapReady) return;
  if(typeof L==='undefined') return;
  try{
    var el=document.getElementById('map');
    mapObj=L.map(el,{zoomControl:false,attributionControl:false}).setView([userLat,userLng],radius>900?11:15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mapObj);

    for(var i=0;i<V.length;i++){
      var v=V[i];
      var cls='vm vm-'+(v.c||'culture');
      if(v.s==='closed') cls+=' closed';
      else if(v.s==='demolished') cls+=' demolished';
      else if(v.s==='transformed') cls+=' transformed';
      var iconHtml=v.s==='transformed'?'🔄':'';
      var iconSz=v.s==='transformed'?[18,18]:[16,16];
      var iconAn=v.s==='transformed'?[9,9]:[8,8];
      var icon=L.divIcon({className:cls,html:iconHtml,iconSize:iconSz,iconAnchor:iconAn});
      var m=L.marker([v.lat,v.lng],{icon:icon,zIndexOffset:v.s==='active'?100:0});
      (function(venue){
        m.on('click',function(){
          var ds=venue._d?fd(venue._d):'';
          var ph='<div class="peek" data-id="'+venue.id+'">';
          ph+='<div class="peek-name">'+esc(venue.n)+'</div>';
          ph+='<div class="peek-meta">';
          if(ds) ph+='<span class="peek-dist">'+ds+'</span>';
          ph+=esc(venue.t);
          ph+='<span class="peek-status lv-s-'+venue.s+'">'+slabel(venue)+'</span>';
          ph+='</div></div>';
          L.popup({closeButton:false,offset:[0,-8]}).setLatLng([venue.lat,venue.lng]).setContent(ph).openOn(mapObj);
        });
      })(v);
      markers[v.id]=m;
    }

    mapObj.on('popupopen',function(){
      setTimeout(function(){
        var peeks=document.querySelectorAll('.peek');
        for(var p=0;p<peeks.length;p++){
          peeks[p].addEventListener('click',function(){
            var pid=this.getAttribute('data-id');
            mapObj.closePopup();
            openSheet(pid);
          });
        }
      },50);
    });

    if(hasGPS) placeUserDot();

    mapObj.on('click',function(){
      if(document.getElementById('sheet').className.indexOf('open')>=0) closeSheet();
    });

    mapReady=true;
    document.getElementById('btnMap').style.opacity='1';
    document.getElementById('gpsBtn').className='show';
    updateMapMarkers(getFiltered());
  }catch(e){}
}

// ===== TOUR SYSTEM =====
var tourMarkers=[];

function renderTourList(){
  var el=document.getElementById('tourList');
  var h='';
  for(var i=0;i<TOURS.length;i++){
    var t=TOURS[i];
    // Count valid stops and active/demolished
    var valid=0,activeCount=0,goneCount=0;
    for(var j=0;j<t.stops.length;j++){
      for(var k=0;k<V.length;k++){
        if(V[k].id===t.stops[j]){
          valid++;
          if(V[k].s==='active') activeCount++;
          else goneCount++;
          break;
        }
      }
    }
    h+='<div class="tour-card" data-tour="'+t.id+'">';
    h+='<div class="tour-icon">'+t.icon+'</div>';
    h+='<div class="tour-title">'+esc(t.name)+'</div>';
    h+='<div class="tour-desc">'+esc(t.desc)+'</div>';
    h+='<div class="tour-meta">'+valid+' stops';
    if(goneCount>0) h+=' · '+activeCount+' still here, '+goneCount+' gone';
    h+='</div></div>';
  }
  el.innerHTML=h;
}

function getVenueById(id){
  for(var i=0;i<V.length;i++){if(V[i].id===id) return V[i];}
  return null;
}

function startTour(tourId){
  if(!mapReady) return;
  var tour=null;
  for(var i=0;i<TOURS.length;i++){if(TOURS[i].id===tourId){tour=TOURS[i];break;}}
  if(!tour) return;
  activeTour=tour;
  tourStep=0;

  // Switch to map
  viewMode='map';
  clearActiveView();
  document.getElementById('map').style.display='block';
  document.getElementById('btnMap').className='vt active';
  try{mapObj.invalidateSize()}catch(e){}

  // Hide all normal markers
  var keys=Object.keys(visibleIds);
  for(var i=0;i<keys.length;i++){
    if(markers[keys[i]]) mapObj.removeLayer(markers[keys[i]]);
  }
  visibleIds={};

  // Clear old tour markers
  clearTourMarkers();

  // Place numbered markers for each stop
  var bounds=[];
  for(var i=0;i<tour.stops.length;i++){
    var v=getVenueById(tour.stops[i]);
    if(!v) continue;
    var cls='vm-tour-num'+(i===0?' current':'');
    var icon=L.divIcon({className:cls,html:''+(i+1),iconSize:[22,22],iconAnchor:[11,11]});
    var m=L.marker([v.lat,v.lng],{icon:icon,zIndexOffset:2000+i});
    (function(venue,idx){
      m.on('click',function(){
        goToTourStop(idx);
        openSheet(venue.id);
      });
    })(v,i);
    m.addTo(mapObj);
    tourMarkers.push(m);
    bounds.push([v.lat,v.lng]);
  }

  // Draw route line
  if(bounds.length>1){
    tourLine=L.polyline(bounds,{color:'#ff2d7b',weight:2,opacity:.5,dashArray:'6,8'}).addTo(mapObj);
  }

  // Fit bounds
  if(bounds.length>1){
    try{mapObj.fitBounds(bounds,{padding:[60,40]})}catch(e){}
  }else if(bounds.length===1){
    mapObj.setView(bounds[0],15);
  }

  // Show tour bar
  document.getElementById('tourBar').style.display='block';
  updateTourBar();
}

function updateTourBar(){
  if(!activeTour) return;
  var v=getVenueById(activeTour.stops[tourStep]);
  document.getElementById('tourBarName').textContent=activeTour.icon+' '+activeTour.name;
  document.getElementById('tourBarStop').textContent=v?v.n:'?';
  document.getElementById('tourBarCount').textContent='Stop '+(tourStep+1)+' of '+activeTour.stops.length;
  document.getElementById('tourPrev').style.display=tourStep>0?'inline-block':'none';
  document.getElementById('tourNext').textContent=tourStep<activeTour.stops.length-1?'Next ›':'Done ✓';

  // Update marker styles
  for(var i=0;i<tourMarkers.length;i++){
    try{
      var el=tourMarkers[i].getElement();
      if(!el) continue;
      el.className='vm-tour-num'+(i<tourStep?' visited':i===tourStep?' current':'');
    }catch(e){}
  }
}

function goToTourStop(idx){
  if(!activeTour||idx<0||idx>=activeTour.stops.length) return;
  tourStep=idx;
  var v=getVenueById(activeTour.stops[idx]);
  if(v&&mapReady){
    try{mapObj.setView([v.lat,v.lng],16,{animate:true})}catch(e){}
  }
  updateTourBar();
}

function clearTourMarkers(){
  for(var i=0;i<tourMarkers.length;i++){
    try{mapObj.removeLayer(tourMarkers[i])}catch(e){}
  }
  tourMarkers=[];
  if(tourLine){try{mapObj.removeLayer(tourLine)}catch(e){} tourLine=null;}
}

function exitTour(){
  activeTour=null;tourStep=0;
  document.getElementById('tourBar').style.display='none';
  clearTourMarkers();
  // Restore normal markers
  updateMapMarkers(getFiltered());
  try{mapObj.setView([userLat,userLng],radius>900?11:15)}catch(e){}
}

var leafletCDNs=[
  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
  'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js',
  'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js'
];
var cssLoaded=false;
function loadLeaflet(cb){
  if(typeof L!=='undefined'){cb(true);return;}
  // Ensure CSS is loaded
  if(!cssLoaded){
    var cssSrcs=['https://unpkg.com/leaflet@1.9.4/dist/leaflet.css','https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css'];
    for(var c=0;c<cssSrcs.length;c++){
      var lnk=document.createElement('link');
      lnk.rel='stylesheet';lnk.href=cssSrcs[c];
      document.head.appendChild(lnk);
    }
    cssLoaded=true;
  }
  var idx=0;
  function tryNext(){
    if(idx>=leafletCDNs.length){cb(false);return;}
    var s=document.createElement('script');
    s.src=leafletCDNs[idx];
    s.onload=function(){if(typeof L!=='undefined')cb(true);else{idx++;tryNext();}};
    s.onerror=function(){idx++;tryNext();};
    document.body.appendChild(s);
  }
  tryNext();
}

// Timeline slider
(function(){
  var slider=document.getElementById('yearSlider');
  var lbl=document.getElementById('yearLabel');
  var sel=document.getElementById('statusSelect');
  var NOW_LABELS={active:'🌈 Still here',closed:'🩶 Gone',demolished:'🟤 Demolished',transformed:'🔄 Transformed'};
  var PAST_LABELS={active:'🌈 Survived',closed:'🩶 Later closed',demolished:'🟤 Later demolished',transformed:'🔄 Later transformed'};
  function updateStatusLabels(isPast){
    var opts=sel.options;
    var map=isPast?PAST_LABELS:NOW_LABELS;
    for(var i=0;i<opts.length;i++){
      var v=opts[i].value;
      if(map[v]) opts[i].text=map[v];
    }
  }
  function updateFill(){
    var pct=((slider.value-1890)/(2026-1890)*100).toFixed(1)+'%';
    slider.style.background='linear-gradient(to right,var(--np) 0%,var(--np) '+pct+',var(--bd) '+pct+',var(--bd) 100%)';
  }
  function setStatusDisabled(disabled){
    sel.disabled=disabled;
    sel.style.opacity=disabled?'0.4':'';
    sel.style.pointerEvents=disabled?'none':'';
    if(disabled){sel.value='all';activeStatus='all';}
  }
  slider.addEventListener('input',function(){
    activeYear=parseInt(this.value);
    var isPast=activeYear<2026;
    lbl.textContent=isPast?String(activeYear):'Now';
    updateStatusLabels(isPast);
    setStatusDisabled(isPast);
    updateFill();
    update();
  });
  // Init
  updateFill();
  updateStatusLabels(false);
  setStatusDisabled(false);
})();

// GPS button
// Toast helper
var toastTimer=null;
function showToast(msg,dur){
  dur=dur||3000;
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='visible';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.className=''},dur);
}

function setGpsState(state){
  var btn=document.getElementById('gpsBtn');
  if(state==='locating') btn.className='show locating';
  else if(state==='tracking') btn.className='show tracking';
  else if(state==='error'){btn.className='show error';setTimeout(function(){btn.className='show'},2500);}
  else btn.className='show';
}

function handleGpsError(err){
  tracking=false;
  if(err.code===1){
    setGpsState('error');
    showToast('Location access denied — check browser settings');
  }else if(err.code===2){
    setGpsState('error');
    showToast('Location unavailable — try again');
  }else if(err.code===3){
    setGpsState('error');
    showToast('Location timed out — try again');
  }else{
    setGpsState('error');
    showToast('Could not get location');
  }
}

document.getElementById('gpsBtn').addEventListener('click',function(){
  if(tracking){
    tracking=false;
    setGpsState('idle');
    try{navigator.geolocation.clearWatch(watchId)}catch(e){}
    showToast('Location tracking off');
  }else{
    if(!navigator.geolocation){showToast('Location not supported');return;}
    if(window.isSecureContext===false){showToast('HTTPS required for location');return;}
    tracking=true;
    setGpsState('locating');
    showToast('Getting your location…',6000);
    try{
      navigator.geolocation.getCurrentPosition(function(p){
        userLat=p.coords.latitude;userLng=p.coords.longitude;hasGPS=true;
        if(radius>900){
          radius=3;
          document.getElementById('radiusSelect').value='3';
        }
        setGpsState('tracking');
        showToast('Location found');
        placeUserDot();
        if(mapReady) try{mapObj.setView([userLat,userLng],15)}catch(e){}
        update();
      },function(err){handleGpsError(err)},{enableHighAccuracy:true,timeout:8000});
      watchId=navigator.geolocation.watchPosition(function(p){
        userLat=p.coords.latitude;userLng=p.coords.longitude;
        if(!hasGPS){hasGPS=true;setGpsState('tracking');showToast('Location found');}
        placeUserDot();
        if(mapReady) try{mapObj.setView([userLat,userLng],mapObj.getZoom())}catch(e){}
        update();
      },function(err){handleGpsError(err)},{enableHighAccuracy:true});
    }catch(e){
      tracking=false;
      setGpsState('error');
      showToast('Location error: '+e.message);
    }
  }
});

// ===== BOOT =====
// 1. Render list data (in background, for when user switches to list)
update();

// 2. GPS (check permission first — only auto-locate if already granted)
try{
  if(navigator.geolocation&&navigator.permissions){
    navigator.permissions.query({name:'geolocation'}).then(function(result){
      if(result.state==='granted'){
        navigator.geolocation.getCurrentPosition(function(p){
          userLat=p.coords.latitude;userLng=p.coords.longitude;hasGPS=true;
          if(radius>900){
            radius=3;
            document.getElementById('radiusSelect').value='3';
          }
          update();
          placeUserDot();
          if(mapReady) try{mapObj.setView([userLat,userLng],15)}catch(e){}
        },function(){},{enableHighAccuracy:true,timeout:4000});
      }
    }).catch(function(){});
  }
}catch(e){}

// 3. Load Leaflet immediately and show map
loadLeaflet(function(ok){
  if(ok){
    tryInitMap();
    if(mapReady){
      showMap();
    }
  }else{
    // Leaflet failed — stay on list, disable map button
    document.getElementById('btnMap').textContent='Map ✗';
    showList();
  }
});
