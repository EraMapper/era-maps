","lat":34.0081,"lng":-118.4145,"a":"11222 Washington Pl, Culver City","i":"🌮","d":"Opened in 1959 in Culver City, Tito's has been serving the same recipe for over sixty years: hard-shell beef tacos with cold shredded cheddar, iceberg lettuce, and a smoky red salsa that people lose their minds over. The menu has never changed. The line has never stopped. On an annual basis they go through over 8 million pounds of tortillas and 500,000 pounds of beef. It is not trying to be authentic Mexican food — it is its own thing entirely, a Southern California mutation that became an institution. The first stop when picking anyone up from LAX. The thing expats miss most. Full-time employees get full medical and dental for their families.","ys":1959,"tl":[{"y":"1959","x":"Tito's Tacos opens on Washington Place in Culver City"},{"y":"2015","x":"Bean & cheese burrito ranked #1 in America by The Daily Meal"},{"y":"2016","x":"Wins trademark case against Vermont taco stand using name"}],"tags":["1959","Hard Shell","Culver City","Institution"],"rel":["originaltommys","chilijohns","applepan","greek","palladium"],"w":"Tito%27s_Tacos","s":"active"},{"id":"chilijohns","h":"burbank","n":"Chili John's","t":"Chili Parlor","c":"food","lat":34.18,"lng":-118.3337,"a":"2018 W Burbank Blvd, Burbank","i":"🌶️","d":"Lithuanian immigrant John Isaac started serving Southwestern chili at his Green Bay, Wisconsin bar in 1900. By 1913 the chili was so popular he renamed the place Chili John's. His son Ernie moved to California and opened this Burbank outpost in 1946, installing the iconic U-shaped counter and painting the mountain lake mural himself — he was an avid fisherman. Burbank's oldest continuously operating restaurant. The recipe has not changed: chili over spaghetti or rice, oyster crackers, shredded cheese, and the question 'how hot?'— from mild to 'Are You Sure?' Workers from the nearby Lockheed plant and early Disney animators were regulars. Featured in Twin Peaks: The Return, Once Upon a Time in Hollywood, and The Rookie. In 2025, facing declining business from reduced film production in Burbank, they opened The Taproom next door to stay afloat.","ys":1946,"tl":[{"y":"1900","x":"John Isaac starts serving chili at Green Bay bar"},{"y":"1913","x":"Renamed Chili John's in Green Bay"},{"y":"1946","x":"Son Ernie opens Burbank location — U-shaped counter installed"},{"y":"2021","x":"Featured on Restaurant Recovery with Todd Graves & Snoop Dogg"},{"y":"2025","x":"Opens The Taproom next door to sustain business"}],"tags":["1946","Chili","U-Shaped Counter","Twin Peaks","Burbank Oldest"],"rel":["originaltommys","titostacos","applepan","artsdeli"],"w":"Chili_John%27s","s":"active"},{"id":"applepan","h":"westla","n":"The Apple Pan","t":"Counter Diner","c":"food","lat":34.0407,"lng":-118.4278,"a":"10801 W Pico Blvd","i":"🍔","d":"Ellen and Alan Baker opened this 26-seat U-shaped counter on Pico Boulevard on April 11, 1947. A neighbor brought flowers for the counter on opening day. The Hickoryburger — quarter-pound patty, cheddar, pickles, tangy barbecue sauce on a soft bun — has not changed since. Neither has the banana cream pie, the apple pie with vanilla ice cream, or the red plaid wallpaper. Johnny Rockets founder Ronn Teitelbaum copied the entire concept — menu, counter, grilling style — after the Baker family turned down his franchise proposal. Jonathan Gold called it essential. Third-generation owner Sunny Sherman sold to Irving and Shelli Azoff in 2019 — longtime customers who vowed to preserve everything. In February 2025, they opened on Mondays for the first time in 78 years. Cash-only policy finally ended. Everything else remains.","ys":1947,"tl":[{"y":"1947","x":"Ellen & Allan Baker open The Apple Pan on Pico Blvd"},{"y":"1986","x":"Johnny Rockets founded using Apple Pan as template"},{"y":"2019","x":"Sold to Irving & Shelli Azoff — preservation promised"},{"y":"2025","x":"Opens on Mondays for first time in 78 years"}],"tags":["1947","Hickoryburger","U-Shaped Counter","Johnny Rockets Origin"],"rel":["originaltommys","titostacos","chilijohns","benfranks"],"w":"The_Apple_Pan","s":"active"},{"id":"smokehouse","h":"burbank","n":"The Smokehouse","t":"Restaurant","c":"food","lat":34.1457,"lng":-118.3415,"a":"4420 Lakeside Dr, Burbank","i":"🥩","d":"The Smokehouse has been feeding the Warner Bros. lot since 1946. George Burns held court here for decades at his regular booth. The steaks are enormous, the cocktails are stiff, and the red-tufted booths have absorbed enough industry conversation to power a thousand podcasts. Open and feeding the lot since 1946.","ys":1946,"tl":[{"y":"1946","x":"Opens next to Warner Bros lot"},{"y":"1955","x":"George Burns becomes a fixture"}],"tags":["Warner Bros","Since 1946","George Burns","Steakhouse"],"rel":["warnerbros","disneystudios","casavega","artsdeli"],"w":"The_Smokehouse_(restaurant)","s":"active"},{"id":"doncucos","h":"burbank","n":"Don Cuco's","t":"Mexican Restaurant","c":"food","lat":34.1524,"lng":-118.3425,"a":"3911 W Riverside Dr, Burbank","i":"🌮","d":"A Valley Mexican institution since the 1970s. Giant margaritas, combination plates, mariachi on weekends, decor that hasn't changed in decades. The kind of restaurant where regulars have the same table for thirty years.","ys":1975,"tl":[{"y":"1975","x":"Opens in Burbank"}],"tags":["Mexican","Burbank","Margaritas","Valley Classic"],"rel":["smokehouse","casavega","artsdeli","warnerbros"],"s":"active"},{"id":"guelaguetza","h":"ktown","n":"Guelaguetza","t":"Oaxacan Restaurant","c":"food","lat":34.0524,"lng":-118.3007,"a":"3014 W Olympic Blvd","i":"🫔","d":"The Lopez family brought Oaxacan food to Los Angeles and changed the city. Guelaguetza has been the definitive destination for mole negro, tlayudas, and mezcal since 1994. The recipes are from Oaxaca — not interpretation, the real thing. James Beard America's Classics Award 2015, years overdue. The Sunday family meal here is one of the great LA dining experiences.","ys":1994,"tl":[{"y":"1994","x":"Opens on Olympic Blvd"},{"y":"2015","x":"James Beard America's Classics Award"}],"tags":["Oaxacan","James Beard","Lopez Family","Mole"],"rel":["langers","tombgins","cassells","elcholo"],"w":"Guelaguetza_(restaurant)","s":"active"},{"id":"elcholo","h":"ktown","n":"El Cholo (Original)","t":"Mexican Restaurant","c":"food","lat":34.0501,"lng":-118.3091,"a":"1121 S Western Ave","i":"🌯","d":"The oldest Mexican restaurant in Los Angeles. Aurelia and Alejandro Borquez opened it in 1923 as The Spanish Kitchen, renamed El Cholo in 1927. The frozen margarita was invented here in 1971 — bar staff rigged a soft-serve machine. The green corn tamales only available May through October. Reagan ate here. Nixon ate here. Every Los Angeles family has a story about El Cholo. Run by the Salisbury family, who bought it inn 1953.","ys":1923,"tl":[{"y":"1923","x":"Opens as The Spanish Kitchen"},{"y":"1927","x":"Renamed El Cholo"},{"y":"1953","x":"Salisbury family takes over"},{"y":"1971","x":"Frozen margarita invented here"}],"tags":["Oldest","1923","Frozen Margarita","Western Ave"],"rel":["guelaguetza","brownderbyog","ambassador","elcoyote"],"w":"El_Cholo","s":"active"},{"id":"elcoyote","h":"fairfax","n":"El Coyote","t":"Mexican Restaurant","c":"food","lat":34.0759,"lng":-118.3492,"a":"7312 Beverly Blvd","i":"🌮","d":"Open since 1931. The margaritas are enormous and lethal. The old-school Mexican-American combination plates, the tiled walls, painted sombreros, and colored lights have not changed in decades. Sharon Tate had her last dinner here on August 8, 1969, before going to Cielo Drive. Her table is there. People ask to sit at it. El Coyote does not advertise this.","ys":1931,"tl":[{"y":"1931","x":"Opens on Beverly Blvd"},{"y":"1969","x":"Sharon Tate's last meal, August 8"}],"tags":["Since 1931","Sharon Tate","Margaritas","Beverly Blvd"],"rel":["elcholo","canters","farmersmarket","formosa"],"w":"El_Coyote_Cafe","s":"active"},{"id":"gehryhome","h":"santamonica","n":"Gehry Residence","t":"Architectural Landmark","c":"culture","lat":34.0353,"lng":-118.4846,"a":"1002 22nd St, Santa Monica","i":"🏠","d":"In 1978, Frank Gehry bought a Dutch Colonial house in Santa Monica and wrapped it in corrugated steel, chain-link fencing, and exposed plywood. The neighbors were furious. Architecture critics were electrified. It announced a completely new way of thinking about space and material. Gehry lived here for decades while designing the Guggenheim Bilbao and Disney Concert Hall. The house that changed architecture is a private residence on a quiet Santa Monica street.","ys":1978,"tl":[{"y":"1977","x":"Gehry purchases Dutch Colonial"},{"y":"1978","x":"Renovation complete — chain-link and corrugated steel"}],"tags":["Frank Gehry","Deconstructivism","Architecture","Private Residence"],"rel":["laphil","georgianhotel","bergamot","gettycenter"],"w":"Gehry_Residence","s":"active"},{"id":"belascotheatre","h":"downtown","n":"Belasco Theatre","t":"Historic Theatre","c":"culture","lat":34.0408,"lng":-118.2591,"a":"1050 S Hill St","i":"🎭","d":"Opened 1926 as a Broadway-caliber house — 1,700 seats, Beaux-Arts facade, Ziegfeld Follies and vaudeville. When live theatre died downtown it became a church, then a nightclub, then a rave venue. The ornate interior — painted ceilings, carved plasterwork — survived all of it. Currently an event venue, the bones of a 1926 Broadway house intact.","ys":1926,"tl":[{"y":"1926","x":"Opens as Broadway Theatre"},{"y":"1965","x":"Becomes a church"},{"y":"1995","x":"Nightclub and event space"}],"tags":["1926","Beaux-Arts","Downtown","Theatre"],"rel":["milliondollar","orpheum","latower","olympicaud"],"w":"Belasco_Theatre_(Los_Angeles)","s":"active"},{"id":"hammer","h":"westla","n":"Hammer Museum","t":"Art Museum","c":"culture","lat":34.0595,"lng":-118.4438,"a":"10899 Wilshire Blvd, Westwood","i":"🖼️","d":"Armand Hammer built this in 1990 next to Occidental Petroleum to house his personal collection — a vanity project. After Hammer died, UCLA took over and turned it into something genuinely important. The Made in LA biennial is one of the most significant showcases for working LA artists. Free admission since 2012. What started as a rich man's monument became an actual institution.","ys":1990,"tl":[{"y":"1990","x":"Armand Hammer opens with personal collection"},{"y":"1994","x":"UCLA takes over"},{"y":"2012","x":"Free admission begins"}],"tags":["UCLA","Free","Made in LA","Westwood"],"rel":["lacma","bergamot","thebroad","gettycenter","nuart"],"w":"Hammer_Museum","s":"active"},{"id":"shrineaud","h":"southla","n":"Shrine Auditorium","t":"Concert Hall","c":"music","lat":34.0234,"lng":-118.2814,"a":"665 W Jefferson Blvd","i":"🎶","d":"Built 1926 by the Shriners — Moorish Revival, horseshoe arches, minarets, 6,300 seats. The largest auditorium on the West Coast for decades. The Oscars were held here for thirty years. Grammys from 2000 to 2003. Michael Jackson filmed Remember the Time here. Before Staples Center, this is where the biggest things in LA entertainment happened.","ys":1926,"tl":[{"y":"1926","x":"Opens — largest auditorium on West Coast"},{"y":"1940s-90s","x":"Academy Awards held here"},{"y":"2000-03","x":"Grammy Awards"},{"y":"2003","x":"Oscars move to Dolby Theatre"}],"tags":["Grammys","Oscars","Moorish Revival","6300 Seats"],"rel":["coliseum","theforum","sportsarena","smcivic","palladium"],"w":"Shrine_Auditorium_and_Expo_Hall","s":"active"},{"id":"stockroom","h":"silverlake","n":"The Stockroom","t":"Leather & Lifestyle Shop","c":"shop","lat":34.1069,"lng":-118.2626,"a":"1769 Glendale Blvd","i":"🔗","d":"The definitive leather, bondage, and alternative lifestyle retailer on the West Coast, operating out of Silver Lake since the early 1990s when Silver Lake was genuinely underground. Survived the neighborhood transformation from leather bar scene to artisanal coffee without changing what it is. A professional, non-judgmental operation serving its community for three decades.","ys":1988,"tl":[{"y":"1988","x":"Founded in Silver Lake by Joel Tucker"},{"y":"1990","x":"Launches as one of first online sex toy retailers"}],"tags":["Leather","Alternative","Silver Lake","LGBTQ"],"rel":["akbar","thecircus","theabbey","blackcat"],"s":"active"},{"id":"beyondbaroque","h":"venice","n":"Beyond Baroque","t":"Literary Arts Center","c":"culture","lat":33.9904,"lng":-118.4594,"a":"681 Venice Blvd","i":"📖","d":"Founded in 1968, Beyond Baroque became the center of the West Coast poetry renaissance. Bukowski read here. Ginsberg read here. The LA poetry scene was forged in this building. Since 1979 it has been in the old Venice City Hall — a 1906 building with creaking floors and fifty years of literary atmosphere. Weekly readings happen. The bookshop specializes in small press and chapbooks.","ys":1968,"tl":[{"y":"1968","x":"Founded by George Drury Smith"},{"y":"1979","x":"Moves to 1906 Venice City Hall"},{"y":"1975","x":"Bukowski and Ginsberg read here"}],"tags":["Poetry","Bukowski","Ginsberg","Venice","Literary Arts"],"rel":["venicewest","beatgen","smallworld","stories"],"w":"Beyond_Baroque_Literary_Arts_Center","s":"active"},{"id":"donuthole","h":"pasadena","n":"The Donut Hole","t":"Drive-Through Donut Stand","c":"food","lat":34.0371,"lng":-117.9517,"a":"15300 Amar Rd, La Puente","i":"🍩","d":"You drive through a giant concrete donut to get your donuts. Built 1968 in La Puente — two enormous donut-shaped structures, your car passing through the hole to reach the window. The purest expression of programmatic architecture: the LA tradition of buildings shaped like the thing they sell. Not a novelty. Has been selling good donuts through a donut-shaped building for over fifty years because it works.","ys":1968,"tl":[{"y":"1968","x":"Opens — drive-through donut building"}],"tags":["Programmatic Architecture","Drive-Through","La Puente","Icon"],"rel":["carneys","bobsbigboy"],"w":"The_Donut_Hole","s":"active"},{"id":"brentsdeli","h":"valley","n":"Brent's Deli","t":"Jewish Deli","c":"food","lat":34.2289,"lng":-118.5603,"a":"19565 Parthenia St, Northridge","i":"🥪","d":"Open since 1967 in Northridge — the Valley's Jewish deli, the one that kept the faith. The pastrami is hand-carved. The matzoh ball soup is the real thing. When the 1994 earthquake damaged the building, they reopened in two weeks. A second location in Westlake Village. The original Parthenia St location packs them in.","ys":1967,"tl":[{"y":"1967","x":"Opens in Northridge"},{"y":"1994","x":"Northridge earthquake — reopens in 2 weeks"}],"tags":["Jewish Deli","Northridge","Pastrami","Since 1967"],"rel":["artsdeli","canters","langers","farmersmarket"],"w":"Brent%27s_Deli","s":"active"},{"id":"academycafe","h":"echopark","n":"Academy Cafe (Police Academy)","t":"Restaurant","c":"food","lat":34.0820566,"lng":-118.2417158,"a":"1880 Academy Dr, Los Angeles, CA 90012","i":"🍽️","d":"Diner inside the LAPD Police Academy in Elysian Park, open to the public weekday mornings. The building started as a dormitory at the 1932 Olympic Village in Baldwin Hills — off-duty officers dismantled and reassembled it in Elysian Park after the Games. Academy completed in 1935. The rock garden outside, designed by Francois Scotti (same artist behind Clifton's waterfall downtown), became Cultural Heritage Monument #110. Retro counter seating, cop memorabilia on every wall, cheap breakfast, and the sound of gunfire from the adjacent range. You can buy an actual firearm in the gift shop next door. Closed for a three-year remodel in 2014, reopened around 2017 with Aramark running the kitchen.","ys":1935,"tl":[{"y":"1935","x":"Police Academy completed in Elysian Park — first class graduates 1936"},{"y":"1937","x":"Francois Scotti builds the rock garden — later designated Cultural Heritage Monument #110"},{"y":"2014","x":"Cafe closes for three-year renovation"},{"y":"2017","x":"Reopens with Aramark running the kitchen"}],"tags":["Police Academy","Elysian Park","Diner","Retro"],"rel":["dodgerstadium","echoparklake","taix"],"s":"active"},{"id":"lulusalibi","h":"westla","n":"Lulu's Alibi","t":"Coffee House","c":"food","lat":34.0463,"lng":-118.4479,"a":"1640 Sawtelle Blvd","i":"☕","d":"The woman known simply as Lulu grew up a 'red booth baby' in the Las Vegas restaurant business, spent 17 years waiting tables and tending bar, and in 1990 opened the place she always wanted to exist. Lulu's Alibi — Home of the Blueplate — became an immediate neighborhood institution on Sawtelle, drawing writers, painters, musicians, and the Nuart crowd. Known for perfectly brewed coffee, hearty breakfasts, and a deep-fried Twinkie that became legendary. The walls rotated as an ever-changing gallery. Ozzy Osbourne, when he finally decided to show his drawings and paintings publicly for the first time, chose Lulu's. When earthquake relief needed organizing or an AIDS benefit needed a home, Lulu's was the room.","ys":1990,"ye":2000,"tl":[{"y":"1990","x":"Lulu's Alibi opens on Sawtelle Blvd"},{"y":"1998","x":"Renamed Lulu's Blue Plate"},{"y":"2000","x":"Closes"}],"tags":["Coffee House","West LA","Nuart","Gallery","Closed"],"rel":["hinano","townhouse","yerustic","drawingroom"],"s":"closed"},{"id":"nortonsimon","h":"pasadena","n":"Norton Simon Museum","t":"Art Museum","c":"culture","lat":34.1464,"lng":-118.1593,"a":"411 W Colorado Blvd, Pasadena","i":"🖼️","d":"Norton Simon spent forty years obsessively acquiring art and then built a museum in Pasadena. The collection is extraordinary — Rembrandt, Rubens, Degas, Picasso, an entire wing of Indian and Southeast Asian sculpture. Frank Gehry redesigned the gardens in 2008. The intimacy of the building makes it the best museum-going experience in Southern California. You can stand close to a Rembrandt without a crowd.","ys":1974,"tl":[{"y":"1974","x":"Opens as Norton Simon Museum"},{"y":"2008","x":"Gehry redesigns sculpture garden"}],"tags":["Art Museum","Rembrandt","Pasadena","Gehry Garden"],"rel":["rosebowl","gamblehouse","coloradobridge","hammer"],"w":"Norton_Simon_Museum","s":"active"},{"id":"rosebowl","h":"pasadena","n":"Rose Bowl","t":"Stadium","c":"culture","lat":34.1613,"lng":-118.1677,"a":"1001 Rose Bowl Dr, Pasadena","i":"🏈","d":"Built 1922, the Rose Bowl is the most storied college football stadium in America. The Granddaddy of Them All — the Rose Bowl Game has been played here since 1902. FIFA World Cup matches in 1994. The 1984 Olympics. Beyonce sold out back-to-back shows. On non-game days, the Rose Bowl flea market fills the parking lot with the best vintage shopping in Southern California.","ys":1922,"tl":[{"y":"1922","x":"Rose Bowl opens"},{"y":"1923","x":"First Rose Bowl Game"},{"y":"1984","x":"Summer Olympics"},{"y":"1994","x":"FIFA World Cup matches and final"}],"tags":["Rose Bowl Game","1922","Flea Market","World Cup","Olympics"],"rel":["coliseum","nortonsimon","gamblehouse","coloradobridge"],"w":"Rose_Bowl_Stadium","s":"active"},{"id":"gamblehouse","h":"pasadena","n":"The Gamble House","t":"Arts & Crafts Architecture","c":"culture","lat":34.1516,"lng":-118.161,"a":"4 Westmoreland Pl, Pasadena","i":"🏡","d":"Designed by Greene and Greene in 1908 for the Procter and Gamble family — the definitive masterpiece of the American Arts and Crafts movement. Every joint, every beam, every piece of furniture designed as a unified whole. The woodwork — teak, oak, cedar — is impossibly refined. Steven Spielberg used it as Doc Brown's house in Back to the Future. Tours run by the USC School of Architecture.","ys":1908,"tl":[{"y":"1908","x":"Completed by Greene and Greene"},{"y":"1966","x":"City of Pasadena preserves it"},{"y":"1985","x":"Used in Back to the Future as Doc's house"}],"tags":["Arts and Crafts","Greene and Greene","Back to the Future","Architecture"],"rel":["nortonsimon","coloradobridge","hollyhock","lovell"],"w":"Gamble_House","s":"active"},{"id":"coloradobridge","h":"pasadena","n":"Colorado Street Bridge","t":"Historic Bridge","c":"culture","lat":34.144,"lng":-118.1685,"a":"Colorado St, Pasadena","i":"🌉","d":"Built 1913, spanning the Arroyo Seco at 150 feet. Elegant Beaux-Arts arches against the canyon. It acquired the dark nickname Suicide Bridge during the Depression, when desperate Pasadenans leapt from it in large numbers. In 2014 the city installed crisis hotline phones. The bridge is beautiful and it carries a weight that history put on it.","ys":1913,"tl":[{"y":"1913","x":"Completed — 150 ft above Arroyo Seco"},{"y":"1933","x":"Depression-era suicides — becomes Suicide Bridge"},{"y":"2014","x":"Crisis hotline phones installed"}],"tags":["Suicide Bridge","1913","Beaux-Arts","Arroyo Seco"],"rel":["gamblehouse","nortonsimon","rosebowl"],"w":"Colorado_Street_Bridge","s":"active"},{"id":"icehousepas","h":"pasadena","n":"The Ice House","t":"Comedy Club","c":"music","lat":34.1467,"lng":-118.1308,"a":"24 N Mentor Ave, Pasadena","i":"🎤","d":"Opened 1960 in a building that was literally an ice house. One of the oldest comedy clubs in America — Steve Martin performed here early in his career, as did David Letterman, Lily Tomlin, and George Carlin. An intimate room of about 200 people where the comics were serious artists at a time when stand-up was figuring out what it was.","ys":1960,"tl":[{"y":"1960","x":"Opens in former ice house building"},{"y":"1965","x":"Steve Martin, Lily Tomlin, Carlin perform"}],"tags":["Comedy","Steve Martin","Since 1960","Pasadena"],"rel":["comedy","groundlings","laugh","nortonsimon"],"w":"The_Ice_House_(comedy_club)","s":"active"},{"id":"vromans","h":"pasadena","n":"Vroman's Bookstore","t":"Bookstore","c":"shop","lat":34.1461,"lng":-118.1362,"a":"695 E Colorado Blvd, Pasadena","i":"📚","d":"The oldest and largest independent bookstore in Southern California. Adam Clark Vroman opened it in 1894 on Colorado Blvd. 130 years later it is on Colorado Blvd, independent, doing author signings, staffed by people who actually read the books. Vroman was also a renowned photographer of the American Southwest.","ys":1894,"tl":[{"y":"1894","x":"A.C. Vroman opens bookstore"}],"tags":["Oldest Bookstore","Since 1894","Independent","Pasadena"],"rel":["skylight","lastbookstore","larryedmunds","nortonsimon"],"w":"Vroman%27s_Bookstore","s":"active"},{"id":"pienburgerpas","h":"pasadena","n":"Pie 'n Burger","t":"Diner","c":"food","lat":34.1361,"lng":-118.1314,"a":"913 E California Blvd, Pasadena","i":"🍔","d":"Opened 1963 on California Blvd near Caltech. The burger is a classic smash patty on a soft bun — nothing complicated, nothing that needed changing. The pie is from scratch, a full slice spinning in the case on the counter. The same family running it for sixty years. Caltech students and professors have eaten here for three generations.","ys":1963,"tl":[{"y":"1963","x":"Opens on California Blvd"}],"tags":["Diner","Since 1963","Caltech","Burgers"],"rel":["applepan","dupars","artsdeli","nortonsimon"],"s":"active"},{"id":"aztechotel","h":"pasadena","n":"Aztec Hotel","t":"Historic Hotel","c":"hotel","lat":34.1515,"lng":-118.0058,"a":"311 W Foothill Blvd, Monrovia","i":"🏨","d":"Designed by Robert Stacy-Judd, opened 1925 along Route 66 in Monrovia. The only surviving Mayan Revival hotel in the United States — terra cotta reliefs of serpents and masked faces, geometric Pre-Columbian motifs everywhere, a facade that looks like it belongs in the Yucatan. Stacy-Judd was obsessed with Mayan architecture and built this when most Americans had never heard of it. On the National Register. Currently being restored.","ys":1925,"tl":[{"y":"1925","x":"Opens on Route 66 in Monrovia"},{"y":"1978","x":"Added to National Register"}],"tags":["Mayan Revival","Route 66","1925","Architecture","Monrovia"],"rel":["gamblehouse","nortonsimon","coloradobridge"],"w":"Aztec_Hotel","s":"active"},{"id":"brentwoodmart","h":"brentwood","n":"Brentwood Country Mart","t":"Outdoor Shopping Village","c":"shop","lat":34.0479,"lng":-118.4912,"a":"225 26th St, Santa Monica","i":"🛒","d":"Built 1948 as a cluster of small shops around a central barn-style building at 26th and San Vicente. Started as practical neighborhood retail, became an institution. James Beard shopped here. The red barn is the landmark. The chicken stand in the center court has been there for decades. One of the last examples of walkable neighborhood retail in LA that survived without becoming a mall.","ys":1948,"tl":[{"y":"1948","x":"Opens at 26th and San Vicente"}],"tags":["1948","Red Barn","26th Street","Neighborhood Retail"],"rel":["farmersmarket","gehryhome","hammer","gettycenter"],"s":"active"},{"id":"gettycenter","h":"brentwood","n":"The Getty Center","t":"Art Museum","c":"culture","lat":34.077,"lng":-118.4757,"a":"1200 Getty Center Dr","i":"🏛️","d":"The Getty Trust built this on a hilltop above the 405 — designed by Richard Meier, opened 1997 after a fourteen-year construction. Travertine buildings, sculpture gardens, views across the city to the ocean. The collection includes van Gogh's Irises and Monet's Wheatstacks. Always free. The tram up the hill is part of the experience.","ys":1997,"tl":[{"y":"1997","x":"Getty Center opens after 14 years of construction"}],"tags":["Free","Richard Meier","Travertine","Views","van Gogh"],"rel":["hammer","lacma","nortonsimon","thebroad","gehryhome"],"w":"Getty_Center","s":"active"},{"id":"duttonsbooks","h":"brentwood","n":"Dutton's Brentwood Books","t":"Bookstore (Closed)","c":"shop","lat":34.0526,"lng":-118.4719,"a":"11975 San Vicente Blvd","i":"📚","d":"For thirty years the Westside's landmark independent bookstore — a rambling multi-room shop where the shelves were jammed and the staff knew what they were talking about. Authors did signings here. A genuine community anchor. Closed 2008 when the lease was not renewed. The Brentwood neighborhood has never quite replaced it.","ys":1984,"ye":2008,"tl":[{"y":"1978","x":"Dutton's opens on San Vicente"},{"y":"2008","x":"Closes — lease not renewed"}],"tags":["Bookstore","Closed 2008","San Vicente","Westside Loss"],"rel":["booksoup","skylight","lastbookstore","vromans"],"s":"closed"},{"id":"willrogers","h":"brentwood","n":"Will Rogers State Historic Park","t":"Historic Park","c":"culture","lat":34.0544,"lng":-118.5131,"a":"1501 Will Rogers State Park Rd, Pacific Palisades","i":"🤠","d":"Will Rogers — cowboy philosopher, radio star, actor, and the most beloved American of his era — bought this land in 1922. He died in an Alaska plane crash with Wiley Post in 1935. His wife Betty kept the ranch and eventually donated it to the state. The house is preserved as the family left it. The polo field where Rogers played every Sunday is active.","ys":1922,"tl":[{"y":"1922","x":"Rogers purchases the ranch"},{"y":"1935","x":"Rogers dies in Alaska plane crash"},{"y":"1944","x":"Betty Rogers donates to the state"}],"tags":["Will Rogers","1922","Ranch","Polo","Pacific Palisades"],"rel":["gettycenter","brentwoodmart","griffith"],"w":"Will_Rogers_State_Historic_Park","s":"active"},{"id":"fairoaks","h":"pasadena","n":"Fair Oaks Pharmacy","t":"Soda Fountain","c":"food","lat":34.116,"lng":-118.1505,"a":"1526 Mission St, South Pasadena","i":"🍦","d":"An old-fashioned soda fountain that has been serving phosphates and malts since the 1915 building went up on Mission Street. The interior is a time capsule — wooden phone booths, penny candy, hand-scooped ice cream. Route 66 ran directly past the front door, making it a last stop before the push to Santa Monica. South Pasadena has protected it fiercely from demolition and the 710 freeway extension that would have flattened the entire block.","ys":1915,"tl":[{"y":"1915","x":"Building erected on Mission St"},{"y":"1935","x":"Route 66 runs past front door"}],"tags":["Soda Fountain","Route 66","South Pasadena"],"w":"South_Pasadena,_California","s":"active"},{"id":"pasadenaplayhouse","h":"pasadena","n":"Pasadena Playhouse","t":"Historic Theater","c":"culture","lat":34.1451,"lng":-118.1373,"a":"39 S El Molino Ave, Pasadena","i":"🎭","d":"Designated the State Theater of California in 1937 — the only theater in the state to hold that title. The Playhouse School of Theatre trained Gene Hackman, Dustin Hoffman, and Raymond Burr before any of them were famous. During the golden age, it premiered more new plays than any theater outside New York. Went bankrupt in 1969, sat dark for years, and was revived in 1986. The Spanish Colonial Revival building is gorgeous — arched loggias and a courtyard that feels like old California.","ys":1925,"tl":[{"y":"1925","x":"Gilmor Brown's company moves into current building on El Molino Ave"},{"y":"1925","x":"Moves to current building"},{"y":"1937","x":"Named State Theater of California"},{"y":"1969","x":"Goes bankrupt — goes dark"},{"y":"1986","x":"Revived and restored"}],"tags":["State Theater","Gene Hackman","Dustin Hoffman","Spanish Colonial"],"w":"Pasadena_Playhouse","s":"active"},{"id":"huntington","h":"pasadena","n":"Huntington Library","t":"Library, Museum & Gardens","c":"culture","lat":34.129,"lng":-118.1145,"a":"1151 Oxford Rd, San Marino","i":"📜","d":"Railroad baron Henry Huntington bought everything — land, streetcar lines, art, rare books, and 120 acres in San Marino where he built a research library that now holds a Gutenberg Bible, a folio of Shakespeare, Thoreau's journals, and millions of other manuscripts. The gardens are twelve distinct landscapes including a Japanese garden and a desert garden with the largest outdoor collection of cacti and succulents in the world. Technically in San Marino, not Pasadena, but nobody draws that line.","ys":1919,"tl":[{"y":"1919","x":"Huntington establishes the institution"},{"y":"1928","x":"Opens to the public"}],"tags":["Gutenberg Bible","Gardens","Rare Books","Railroad Baron"],"w":"Huntington_Library","s":"active"},{"id":"castlegreen","h":"pasadena","n":"Castle Green","t":"Historic Apartments","c":"hotel","lat":34.1439,"lng":-118.149,"a":"99 S Raymond Ave, Pasadena","i":"🏰","d":"A Moorish and Spanish Colonial fantasy built in 1898 as the annex to the Hotel Green, Pasadena's grandest resort during the era when East Coast money wintered in California. The bridge that connected it to the main hotel is long gone. The building survived as apartments — increasingly eccentric ones. Film crews love it: it has appeared in everything from The Sting to Bugsy to Mad Men. The ornate interior courtyard and painted ceilings are intact. A survivor from when Pasadena was the destination, not a suburb.","ys":1898,"tl":[{"y":"1898","x":"Built as Hotel Green annex"},{"y":"1925","x":"East Coast elite winter resort"},{"y":"1955","x":"Converted to apartments"}],"tags":["Moorish","Film Location","Mad Men","The Sting"],"w":"Castle_Green_(Pasadena,_California)","s":"active"},{"id":"ambassadoraud","h":"pasadena","n":"Ambassador Auditorium","t":"Concert Hall","c":"culture","lat":34.1434,"lng":-118.1566,"a":"131 S St John Ave, Pasadena","i":"🎵","d":"Herbert W. Armstrong's Worldwide Church of God built this concert hall in 1974 and spared no expense — the acoustics were designed to rival the best halls in Europe. Luciano Pavarotti, Ella Fitzgerald, and Vladimir Horowitz all performed here. When the church imploded in the 1990s, the auditorium went dark. The hall hosts occasional events, but its peak as a world-class concert venue was brief and strange — a doomsday church building one of the finest acoustic spaces in California.","ys":1974,"tl":[{"y":"1974","x":"Opens — world-class acoustics"},{"y":"1985","x":"Pavarotti, Fitzgerald, Horowitz perform"},{"y":"1995","x":"Church collapses — hall goes dark"}],"tags":["Acoustics","Worldwide Church of God","Pavarotti"],"w":"Ambassador_Auditorium","s":"active"},{"id":"ricksdrivein","h":"silverlake","n":"Rick's Drive In & Out","t":"Burger Stand","c":"food","lat":34.106,"lng":-118.2562,"a":"2400 Fletcher Dr","i":"🍔","d":"A no-frills burger stand on Fletcher Drive near the 2 freeway that has been feeding the eastside since 1969. The original opened first; the Fletcher location arrived in 1981 and became the mothership. Open until midnight, drive-thru or counter service, breakfast burritos voted among the best in LA. Dodger fans treat it as a mandatory pre-game stop. The menu runs from burgers to Mexican to breakfast, all of it cheap and fast. The kind of place that has survived every wave of gentrification because the neighborhood refuses to let it die.","ys":1981,"tl":[{"y":"1969","x":"First location opens"},{"y":"1981","x":"Fletcher Dr location opens — becomes the flagship"}],"tags":["Burgers","Drive-Thru","Dodgers","Eastside Institution"],"s":"active"},{"id":"vicentefoods","h":"brentwood","n":"Vicente Foods","t":"Neighborhood Market","c":"shop","lat":34.0525,"lng":-118.4738,"a":"12027 San Vicente Blvd","i":"🛒","d":"The independently owned grocery store that Brentwood refuses to let die. Open since 1958, it has survived Whole Foods, Erewhon, and every boutique grocer that has tried to muscle into the neighborhood. The butcher counter is legendary. The produce section is curated. The aisles are narrow and the parking lot is a war zone, but that is part of the charm. A relic of when every neighborhood had its own market run by people who knew your name.","ys":1958,"tl":[{"y":"1958","x":"Opens on San Vicente Blvd"}],"tags":["Grocery","Independent","Brentwood Institution","Butcher Counter"],"s":"active"},{"id":"sanvicenteinn","h":"weho","n":"San Vicente Inn","t":"Historic Guest House","c":"hotel","lat":34.0859,"lng":-118.385,"a":"845 N San Vicente Blvd, West Hollywood","i":"🏳️‍🌈","d":"One of the first openly gay guesthouses in Los Angeles, operating from the early 1970s through 2018. A clothing-optional compound with a pool, sun deck, and rooms that hosted decades of queer travelers and LA transplants getting their bearings. Quiet, discreet, surrounded by trees — the opposite of the WeHo club scene three blocks away. In 2018, Jeff Klein (owner of Sunset Tower Hotel) converted the property into San Vicente Bungalows, an exclusive members-only private club. The gay guesthouse is gone; the bungalows remain.","ys":1970,"ye":2018,"tl":[{"y":"1970","x":"Opens as gay guesthouse"},{"y":"2018","x":"Converted to San Vicente Bungalows — members-only private club"}],"tags":["LGBTQ","Guesthouse","WeHo","Historic"],"s":"closed"},{"id":"caioti","h":"studiocity","n":"Caioti Pizza Cafe","t":"Pizza & Maternity Legend","c":"food","lat":34.149,"lng":-118.3789,"a":"4346 Tujunga Ave, Studio City","i":"🍕","d":"A tiny pizza joint on Tujunga with a cult following among pregnant women. The legend: Caioti's special salad — romaine, watercress, walnuts, Gorgonzola, and a proprietary balsamic dressing — induces labor. There is zero medical evidence for this. Pregnant women eat it anyway, sometimes driving from hours away. The pizza is also good, but nobody talks about the pizza. The salad is the star, and the babies keep coming.","ys":1986,"tl":[{"y":"1986","x":"Opens on Tujunga Ave"},{"y":"1995","x":"Labor-inducing salad legend begins"}],"tags":["Pizza","Labor Salad","Urban Legend","Cult Following"],"s":"active"},{"id":"bradybunch","h":"studiocity","n":"Brady Bunch House","t":"TV Landmark","c":"culture","lat":34.143,"lng":-118.3756,"a":"11222 Dilling St, Studio City","i":"📺","d":"The split-level ranch house used for exterior shots of The Brady Bunch from 1969 to 1974. Only the outside was filmed here — the interiors were all on a Paramount soundstage. HGTV bought the house in 2018 for $3.5 million and spent another $1.9 million renovating the interior to match the TV set, including the famous floating staircase and orange-and-green kitchen. The most photographed house in Studio City. Tourists slow-roll Dilling Street daily.","ys":1959,"tl":[{"y":"1959","x":"House built"},{"y":"1969","x":"Selected for Brady Bunch exterior shots"},{"y":"2018","x":"HGTV buys for $3.5M — renovates interior to match show"}],"tags":["TV History","Brady Bunch","HGTV","Split-Level"],"w":"Brady_Bunch_House","s":"active"},{"id":"elportal","h":"noho","n":"El Portal Theatre","t":"Historic Theater","c":"culture","lat":34.1669,"lng":-118.376,"a":"5269 Lankershim Blvd, North Hollywood","i":"🎭","d":"Built in 1926 as a silent movie palace, converted to live theater in the NoHo Arts District revival of the 1990s. The Art Deco facade survived decades of Valley neglect. Now a 360-seat venue hosting plays, musicals, and comedy — the anchor of NoHo's claim to being a legitimate theater district. The original terrazzo floors and ornamental plasterwork are intact under decades of paint.","ys":1926,"tl":[{"y":"1926","x":"Opens as silent movie palace"},{"y":"1995","x":"Converted to live theater"}],"tags":["Art Deco","NoHo Arts District","Live Theater"],"w":"El_Portal_Theatre","s":"active"},{"id":"federalbar","h":"noho","n":"The Federal Bar","t":"Bar & Restaurant","c":"nightlife","lat":34.1672,"lng":-118.3763,"a":"5303 Lankershim Blvd, North Hollywood","i":"🍸","d":"Housed in a 1926 Parkinson-designed bank building — art deco bones, vaulted ceilings, a giant bank vault door leading to a cocktail lounge. Opened in 2011 by Knitting Factory Entertainment as part of the NoHo Arts District wave, it became the neighborhood's default gathering spot. The second floor became the Knitting Factory NoHo music venue. Closed end of 2023 as rising crime and costs buried the operation. The building became The Witch's Cottage in early 2026 — a cafe-bar-performance venue with fairy-tale interiors and a hidden tabletop gaming room.","ys":2011,"ye":2023,"tl":[{"y":"1926","x":"Built as Security Trust and Savings Bank"},{"y":"2011","x":"Knitting Factory opens The Federal Bar"},{"y":"2023","x":"Closes — crime and costs cited"},{"y":"2026","x":"Becomes The Witch's Cottage"}],"tags":["Bank Vault","Art Deco","Adaptive Reuse","NoHo Arts District"],"s":"closed"},{"id":"circusliquor","h":"noho","n":"Circus Liquor","t":"Liquor Store & Landmark","c":"shop","lat":34.1723,"lng":-118.3702,"a":"5600 Vineland Ave, North Hollywood","i":"🤡","d":"A liquor store with a 32-foot neon clown out front — one of the great surviving neon signs in the Valley. The clown nicknamed \"Valley\" has been towering over Vineland Ave since 1959, holding a drum and grinning maniacally at traffic. Cher got mugged in the parking lot in Clueless. Also appeared in Californication, Blue Thunder, Alpha Dog, and a dozen other productions. The sign is the thing. Inside it is just a liquor store. Outside, it is a Valley icon.","ys":1959,"tl":[{"y":"1959","x":"Opens with 32-foot neon clown"},{"y":"1995","x":"Cher gets mugged here in Clueless"}],"tags":["Neon","Giant Clown","Clueless","Valley Icon"],"s":"active"},{"id":"lankershimart","h":"noho","n":"Lankershim Arts Center","t":"Community Theater","c":"culture","lat":34.1633,"lng":-118.3736,"a":"5108 Lankershim Blvd, North Hollywood","i":"🎪","d":"A Streamline Moderne landmark designed by Charles S. Lee in 1939 for the Department of Water and Power. Designated a Historic-Cultural Monument in 1980, then refurbished and converted into an arts center around 1990. Now operated by the City of LA Department of Cultural Affairs as a home for emerging performing artists in the NoHo Arts District. Multiple small companies share the space — black-box and gallery stages where actors work for next to nothing and the audience is close enough to touch the stage.","ys":1939,"tl":[{"y":"1939","x":"Built as DWP office by architect Charles S. Lee"},{"y":"1980","x":"Designated Los Angeles Historic-Cultural Monument"},{"y":"1990","x":"Refurbished and converted into arts center"}],"tags":["Black Box","99-Seat","NoHo Arts District","Small Theater"],"s":"active"},{"id":"portos","h":"burbank","n":"Porto's Bakery","t":"Cuban Bakery","c":"food","lat":34.1678,"lng":-118.3466,"a":"3614 W Magnolia Blvd, Burbank","i":"🥐","d":"Rosa Porto fled Cuba in 1971 and started baking cakes out of her garage in Echo Park. The family opened the first bakery in Silver Lake in 1976, but the Burbank flagship on Magnolia is the one with the line out the door at 7am every single day. The cheese rolls and potato balls are the draw — cheap, addictive, and produced in industrial quantities. Nobody goes to Porto's for one thing. You go for a cheese roll and leave with a bag of guava pastries, a tres leches cake, and a ham croquette. The line moves fast because they have perfected the chaos.","ys":1976,"tl":[{"y":"1971","x":"Rosa Porto starts baking in Echo Park garage"},{"y":"1976","x":"First bakery opens in Silver Lake"},{"y":"1996","x":"Burbank flagship opens — lines begin"}],"tags":["Cuban","Cheese Rolls","Potato Balls","The Line"],"w":"Porto%27s_Bakery","s":"active"},{"id":"pickwick","h":"burbank","n":"Pickwick Bowl","t":"Bowling & Recreation (Closed)","c":"culture","lat":34.161,"lng":-118.3116,"a":"921 W Riverside Dr, Burbank","i":"🎳","d":"A sprawling recreation complex that has anchored Burbank since 1938 — bowling, ice skating, horseback riding, gardens, and a pub all on one property along the LA River. The Pickwick name comes from Dickens, and the vibe is old Burbank: families, league bowlers, figure skating kids, and studio employees blowing off steam. The ice rink has trained Olympic skaters. The lanes have that mid-century feel. Burbank's living room.","ys":1958,"ye":2023,"tl":[{"y":"1938","x":"Opens on Riverside Dr"},{"y":"1965","x":"Ice rink trains Olympic skaters"},{"y":"2023","x":"Demolished for redevelopment"}],"tags":["Bowling","Ice Skating","Mid-Century","Burbank Institution"],"s":"demolished"},{"id":"castaway","h":"burbank","n":"Castaway Restaurant","t":"Hilltop Restaurant","c":"food","lat":34.2042,"lng":-118.303,"a":"1250 E Harvard Rd, Burbank","i":"🌅","d":"Perched on a hill above Burbank with panoramic views from downtown to the ocean. Originally a Polynesian-themed restaurant in the Tiki era, it burned down and was rebuilt as a more conventional steakhouse and event venue. The food is fine. The view is the point. On a clear day you can see the entire basin laid out below you — every neighborhood on the map visible from one table. The ultimate Valley power lunch spot and prom destination.","ys":1962,"tl":[{"y":"1962","x":"Opens as Polynesian restaurant on the hill"},{"y":"1977","x":"Burns — rebuilt"}],"tags":["View","Hilltop","Polynesian Origins","Valley Power Lunch"],"s":"active"},{"id":"martinos","h":"burbank","n":"Martino's Bakery","t":"Bakery","c":"food","lat":34.1769,"lng":-118.3183,"a":"335 N Victory Blvd, Burbank","i":"🎂","d":"A Burbank bakery institution since 1926, when Victor and Eva Martino started making pies in their garage. The signature is the teacake — a simple, buttery, sugar-dusted dome that has been produced in the same recipe for nearly a century. Wedding cakes, danishes, cupcakes, and breads fill the glass cases. The interior is modest. When Porto's gets all the press, Martino's gets the loyalty — generations of Burbank families who have been buying teacakes here since before the studios moved in. Campbell Soup bought the business in 1981; employees bought it back in 1994 to keep it alive. Family-run.","ys":1926,"tl":[{"y":"1926","x":"Victor and Eva Martino start baking in their garage"},{"y":"1981","x":"Campbell Soup acquires"},{"y":"1994","x":"Employees buy it back — saved from closure"}],"tags":["Bakery","Teacakes","Burbank Institution","Since 1926"],"s":"active"},{"id":"dolphins","h":"southla","n":"Dolphin's of Hollywood","t":"Record Store","c":"shop","lat":34.004,"lng":-118.2572,"a":"1065 E Vernon Ave (at Central Ave)","i":"💿","d":"John Dolphin opened his record store on Central Ave in 1948 and did something revolutionary — he broadcast live from the store, with DJs spinning records in the window while customers bought them on the spot. He would press records for local artists and sell them before the major labels even knew the songs existed. Dolphin was murdered in the store on February 1, 1958, by aspiring singer Percy Ivy in a dispute over payment. The store continued under his wife Ruth into the 1980s. In 2016, the city renamed the intersection of Central and Vernon as Dolphin's of Hollywood Square. A critical and largely forgotten piece of LA's Black music infrastructure.","ys":1948,"ye":1989,"tl":[{"y":"1948","x":"Opens on Central Ave — live radio broadcasts"},{"y":"1955","x":"Pressing and selling records direct to customers"},{"y":"1958","x":"John Dolphin murdered in the store"},{"y":"1964","x":"Ruth Dolphin continues operations"}],"tags":["Record Store","Black Music","Central Ave","Murder","Pioneer"],"w":"John_Dolphin_(music_producer)","s":"closed"},{"id":"wattscoffee","h":"southla","n":"Watts Coffee House","t":"Cafe & Cultural Space","c":"food","lat":33.9432,"lng":-118.2402,"a":"1827 E 103rd St, Watts","i":"☕","d":"A community cafe and cultural hub in the Watts Towers Arts Center complex, blocks from Simon Rodia's towers. More than just coffee — it hosts poetry readings, art shows, music, and community meetings. The space represents the kind of grassroots cultural investment that Watts has built from within, not waiting for outside developers. Good coffee, neighborhood energy, and a direct connection to the towers next door.","ys":1997,"tl":[{"y":"1997","x":"Desiree Edwards reopens historic Watts Coffee House"}],"tags":["Community","Watts","Coffee","Cultural Hub"],"s":"active"},{"id":"angelesfuneral","h":"southla","n":"Angelus Funeral Home","t":"Historic Funeral Home","c":"culture","lat":34.0152,"lng":-118.3358,"a":"3875 Crenshaw Blvd","i":"⚰️","d":"The most historically significant Black funeral home in Los Angeles. Founded in 1923 by a group of community leaders on Central Avenue, Angelus was the first Black-owned business incorporated in California. The original building was designed by Paul R. Williams — the most important African American architect of the twentieth century. John Lamar Hill Sr. built it into a powerhouse; his son became the first Black man on the California State Board of Funeral Directors. The Crenshaw location, also designed by Williams, has hosted the funerals of Dorothy Dandridge, Nat King Cole, Florence Griffith Joyner, and Mayor Tom Bradley. In a community where funeral homes serve as social institutions, Angelus has been the most important one for a century.","ys":1923,"tl":[{"y":"1923","x":"Founded on Central Ave — first Black-incorporated business in CA"},{"y":"1934","x":"Paul R. Williams designs Jefferson Blvd building"},{"y":"1968","x":"Moves to Crenshaw — Williams designs again"}],"tags":["Funeral Home","Black LA","Paul R. Williams","Nat King Cole","Dorothy Dandridge"],"w":"Angelus_Funeral_Home","s":"active"},{"id":"hotcool","h":"southla","n":"ORA (formerly Hot & Cool Cafe)","t":"Vegan Cafe & Community Space","c":"food","lat":34.0051,"lng":-118.3317,"a":"4331 Degnan Blvd","i":"☕","d":"A vegan cafe and cultural space in Leimert Park Village serving Ethiopian coffee and plant-forward food. Founded by Anthony Jolly and Tina Amin in 2018 as Hot & Cool Cafe, rebranded to ORA in early 2024 with a sleek renovation. Certified as a social enterprise, ORA prioritizes hiring from the transitional workforce. Hosts open mic nights, comedy shows, and R&B day parties. In 2023, the Leimert Park businesses secured a $6.5M loan to purchase the Degnan Blvd building — a rare win for community ownership.","ys":2018,"tl":[{"y":"2018","x":"Opens as Hot & Cool Cafe"},{"y":"2023","x":"Businesses purchase Degnan Blvd building"},{"y":"2024","x":"Rebrands to ORA — renovated interior"}],"tags":["Coffee","Leimert Park","Vegan","Social Enterprise","Community Ownership"],"s":"active"},{"id":"shutters","h":"santamonica","n":"Shutters on the Beach","t":"Luxury Beach Hotel","c":"hotel","lat":34.0071,"lng":-118.4917,"a":"1 Pico Blvd, Santa Monica","i":"🏨","d":"The only hotel in LA where you can fall asleep listening to waves. Opened in 1993, designed to look like a Cape Cod beach house that got a very large trust fund. The lobby is full of original art. The restaurant, 1 Pico, sits directly on the sand. Industry people use it for discreet meetings because the location is inconvenient enough that you will not run into anyone by accident. Santa Monica's quietest flex.","ys":1993,"tl":[{"y":"1993","x":"Opens on the sand at Pico Blvd"}],"tags":["Beach","Luxury","Art Collection","Industry Meetings"],"w":"Shutters_on_the_Beach","s":"active"},{"id":"cameraobscura","h":"santamonica","n":"Camera Obscura","t":"Optical Landmark","c":"culture","lat":34.0128,"lng":-118.497,"a":"1450 Ocean Ave, Santa Monica","i":"📷","d":"A working camera obscura — a dark room with a rotating mirror that projects a live image of the outside world onto a white table. This one has been in Palisades Park since 1898, making it one of the oldest in the United States. The technology predates photography. You walk into a dark room in a senior center on Ocean Ave and suddenly you are watching the beach, the pier, and the Pacific projected in real-time like a Victorian surveillance camera. Free, strange, and unforgettable.","ys":1898,"tl":[{"y":"1898","x":"Installed in Palisades Park"}],"tags":["Optical","Victorian","Free","One of a Kind"],"w":"Camera_Obscura_Art_Lab","s":"active"},{"id":"kingshead","h":"santamonica","n":"Ye Olde King's Head","t":"British Pub","c":"food","lat":34.0146,"lng":-118.4973,"a":"116 Santa Monica Blvd, Santa Monica","i":"🍺","d":"A proper British pub serving pints and shepherd's pie on Santa Monica Blvd since 1974. Darts, football on the telly, meat pies, and a gift shop selling Marmite, digestive biscuits, and HP Sauce. The expat crowd watches Premier League matches at ungodly hours. Keith Moon got kicked out in the mid-'70s for trashing the place. Over 50 years in and the building went up for sale in 2024, but the business carries on.","ys":1974,"tl":[{"y":"1974","x":"Opens — British consulate of Santa Monica"},{"y":"2024","x":"Building listed for sale — pub stays open"}],"tags":["British Pub","Expat","Darts","Premier League"],"s":"active"},{"id":"penthouse","h":"santamonica","n":"The Penthouse at The Huntley","t":"Rooftop Bar","c":"nightlife","lat":34.0188,"lng":-118.5014,"a":"1111 2nd St, Santa Monica","i":"🍸","d":"An 18th-floor cocktail bar sitting on top of the Huntley Hotel with 270-degree views of the Pacific, the Santa Monica Pier, and the entire LA basin. The space is small, the drinks are expensive, and the sunset views are non-negotiable. It is the kind of place that reminds you why people pay Santa Monica prices — because on a clear evening, from that height, the ocean goes on forever.","ys":2007,"tl":[{"y":"2007","x":"Opens atop The Huntley Hotel"}],"tags":["Rooftop","Cocktails","Sunset","Views"],"s":"active"},{"id":"stinkingrose","h":"bevhills","n":"The Stinking Rose","t":"Garlic Restaurant (Closed)","c":"food","lat":34.0667,"lng":-118.3765,"a":"55 N La Cienega Blvd","i":"🧄","d":"A restaurant where garlic was the concept, the ingredient, and the decoration. Every dish featured garlic — garlic ice cream, garlic martinis, 40-clove garlic chicken. The motto: we season our garlic with food. The original opened in San Francisco in 1991; the Beverly Hills outpost arrived in 1996 on Restaurant Row and became a tourist magnet. The interior was maximalist — garlic braids hanging everywhere, vampire kitsch, the whole production. Not subtle. Not trying to be. You reeked for 24 hours afterward. The Beverly Hills location closed permanently in 2021. The San Francisco original is open.","ys":1996,"ye":2021,"tl":[{"y":"1996","x":"Original opens in San Francisco"},{"y":"1996","x":"Beverly Hills location opens on La Cienega"},{"y":"2021","x":"Beverly Hills closes permanently"}],"tags":["Garlic","Restaurant Row","Novelty","Closed 2021"],"w":"The_Stinking_Rose","s":"closed"},{"id":"thepalms","h":"weho","n":"The Palms","t":"Lesbian Bar (Closed)","c":"nightlife","lat":34.0883,"lng":-118.3782,"a":"8572 Santa Monica Blvd","i":"🏳️‍🌈","d":"The oldest lesbian bar in Los Angeles, open from 1965 to 2013. For nearly 50 years, The Palms was the bar — the place where queer women in LA could exist without explanation. Pool tables, cheap drinks, Thursday karaoke, and a community that had nowhere else to go for most of that half century. When it closed, LA lost one of its last dedicated lesbian spaces. The building is now something else. The history is irreplaceable.","ys":1965,"ye":2013,"tl":[{"y":"1965","x":"Opens on Santa Monica Blvd"},{"y":"1985","x":"Becomes center of lesbian social life"},{"y":"2013","x":"Closes after 48 years"}],"tags":["Lesbian Bar","LGBTQ","WeHo","Historic","Closed"],"s":"closed"},{"id":"canfieldmoreno","h":"silverlake","n":"Canfield-Moreno Estate / The Paramour","t":"Historic Estate & Venue","c":"culture","lat":34.0954,"lng":-118.271,"a":"1923 Micheltorena St","i":"🏰","d":"A 22,000-square-foot Mediterranean Revival mansion on 4.5 hilltop acres, designed by Robert D. Farquhar and completed in 1923. Oil heiress Daisy Canfield commissioned it; when she married silent film star Antonio Moreno, it became the site of lavish Sunday parties for Hollywood royalty. After Canfield died in a 1933 car accident, the estate passed through several lives — a boarding school for orphaned girls during the Depression, then a convent for Franciscan nuns from 1953 to the 1990s. Restaurateur Dana Hollister bought it in 1998 for $2.25 million and restored it as a boutique hotel and event venue called The Paramour. My Chemical Romance recorded The Black Parade here and reported the place was haunted. Halloween H20 and Scream 3 filmed here. The pool overlooks the entire LA basin. Weddings cost what a car costs.","ys":1923,"tl":[{"y":"1923","x":"Farquhar builds mansion for Daisy Canfield"},{"y":"1925","x":"Antonio Moreno era — lavish Hollywood parties"},{"y":"1933","x":"Canfield dies in car accident"},{"y":"1953","x":"Becomes Franciscan convent and home for girls"},{"y":"1988","x":"Designated LA Historic-Cultural Monument #391"},{"y":"1998","x":"Dana Hollister buys for $2.25M — restores as The Paramour"}],"tags":["Silent Film","Convent","Event Venue","Haunted","Mediterranean Revival"],"w":"Canfield-Moreno_Estate","s":"active"},{"id":"vibiana","h":"downtown","n":"Vibiana","t":"Event Venue & Restaurant","c":"culture","lat":34.0507,"lng":-118.2447,"a":"214 S Main St","i":"⛪","d":"The former Cathedral of Saint Vibiana, built in 1876 as the mother church of the Archdiocese of Los Angeles. Damaged in the Northridge earthquake in 1994, the Archdiocese tried to demolish it. Preservationists won. Developer Tom Gilmore converted it into an event venue and restaurant space — Redbird occupied the rectory for years. The nave, with its original Baroque-style interior, now hosts weddings and galas instead of masses. Sacred architecture, secular purpose. LA's most dramatic adaptive reuse.","ys":1876,"tl":[{"y":"1876","x":"Built as Cathedral of Saint Vibiana"},{"y":"1994","x":"Damaged in Northridge earthquake"},{"y":"2010","x":"Reopens as event venue — Redbird in rectory"}],"tags":["Cathedral","Adaptive Reuse","Redbird","Tom Gilmore","Earthquake"],"w":"Cathedral_of_Saint_Vibiana","s":"active"},{"id":"howlinrays","h":"downtown","n":"Howlin' Ray's","t":"Hot Chicken","c":"food","lat":34.0615,"lng":-118.2397,"a":"727 N Broadway","i":"🔥","d":"Nashville hot chicken in Chinatown by Johnny Ray Zone and Amanda Chapman. Zone trained under Thomas Keller and Gordon Ramsay before a trip to Prince's Hot Chicken Shack in Nashville changed his life. Started as a food truck in late 2015, then opened a stall in Far East Plaza in April 2016. The heat levels go from Country — mild — to Howlin' — a capsaicin assault. The lines started immediately and never stopped. A second location opened in Pasadena in 2022. The slaw is vinegar-based and essential for survival.","ys":2015,"tl":[{"y":"2015","x":"Food truck launches"},{"y":"2016","x":"Opens brick-and-mortar in Far East Plaza, Chinatown"},{"y":"2022","x":"Pasadena location opens"}],"tags":["Hot Chicken","Nashville","The Line","Chinatown","Capsaicin"],"w":"Howlin%27_Ray%27s","s":"active"},{"id":"pinecrane","h":"silverlake","n":"Pine & Crane","t":"Taiwanese Restaurant","c":"food","lat":34.0905,"lng":-118.2771,"a":"1521 Griffith Park Blvd","i":"🥡","d":"Fast-casual Taiwanese food that changed the Silver Lake lunch game when it opened in 2014. Vivian Ku's menu — dan dan noodles, three cup chicken, mapo tofu — is rooted in family recipes but executed with a precision that earned a James Beard semifinalist nod. The space is small, the line moves fast, and the food is sharply priced for the quality. It proved that a Taiwanese lunch counter in a gentrifying neighborhood could be both culturally authentic and wildly successful. Everyone eats here.","ys":2014,"tl":[{"y":"2014","x":"Vivian Ku opens on Griffith Park Blvd"},{"y":"2019","x":"James Beard semifinalist"}],"tags":["Taiwanese","Fast-Casual","James Beard","Silver Lake"],"s":"active"},{"id":"mjs","h":"silverlake","n":"MJ's","t":"Gay Bar (Closed)","c":"nightlife","lat":34.1083,"lng":-118.2715,"a":"2810 Hyperion Ave","i":"🏳️‍🌈","d":"One of Silver Lake's last gay bars before gentrification swept Hyperion Avenue clean. MJ's took over the space around 2002, replacing Woody's Hyperion Lounge, which had been there since at least 1969. Go-go dancers on platforms, outlandish theme nights, foam parties, a dance floor that got sweaty and stayed sweaty. Not a tasteful establishment. Not trying to be. When it closed in March 2014, it was the fourth prominent gay bar Silver Lake had lost in three years — after Le Barcito, The Other Side, and Detour. The space became Tenants of the Trees, where a teenage Billie Eilish played early shows. Hyperion Avenue now has more preschools than gay bars.","ys":2002,"ye":2014,"tl":[{"y":"1969","x":"Woody's Hyperion Lounge opens at this address"},{"y":"2002","x":"MJ's takes over — go-go dancers, theme nights"},{"y":"2014","x":"Closes in March — fourth Silver Lake gay bar lost in 3 years"},{"y":"2015","x":"Space becomes Tenants of the Trees"}],"tags":["Gay Bar","Silver Lake","Go-Go","Gentrification","Closed 2014"],"s":"closed"},{"id":"cuffs","h":"silverlake","n":"Cuffs / Hyperion Tavern","t":"Bar / Music Venue","c":"nightlife","lat":34.0981296,"lng":-118.2749394,"a":"1941 Hyperion Ave, Los Angeles, CA 90027","i":"⛓️","d":"Two eras of Silver Lake underground at the same address. Cuffs opened in 1981 as a leather bar on the Hyperion strip alongside Basic Plumbing and Pure Trash — black walls, red lighting, so dark inside that anyone entering from the street went blind for a moment while their eyes adjusted. The AIDS crisis decimated the neighborhood through the 1980s and 1990s but Cuffs persisted as a laid-back, sleazy holdout until closing in the early 2000s. Mark Hirsch reopened the space in 2005 as Hyperion Tavern — chandeliers and law-volume bookshelves replacing leather chaps. No sign outside, just a barbershop pole. Cash only. Open maybe Tuesdays and Fridays 9pm to 2am. Sketch party nights with butcher paper taped over the bar, underground music, harp performances, weird animation screenings. Has been falsely declared dead at least three times since 2012. Yelp says permanently closed. Google says temporarily closed. Neither has ever been reliable on whether this place exists.","ys":1981,"tl":[{"y":"1981","x":"Cuffs opens on Hyperion Ave — height of Silver Lake leather scene"},{"y":"1985","x":"AIDS crisis ravages the neighborhood — Cuffs persists"},{"y":"2001","x":"Cuffs closes after two decades"},{"y":"2005","x":"Mark Hirsch reopens the space as Hyperion Tavern"},{"y":"2012","x":"First of several false death reports — Hyperion Tavern survives"},{"y":"2026","x":"Yelp says permanently closed. Google says temporarily closed. Nobody knows."}],"tags":["Leather Bar","Gay Bar","Dive Bar","Music Venue","Underground","Silver Lake","AIDS Era"],"rel":["sllounge","akbar","4100bar"],"s":"active"},{"id":"roosterfish","h":"venice","n":"Roosterfish","t":"Gay Bar","c":"nightlife","lat":33.992,"lng":-118.467,"a":"1302 Abbot Kinney Blvd","i":"🐓","d":"The anti-WeHo gay bar. Opened in 1979 by Walter Schneider and B.M. Alexander, two pioneers who had started The Gallery Room, one of the first gay establishments in West Hollywood, back in 1962. They named it after a feisty game fish they caught sailing off Cabo San Lucas. For 37 years, Roosterfish was the only gay bar west of the 405 — a turquoise-painted dive on Abbot Kinney with cheap drinks, a jukebox, pool tables, and pornographic collages on the men's room ceiling. Not glamorous. Deliberately not glamorous. When it closed in May 2017 after a rent hike, Venice Pride was literally founded in response. Dustin Lance Black had his first legal drink here in 1995. New owners reopened it later that year, keeping the name and the ceiling. Going strong.","ys":1979,"tl":[{"y":"1979","x":"Walter Schneider and B.M. Alexander open Roosterfish on Abbot Kinney"},{"y":"1988","x":"Co-founder Alexander dies"},{"y":"2006","x":"Schneider dies — leaves bar to four friends"},{"y":"2016","x":"Venice Pride founded in response to looming closure"},{"y":"2017","x":"Closes May — reopens under new owners September"}],"tags":["Gay Bar","Venice","Abbot Kinney","Dive Bar","Venice Pride"],"s":"active"},{"id":"queenmary","h":"longbeach","n":"The Queen Mary","t":"Ocean Liner / Hotel / Museum","c":"culture","lat":33.75173,"lng":-118.19054,"a":"1126 Queens Hwy, Long Beach","i":"🚢","d":"A 1,019-foot British ocean liner launched in 1936 that crossed the Atlantic in four days. During WWII she was painted grey and nicknamed the Grey Ghost — she carried 800,000 troops and Hitler put a $250,000 bounty on her. Long Beach bought her in 1967 for $3.45 million and permanently moored her as a hotel and museum. She was too big for the Panama Canal, so her final voyage went around Cape Horn. Over 50 million people have visited. The Art Deco interiors are original. The ship is reportedly one of the most haunted places in America — at least 600 spirits, according to one psychic. The city has struggled to maintain her for decades, but she keeps coming back.","ys":1967,"tl":[{"y":"1936","x":"Maiden voyage — wins Blue Riband for fastest Atlantic crossing"},{"y":"1941","x":"Becomes the Grey Ghost — carries 800,000 troops in WWII"},{"y":"1967","x":"Long Beach buys her for $3.45M — final voyage around Cape Horn"},{"y":"1971","x":"Opens as floating hotel and museum"},{"y":"2023","x":"Reopens after $43M renovation"}],"tags":["Ocean Liner","Art Deco","WWII","Haunted","1936"],"rel":["battleshipiowa","joejosts","alexsbar"],"w":"RMS_Queen_Mary","s":"active"},{"id":"joejosts","h":"longbeach","n":"Joe Jost's","t":"Tavern","c":"nightlife","lat":33.78289,"lng":-118.15873,"a":"2803 E Anaheim St, Long Beach","i":"🍺","d":"Hungarian immigrant Joe Jost opened this as a combination barber shop, pool hall, and poker room in 1924 on East Anaheim Street. When Prohibition ended in 1933, out went the barber chairs and in came the beer. A hundred years later it is here, family-owned by Jost's grandson Ken Buck, serving the same things: frozen schooners of beer, pickled eggs with pretzel sticks, and Joe's Special — a Polish sausage on rye with Swiss cheese, mustard, and pickle for four dollars. The antique peanut roaster runs daily. The Brunswick pool tables are turn-of-the-century originals. They have served over 14 million schooners of beer and 6 million pickled eggs. Cash only. One of the oldest continuously operated taverns west of the Mississippi.","ys":1924,"tl":[{"y":"1924","x":"Joe Jost opens barber shop and pool hall on Anaheim St"},{"y":"1934","x":"Prohibition ends — beer and Joe's Special sandwiches begin"},{"y":"1975","x":"Grandson Ken Buck takes over operations"},{"y":"2024","x":"Celebrates 100th anniversary"}],"tags":["1924","Pickled Eggs","100 Years","Cash Only","Family-Owned"],"rel":["queenmary","alexsbar","battleshipiowa"],"w":"Joe_Jost%27s","s":"active"},{"id":"alexsbar","h":"longbeach","n":"Alex's Bar","t":"Punk & Live Music Venue","c":"music","lat":33.7827,"lng":-118.1574,"a":"2913 E Anaheim St, Long Beach","i":"🎸","d":"Opened January 27, 2000 in the Zaferia neighborhood of Long Beach — the city's definitive punk and live music dive. Four nights a week of punk, ska, roots, indie, reggae, Latin, and garage rock. Capacity 300. Offspring, Black Flag, Eagles of Death Metal, Mike Watt, and Mariachi El Bronx have all played here. The tagline is 'Turning Down The Suck Since 2000.' The patio has a mural and the crowd is a cross-section of Long Beach — port workers, musicians, college kids, lifers. One of the few venues that kept Long Beach's DIY music scene alive through the 2000s and 2010s when everything else was closing.","ys":2000,"tl":[{"y":"2000","x":"Opens January 27 on East Anaheim St"},{"y":"2010","x":"Hosts Black Flag, Offspring, Eagles of Death Metal"},{"y":"2020","x":"Celebrates 20th anniversary with Mike Watt and Mariachi El Bronx"}],"tags":["Punk","DIY","Long Beach","Since 2000","Live Music"],"rel":["joejosts","queenmary","battleshipiowa"],"s":"active"},{"id":"battleshipiowa","h":"longbeach","n":"Battleship USS Iowa Museum","t":"Floating Museum","c":"culture","lat":33.74425,"lng":-118.27724,"a":"250 S Harbor Blvd, San Pedro","i":"⚓","d":"The lead ship of the last class of U.S. Navy battleships, commissioned in 1943. She carried FDR across the Atlantic to the Tehran Conference — the only U.S. warship with a bathtub installed for a president. Hitler put a bounty on her. She earned 11 battle stars across WWII, Korea, and the Cold War. Decommissioned in 1990, she sat rusting in a mothball fleet until the Pacific Battleship Center towed her to San Pedro in 2012. Opened to the public on July 4, 2012 — the only battleship museum on the West Coast. Nine 16-inch guns, seven decks to explore, and the ghost of every sailor who served aboard.","ys":2012,"tl":[{"y":"1943","x":"Commissioned — carries FDR to Tehran Conference"},{"y":"1952","x":"Korean War service — 2 battle stars"},{"y":"1984","x":"Recommissioned for Cold War service"},{"y":"1990","x":"Decommissioned for the last time"},{"y":"2012","x":"Opens as museum in San Pedro on July 4th"}],"tags":["Battleship","WWII","FDR","San Pedro","Museum Ship"],"rel":["queenmary","joejosts","alexsbar"],"w":"USS_Iowa_(BB-61)","s":"active"},{"id":"recordsafari","h":"atwater","n":"Record Safari","t":"Record Store","c":"shop","lat":34.12287,"lng":-118.26896,"a":"3222 Los Feliz Blvd","i":"💿","d":"Coachella co-founder Paul Tollett and record curator Alex Rodriguez opened this Atwater Village store in July 2021 in a 1925 building that spent 30 years as Sonora Recording Studio — where Elliott Smith, Nancy Sinatra, and the Backstreet Boys all made records. Now it is filled with new and used vinyl, a 10,000-square-foot lot with its own parking and space for outdoor events and food trucks. Rodriguez is also the head curator for Coachella's on-site record emporium. The store is the physical expression of his obsession: crate-digging across America and bringing the best finds home to Atwater.","ys":2021,"tl":[{"y":"1925","x":"Building constructed"},{"y":"1997","x":"Sonora Recording Studio — Elliott Smith records here"},{"y":"2021","x":"Record Safari opens in July — Tollett and Rodriguez"}],"tags":["Vinyl","Coachella","Atwater Village","Since 2021"],"rel":["bigfootlodge","amoebarec","towerrec"],"s":"active"},{"id":"clubteegee","h":"atwater","n":"Club Tee Gee","t":"Dive Bar","c":"nightlife","lat":34.11768,"lng":-118.26077,"a":"3210 Glendale Blvd","i":"🍸","d":"A horseshoe-shaped bar that has been serving Atwater Village since 1946. The original neon sign glows. The interior is wood-paneled, the lighting is low, and the crowd is neighborhood regulars who have been coming here for decades alongside newer arrivals who discovered it through word of mouth. No TVs behind the bar. No craft cocktail menu. Just drinks, a jukebox, and conversation. The kind of bar that every neighborhood needs and almost none have anymore.","ys":1946,"tl":[{"y":"1946","x":"Opens on Glendale Blvd"}],"tags":["1946","Dive Bar","Neon Sign","Horseshoe Bar","Atwater"],"rel":["bigfootlodge","recordsafari","drawingroom"],"s":"active"},{"id":"brandpark","h":"glendale","n":"Brand Park / Brand Library","t":"Historic Park & Library","c":"culture","lat":34.18092,"lng":-118.27623,"a":"1601 W Mountain St, Glendale","i":"🏛️","d":"Leslie C. Brand was a Glendale real estate developer who built a Moorish-Indian fantasy mansion called El Miradero in 1904, modeled after the East Indian Pavilion at the 1893 Chicago World's Fair. When he died in 1925, he left the 489-acre estate to the city on the condition it become a park and library. The mansion now houses the Brand Library & Art Center — one of the only public libraries in America devoted exclusively to art and music. The park stretches into the Verdugo Mountains with hiking trails, a Japanese tea house, and views of the entire San Fernando Valley. Free.","ys":1904,"tl":[{"y":"1904","x":"Brand builds El Miradero — Moorish-Indian mansion"},{"y":"1925","x":"Brand dies — estate donated to Glendale"},{"y":"1956","x":"Brand Library opens in the mansion"}],"tags":["Moorish","Mansion","Free Library","Art & Music","Hiking"],"w":"Brand_Park_(Glendale,_California)","s":"active"},{"id":"damonssteakhouse","h":"glendale","n":"Damon's Steak House","t":"Tiki Steakhouse","c":"food","lat":34.15062,"lng":-118.25547,"a":"317 N Brand Blvd, Glendale","i":"🥩","d":"Oregon-born candy store impresario Loyal Adelbert Damon sold off his sweets shops and opened this steakhouse in 1937 on Central Avenue in Glendale. A single palm tree in the original location inspired the tiki decor that would eventually take over the place. After relocating to Brand Boulevard, the restaurant went full Polynesian — thatched roof, saltwater aquarium, Old Hawaii murals, outrigger canoes suspended from the ceiling, bamboo booths. Thick-cut prime rib and tropical rum drinks for three generations of Glendale families. Several staffers have worked here 25+ years. One of the last surviving tiki restaurants in LA.","ys":1937,"tl":[{"y":"1937","x":"Loyal Damon opens steakhouse on Central Ave"},{"y":"1960","x":"Relocates to Brand Blvd — goes full tiki"},{"y":"2005","x":"New ownership preserves original concept"}],"tags":["Tiki","Steakhouse","Brand Blvd","Glendale Institution"],"s":"active"},{"id":"greatwhitehut","h":"glendale","n":"Great White Hut","t":"Burger Stand","c":"food","lat":34.16805,"lng":-118.28627,"a":"121 W California Ave, Glendale","i":"🍔","d":"A tiny white roadside burger shack on Glenoaks Boulevard that has been serving burgers, chili dogs, and fries since 1928. One of the oldest continuously operating burger stands in Southern California. The building is barely bigger than a food truck. The menu has not changed. The people lining up have been lining up since their parents brought them. This is what fast food looked like before it became an industry.","ys":1947,"tl":[{"y":"1928","x":"Opens on Glenoaks Blvd"}],"tags":["1928","Burger Stand","Roadside","Glendale","Unchanged"],"s":"active"},{"id":"bunnymuseum","h":"altadena","n":"The Bunny Museum","t":"Oddity Museum","c":"culture","lat":34.19054,"lng":-118.13181,"a":"2605 Lake Ave, Altadena","i":"🐰","d":"Candace Frazee and Steve Lubanski started exchanging bunny gifts on their first Valentine's Day in 1993. Thirty years later, the collection had grown to over 46,000 bunny-related items — Guinness World Record. They turned their Altadena home into a museum in 1998, then moved it to a larger commercial space on Lake Avenue. Live rabbits. Taxidermied rabbits. Bunny toasters, bunny telephones, bunny everything. Simultaneously the most absurd and most sincere museum in Los Angeles. A love story that became an obsession that became a tourist attraction. In January 2025, the Eaton Fire devastated Altadena. The museum's future is uncertain.","ys":1998,"tl":[{"y":"1993","x":"Candace and Steve exchange first bunny gifts"},{"y":"1998","x":"Open home as museum — collection already in thousands"},{"y":"2017","x":"Move to larger space on Lake Ave"},{"y":"2025","x":"Eaton Fire devastates Altadena — future uncertain"}],"tags":["Guinness Record","Oddity","Love Story","46000 Bunnies","Eaton Fire"],"w":"The_Bunny_Museum","s":"active"},{"id":"colombos","h":"eaglerock","n":"Colombo's Italian Steakhouse","t":"Italian Restaurant","c":"food","lat":34.13963,"lng":-118.20729,"a":"1833 Colorado Blvd, Eagle Rock","i":"🍝","d":"An Eagle Rock institution since 1954. Red leather booths, dim lighting, and an Italian-American menu that has not changed because it does not need to. The martinis are strong. The veal parmesan is the size of a small child. The crowd is multi-generational Eagle Rock — families who have been eating here since their grandparents brought them. When Colorado Boulevard started gentrifying around it, Colombo's did not pivot to small plates or craft cocktails. It stayed exactly what it was. That is why it is here.","ys":1954,"tl":[{"y":"1954","x":"Opens on Colorado Blvd"}],"tags":["1954","Italian","Red Leather","Eagle Rock Institution"],"s":"active"},{"id":"mrtsbowl","h":"highlandpark","n":"Highland Park Bowl / Mr T’s Bowl","t":"Bowling Alley & Bar","c":"music","lat":34.1096,"lng":-118.19369,"a":"5621 N Figueroa St, Highland Park","i":"🎳","d":"Built in 1927 during Prohibition as a bowling alley with a brilliant loophole: doctors' offices upstairs wrote prescriptions for 'medicinal whiskey,' the pharmacy downstairs filled them, and you drank while you bowled. One of only three legal drinking spots on Figueroa. In 1966, Italian immigrant Joseph 'Mr. T' Teresa bought the place, covered the original Spanish Revival architecture with drop ceilings and wood paneling, and ran it for decades. By the 1980s bowling was dead and the back room became one of LA's great punk venues — Silversun Pickups, No Age, and dozens of underground bands played behind a black curtain that hid the lanes. Mr. T's son sold to 1933 Group in 2014. They spent $2 million stripping everything back to the 1927 bones — uncovering bow trusses, a hidden forest mural from the 1930s, and the original 'most beautiful building on Figueroa' facade. Reopened April 2016 as Highland Park Bowl with eight restored lanes, wood-fired pizza, and cocktails. They have a room called Mr. T's.","ys":1927,"tl":[{"y":"1927","x":"Opens during Prohibition — medicinal whiskey loophole"},{"y":"1933","x":"Music store gets live music permit"},{"y":"1966","x":"Joseph 'Mr. T' Teresa buys — covers original architecture"},{"y":"1997","x":"Becomes punk rock venue — bowling lanes hidden behind curtain"},{"y":"2014","x":"Mr. T's son sells to 1933 Group"},{"y":"2016","x":"Reopens as Highland Park Bowl — $2M restoration to 1927 glory"}],"tags":["1927","Prohibition","Punk Venue","1933 Group","Bowling","Restored"],"w":"Highland_Park_Bowl","s":"active"},{"id":"lighthousecafe","h":"hermosabeach","n":"The Lighthouse Cafe","t":"Jazz Club & Restaurant","c":"music","lat":33.8619,"lng":-118.3996,"a":"30 Pier Ave, Hermosa Beach","i":"🎷","d":"Built in 1934 as Verpilate's restaurant, converted to The Lighthouse bar in 1940. Jazz began on May 29, 1949, when bassist Howard Rumsey talked owner John Levine into a trial Sunday jam session. It became the hub of West Coast jazz — Chet Baker, Miles Davis, Gerry Mulligan, Art Pepper, Cannonball Adderley all recorded here. At least two dozen jazz albums were cut at the Lighthouse in the 1950s and 60s. Featured prominently in La La Land (2016) — Ryan Gosling's character plays here. Jazz brunch on Sundays remains an institution.","ys":1934,"tl":[{"y":"1934","x":"Verpilate's restaurant opens at 30 Pier Ave"},{"y":"1940","x":"Becomes The Lighthouse bar"},{"y":"1949","x":"Howard Rumsey starts jazz — May 29"},{"y":"1971","x":"Rumsey leaves — jazz declines"},{"y":"2016","x":"Featured in La La Land"}],"tags":["West Coast Jazz","La La Land","Howard Rumsey","Chet Baker","South Bay"],"w":"Lighthouse_Caf%C3%A9","s":"active"},{"id":"hermosapier","h":"hermosabeach","n":"Hermosa Beach Pier","t":"Historic Pier","c":"culture","lat":33.8618,"lng":-118.3999,"a":"1 Pier Ave, Hermosa Beach","i":"🌊","d":"The first pier was built in 1904 by the Hermosa Beach Land and Water Company — a 500-foot wooden trestle extending into the Pacific. A storm destroyed it in 1913. The replacement, a 1,000-foot concrete structure, went up in 1914. The current pier dates to 1965. Ryan Gosling walked this pier singing City of Stars in La La Land, filmed August 25, 2015 — the scene that launched an Oscar-winning song. The pier is the heart of Hermosa: volleyball tournaments, surf contests, and The Strand all radiate from it.","ys":1904,"tl":[{"y":"1904","x":"First wooden pier built — 500 feet"},{"y":"1913","x":"Storm destroys original pier"},{"y":"1914","x":"Concrete replacement — 1,000 feet"},{"y":"1965","x":"Current pier structure built"},{"y":"2015","x":"La La Land films City of Stars scene"}],"tags":["1904","La La Land","Volleyball","The Strand"],"w":"Hermosa_Beach_Pier","s":"active"},{"id":"mickeysdeli","h":"hermosabeach","n":"Mickey's Italian Deli","t":"Italian Deli","c":"food","lat":33.8631,"lng":-118.3985,"a":"101 Hermosa Ave, Hermosa Beach","i":"🍕","d":"In 1953, 22-year-old Korean War veteran Michael Angelo 'Mickey' Mance opened a deli, market, and liquor store on Hermosa Avenue. When surfers came in with five cents, he grabbed a roll, added marinara sauce, and served — the Sauce Sandwich became legendary. Three generations of the Mance family have run it since. A patio mural depicts Mickey between Marlon Brando and Frank Sinatra. The pizza, the sandwiches, the pasta sauce bottled for takeaway — nothing fancy, everything good. A second location opened in Redondo Beach in 2026.","ys":1953,"tl":[{"y":"1953","x":"Mickey Mance opens deli on Hermosa Ave"},{"y":"2016","x":"Third generation Mickey joins the business"},{"y":"2026","x":"Second location opens in Redondo Beach"}],"tags":["1953","Three Generations","Sauce Sandwich","South Bay"],"s":"active"},{"id":"mermaid","h":"hermosabeach","n":"The Mermaid","t":"Dive Bar","c":"community","lat":33.8623863,"lng":-118.4016809,"a":"11 Pier Ave, Hermosa Beach","i":"🍺","d":"Quentin 'Boots' Thelen opened The Mermaid in 1954 at the foot of Pier Avenue, right on The Strand. For 57 years he ran it as a no-frills dive bar and grill — one of the few spots in LA where you could drink cheap beer and watch the sunset over open water. Esquire named it one of the Best Bars in America in 2008. Boots died in 2007; the property sold to developers in 2013. Killer Shrimp tried to keep it alive but high rent, city restrictions, and a looming hotel project made it impossible. Closed September 2017. The building is now Vista, a Polynesian fusion restaurant. The view is the same; everything else is different.","ys":1954,"ye":2017,"tl":[{"y":"1954","x":"Boots Thelen opens The Mermaid on Pier Ave"},{"y":"2007","x":"Boots dies — property listed for sale"},{"y":"2008","x":"Esquire names it Best Bar in America"},{"y":"2013","x":"Killer Shrimp takes over operations"},{"y":"2017","x":"Closes September — rent and city politics win"}],"tags":["Dive Bar","Pier Avenue","Boots Thelen","South Bay"],"rel":["lighthousecafe","hermosapier"],"s":"closed"},{"id":"hermosamuseum","h":"hermosabeach","n":"Hermosa Beach Museum","t":"Museum","c":"culture","lat":33.864073,"lng":-118.3942202,"a":"710 Pier Ave, Hermosa Beach","i":"🏛️","d":"Founded in 1987 by a small group of locals who met in a living room at the foot of Longfellow, the Hermosa Beach Historical Society opened its first museum space in 1991 inside the Community Center — the former Pier Avenue Junior High School, a mid-1930s building. Expanded into the old woodshop in 2007. The collection of 3,500-plus items covers surf culture, punk history, beach volleyball, and the bars that defined Hermosa. Free admission. Adopted the Hermosa Beach Murals Project in 2020, safeguarding ten public murals around town.","ys":1987,"tl":[{"y":"1987","x":"Historical Society founded — nine members"},{"y":"1991","x":"First museum opens in Community Center Room 7"},{"y":"2007","x":"Exp
