s followers found suspicious. Designated Los Angeles Historic-Cultural Monument No. 592 in 1994. Seminars, sound baths, Death Cafe gatherings, and film screenings on the regular.","ys":1934,"tl":[{"y":"1934","x":"Manly P. Hall founds the Philosophical Research Society"},{"y":"1936","x":"Robert Stacy-Judd designs Mayan Revival campus"},{"y":"1985","x":"Charles and Linda Bukowski marry on the grounds"},{"y":"1990","x":"Manly P. Hall dies"},{"y":"1994","x":"Designated LA Historic-Cultural Monument No. 592"}],"tags":["Library","Philosophy","Mayan Revival","Architecture","Los Feliz"],"rel":["barnsdall","griffith","hollyhock"],"w":"Philosophical_Research_Society","s":"active"},{"id":"bronsoncaves","h":"hollywood","n":"Bronson Caves","t":"Film Location & Hiking Trail","c":"culture","lat":34.1229694,"lng":-118.3155101,"a":"3200 Canyon Dr, Griffith Park","i":"🦇","d":"In 1903 the Union Rock Company blasted a quarry into the hillside at the southwest corner of Griffith Park to extract crushed rock for building LA's streets. When the quarry shut down in the late 1920s it left behind a short tunnel through the hill with three openings — and Hollywood immediately started filming there. Over 100 productions have used the caves, from the 1919 serial Lightning Bryce to Star Trek to Invasion of the Body Snatchers. But the tunnel's most famous role is as the entrance to the Batcave in the 1966-68 Batman TV series. Adam West's Batmobile drove through here three times a week. The hike from the trailhead is a third of a mile with 100 feet of gain. Hollywood Sign visible from behind the caves.","ys":1903,"tl":[{"y":"1903","x":"Union Rock Company opens quarry in Brush Canyon"},{"y":"1919","x":"Lightning Bryce becomes first film shot at the caves"},{"y":"1928","x":"Quarry ceases operation — caves left behind"},{"y":"1966","x":"Batman TV series uses tunnel as Batcave entrance"}],"tags":["Film Location","Batman","Griffith Park","Hiking","Quarry"],"rel":["griffith","hollywoodsign","lazoo"],"w":"Bronson_Canyon","s":"active"},{"id":"bambooinn","h":"ktown","n":"Bamboo Inn","t":"Chinese Diner","c":"food","lat":34.0561227,"lng":-118.275782,"a":"2005 W 7th St","i":"🥡","d":"Opened in 1951 in the Westlake neighborhood as a tiny Chinese lunch counter, Bamboo Inn is one of the oldest continuously operating Chinese restaurants in greater Los Angeles. The exterior promises Genuine Chinese Food and Chinese Chop Suey — a throwback to when those words meant something exotic. Inside: wood-paneled walls, burgundy vinyl booths, a massive antique cash register that clanks and dings with every sale. The Chinese family that runs it has been here since the 1970s. Owner Lisa and her family cook everything from the kitchen you can see from the counter. Fat New York-style egg rolls, wor wonton soup that could feed three people, beef canton noodles, sweet and sour chicken. Cash only. Budweiser for $2.50. The second-oldest surviving Chinese restaurant in the greater LA area after Paul's Kitchen.","ys":1951,"tl":[{"y":"1951","x":"Opens as a Chinese lunch counter in Westlake"},{"y":"1970","x":"Current family takes over operations"},{"y":"2019","x":"LA Weekly profiles it as the chop suey joint that time forgot"}],"tags":["Chinese","Diner","Westlake","Cash Only","Vintage"],"rel":["yangchow","wongs","philippes"],"s":"active"},{"id":"thehat","h":"pasadena","n":"The Hat","t":"Pastrami Stand","c":"food","lat":34.0787555,"lng":-118.1232019,"a":"1 W Valley Blvd, Alhambra","i":"🥪","d":"Maurice Maretsky and Alvin Annenberg opened the first Hat stand in 1951 — a tiny walk-up window slinging pastrami dip sandwiches to the post-war San Gabriel Valley. The original was actually in Boyle Heights, but this Alhambra location at Valley and Garfield, also opened in 1951, became the flagship and the one everyone means when they say The Hat. The pastrami dip — thinly machine-sliced, steamed, stuffed into a soft French roll with au jus for dipping — is unlike any East Coast deli version. It's a distinctly Southern California creation. Brothers Joe and Corky Conzonire bought the business in 1981 and expanded it to eleven locations across four counties. The city of Alhambra designated the original neon sign — featuring a chef's toque and the words World Famous Pastrami — as a historic landmark in 1989. Corky died in 2021. Customers consume 13 to 15 tons of pastrami per week across all locations. Opening a Las Vegas outpost in 2026.","ys":1951,"tl":[{"y":"1951","x":"Opens in Alhambra at Valley and Garfield"},{"y":"1981","x":"Conzonire brothers buy the business"},{"y":"1989","x":"Alhambra designates iconic neon sign as historic landmark"},{"y":"2021","x":"Co-owner Corky Conzonire dies — Joe becomes sole owner"},{"y":"2026","x":"First location outside California opens in Las Vegas"}],"tags":["Pastrami","Fast Food","San Gabriel Valley","Neon Sign","Historic"],"rel":["johnniepastrami","langers","philippes"],"w":"The_Hat","s":"active"},{"id":"barones","h":"valley","n":"Barone's Famous Italian","t":"Pizzeria & Italian Restaurant","c":"food","lat":34.1791691,"lng":-118.4321453,"a":"13726 Oxnard St, Valley Glen","i":"🍕","d":"In 1945, Josephine Barone and her husband Jerry assembled an army of siblings — Tony, Frank, and Mike Arpaia, Joseph Izzo, and Frank Monteleone — and opened a small sandwich-and-pasta restaurant at Beverly Glen and Ventura Boulevard in Sherman Oaks. Pizza wasn't on the menu until they ran out of food on a busy day and Josephine found a rectangular pan and put together her mother's recipe. People lost their minds. The trademarked rectangular thin-crust pizza — made with Monterey Jack cheese instead of mozzarella because that's what they had — became the Valley's defining pie. James Dean ate here. Frank Sinatra ate here. John Wayne ate here. The date scene from Fast Times at Ridgemont High was set here. In 2006, Barone's moved from Ventura Boulevard into the former Old Heidelberg German restaurant space on Oxnard Street — the 1958 stained glass windows, red leather booths, and dark wood paneling survived the transition. Tom Monteleone, Frank's son, runs it now. Third generation.","ys":1945,"tl":[{"y":"1945","x":"Josephine Barone and six siblings open on Ventura Blvd in Sherman Oaks"},{"y":"1950","x":"Frank and Mary Monteleone join — pizza becomes the star"},{"y":"1982","x":"Fast Times at Ridgemont High date scene set here"},{"y":"2006","x":"Moves to former Old Heidelberg space on Oxnard St in Valley Glen"}],"tags":["Pizza","Italian","Valley","Old School","Film Location"],"rel":["casabianca","colombos","miceli"],"w":"Barone%27s","s":"active"},{"id":"billstacos","h":"southla","n":"Bill's Taco House","t":"Taco Shop","c":"food","lat":34.0113091,"lng":-118.2709799,"a":"219 E Martin Luther King Jr Blvd","i":"🌮","d":"A man named Bill opened this tiny taco shop in South Los Angeles in 1949 and almost immediately pioneered something unusual: the cheeseburger taco — a patty-style ground beef taco in a crispy shell. The counter-service restaurant has had only three owners in 75 years. After the 1992 LA riots, a Korean woman named Eva Man took over and has run it ever since with her daughter Annie. The walls are decorated with murals depicting famous moments in the civil rights movement. Molded laminate seating, a vintage sign out front, and a menu that hasn't changed much since Eisenhower. The tacos are heavy, saucy, and greasy in the way that comfort food is supposed to be. Regulars have been coming since childhood and now bring their own children. Cash only.","ys":1949,"tl":[{"y":"1949","x":"Bill opens a taco shop at Martin Luther King Jr Blvd"},{"y":"1950","x":"Pioneers the cheeseburger taco — ground beef patty in a taco shell"},{"y":"1992","x":"Eva Man takes over after the LA riots — runs it to this day"}],"tags":["Tacos","South LA","Cash Only","Historic","Civil Rights Murals"],"rel":["kingtaco1","burritoking","originaltommys"],"s":"active"},{"id":"snugharbor","h":"santamonica","n":"Snug Harbor","t":"Diner","c":"food","lat":34.0340425,"lng":-118.4802422,"a":"2323 Wilshire Blvd, Santa Monica","i":"🍳","d":"Frank Leight opened this tiny diner on Wilshire Boulevard during World War II — 1941, to be exact — as a calm port in a storm where everyone could slurp a Coke and chow a Zwiebel burger. After fleeing East Germany in 1954, Christa Rosenloecher landed at the Snug and started mixing malts for Frank. She eventually bought the place and turned it into one of the best neighborhood breakfast spots in Santa Monica. In the late 1970s, a kid named C.J. Rudolph started eating Hungry Man breakfasts and periodically asking Christa if she was ready to sell. She finally said sure. C.J.'s been running it since. Small counter, a few booths, a back patio, baked grapefruit on the menu since the beginning. The Sunrise Burrito and Captain's Wafflewich are modern additions. Open seven days, breakfast and lunch only, closes at 2 PM. The kind of diner that makes you put your phone away.","ys":1941,"tl":[{"y":"1941","x":"Frank Leight opens Snug Harbor on Wilshire Blvd"},{"y":"1954","x":"Christa Rosenloecher arrives from East Germany — starts mixing malts"},{"y":"1980","x":"C.J. Rudolph finally convinces Christa to sell"}],"tags":["Diner","Breakfast","Santa Monica","WWII Era","Neighborhood"],"rel":["chezjay","thegalley","hinano"],"s":"active"},{"id":"erniesmex","h":"noho","n":"Ernie's Mexican Restaurant","t":"Mexican Restaurant","c":"food","lat":34.1507388,"lng":-118.3658039,"a":"4410 Lankershim Blvd, North Hollywood","i":"🇲🇽","d":"Ernie and Albina Cruz opened their first Mexican restaurant in Lincoln Heights in 1944. On June 17, 1952, they opened this second location on Lankershim Boulevard in North Hollywood, and it's the one that survived. The family also ran Ernie's Jr locations in Eagle Rock (closed 2014) and Pasadena (closed 1998), but this North Hollywood spot is the last one standing — over 70 years and counting. Dark wooden accents, paper lanterns, moody dim lighting that makes the place feel like a Hollywood version of a Mexican hacienda. Live music on weekends — mariachi on Fridays, a guitarist on Saturdays. The Skylab Burrito is legendarily huge. Tamarind margaritas are the move. Not the most authentic Mexican food in LA, but it's the version of Mexican food that the Valley grew up on, and that counts for something.","ys":1952,"tl":[{"y":"1944","x":"Ernie and Albina Cruz open first Ernie's in Lincoln Heights"},{"y":"1952","x":"North Hollywood location opens June 17 on Lankershim Blvd"},{"y":"1998","x":"Pasadena Ernie's Jr closes"},{"y":"2014","x":"Eagle Rock Ernie's Jr closes — NoHo becomes last location"}],"tags":["Mexican","Valley","Family-Owned","Live Music","Margaritas"],"rel":["casavega","smokehouse","bobsbigboy"],"s":"active"},{"id":"melodybar","h":"westla","n":"Melody Bar & Grill","t":"Bar & Grill","c":"food","lat":33.9537441,"lng":-118.3959086,"a":"9132 S Sepulveda Blvd","i":"🍺","d":"Opened in 1952 on Sepulveda Boulevard in Westchester, just north of LAX, the Melody started as a neighborhood steakhouse and gathering spot for the big wheels at AiResearch Manufacturing at the entrance to the airport. Friday after work was the time and place. Through the 1960s it became a hangout for the Los Angeles Kings hockey team. Through the '80s it was a prominent steakhouse. Through the '90s it morphed into a sports bar where Lakers and Kings players were industry regulars. Amber chandeliers dangle from the ornate copper ceilings. New owners Christian Warren and Bobby Hughes kept the midcentury bones intact while adding live music, karaoke, trivia nights, and a modern food menu. Closest real bar to LAX. Directly across from the In-N-Out on Sepulveda.","ys":1952,"tl":[{"y":"1952","x":"Opens as a neighborhood steakhouse on Sepulveda Blvd"},{"y":"1960","x":"Becomes a hangout for LA Kings players"},{"y":"1990","x":"Transitions to a sports bar — Lakers and Kings regulars"},{"y":"2020","x":"Christian Warren and Bobby Hughes take over — modernize while preserving vintage charm"}],"tags":["Bar","Steakhouse","Sports Bar","Westchester","LAX"],"rel":["proudbird","randysdonuts"],"s":"active"},{"id":"clubbahia","h":"echopark","n":"Club Bahia","t":"Latin Nightclub","c":"music","lat":34.0663707,"lng":-118.2498937,"a":"1130 W Sunset Blvd","i":"💃","d":"Bart Higgins and his wife opened Club Bahia on December 4, 1974 on a stretch of Sunset Boulevard in Echo Park that locals once called Little Havana. It was part of a constellation of Latin clubs — Candilejas Club, Club Continental, the Panamerican Night Club — that catered to Cubans and salseros when the neighborhood was heavily Central American and Caribbean. One by one, the other clubs disappeared. Bahia outlasted them all. Live entertainment every Friday and Saturday — salsa, cumbia, merengue, norteño — for over fifty years. After Bart died, his family continued running the club. LiveNation booked shows here for a while. A family lawsuit over ownership and liquor licensing simmered from 2015 onward. The property sold for $8.5 million in 2022, but Club Bahia wasn't part of the real estate deal and kept hosting shows. The last of the Sunset Boulevard salsa clubs.","ys":1974,"tl":[{"y":"1974","x":"Bart Higgins opens Club Bahia on Sunset Blvd"},{"y":"1980","x":"Part of Little Havana club row with Candilejas and Panamerican"},{"y":"2015","x":"Family lawsuit over club ownership begins"},{"y":"2022","x":"Property sold for $8.5M — club continues operating"}],"tags":["Latin","Salsa","Cumbia","Echo Park","Nightclub"],"rel":["losglobos","elcid"],"s":"active"},{"id":"bluewhale","h":"littletokyo","n":"Blue Whale","t":"Jazz Club (Closed / Relocated)","c":"music","lat":34.0497383,"lng":-118.2422008,"a":"123 Astronaut E S Onizuka St #301","i":"🎷","d":"Korean immigrant and jazz vocalist Joon Lee stopped recording his debut album in the fall of 2009 when he got a call about a run-down karaoke bar on the third floor of a Little Tokyo strip mall. He converted it into a 100-seat jazz club where musicians performed between two pillars at floor level instead of on an elevated stage — the idea being to share energy between performer and audience. The Blue Whale became the most important jazz venue in Los Angeles almost immediately. Anthony Wilson held a longtime residency. Louis Cole's Big Band packed the room. Ambrose Akinmusire, Walter Smith III, and Julian Lage all came through. The LA Times called it a beloved jazz incubator. It arrived at a crucial moment — the Jazz Bakery had just closed, the Thelonious Monk Institute had left USC for New Orleans, and LA's jazz infrastructure was fraying. COVID killed it. Closed permanently December 31, 2020 after 11 years. Lee announced a new location in Atwater Village in late 2024.","ys":2009,"ye":2020,"tl":[{"y":"2009","x":"Joon Lee opens the Blue Whale in Weller Court, Little Tokyo"},{"y":"2012","x":"NPR profiles it as an immigrant's dream turned jazz hub"},{"y":"2020","x":"Closes permanently December 31 due to COVID"},{"y":"2024","x":"Announces reopening at new Atwater Village location"}],"tags":["Jazz","Little Tokyo","Live Music","Closed","Korean-Owned"],"rel":["bakedpotato","worldstage"],"w":"Blue_Whale_Jazz_Club","s":"closed"},{"id":"bourgeoispig","h":"hollywood","n":"Bourgeois Pig","t":"Coffeehouse (Closed)","c":"community","lat":34.1054056,"lng":-118.3190333,"a":"5931 Franklin Ave","i":"☕","d":"Opened around 1990 at the corner of Franklin and Tamarind in Franklin Village, the Bourgeois Pig was Hollywood's bohemian living room for over three decades. Dark interior that looked more like a bar than a coffeehouse — pool table, mismatched furniture from a dozen thrift shops, and a back room decorated like a forest from a fantasy novel. Writers worked on screenplays. Actors rehearsed scenes in booths. Musicians debated the merits of bands nobody else had heard of. Open until 2 AM. Slayer espresso machine. The kind of place that made you feel like you were in on something. Original owner Rodney sold it around 2005-2006. New management kept the vibe going for another 16 years. Closed June 17, 2022 after the lease expired. The owners started a GoFundMe to find a new location. Facebook page says: The End of an Era — The Bourgeois Pig will oink again.","ys":1990,"ye":2022,"tl":[{"y":"1990","x":"Opens at Franklin and Tamarind in Franklin Village"},{"y":"2006","x":"Original owner Rodney sells — new management takes over"},{"y":"2022","x":"Closes June 17 after 32 years — lease expired"}],"tags":["Coffeehouse","Hollywood","Bohemian","Franklin Village","Closed"],"rel":["highlandgrounds","catfiddle","hotelcafe"],"s":"closed"},{"id":"samshofbrau","h":"downtown","n":"Sam's Hofbrau","t":"Strip Club & Bar","c":"nightlife","lat":34.0286552,"lng":-118.2398099,"a":"1751 E Olympic Blvd","i":"🍺","d":"Downtown LA's first strip club, established in 1995 in an industrial pocket east of the Arts District. It's a topless bar with a full kitchen — pizza, chicken wings, salads — and a sports bar atmosphere that makes it unlike any other strip club in the city. No cover during the day. Quentin Tarantino filmed here twice: it's where Louis picks up Ordell after the money drop in Jackie Brown, and the interior doubles as the My Oh My Club in Kill Bill Vol. 2. Multiple music videos shot inside. 25 to 60 dancers on a given night. Amber chandeliers and a saloon-like interior. Playboy, LA Magazine, and LA Weekly have all put it on their best strip club lists. Open seven days a week, 11 AM to 2 AM. The kind of place that somehow manages to be both sleazy and weirdly welcoming.","ys":1995,"tl":[{"y":"1995","x":"Opens on Olympic Blvd — DTLA's first strip club"},{"y":"1997","x":"Featured in Quentin Tarantino's Jackie Brown"},{"y":"2004","x":"Interior used in Kill Bill Vol. 2 as the My Oh My Club"}],"tags":["Strip Club","Bar","Film Location","Tarantino","Downtown"],"rel":["edisonbar","kingeddys"],"s":"active"},{"id":"residuals","h":"studiocity","n":"Residuals Tavern","t":"Industry Bar","c":"nightlife","lat":34.1404914,"lng":-118.3714706,"a":"11042 Ventura Blvd, Studio City","i":"🍺","d":"Opened in 1986 as Re$iduals — named after the ever-diminishing checks actors receive for repeat airings of a TV show. A Studio City dive bar on Ventura Boulevard that became the unofficial living room of the entertainment industry's lower middle class: small-time actors, working writers, session musicians, crew members. The kind of people who actually make Hollywood function. Dart boards, karaoke nights, dim lanterns, no food menu but you can bring your own from the strip mall's other restaurants. Featured in HBO's Barry — it's where Barry meets his future girlfriend Sally after acting class. Legend has it there's a ghost in the attic crawlspace that the staff refuses to discuss. If you bring in a residuals check, you get a free drink. That's the whole premise.","ys":1986,"tl":[{"y":"1986","x":"Opens as Re$iduals on Ventura Blvd in Studio City"},{"y":"2018","x":"Featured in HBO's Barry as the actors' after-class bar"},{"y":"2025","x":"Approaching four decades on Ventura Blvd"}],"tags":["Dive Bar","Industry","Actors","Studio City","Barry"],"rel":["smokehouse","bobsbigboy","vitellos"],"s":"active"},{"id":"sofistadium","h":"southla","n":"SoFi Stadium","t":"NFL Stadium","c":"culture","lat":33.9534765,"lng":-118.3390235,"a":"1001 S Stadium Dr, Inglewood","i":"🏟️","d":"Built on the grave of Hollywood Park Racetrack (1938-2013), SoFi Stadium opened in September 2020 as the most expensive stadium ever constructed — $5.5 billion, privately funded by Rams owner Stan Kroenke. Designed by HKS with a translucent ETFE canopy roof that allows sunlight and ocean breezes through. The playing field sits 100 feet below street level because the FAA required a low profile to avoid interfering with LAX radar and flight paths — Kroenke built a separate $29 million radar system to satisfy the feds. Home to both the LA Rams and LA Chargers. Capacity 70,240, expandable past 100,000. The Rams played the first NFL game here against the Cowboys on September 13, 2020 — to an empty stadium because of COVID. Hosted Super Bowl LVI in 2022, WrestleMania 39 in 2023. Will host 2026 FIFA World Cup matches, Super Bowl LXI in 2027, and the 2028 Olympics opening ceremony and swimming events.","ys":2020,"tl":[{"y":"1938","x":"Hollywood Park Racetrack opens on this site"},{"y":"2013","x":"Hollywood Park closes — site demolished for redevelopment"},{"y":"2016","x":"NFL approves Rams return to LA — groundbreaking November"},{"y":"2020","x":"SoFi Stadium opens September — first game played to empty stands"},{"y":"2022","x":"Hosts Super Bowl LVI — Rams beat Bengals at home"},{"y":"2028","x":"2028 Olympics opening ceremony and swimming events"}],"tags":["NFL","Stadium","Olympics","Inglewood","Rams","Chargers"],"rel":["coliseum","theforum","rosebowl"],"w":"SoFi_Stadium","s":"active"},{"id":"intuitdome","h":"southla","n":"Intuit Dome","t":"NBA Arena","c":"culture","lat":33.9437983,"lng":-118.3421771,"a":"3930 W Century Blvd, Inglewood","i":"🏀","d":"After 25 years as tenants at Crypto.com Arena sharing with the Lakers and Kings, the LA Clippers finally got a home of their own. Steve Ballmer — the richest owner in the NBA, former Microsoft CEO — spent $2 billion building the most technologically advanced arena in professional sports. Designed by AECOM. Opened August 15, 2024 with back-to-back Bruno Mars concerts. The signature feature is The Wall: a 51-row, 4,500-seat section behind the opponents' basket — no premium seating, no corporate buffer zones, just fans stacked vertically to produce maximum noise. Inspired by European soccer supporter sections. Kevin Durant after the first game: It's going to be a tough road environment for anyone who comes in here. Facial recognition entry, sensors in every seat that reward loud fans, USB-C charging in every armrest. Hosted the 2026 NBA All-Star Game. Will host basketball at the 2028 Olympics.","ys":2024,"tl":[{"y":"2017","x":"Inglewood approves exclusive negotiating agreement with Clippers"},{"y":"2021","x":"Groundbreaking ceremony September 17"},{"y":"2024","x":"Opens August 15 — Bruno Mars inaugural show"},{"y":"2026","x":"Hosts NBA All-Star Game"},{"y":"2028","x":"Basketball venue for the Summer Olympics"}],"tags":["NBA","Arena","Clippers","Technology","Inglewood"],"rel":["coliseum","theforum","sofistadium"],"w":"Intuit_Dome","s":"active"},{"id":"videotheque","h":"highlandpark","n":"Vidéothèque","t":"Video Rental Store","c":"shop","lat":34.0928543,"lng":-118.2095917,"a":"4102 N Figueroa St","i":"📼","d":"Mark Wright managed a video store called Video Paradiso in his college town of Claremont, then opened his own shop on Mission Street in South Pasadena in March 2003. Vidéothèque became a pillar of the neighborhood for twenty years — 45,000 titles organized by director, actor, and era rather than alphabetically. Pinball machine, jukebox loaded with 45s, vintage vinyl, bespoke T-shirts. Friday night screenings inside the store. Not just a rental shop but a third place where cinephiles loitered for hours debating obscure French New Wave films. When the lease expired in 2023, skyrocketing rent forced a move. They said goodbye with a sold-out screening of John Waters' Multiple Maniacs projected on a sheet inside the emptied store. Reopened four miles away at 4102 N Figueroa Street in Highland Park, near where Cypress Park meets Mount Washington. Bigger space, same obsessive curation.","ys":2003,"tl":[{"y":"2003","x":"Mark Wright opens Vidéothèque on Mission Street in South Pasadena"},{"y":"2023","x":"Celebrates 20th anniversary — then forced to move by rising rent"},{"y":"2023","x":"Reopens on Figueroa Street in Highland Park with more space"}],"tags":["Video Store","Film","Physical Media","Highland Park","Cinephile"],"rel":["vidiots","nuart","amoebarec"],"s":"active"},{"id":"cinefile","h":"westla","n":"CineFile Video","t":"Video Rental Store","c":"shop","lat":34.046394,"lng":-118.4480848,"a":"11280 Santa Monica Blvd","i":"🎬","d":"Founded in 1999 by Philip Anderson on a stretch of Santa Monica Boulevard in West LA that the LA Weekly once called Analog Alley — a record shop, two bookstores, CineFile, and the Nuart Theatre all within a few blocks. When Anderson was about to shutter in 2013, Sebastian Mathews — owner of the Touch Vinyl record shop nearby — bought it because he couldn't bear to watch it disappear. Over 50,000 titles: DVDs, Blu-rays, VHS, laserdiscs. The kind of inventory that makes every streaming service combined look like a gas station DVD rack. Werner Herzog, Sean Baker, Barry Jenkins, and Nicolas Winding Refn have all browsed the shelves. Open until midnight on weekends. Partnerships with Criterion Collection, Vinegar Syndrome, and Shout! Factory. $30 monthly membership, no late fees. The last video rental store on the Westside.","ys":1999,"tl":[{"y":"1999","x":"Philip Anderson opens CineFile Video on Santa Monica Blvd"},{"y":"2012","x":"Analog Alley thrives — record shops, bookstores, CineFile, Nuart"},{"y":"2013","x":"Sebastian Mathews buys CineFile to save it from closure"}],"tags":["Video Store","Film","Physical Media","West LA","Analog Alley"],"rel":["vidiots","videotheque","nuart"],"s":"active"},{"id":"faultline","h":"hollywood","n":"Faultline Bar","t":"Leather Bar (Closed)","c":"nightlife","lat":34.083451,"lng":-118.292402,"a":"4216 Melrose Ave","i":"⛓️","d":"The building at 4216 Melrose Avenue has been a gay bar for over 40 years. In the 1960s it was called the Red Rouge, owned by Judy Garland and her husband Sid Luft — Garland put her handprint and signature in the cement behind the bar in 1963. It became The Stud, a Levi/leather cruise bar, from 1974 to 1988. Then Griff's in 1989. Shawn Farnsworth bought it in 1993 and christened it Faultline in 1994 — the same year as the Northridge Earthquake. For 26 years it was LA's last standing leather bar: neon penis on the wall, Tom of Finland art, go-go boys, legendary Sunday beer busts that drew 600 people, outdoor parking lot events, and a community of bears, otters, leather daddies, and everyone else who didn't fit the West Hollywood mold. COVID killed it. The owners emptied the building in late 2020. The liquor license was transferred to a new straight bar called Bestie Lounge in December 2021. The neon penis is reportedly in storage.","ys":1974,"ye":2020,"tl":[{"y":"1963","x":"Judy Garland signs her name in the cement at the Red Rouge"},{"y":"1974","x":"Becomes The Stud — Levi/leather cruise bar"},{"y":"1994","x":"Shawn Farnsworth opens Faultline"},{"y":"2004","x":"Major expansion adds enclosed outdoor patio"},{"y":"2020","x":"Closes during COVID — interior cleared out late in the year"},{"y":"2021","x":"Liquor license cancelled — space becomes Bestie Lounge"}],"tags":["Leather Bar","Gay Bar","LGBTQ","Closed","Judy Garland"],"rel":["catchone","cuffs","akbar"],"s":"closed"},{"id":"saddleranch","h":"weho","n":"Saddle Ranch Chop House","t":"Western-Themed Restaurant & Bar","c":"food","lat":34.0956592,"lng":-118.3723546,"a":"8371 Sunset Blvd, West Hollywood","i":"🤠","d":"Opened September 1999 on the Sunset Strip with a concept called Rock Meets Western: rustic wood-and-stone construction, western props, faux saloon balconies, and the only mechanical bull in Los Angeles. It was an instant hit. Sex and the City filmed here. Desperate Housewives filmed here. American Idol, Six Feet Under, VH1's Rock of Love — all filmed here. Business Insider named it the rowdiest bar in the United States in 2013. VH1 gave the staff their own reality show in 2011. Stone campfire pits on the outdoor patio facing the Strip where you can roast your own s'mores. Oval-shaped bar in the center of the dining room. Second location at Universal CityWalk opened 2003. Open 365 days a year, until 2 AM. The kind of place that tourists love and locals secretly love too.","ys":1999,"tl":[{"y":"1999","x":"Opens on the Sunset Strip in September — first mechanical bull in LA"},{"y":"2003","x":"Second location opens at Universal CityWalk"},{"y":"2011","x":"VH1 reality show Saddle Ranch premieres"},{"y":"2013","x":"Business Insider names it rowdiest bar in the US"}],"tags":["Sunset Strip","Mechanical Bull","Western","Restaurant","Film Location"],"rel":["rainbow","roxy","whisky"],"w":"Saddle_Ranch_Chop_House","s":"active"},{"id":"genghiscohen","h":"fairfax","n":"Genghis Cohen","t":"Chinese Restaurant & Music Venue","c":"food","lat":34.0838,"lng":-118.3614,"a":"740 N Fairfax Ave","i":"🥟","d":"Music producer Allan Rinde — a New York native who rode the rock and roll wave in the 1960s and 1970s — opened a Chinese restaurant on Fairfax Avenue in 1983 as a tribute to American Chinese cuisine and the thriving Jewish community in the neighborhood. The name was the joke and the concept: Jewish-Chinese cross-pollination, red leather booths, egg rolls, crab rangoon, egg foo young. Rinde built an adjacent music room that by the late 1980s was one of the busiest small venues in LA. Sara Bareilles got her start here. Jackson Browne, Beck, Dave Grohl, Bonnie Raitt, Tom Morello all played the room. The Chinese Restaurant episode of Seinfeld was inspired by it. Marc Rose and Med Abrous of Call Mom purchased it in 2015 and restored the neon, paper lanterns, and fish tank. The original strip mall at 740 N Fairfax was sold to developers and Genghis Cohen was forced out May 31, 2025 after 42 years. They reopened one day later at a temporary space at 448 N Fairfax while searching for a permanent home with a music venue. Hosting live shows at Canter's Kibitz Room in the meantime.","ys":1983,"tl":[{"y":"1983","x":"Allan Rinde opens Genghis Cohen on Fairfax Ave"},{"y":"1988","x":"Music room becomes one of LA's busiest small venues"},{"y":"2015","x":"Marc Rose and Med Abrous purchase — restore neon and fish tank"},{"y":"2025","x":"Forced out of 740 N Fairfax — strip mall sold to developers"},{"y":"2025","x":"Reopens at 448 N Fairfax one day later — searching for permanent home"}],"tags":["Chinese","Music Venue","Fairfax","Jewish-Chinese","Seinfeld"],"rel":["canters","farmersmarket","largo"],"w":"Genghis_Cohen","s":"active"},{"id":"beverlypark","h":"weho","n":"Beverly Park","t":"Amusement Park (Demolished)","c":"culture","lat":34.0756,"lng":-118.3773,"a":"8500 Beverly Blvd (now Beverly Center)","i":"🎠","d":"The kiddieland that inspired Disneyland. Frock & Meyer built a small children's amusement park at Beverly and La Cienega in 1943, and David Bradley bought it in 1945 with his partner Donald Kaye. Less than an acre, sitting atop active oil wells, with a dozen rides scaled for children: the Little Dipper roller coaster, a Ferris wheel, Tilt-A-Whirl, boats, helicopters, and the Haunted Castle — which became notorious after the park closed when a film crew discovered that one of the props was a real human corpse. Bradley disguised the oil derrick towering over the property to look like a dragon with flapping wings. Lana Turner brought her daughter Cheryl. Errol Flynn came. John Lennon, Kirk Douglas, Sonny and Cher all brought their kids. Walt Disney studied the park extensively before building Disneyland and hired Bradley as a consultant. Up to 5,000 visitors on a busy day. Closed 1974 when the Beverly Oil Company jacked up the lease. Demolished. The Beverly Center opened on the site in 1982.","ys":1943,"ye":1974,"tl":[{"y":"1943","x":"Frock & Meyer build Beverly Park at Beverly and La Cienega"},{"y":"1945","x":"David Bradley buys it — begins 30 years of innovation"},{"y":"1955","x":"Walt Disney studies the park before building Disneyland"},{"y":"1974","x":"Closes when oil company raises the lease"},{"y":"1982","x":"Beverly Center mall opens on the site"}],"tags":["Amusement Park","Demolished","Kiddieland","Walt Disney","Beverly Center"],"rel":["golfnstuff","disneystudios"],"w":"Beverly_Park_(amusement_park)","s":"demolished"},{"id":"ponyland","h":"weho","n":"Ponyland","t":"Pony Ride Park (Demolished)","c":"culture","lat":34.0762,"lng":-118.3756,"a":"8536 Beverly Blvd (now Beverly Center)","i":"🐴","d":"Adjacent to Beverly Park at 8536 Beverly Boulevard, Ponyland was owned and operated by Leo Pat Murphy and his wife Viva. Children picked a pony and raced around a circular track while geese and swans attacked from the center island — biting kids on the butt was a defining memory for generations of Angelenos. When Beverly Park closed in 1974, Ponyland held on for five more years. In 1979, Viva — by then a widow — hitched up her 27 ponies and left the city. The carnival had officially left town. Both sites were demolished and replaced by the Beverly Center in 1982. As one resident put it, they traded ponies and Ferris wheels for parking decks and shopping bags.","ys":1945,"ye":1979,"tl":[{"y":"1945","x":"Ponyland opens adjacent to Beverly Park on Beverly Blvd"},{"y":"1974","x":"Beverly Park closes — Ponyland keeps going"},{"y":"1979","x":"Viva Murphy hitches 27 ponies and leaves the city"},{"y":"1982","x":"Beverly Center opens on the combined site"}],"tags":["Pony Rides","Demolished","Kiddieland","Beverly Center"],"rel":["beverlypark","golfnstuff"],"s":"demolished"},{"id":"earlcarroll","h":"hollywood","n":"Earl Carroll Theatre","t":"Nightclub / Theater","c":"music","lat":34.0978466,"lng":-118.324744,"a":"6230 Sunset Blvd","i":"💃","d":"Broadway showman Earl Carroll — nicknamed the Troubadour of the Nude — built Hollywood's premier entertainment palace and opened it December 26, 1938. Gordon B. Kaufmann designed the Streamline Moderne building. The facade bore a 20-foot neon portrait of Carroll's companion Beryl Wallace and the slogan Through These Portals Pass the Most Beautiful Girls in the World. The 1,200-seat supper club had a 60-foot revolving turntable stage, a water curtain, swings that lowered from the ceiling, and showgirls ascending a 100-foot staircase. Carroll and Wallace died in a United Airlines crash in 1948. The theater became the Moulin Rouge in 1953, then Hullabaloo in 1966, then the Aquarius Theater where Hair ran and The Doors recorded live in 1969. Zoot Suit played here in 1978. Star Search taped here in the 1980s. Chevy Chase's disastrous talk show lasted five weeks in 1993. Nickelodeon occupied the building from 1997 to 2017 — iCarly, Drake & Josh, Victorious were all filmed inside. Designated LA Historic-Cultural Monument in 2016. Quentin Tarantino restored the psychedelic facade for Once Upon a Time in Hollywood. New operators signed a 10-year lease in 2019 to restore it as an entertainment venue.","ys":1938,"tl":[{"y":"1938","x":"Opens December 26 as Earl Carroll's Theatre-Restaurant"},{"y":"1948","x":"Carroll and Beryl Wallace die in plane crash"},{"y":"1953","x":"Becomes the Moulin Rouge under Frank Sennes"},{"y":"1968","x":"Renamed the Aquarius — hosts Hair and The Doors"},{"y":"1983","x":"Becomes TV studio — Star Search tapes here for nine years"},{"y":"1997","x":"Nickelodeon moves in — iCarly, Drake & Josh filmed inside"},{"y":"2016","x":"Designated LA Historic-Cultural Monument"}],"tags":["Theater","Nightclub","Streamline Moderne","Nickelodeon","Historic"],"rel":["palladium","pantages","ciros"],"w":"Earl_Carroll_Theatre_(Los_Angeles)","s":"active"},{"id":"mamaison","h":"fairfax","n":"Ma Maison","t":"Celebrity Restaurant (Closed)","c":"food","lat":34.0834,"lng":-118.3727,"a":"8368 Melrose Ave","i":"🍽️","d":"Patrick Terrail — descendant of French restaurant royalty, nephew of the owner of La Tour d'Argent in Paris — opened Ma Maison in October 1973 on Melrose Avenue near Cedars-Sinai. The first two years were a struggle. Then he hired a 25-year-old Austrian nobody named Wolfgang Puck, whose first paycheck bounced. Puck transformed the kitchen into the birthplace of California nouvelle cuisine — cream of sorrel soup, grilled chicken with sherry vinegar, steamed oysters with baby vegetables. The phone number was unlisted. The patio was covered in Astroturf. David Hockney designed the menus. Orson Welles ate lunch there almost every day and entered through the kitchen to avoid being seen. The line of Rolls-Royces outside was a landmark. Puck left in 1982 to open Spago. In 1982, sous chef John Sweeney strangled actress Dominique Dunne — the daughter of writer Dominick Dunne — and the murder haunted the restaurant for years. Ma Maison closed November 1, 1985. Terrail sold the building for over $2 million. The restaurant that launched Wolfgang Puck, California cuisine, and the modern LA dining scene lasted twelve years.","ys":1973,"ye":1985,"tl":[{"y":"1973","x":"Patrick Terrail opens Ma Maison on Melrose Avenue"},{"y":"1975","x":"Hires Wolfgang Puck — California nouvelle cuisine is born"},{"y":"1982","x":"Puck leaves to open Spago — sous chef murders Dominique Dunne"},{"y":"1985","x":"Closes November 1 — building sold for $2M"}],"tags":["Celebrity Restaurant","Wolfgang Puck","California Cuisine","Closed","Hollywood Elite"],"rel":["spago","chasens","musso"],"w":"Ma_Maison","s":"closed"},{"id":"globetheatre","h":"downtown","n":"Globe Theatre","t":"Historic Theater / Event Venue","c":"culture","lat":34.044,"lng":-118.254,"a":"740 S Broadway","i":"🎭","d":"Oliver Morosco opened this theater on January 6, 1913, as the first legitimate dramatic playhouse on Broadway — built for full-scale plays when every other house was doing vaudeville. The interior, designed by Alfred Rosenheim, included special wide seats for patrons over 200 pounds and an orchestra pit filled with plants instead of musicians. Morosco killed intermission music because he thought it was rude. The building, wrapped inside the 11-story Garland Building by Morgan, Walls & Morgan, cycled through names and lives: President Theatre in 1928, Newsreel Theatre in 1938, Globe in 1947. Spanish-language films ran through the 1980s. A swap meet occupied the gutted auditorium from 1987 to 2002. Then nightclub Club 740, shut down in 2011 after shootings. A four-year restoration beginning in 2014 brought back the mirrored lobby, marble staircases, and original paint bridge — one of the few surviving in LA. The Globe now operates as a multi-purpose event venue with 1,575 standing capacity.","ys":1913,"tl":[{"y":"1913","x":"Opens January 6 as Morosco Theatre — first legitimate playhouse on Broadway"},{"y":"1928","x":"Renamed President Theatre under Henry Duffy"},{"y":"1938","x":"Becomes LA's first continuous Newsreel Theatre"},{"y":"1947","x":"Renamed Globe Theatre"},{"y":"1986","x":"Closes as Spanish-language cinema after 73 years of screenings"},{"y":"1987","x":"Gutted for indoor swap meet"},{"y":"2014","x":"Restoration begins — historic lobby and marble staircases uncovered"},{"y":"2025","x":"Reopens as fully restored event venue"}],"tags":["Broadway Theater District","Historic Theater","Event Venue","National Register"],"rel":["orpheumtheatre","palacetheatre","regenttheater"],"w":"Globe_Theatre_(Los_Angeles)","s":"active"},{"id":"cameotheatre","h":"downtown","n":"Cameo Theatre","t":"Historic Theater (Closed)","c":"culture","lat":34.0474,"lng":-118.251,"a":"528 S Broadway","i":"🎬","d":"W.H. Clune opened Clune's Broadway Theatre on October 10, 1910 — one of the first purpose-built movie theaters in America. Opening night tickets cost ten cents for standard seats, twenty for loge. A $50,000 Wurlitzer organ went in during 1921. H.L. Gumbiner bought and renovated the place in 1924, reopening it as the Cameo with a 16-piece house orchestra. Universal Pictures ran it for two years. Fox West Coast took it over. Metropolitan Theatres held on through the Spanish-language era. For 81 consecutive years, this building screened movies — the longest unbroken run of any theater in Los Angeles. It finally closed in 1991. The auditorium became storage; the lobby became an electronics shop, then a jewelry store. Alfred Rosenheim's Neoclassical facade and decorative pilasters with stylized \"C\" capitals survive, making the Cameo the oldest essentially unaltered nickelodeon theater in the city.","ys":1910,"ye":1991,"tl":[{"y":"1910","x":"Opens October 10 as Clune's Broadway — one of America's first purpose-built cinemas"},{"y":"1921","x":"$50,000 Wurlitzer organ installed"},{"y":"1924","x":"Renamed Cameo Theatre under H.L. Gumbiner"},{"y":"1991","x":"Closes after 81 consecutive years of film screenings"}],"tags":["Broadway Theater District","Historic Theater","Closed","National Register","Nickelodeon"],"rel":["globetheatre","roxietheatre","orpheumtheatre"],"w":"Cameo_Theatre_(Los_Angeles)","s":"closed"},{"id":"roxietheatre","h":"downtown","n":"Roxie Theatre","t":"Historic Theater (Closed)","c":"culture","lat":34.0476,"lng":-118.2509,"a":"518 S Broadway","i":"🎬","d":"The last theater built on Broadway and the only one in Art Deco style. John M. Cooper designed it, and it opened November 25, 1931 with Bebe Daniels in \"Honor of the Family\" and Laurel & Hardy in \"Come Clean.\" The construction required 35 miles of electrical wire and a 31-motor ventilation system. The colorful terrazzo entrance became a downtown landmark. The building's history runs dark: general manager Harry Metzger died of a heart attack in the ticket booth in 1943, discovered by a customer trying to buy a ticket. On Christmas Eve 1954, a woman killed herself in her seat during a double feature — her body wasn't found until the lights came on at 3:30 AM. She was never identified. An usher tied up the manager and robbed the place in 1958. Metropolitan Theatres switched to Spanish-language films in 1978 and closed the Roxie for good in summer 1989. The lobby became retail; the auditorium was sealed and left to water damage. Cooper's terrazzo and stepped Art Deco facade remain.","ys":1931,"ye":1989,"tl":[{"y":"1931","x":"Opens November 25 — last theater built on Broadway, only Art Deco design"},{"y":"1943","x":"Manager dies of heart attack in ticket booth"},{"y":"1954","x":"Unidentified woman found dead Christmas Eve during double feature"},{"y":"1978","x":"Switches to Spanish-language films under Metropolitan Theatres"},{"y":"1989","x":"Closes permanently — auditorium sealed, lobby converted to retail"}],"tags":["Broadway Theater District","Historic Theater","Art Deco","Closed","National Register"],"rel":["globetheatre","cameotheatre","orpheumtheatre"],"w":"Roxie_Theatre","s":"closed"},{"id":"statetheatre","h":"downtown","n":"State Theatre","t":"Historic Theater (Closed)","c":"culture","lat":34.0451,"lng":-118.2537,"a":"703 S Broadway","i":"🎭","d":"Marcus Loew built his west coast showcase at Broadway and 7th — the busiest intersection downtown — and opened it November 12, 1921 as Loew's State. Weeks & Day designed the 12-story Beaux Arts building with a 2,450-seat auditorium in Spanish Renaissance style. A Billiken good luck figure sits in a niche above the proscenium. The fire curtain, painted by Armstrong-Powers, depicts a surreal city of onion-domed towers surrounded by planets and comets. Judy Garland sang here as a kid with the Gumm Sisters in 1929, earning the nickname \"Leather Lungs\" for reaching the back of the 125-foot-deep auditorium. MGM first-run pictures played for decades. United Artists took over in 1949 and dropped \"Loew's\" from the name. Metropolitan Theatres ran Spanish-language films through the decline years. The State closed in 1997 — the last Broadway theater to stop screening movies. The Universal Church of the Kingdom of God used it as \"Cathedral of Faith\" through the 2010s. The Broadway Theatre Group owns it and is seeking a theatrical tenant.","ys":1921,"ye":1998,"tl":[{"y":"1921","x":"Opens November 12 as Loew's State — west coast flagship for MGM"},{"y":"1929","x":"Young Judy Garland sings with the Gumm Sisters"},{"y":"1949","x":"United Artists takes over — name shortened to State Theatre"},{"y":"1963","x":"Metropolitan Theatres begins Spanish-language programming"},{"y":"1997","x":"Closes — last Broadway theater to stop showing films"},{"y":"1998","x":"Converted to Cathedral of Faith church"}],"tags":["Broadway Theater District","Historic Theater","Closed","National Register","MGM"],"rel":["globetheatre","orpheumtheatre","palacetheatre"],"w":"State_Theatre_(Los_Angeles)","s":"closed"},{"id":"goldenapple","h":"fairfax","n":"Golden Apple Comics","t":"Comic Book Store","c":"community","lat":34.0832,"lng":-118.3435,"a":"7018 Melrose Ave","i":"📚","d":"Bill Liebowitz — yo-yo champion, CPA, co-founder of Rhino Records — gave up his corner office and big salary in 1979 to open a 400-square-foot comic shop on Melrose Avenue. The name came from bags left behind by the previous tenant, a business called Golden Apple. DC Comics vice president Bob Wayne called it \"one of the most important comic book stores in the world.\" Liebowitz rented Klieg lights for the Todd McFarlane Spider-Man #1 launch in 1990, making a comic release look like a Hollywood premiere. He arranged a police motorcade for an Image Comics signing in 1992. Jack Kirby, Stan Lee, Frank Miller, George Romero, and Michael Jackson all came through the door. Liebowitz died of a heart attack in 2004. His son Ryan moved the shop down Melrose to its current La Brea location and kept the legacy going. Featured in Weird Al's \"White & Nerdy\" video and the film Free Enterprise. Survived COVID by pivoting hard to online sales and exclusive variant covers.","ys":1979,"tl":[{"y":"1979","x":"Bill Liebowitz opens Golden Apple Comics on Melrose Avenue"},{"y":"1983","x":"Second location opens in Northridge"},{"y":"1990","x":"Klieg-light premiere for Spider-Man #1 launch"},{"y":"2004","x":"Bill Liebowitz dies — son Ryan takes over"},{"y":"2009","x":"Northridge location sold to Earth 2 Comics"}],"tags":["Comic Books","Melrose","Independent Retail","Pop Culture"],"rel":["meltdown"],"w":"Golden_Apple_Comics","s":"active"},{"id":"hideho","h":"santamonica","n":"Hi De Ho Comics","t":"Comic Book Store (Closed)","c":"community","lat":34.0137,"lng":-118.4841,"a":"1803 Lincoln Blvd","i":"📚","d":"The first comic book store in Los Angeles County. Brothers Bob and Mark Hennessey opened Hi De Ho Comics on July 7, 1977 — 7/7/77, a date chosen for cosmic significance. Marvel paid to build their shelves. Bags and boards didn't exist yet, so the Hennesseys had to invent their own. The shop started near the Third Street Promenade and later moved to a larger space on Lincoln Boulevard. Geoffrey Patterson II purchased Hi De Ho in 2015 and connected it to his family's Geoffrey's Comics brand. For 46 years the store was a Santa Monica institution — cavernous, overstuffed with new releases and hard-to-find back issues, a place where UCLA students and Westside collectors dug through long boxes side by side. COVID gutted the customer base. Online retail and big-box stores selling comics finished it off. Hi De Ho closed its brick-and-mortar doors December 31, 2023. Pull list service continues as pop-up events.","ys":1977,"ye":2023,"tl":[{"y":"1977","x":"Opens July 7 (7/7/77) — first comic book store in LA County"},{"y":"2015","x":"Geoffrey Patterson II purchases Hi De Ho"},{"y":"2023","x":"Closes brick-and-mortar December 31 — shifts to online and pull parties"}],"tags":["Comic Books","Santa Monica","Independent Retail","Closed"],"rel":["goldenapple"],"s":"closed"},{"id":"hollywoodpark","h":"southla","n":"Hollywood Park Racetrack","t":"Racetrack (Demolished)","c":"community","lat":33.9501,"lng":-118.3446,"a":"1050 S Prairie Ave, Inglewood","i":"🏇","d":"Jack Warner of Warner Bros. chaired the Hollywood Turf Club that opened this track on June 10, 1938. The shareholders read like a studio lot call sheet: Walt Disney, Samuel Goldwyn, Darryl Zanuck, Al Jolson, Bing Crosby, Ralph Bellamy, directors Raoul Walsh and Mervyn LeRoy. Seabiscuit won the inaugural Hollywood Gold Cup. The track closed during World War II and served as storage for North American Aviation. Racing resumed in 1944 and Hollywood Park became a prestige destination for thoroughbred racing through the twentieth century — flamingos in the infield lake, celebrities in the clubhouse, airplanes from LAX roaring overhead. The 1992 LA riots forced racing cancellations. Attendance declined through the lottery and off-track betting era. Racing ended December 22, 2013. The grandstand was imploded May 31, 2015. SoFi Stadium now sits on the site. The track that movie moguls built for their horses became a stadium for their football teams.","ys":1938,"ye":2013,"tl":[{"y":"1938","x":"Opens June 10 — Seabiscuit wins inaugural Hollywood Gold Cup"},{"y":"1942","x":"Closes for WWII — becomes North American Aviation storage"},{"y":"1944","x":"Racing resumes under charitable wartime permit"},{"y":"1992","x":"Racing canceled during LA riots"},{"y":"1994","x":"Hollywood Park Casino added to complex"},{"y":"2013","x":"Final race day December 22 — 75 years of thoroughbred racing ends"},{"y":"2015","x":"Grandstand imploded — SoFi Stadium construction begins"}],"tags":["Horse Racing","Demolished","Inglewood","Hollywood History","SoFi Stadium"],"rel":["sofistadium","theforum"],"w":"Hollywood_Park_Racetrack","s":"demolished"},{"id":"larryschilidog","h":"burbank","n":"Larry's Chili Dog","t":"Hot Dog Stand","c":"food","lat":34.1762,"lng":-118.345,"a":"3122 W Burbank Blvd, Burbank","i":"🌭","d":"Opened in 1952 on Burbank Boulevard as a walk-up hot dog stand. The name Larry was supposedly the nickname of the original owner's girlfriend — neither of the first two owners was actually named Larry. The current proprietor, John, is only the third owner in seven decades. He opens, closes, cooks, cleans, and answers the phone six days a week. Originally located across the street at 3111, where the old space was large enough that a two-story office building now occupies the footprint. The chili recipe is mild and complements the snap of the high-quality dogs — steamed bun, finely shredded cheddar, nothing fancy. But the cult item is the breakfast burrito: bacon, sausage, scrambled eggs, hash browns, and a green-chili salsa that Burbank studio workers have been lining up for since Warner Bros. and NBC lot crews discovered it decades ago. Vintage neon sign. Outdoor patio hidden behind hedges. Signed celebrity photos cover the kitchen wall.","ys":1952,"tl":[{"y":"1952","x":"Opens on Burbank Blvd as a walk-up hot dog stand"},{"y":"2003","x":"John takes over as third owner — breakfast burrito cult grows"}],"tags":["Hot Dogs","Burbank","Breakfast Burrito","Vintage"],"rel":["bobsbigboy","smokehouse"],"s":"active"},{"id":"littletonis","h":"noho","n":"Little Toni's","t":"Italian Restaurant","c":"food","lat":34.1568,"lng":-118.3701,"a":"4745 Lankershim Blvd, North Hollywood","i":"🍕","d":"Took over from the Italian Cottage Restaurant in 1956, started with thirty seats. Expansion came by absorbing the adjacent liquor store ten years later, then demolishing Swanky's next door for more room. Family-owned for nearly seventy years. Sits on a wedge-shaped corner where Lankershim and Vineland cross at odd angles — there is literally no crosswalk to reach the building, so every customer jaywalks. Inside: exposed brick, red leather booths, candlelight so dim that diners use phone flashlights to read the menu. Rated best pizza in the Valley by the LA Times and LA Magazine. Open until midnight, which makes it the late-night destination for the NoHo Arts District theatre crowd. Actors celebrating opening nights, comedians closing down the place at 2 AM, families sharing carafes of house wine and oversized pies. The original framed menu hangs on the wall of the Bartoni's cocktail bar — the prices will make you weep.","ys":1956,"tl":[{"y":"1956","x":"Takes over Italian Cottage Restaurant — renamed Little Toni's"},{"y":"1966","x":"Expands into adjacent liquor store space"},{"y":"1967","x":"Second location opens in Woodland Hills"}],"tags":["Italian","Pizza","NoHo Arts District","Late Night","Family-Owned"],"rel":["vitellos","santoros"],"s":"active"},{"id":"beeps","h":"valley","n":"Beep's","t":"1950s Diner","c":"food","lat":34.2014,"lng":-118.4834,"a":"16063 Sherman Way, Van Nuys","i":"🍔","d":"Opened in 1956 in Van Nuys — named for the sound a car makes when it pulls up to order. The drive-up service is gone but the hot pink and turquoise exterior looks like it was time-warped from the Eisenhower administration. Inside: silver sparkly vinyl seats, squiggle-patterned tabletops, every inch of wall covered in fifties and sixties memorabilia — movie posters, 3D model cars jutting from the walls, paintings of Elvis, Marilyn, James Dean, and Bogart hanging out together. The Daily News called it genuine nostalgia, unlike faux throwbacks like Johnny Rockets. The menu is enormous and impossibly cheap. Burgers start at a few bucks. The chili size — a burger patty on a grilled bun covered in a ladle of chili, eaten with a knife and fork — is a vanishing Southern California specialty that Beep's keeps alive. Breakfast burritos all day. Shakes blended thick enough to stand a straw in.","ys":1956,"tl":[{"y":"1956","x":"Opens in Van Nuys as a drive-up hamburger stand"}],"tags":["Diner","Burgers","1950s","Van Nuys","Retro"],"rel":["bobsbigboy","larryschilidog"],"s":"active"},{"id":"factorsdeli","h":"westla","n":"Factor's Famous Deli","t":"Jewish Deli","c":"food","lat":34.055,"lng":-118.3946,"a":"9420 W Pico Blvd","i":"🥪","d":"Pico-Robertson's anchor deli since 1948. The Markowitz family took over in 1969 and hasn't changed the formula: hand-cut pastrami on double-baked rye, matzo ball soup that people drive across the city for, and portions that suggest the kitchen does not believe in moderation. Vintage movie posters and family photos line the walls. Eighty percent of customers are regulars — retired talent agents, bickering neighbors, and people who know exactly which booth they want. As LA's Jewish delis vanish one by one — Izzy's, Greenblatt's, Jerry's, all gone — Factor's endures on Pico, green awning intact.","ys":1948,"tl":[{"y":"1948","x":"Opens on Pico Blvd"},{"y":"1969","x":"Markowitz family takes over operations"},{"y":"2020","x":"Survives pandemic and deli extinction wave"}],"tags":["Jewish Deli","Pico-Robertson","Pastrami","Matzo Ball Soup"],"rel":["canters","langers","juniorsdeli","artsdeli","brentsdeli"],"s":"active"},{"id":"chiatday","h":"venice","n":"Chiat/Day Building (Binoculars Building)","t":"Postmodern Landmark","c":"culture","lat":33.995,"lng":-118.4765,"a":"340 Main St","i":"🔭","d":"Frank Gehry designed it in 1991 for ad agency Chiat/Day. Claes Oldenburg and Coosje van Bruggen created the 44-foot binoculars that serve as the building entrance — conference rooms inside each lens, eyepieces as skylights, parking garage between the barrels. The story goes that Gehry grabbed a maquette of the binoculars from across his desk during a meeting with founder Jay Chiat to show how a third element could unite his two mismatched buildings. It stuck. Google leased the whole complex in 2011 and operates it as their Venice campus. The building is going on the market as Google's lease expires in 2030. Three blocks from the beach, peak Venice.","ys":1991,"tl":[{"y":"1991","x":"Opens as Chiat/Day ad agency HQ — Gehry + Oldenburg collaboration"},{"y":"2011","x":"Google leases building as Venice campus"}],"tags":["Frank Gehry","Claes Oldenburg","Google","Postmodern","Programmatic Architecture"],"rel":["googlevenice","gehryhome","abbotkinney","goldsgym","venicesign"],"w":"Binoculars_Building","s":"active"},{"id":"palacetheatre","h":"downtown","n":"Palace Theatre","t":"Historic Vaudeville Theater","c":"culture","lat":34.0459,"lng":-118.2526,"a":"630 S Broadway","i":"🎭","d":"The oldest surviving theater on Broadway and the oldest remaining original Orpheum theater in the country. Opened June 1911 as the third Orpheum vaudeville house, designed by G. Albert Lansburgh in a Florentine Renaissance style with polychrome terra cotta and Domingo Mora sculptures on the facade. Harry Houdini performed here — his custom trap door is embedded in the stage. Will Rogers, Fred Astaire, and a young Rita Hayworth all played the Orpheum before it became the Palace in 1926. Michael Jackson's Thriller was filmed inside. The Big Lebowski used it. Dreamgirls dressed it up as a Detroit theater. After decades of grindhouse and Spanish-language films, a million-dollar restoration reopened it in 2011 as a live events venue.","ys":1911,"tl":[{"y":"1911","x":"Opens as Orpheum Theatre — Houdini, Will Rogers, Fred Astaire perform"},{"y":"1926","x":"Renamed Palace after new Orpheum opens down Broadway"},{"y":"1929","x":"Fox takes over — interior remodeled by Anthony Heinsbergen"},{"y":"1978","x":"Metropolitan Theatres begins Spanish-language programming"},{"y":"1983","x":"Michael Jackson films Thriller inside"},{"y":"2000","x":"Closes as movie theater"},{"y":"2011","x":"$1M restoration — reopens as live venue"}],"tags":["Orpheum Circuit","Vaudeville","Houdini","Broadway Theater District","Thriller","National Register"],"rel":["orpheum","milliondollar","globetheatre","statetheatre","belascotheatre","cameotheatre"],"w":"Palace_Theater_(Los_Angeles)","s":"active"},{"id":"versailles","h":"westla","n":"Versailles Cuban Food","t":"Cuban Restaurant","c":"food","lat":34.0211,"lng":-118.4036,"a":"10319 Venice Blvd","i":"🍗","d":"The garlic chicken that launched a chain. Versailles opened in 1971 in the Palms district on Venice Blvd and became the Cuban restaurant for a city that doesn't have a Little Havana. The garlic sauce — mojo criollo — is the signature: roasted half chicken swimming in it, garnished with onions, served with black beans and fried plantains. Portions are large and cheap. Helen Mirren named dinner at Versailles as her ideal LA weekend. Jonathan Gold noted that everybody loved the chicken. Five locations eventually, but the Venice Blvd original is the one that matters — dark, divey, Havana-style, and permanently crowded.","ys":1971,"tl":[{"y":"1971","x":"Opens on Venice Blvd in Palms"},{"y":"1990","x":"La Cienega location opens — chain expands"},{"y":"2020","x":"Survives pandemic across multiple locations"}],"tags":["Cuban","Garlic Chicken","Mojo Criollo","Palms","Chain Original"],"rel":["elcholo","elcoyote","guelaguetza","casavega"],"w":"Versailles_(restaurant_chain)","s":"active"},{"id":"thelash","h":"downtown","n":"The Lash","t":"Underground Club (Closed)","c":"nightlife","lat":34.0471,"lng":-118.2472,"a":"117 Winston St","i":"🪩","d":"Ten years of beautiful weirdness in a DTLA alley. Owner Ross O'Carroll and designer Erik Hart opened The Lash in February 2013 in the ground floor of the Jeffries Building on Winston Street — a hidden block between Main and Spring. Two rooms: one for dancing, one for drinking. Smashed subway tiles on the walls, a deconstructed disco ball, and a neon sign in Russian reading \"Wish you were here.\" The booking was fearlessly eclectic — vogue contests on Saturday nights instead of top 40, Mustache Mondays for queer culture, city pop nights, Berlin-style techno. The crowd was drag queens and club kids and 20-somethings who found the alley. Closed January 2023 — pandemic recovery economics. DTLA lost its best weird room.","ys":2013,"ye":2023,"tl":[{"y":"2013","x":"Opens on Winston St — Erik Hart designs industrial interior"},{"y":"2017","x":"Kristal Barboza begins booking — eclectic programming peaks"},{"y":"2023","x":"Closes after 10 years — pandemic recovery costs"}],"tags":["Underground Club","DTLA","Queer Nightlife","Techno","Mustache Mondays"],"rel":["thesmell","zebulon","catchone","goldengopher","sevengrand"],"s":"closed"},{"id":"oldtrapperslodge","h":"valley","n":"Old Trapper's Lodge","t":"Folk Art Landmark","c":"culture","lat":34.1862,"lng":-118.5823,"a":"Pierce College, 6201 Winnetka Ave, Woodland Hills","i":"🤠","d":"John Ehn was a Michigan trapper who moved to Burbank in 1941 and opened a motel near the airport. Starting in 1951, he spent thirty years building life-size concrete sculptures of Old West characters — cowboys, miners, saloon girls, and a full Boot Hill cemetery — using his own family as models. He hired sculptor Claude Bell of Cabazon Dinosaurs fame to get started, watched for a few days, then decided he could do it himself. Ehn died in 1981 at 84. The sculptures were declared California Historical Landmark No. 939 in 1985. When Burbank Airport bought the land in 1987, an anonymous caller persuaded Pierce College to adopt the statues. They now sit fenced off behind the animal science building, maintained by mystery volunteers who show up every few years to repaint them. Pierce College has been trying to remove them, citing the sculptures' stereotypical depictions. The Ehn family and preservationists are fighting to keep them.","ys":1951,"tl":[{"y":"1951","x":"John Ehn begins building folk art sculptures at his Burbank motel"},{"y":"1981","x":"Ehn dies at 84 — 30 years of work complete"},{"y":"1985","x":"Declared California Historical Landmark No. 939"},{"y":"1988","x":"Sculptures relocated to Pierce College after airport expansion demolishes motel"}],"tags":["Folk Art","California Historical Landmark","Outsider Art","Old West","Pierce College","Woodland Hills"],"rel":["wattstowers","foldedwings"],"w":"Old_Trapper%27s_Lodge","s":"active"},{"id":"laac","h":"downtown","n":"Los Angeles Athletic Club","t":"Private Athletic & Social Club","c":"culture","lat":34.0465,"lng":-118.2552,"a":"431 W 7th St","i":"🏛️","d":"LA's oldest social institution, founded September 8, 1880, when the city had 11,000 people. The twelve-story Beaux-Arts clubhouse at 7th and Olive was completed in 1912, designed by John Parkinson and George Bergstrom — Parkinson later designed the Coliseum. First indoor swimming pool in Southern California. Charlie Chaplin lived here. Mary Pickford, Douglas Fairbanks, and Rudolph Valentino were regulars. George S. Patton, Jack London, and William Randolph Hearst passed through the lobby. The club founded the California Yacht Club in 1922 and Riviera Country Club in 1926. LA Historic-Cultural Monument No. 69. Nearly 150 years running, it operates as a members-only club with hotel rooms, a gym, squash courts, and a cocktail bar called Invention.","ys":1880,"tl":[{"y":"1880","x":"Founded — LA's first athletic and social club"},{"y":"1912","x":"12-story Beaux-Arts clubhouse opens at 7th & Olive — first indoor pool in SoCal"},{"y":"1922","x":"Founded California Yacht Club"},{"y":"1926","x":"Founded Riviera Country Club"},{"y":"2016","x":"Multi-million dollar modernization"}],"tags":["Private Club","Beaux-Arts","Chaplin","Parkinson","LA Monument 69","1880"],"rel":["biltmore","coliseum","centrallibrary","hotelfigueroa","bonaventure"],"w":"Los_Angeles_Athletic_Club","s":"active"},{"id":"fivestarbar","h":"downtown","n":"Five Star Bar","t":"Dive Bar & Music Venue","c":"music","lat":34.0498,"lng":-118.2458,"a":"267 S Main St","i":"🎸","d":"DTLA's underground rock sanctuary since the late 1980s. Mark Cordova opened the bar in a 1905 building on Main Street and by the late '90s had borrowed sound equipment from Fishbone's John Norwood Fisher and built a stage. Two floors, a pool table, and a jukebox playing everything from 1920s jazz to Zeppelin. LAPD's vice squad reportedly warned Cordova against booking punk, metal, and hip-hop — he booked all three. The Adolescents, 2Mex, Tropa Magica, and hundreds of touring bands played the tiny stage. Closed during COVID, then reopened in 2025 under new ownership by DIY scene veteran Dice, who came up through the Rec Center and Towne Square. Angie Hurtado behind the bar makes burgers that rival any gastropub.","ys":1987,"tl":[{"y":"1987","x":"Mark Cordova opens Five Star Bar on Main St"},{"y":"1999","x":"Stage built — live music becomes nightly with Fishbone bassist's loaned gear"},{"y":"2020","x":"Closes during COVID"},{"y":"2025","x":"Reopens under new ownership — DIY veteran Dice takes over"}],"tags":["Dive Bar","Punk","Live Music","Main Street","DTLA"],"rel":["thesmell","thelash","goldengopher","kingeddy"],"s":"active"},{"id":"silverplatter","h":"ktown","n":"Silver Platter","t":"LGBTQ+ Latinx Bar (Endangered)","c":"nightlife","lat":34.0593,"lng":-118.2835,"a":"2700 W 7th St","i":"🪩","d":"LA's oldest gay bar in Westlake, open since 1963. The building dates to 1922 and the Silver Platter name first appeared in 1931 as a grille. By the 1970s, Rogelio Ramirez had transformed it into a gay bar for Latino immigrants in Tejano boots and leather jackets. When Rogelio died of AIDS, his brother Gonzalo took over. By the early 1990s, trans Latinas began showing up — first a few, then dozens. The Silver Platter became one of the only places in LA where vestidas could gather safely. Artist Wu Tsang documented the bar in his 2012 film Wildness, in which the bar itself narrates its own history. A developer filed to demolish the building for apartments in 2020. The LA Conservancy is fighting to save it. The neon sign survives.","ys":1963,"tl":[{"y":"1963","x":"Opens as gay bar in Westlake"},{"y":"1970","x":"Rogelio Ramirez establishes it as a Latino gay bar"},{"y":"1993","x":"Trans Latina community finds a home here"},{"y":"2008","x":"Wu Tsang's Wildness party nights begin — later becomes a documentary"},{"y":"2024","x":"Demolition threatened — LA Conservancy fights to save it"}],"tags":["LGBTQ+","Latinx","Trans","Westlake","Endangered","Neon","Wildness"],"rel":["catchone","akbar","theabbey","thepalms","macarthurpark"],"s":"active"},{"id":"hollywoodhotel","h":"hollywood","n":"Hollywood Hotel","t":"Landmark Hotel (Demolished)","c":"culture","lat":34.1015,"lng":-118.3387,"a":"Hollywood Blvd & Highland Ave","i":"🏨","d":"The hotel that made Hollywood. H.J. Whitley built it in 1902 at the northwest corner of Hollywood Blvd and Highland Ave for $30,000 to lure buyers to his residential lots. Almira Hershey bought it in 1906 and expanded it from 16 rooms to 250. Rudolph Valentino lived in room 264 and married his first wife Jean Acker there in 1919. Carrie Jacobs Bond composed A Perfect Day as a guest. The Thursday night dances were the social calendar of early Hollywood. Every studio boss — Jesse Lasky, Carl Laemmle, Louis B. Mayer, Harry Warner, Irving Thalberg — stayed here. Louella Parsons broadcast her gossip column from the lobby. The guest ledger is preserved at the Smithsonian. After Hershey died, the hotel declined. Charles Toberman demolished it in August 1956 for a $10M office building. The site is now the Dolby Theatre and the Hollywood Ovation complex.","ys":1902,"ye":1956,"tl":[{"y":"1902","x":"H.J. Whitley opens Hollywood Hotel at Prospect Ave & Highland"},{"y":"1906","x":"Almira Hershey buys it — expands to 250 rooms"},{"y":"1919","x":"Rudolph Valentino marries Jean Acker in Room 264"},{"y":"1937","x":"Warner Bros. film Hollywood Hotel shot partly on location"},{"y":"1956","x":"Demolished by Charles Toberman — office building replaces it"},{"y":"2001","x":"Hollywood & Highland Center (now Dolby Theatre complex) built on the site"}],"tags":["Demolished","Valentino","Early Hollywood","Whitley","Hershey","Smithsonian"],"rel":["chinese","roosevelt","walkfame","egyptian","pantages","earlcarroll"],"w":"Hollywood_Hotel","s":"demolished"},{"id":"pleasurechest","h":"weho","n":"The Pleasure Chest","t":"Adult Boutique","c":"shop","lat":34.091,"lng":-118.3576,"a":"7733 Santa Monica Blvd","i":"💋","d":"The oldest sex-positive retailer in the country. Founded in 1971 in New York's West Village by Duane Colglazier and Bill Rifkin, who refused to black out the store windows with XXX — they wanted a department store feel for adult merchandise. The WeHo location opened in the mid-1970s on Santa Monica Blvd and became inseparable from the neighborhood's identity. Joan Jett bought the ringed leather belt she gave to Sid Vicious here — it appears in countless photos of them from the late '70s. Queen referenced the store in their 1978 track Let Me Entertain You. Featured in Sex and the City and Entourage. Now owned by Brian Robinson (Colglazier's nephew), it runs education programs and classes alongside the retail floor. One of the few legacy businesses on Santa Monica Blvd that predates WeHo's cityhood.","ys":1976,"tl":[{"y":"1976","x":"LA location opens on Santa Monica Blvd in West Hollywood"},{"y":"1978","x":"Queen references the store in Let Me Entertain You"},{"y":"1978","x":"Joan Jett buys the belt she gives to Sid Vicious"}],"tags":["LGBTQ+","WeHo","Punk","Sex-Positive","Joan Jett","Queen","Legacy Business"],"rel":["theabbey","catchone","akbar","bodyshop"],"s":"active"},{"id":"laplaza","h":"downtown","n":"LA Plaza de Cultura y Artes","t":"Museum","c":"culture","lat":34.0565,"lng":-118.2398,"a":"501 N Main St","i":"🏛️","d":"The first major museum dedicated to Mexican American history in Los Angeles, opened in 2011 on 2.2 acres adjacent to Olvera Street. Housed in two restored 1880s buildings — the Vickrey-Brunswig Building and the 1883 Plaza House — with a teaching kitchen named for Gloria Molina, who fought for decades to make the place real. The permanent exhibit recreates 1920s Main Street. During construction in 2010, workers unearthed human remains from a forgotten cemetery. A Smithsonian affiliate that cost $54 million and opened free to the public.","ys":2011,"tl":[{"y":"2011","x":"Opens April 16 adjacent to Olvera Street"},{"y":"2010","x":"Human remains discovered during construction"},{"y":"2014","x":"John Echeveste becomes CEO"},{"y":"2022","x":"Leticia Rhi Buckley appointed CEO"},{"y":"2024","x":"$2M renovation announced for expanded exhibits"}],"tags":["Museum","Mexican American","Cultural Center","Downtown"],"rel":["olverastreet","mercedtheatre","picohouse"],"w":"LA_Plaza_de_Cultura_y_Artes","s":"active"},{"id":"domingos","h":"valley","n":"Domingo's Italian Deli","t":"Deli","c":"food","lat":34.1615,"lng":-118.5158,"a":"17548 Ventura Blvd, Encino","i":"🥖","d":"Family-owned Southern Italian deli on Ventura Blvd since 1948, long before Encino became synonymous with strip-mall sushi and $18 smoothies. They bake bread daily, cure their own meats, and stock imported Italian specialties that actual Italian chefs drive across the Valley to buy. The Spicy Dom sandwich has a devoted following. Closed Mondays and Tuesdays — if you show up on the wrong day, that's your problem.","ys":1948,"tl":[{"y":"1948","x":"Opens on Ventura Blvd in Encino"},{"y":"1960","x":"Becomes supplier to LA restaurants and chefs"},{"y":"2020","x":"Survives pandemic with takeout and delivery"}],"tags":["Deli","Italian","Valley","Historic Restaurant"],"rel":["santoros","pinocchios"],"s":"active"},{"id":"pinkpussycat","h":"weho","n":"Pink Pussycat","t":"Club","c":"music","lat":34.0911,"lng":-118.3636,"a":"7969 Santa Monica Blvd","i":"🐱","d":"Burlesque club opened in 1961 by Alice and Harry Schiller, who transformed a failing Latin jazz club into the Rat Pack's favorite strip joint. Alice gave her dancers stage names like Fran Sinatra, Samya Davis Jr., and Peeler Lawford — and the real ones showed up to inspect their namesakes. Also home to the Pink Pussycat College of Striptease, a.k.a. the Navel Academy, where Sally Marr — Lenny Bruce's mother — taught courses in the Fundamentals of Taking It Off. Bob Hope quipped at the 1964 Music Center opening that L.A. needs culture and the Pink Pussycat can't do it alone. Closed late 1970s, became Peanuts disco, then Club 7969. The original marquee survived atop the building for decades.","ys":1961,"ye":1979,"tl":[{"y":"1961","x":"Alice and Harry Schiller open the Pink Pussycat"},{"y":"1961","x":"Pink Pussycat College of Striptease launches with Sally Marr as instructor"},{"y":"1964","x":"Bob Hope references the club at the Music Center opening"},{"y":"1967","x":"Alice boasts she glamorized 1,000 pussycats, 20 married millionaires"},{"y":"1979","x":"Closes and becomes Peanuts disco"}],"tags":["Burlesque","Nightclub","Rat Pack","WeHo","Closed"],"rel":["ciros","trocadero","bodyshop"],"s":"closed"},{"id":"jitlada","h":"hollywood","n":"Jitlada","t":"Restaurant","c":"food","lat":34.0986,"lng":-118.3041,"a":"5233 W Sunset Blvd","i":"🌶️","d":"Southern Thai restaurant in a Thai Town strip mall that has been humbling spice-hardened eaters since the late 1970s. Jazz Singsanong and her brother Tui took over in 2007, turning it into a celebrity magnet — Matt Groening ate here so often he filled an entire wall with original Simpsons drawings. Ruth Reichl called it some of the city's best Thai food in 1984. Tui died in 2017 at 67. Jazz was a James Beard finalist in 2022. The menu runs past 200 items and the crying tiger beef alone justifies the 45-minute wait.","ys":1979,"tl":[{"y":"1979","x":"Opens in a Sunset Blvd strip mall"},{"y":"1984","x":"Ruth Reichl reviews it for the LA Times"},{"y":"2007","x":"Jazz and Tui Singsanong take ownership, specialize in Southern Thai"},{"y":"2017","x":"Chef Tui Sungkamee dies at 67"},{"y":"2022","x":"Jazz Singsanong named James Beard finalist for Best Chef California"}],"tags":["Thai","Southern Thai","Thai Town","Celebrity Haunt"],"rel":["genghiscohen","kouraku"],"w":"Jitlada","s":"active"},{"id":"beverlytheatre","h":"bevhills","n":"Beverly Theatre","t":"Theater","c":"culture","lat":34.0674,"lng":-118.3992,"a":"206 N Beverly Dr, Beverly Hills","i":"🎬","d":"The first movie theater in Beverly Hills, opened May 18, 1925, designed by Lewis A. Smith in a Moorish-Mughal Revival style topped by an onion dome that became a neighborhood landmark. Interior featured Arabian Nights murals, a Chinese moon gate proscenium arch, ornamental elephants, and a Wurlitzer organ. Hosted vaudeville and film premieres for the entertainment royalty who lived nearby. Closed as a cinema in 1977, gutted for retail, briefly became a Fiorucci boutique. Demolished in 2005 for the Montage Beverly Hills hotel despite years of preservationist battles. The dome came down and Beverly Hills lost its architectural conscience.","ys":1925,"ye":1977,"tl":[{"y":"1925","x":"Opens May 18 as the first cinema in Beverly Hills"},{"y":"1936","x":"S. Charles Lee moderne remodel"},{"y":"1948","x":"Gala premiere of Joan of Arc starring Ingrid Bergman"},{"y":"1977","x":"Closes as a cinema after 52 years"},{"y":"2005","x":"Demolished for the Montage Beverly Hills hotel"}],"tags":["Theater","Cinema","Demolished","Beverly Hills","Art Deco"],"rel":["egyptian","pantages","vistatheater"],"w":"Beverly_Theatre_(Beverly_Hills,_California)","s":"demolished"},{"id":"chungkiwa","h":"ktown","n":"Chung Ki Wa","t":"Restaurant","c":"food","lat":34.05277,"lng":-118.316126,"a":"3545 W Olympic Blvd","i":"🥩","d":"Koreatown's elder statesman of Korean BBQ. Open since 1989, Chung Ki Wa once served venison alongside its Black Angus beef — a rarity that drew adventurous eaters from across the city. The restaurant's longevity in a neighborhood where Korean restaurants open and close with alarming frequency speaks to the quality of its galbi and naengmyun. One reviewer claims 35 years of patronage. The sign out front just says \"Korean Black Angus.\"","ys":1989,"tl":[{"y":"1989","x":"Opens on Olympic Blvd in Koreatown"},{"y":"2000","x":"Known for venison BBQ alongside traditional beef cuts"},{"y":"2015","x":"Rebrands around certified Black Angus beef BBQ"}],"tags":["Korean BBQ","Koreatown","Restaurant"],"rel":["dansungsa","guelaguetza"],"s":"active"},{"id":"hangarikalguksu","h":"ktown","n":"Hangari Kalguksu","t":"Restaurant","c":"food","lat":34.063329,"lng":-118.297375,"a":"3470 W 6th St, Ste 9 & 10","i":"🍜","d":"The noodle shop that turns grown adults into children slurping soup. Hangari's hand-cut kalguksu in anchovy broth is the kind of food that makes you forget you have a phone. Family-owned since 2014, it trademarked the phrase \"Check Out My Noods\" and introduced a pork bossam in 2018 that immediately became the top-selling dish. Lines form by 6:30 PM on weekends. Named for the traditional Korean clay storage pots.","ys":2014,"tl":[{"y":"2014","x":"Opens in Koreatown's Alexandria Plaza"},{"y":"2016","x":"Expands with interior renovation"},{"y":"2017","x":"Grand re-opening with new branding, trademarks \"Check Out My Noods\""},{"y":"2018","x":"Introduces pork bossam, becomes the #1 dish"}],"tags":["Korean","Noodles","Koreatown","Restaurant"],"rel":["chungkiwa","dansungsa"],"s":"active"},{"id":"soban","h":"ktown","n":"Soban","t":"Restaurant","c":"food","lat":34.054119,"lng":-118.320852,"a":"4001 W Olympic Blvd","i":"🦀","d":"A tiny mother-daughter Korean restaurant whose ganjang gejang — soy-marinated raw crab — might be the single best reason to visit Koreatown. Jonathan Gold put Soban on his 101 list four years running. The Michelin Guide followed in 2019. Then Bong Joon-ho and the Parasite cast showed up after the 2020 Oscars to celebrate their historic wins, and the secret was definitively out. Service can be brusque. The banchan is worth the attitude.","ys":2012,"tl":[{"y":"2012","x":"Opens on Olympic Blvd, mother-daughter team"},{"y":"2013","x":"First appearance on Jonathan Gold's 101 Best Restaurants"},{"y":"2019","x":"Michelin Guide recognition"},{"y":"2020","x":"Bong Joon-ho and Parasite cast celebrate Oscar wins here"},{"y":"2022","x":"Named to LA Times 101 Best Restaurants for third consecutive year"}],"tags":["Korean","Koreatown","Restaurant","Jonathan Gold"],"rel":["chungkiwa","guelaguetza"],"w":"Soban_(restaurant)","s":"active"},{"id":"downtownrehearsal","h":"artsdistrict","n":"Downtown Rehearsal","t":"Rehearsal Studio","c":"music","lat":34.031394,"lng":-118.229656,"a":"1000 S Santa Fe Ave","i":"🎸","d":"For 26 years, this five-story former warehouse was the engine room of LA's underground music scene. Founded in 1989 by Musicians Institute grad Greg Koch, Downtown Rehearsal offered 24-hour lockout studios where L7, Fishbone, the Melvins, Macy Gray, Blind Melon, and hundreds of unsigned bands ground it out behind closed doors. The labyrinthine corridors buzzed with competing genres seeping through walls. In 2015, Soho House bought the building for $18.5 million and evicted everyone. The soda machine dispensed RC Cola until the end.","ys":1989,"ye":2015,"tl":[{"y":"1989","x":"Greg Koch opens lockout studios on Santa Fe Ave with operating windows and downtown views"},{"y":"1991","x":"Expands to third floor, 62 studios"},{"y":"1999","x":"Opens second location on 7th Street near LA River"},{"y":"2001","x":"Reaches 212 rooms across two locations"},{"y":"2015","x":"Santa Fe location closed — Soho House purchases building for $18.5M, displacing hundreds of musicians"}],"tags":["Music","Rehearsal Studio","Arts District"],"rel":["bestia","angelcity"],"s":"closed"},{"id":"1642bar","h":"echopark","n":"1642 Beer and Wine","t":"Bar","c":"community","lat":34.068,"lng":-118.263,"a":"1642 W Temple St","i":"🍺","d":"A candlelit hole-in-the-wall on the border of Historic Filipinotown and Echo Park where the beer list rotates on chalkboard and live bands play everything from honky-tonk to ragtime to swing. Opened in 2010 by Liz Fischbach, who lives up the alley — the same alley where Tom Waits shot the \"In The Neighborhood\" video. The space was previously Lupita's, a ranchero bar popular with gangsters. No cocktails, no pretension. Tamale happy hour on Thursdays courtesy of the tamale shop next door.","ys":2010,"tl":[{"y":"2010","x":"Opens in former ranchero bar on Temple St"},{"y":"2015","x":"Becomes known for eclectic live music — blues, swing, ragtime, honky-tonk"},{"y":"2020","x":"Pivots to outdoor market during COVID shutdown"},{"y":"2021","x":"Returns to normal bar operations"}],"tags":["Bar","Live Music","Historic Filipinotown","Echo Park"],"rel":["echo","theroost"],"s":"active"},{"id":"littlefridas","h":"weho","n":"Little Frida's Coffee House","t":"Coffeehouse","c":"community","lat":34.086637,"lng":-118.380949,"a":"8730 Santa Monica Blvd","i":"☕","d":"The lesbian coffeehouse where Ellen came out. Little Frida's was a West Hollywood institution through the 1990s — burnt orange walls, local art, secondhand couches, and a steady rotation of poetry readings, comedy, and live music. It appeared in Ellen's historic 1997 coming-out episode (the \"Puppy Episode\"), Bar Girls (1995), and Trave
