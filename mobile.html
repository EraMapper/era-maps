aring the same tiny stage. It's not a club with a cover charge; it's a living room for the community. The kind of place where the music matters more than the money.","ys":1989,"tl":[{"y":"1989","x":"Billy Higgins and Kamau Daaood found The World Stage"},{"y":"1993","x":"Hosts drum workshops, poetry, jazz"}],"tags":["Jazz","Billy Higgins","Jam Session","Leimert Park"],"rel":["dunbarhotel","mavericksflat","leimertpark","visiontheatre","wiltern","elcapitan"],"w":"World_Stage_(Leimert_Park)","s":"active"},{"id":"coliseum","h":"southla","n":"LA Memorial Coliseum","t":"Stadium","c":"culture","lat":34.0139,"lng":-118.2878,"a":"3911 S Figueroa St","i":"🏟️","d":"Built in 1923, host to two Olympics (1932 and 1984), about to host a third in 2028. USC football has played here for over a century. Two Super Bowls. A World Series. Concerts from the Rolling Stones to Depeche Mode. The 1960 Democratic National Convention where JFK was nominated. The peristyle end with its Olympic torch and Art Deco columns is one of the most recognizable structures in Los Angeles. It's survived earthquakes, riots, and decades of neglect to remain standing — the stadium that won't quit.","ys":1923,"tl":[{"y":"1923","x":"Opens — John & Donald Parkinson design"},{"y":"1932","x":"Hosts Summer Olympics"},{"y":"1984","x":"Hosts Summer Olympics again"},{"y":"2028","x":"Scheduled for third Summer Olympics"}],"tags":["Olympics","1923","USC","Stadium"],"w":"Los_Angeles_Memorial_Coliseum","s":"active"},{"id":"mavericksflat","h":"southla","n":"Maverick's Flat","t":"Nightclub (Closed ~1980s)","c":"music","lat":34.0076,"lng":-118.3351,"a":"4225 Crenshaw Blvd","i":"🎤","d":"The Apollo of the West. John Daniels opened it on Crenshaw in 1966 and it became the hottest Black nightclub in LA. The Temptations, Marvin Gaye, Ike and Tina Turner, Parliament Funkadelic all played here. Muhammad Ali and Steve McQueen would show up. Marlon Brando came through. John Daniels gave Cheech and Chong some of their first big breaks on this stage. It was word of mouth — the kind of high-energy scene that was relaxed enough to attract everyone from Crenshaw locals to Hollywood elite.","ys":1966,"ye":1985,"tl":[{"y":"1933","x":"Building erected on Crenshaw Blvd"},{"y":"1966","x":"John Daniels opens — Temptations play opening night"},{"y":"1972","x":"Marvin Gaye, Parliament, Earth Wind & Fire perform"},{"y":"2000","x":"Designated Historic-Cultural Monument"},{"y":"2021","x":"Nina RoZa acquires — private event space"}],"tags":["Soul","R&B","Crenshaw","Muhammad Ali"],"rel":["dunbarhotel","worldstage","leimertpark","cocoanut","faisdodo"],"s":"closed"},{"id":"bhcplaza","h":"southla","n":"Baldwin Hills Crenshaw Plaza","t":"Shopping Center","c":"shop","lat":34.0114,"lng":-118.3365,"a":"3650 W Martin Luther King Jr Blvd","i":"🛍️","d":"America's oldest regional shopping center, opened in 1947 as Broadway Crenshaw Plaza. For decades it was the commercial anchor of Black LA. The real hidden gem: the Museum of African American Art sits on the third floor of the Macy's — a quiet, free museum housing the Palmer Hayden Collection of Harlem Renaissance paintings, tucked inside a department store. It's one of the most improbable museum locations in the city.","ys":1947,"tl":[{"y":"1947","x":"Opens as Broadway-Crenshaw Center"},{"y":"1988","x":"Renamed Baldwin Hills Crenshaw Plaza"},{"y":"2024","x":"Redevelopment debate ongoing"}],"tags":["Shopping","Black History","Museum","1947"],"rel":["leimertpark","dunbarhotel","visiontheatre","mercadopaloma","wattstowers"],"w":"Baldwin_Hills_Crenshaw_Plaza","s":"active"},{"id":"dulans","h":"southla","n":"Dulan's on Crenshaw","t":"Soul Food Restaurant","c":"food","lat":33.9993,"lng":-118.3305,"a":"4859 Crenshaw Blvd","i":"🍗","d":"A quarter century of soul food on Crenshaw Boulevard. Fried chicken, collard greens, peach cobbler — recipes passed down through generations, served with a side of warm hospitality. It's the kind of restaurant where the portions are enormous and the regulars know everybody. South LA needed a food entry on this map and Dulan's earns it. Not trendy, not reinvented, not fusion. Just really good soul food made by people who care.","ys":1999,"tl":[{"y":"2000","x":"Adolf Dulan opens soul food on Crenshaw"},{"y":"2015","x":"Anchor of Black dining on Crenshaw"}],"tags":["Soul Food","Fried Chicken","Crenshaw","Community"],"s":"active"},{"id":"mercadopaloma","h":"southla","n":"Mercado La Paloma","t":"Community Market","c":"food","lat":34.0174,"lng":-118.2784,"a":"3655 S Grand Ave","i":"🌮","d":"A converted garment factory turned vibrant community marketplace, home to small restaurants, nonprofits, and shops. The anchor tenant is Holbox, Gilberto Cetina's Michelin-starred seafood counter serving coastal Mexican food — a world-class restaurant inside what looks like a food court. The market model works: immigrant families run their businesses, nonprofits support the community, and everyone eats together. It's South LA's answer to Grand Central Market.","ys":2001,"tl":[{"y":"2001","x":"Opens as community marketplace near USC"},{"y":"2012","x":"Oaxacan and Yucatecan vendors draw citywide following"}],"tags":["Food Hall","Holbox","Michelin","Community"],"rel":["dulans","leimertpark","wattstowers","thelobster","smpier","chezjay"],"s":"active"},{"id":"baycities","h":"santamonica","n":"Bay Cities Italian Deli","t":"Deli","c":"food","lat":34.018,"lng":-118.4892,"a":"1517 Lincoln Blvd, Santa Monica","i":"🥖","d":"The Godmother sandwich. That's the whole pitch. A massive Italian sub with the works — prosciutto, capicola, mortadella, ham, salami, provolone, the whole canon — on bread they bake in-house. The line wraps around the building on weekends. Bay Cities has been here since 1925, serving Santa Monica's Italian community long before the city became a wellness destination. The deli case is a time machine. Everything else around it has changed; the Godmother hasn't.","ys":1925,"tl":[{"y":"1925","x":"Opens as Italian deli in Santa Monica"},{"y":"1965","x":"The Godmother sandwich becomes legendary"}],"tags":["Italian Deli","Godmother Sandwich","1925","Lincoln Blvd"],"s":"active"},{"id":"thelobster","h":"santamonica","n":"The Lobster","t":"Seafood Restaurant","c":"food","lat":34.011,"lng":-118.495,"a":"1602 Ocean Ave, Santa Monica","i":"🦞","d":"Perched at the entrance to the Santa Monica Pier with a view that justifies whatever they charge. The original site had a seafood restaurant since the 1920s. The current incarnation opened in 1999 and immediately became the place where you take people who are visiting LA for the first time. Sunset over the Pacific, a lobster on the plate, the Ferris wheel glowing in your peripheral vision. It's a cliche and it works every single time.","ys":1999,"tl":[{"y":"1999","x":"Opens at Santa Monica Pier entrance"}],"tags":["Seafood","Ocean View","Santa Monica Pier","Sunset"],"rel":["smpier","baycities","chezjay","casadelmar","lacma","hauserwirth"],"s":"active"},{"id":"bergamot","h":"santamonica","n":"Bergamot Station","t":"Gallery Complex","c":"culture","lat":34.0283,"lng":-118.4677,"a":"2525 Michigan Ave, Santa Monica","i":"🖼️","d":"A former Red Car trolley station converted into a sprawling arts campus housing dozens of galleries, the Santa Monica Museum of Art (before it moved), and creative offices. When the Pacific Electric Railway shut down in 1953, the station sat empty for decades before being reimagined as a cultural center. It's now the Westside's primary gallery district — a place where you can wander between contemporary photography, abstract painting, and sculpture without getting in your car.","ys":1994,"tl":[{"y":"1875","x":"Site built as Red Car trolley station"},{"y":"1994","x":"Wayne Blank converts to gallery complex"}],"tags":["Gallery","Red Car","Pacific Electric","Art"],"w":"Bergamot_Station","s":"active"},{"id":"chezjay","h":"santamonica","n":"Chez Jay","t":"Dive Bar","c":"nightlife","lat":34.0105,"lng":-118.4933,"a":"1657 Ocean Ave, Santa Monica","i":"🥃","d":"A tiny dive bar a block from the beach, open since 1959. Sawdust on the floor, peanut shells everywhere, red vinyl booths held together with tape. The kind of place that shouldn't survive in a city where every oceanfront property gets redeveloped into luxury condos. But Chez Jay persists. Astronauts from nearby aerospace companies drank here. JFK and Marilyn Monroe allegedly had a booth. Sean Penn was a regular. The steak is cheap and good. The martinis are strong. Santa Monica needs at least one place that refuses to care about vibes.","ys":1959,"tl":[{"y":"1959","x":"Jay Fiondella opens tiny bar on Ocean Ave"},{"y":"1965","x":"Beach Boys, Sean Penn, Dennis Hopper hang out"}],"tags":["Dive Bar","1959","JFK","Astronauts"],"rel":["thelobster","baycities","casadelmar","lacma","farmersmarket","canters"],"w":"Chez_Jay","s":"active"},{"id":"panpacificpark","h":"fairfax","n":"Pan Pacific Park","t":"Park & Memorial","c":"culture","lat":34.076,"lng":-118.3551,"a":"7600 Beverly Blvd","i":"🕯️","d":"The park sits where the Pan Pacific Auditorium once stood — a Streamline Moderne masterpiece from 1935 with four iconic pylons that became one of LA's most photographed buildings. Elvis performed there. The Ice Capades. Roller derby. It burned in 1989, probably arson, and the pylons were gone. Now it's a park with a community recreation center and a Holocaust memorial — the Los Angeles Museum of the Holocaust sits at its edge, the first freestanding Holocaust museum in the United States, and it's free.","ys":1935,"tl":[{"y":"1935","x":"Pan-Pacific Auditorium opens — Streamline Moderne"},{"y":"1972","x":"Auditorium closes"},{"y":"1989","x":"Destroyed by fire"},{"y":"1990","x":"Park built on former site"}],"tags":["Pan Pacific Auditorium","Holocaust Museum","Streamline Moderne","1935"],"w":"Pan_Pacific_Park","s":"active"},{"id":"swingers","h":"fairfax","n":"Swingers Diner","t":"Diner","c":"food","lat":34.076,"lng":-118.3644,"a":"8020 Beverly Blvd","i":"☕","d":"The late-night diner that defined 1990s Fairfax. Open until 4am, booth seating, retro decor, and a crowd that mixed musicians, actors, club kids, and insomniacs. Vince Vaughn in Swingers (1996) made it famous, but it was already the default post-show landing pad for anyone coming from a gig on the Sunset Strip. The turkey burger at 2am was a rite of passage. Closed during COVID in 2020 but rescued by former GM Stephanie Wilson, who bought it and reopened. The late-night tradition continues.","ys":1993,"tl":[{"y":"1993","x":"Opens on Beverly Blvd as retro diner"},{"y":"1996","x":"Referenced in Swingers film"},{"y":"2020","x":"Closes during COVID — reopens under new owner Stephanie Wilson"}],"tags":["Diner","1990s","Swingers","Late Night"],"rel":["canters","farmersmarket","astroburger","benfranks"],"s":"active"},{"id":"silentmovie","h":"fairfax","n":"Brain Dead Studios (Silent Movie Theatre)","t":"Cinema","c":"culture","lat":34.082,"lng":-118.3616,"a":"611 N Fairfax Ave","i":"🎬","d":"Opened in 1942 by John Hampton, who collected and projected silent films when nobody else cared. It was the last remaining silent movie theater in the world. In 1997, Hampton's projectionist Lawrence Austin was murdered by a hitman hired by Hampton's heir — one of LA's strangest true crime stories. The theater reopened under new management, shifted to repertory and independent film, and has operated under various names since. Since 2010, the streetwear brand Brain Dead has operated the space as Brain Dead Studios — indie cinema, art exhibitions, and a cafe/patio, retaining the historic character while expanding beyond silent film. The Fairfax Avenue facade with its vintage marquee remains an anchor of the neighborhood.","ys":1942,"tl":[{"y":"1942","x":"John & Dorothy Hampton open silent film theater"},{"y":"1979","x":"John Hampton murdered inside theater"},{"y":"1997","x":"Cinefamily takes over"},{"y":"2017","x":"Cinefamily closes — harassment scandal"},{"y":"2010","x":"Brain Dead Studios takes over — indie cinema + gallery + cafe"}],"tags":["Silent Film","1942","True Crime","Repertory"],"rel":["cinerama","egyptian","vistatheater","nuart","marcianofoundation"],"w":"Silent_Movie_Theatre","s":"active"},{"id":"hmsbounty","h":"ktown","n":"HMS Bounty","t":"Dive Bar","c":"nightlife","lat":34.062,"lng":-118.2972,"a":"3357 Wilshire Blvd","i":"🍺","d":"A nautical-themed dive bar in the ground floor of the Gaylord Apartments, a 1924 building on Wilshire. Red leather booths, wood paneling, ship wheels on the walls, bartenders who've been pouring for decades. It's been used as a filming location in Mad Men, 500 Days of Summer, and dozens of other productions that need a bar that looks like time stopped in 1962. The drinks are cheap, the crowd is mixed — Korean grandmothers, film students, off-duty nurses — and nothing has been renovated.","ys":1962,"tl":[{"y":"1924","x":"Gaylord Apartments built on Wilshire"},{"y":"1962","x":"HMS Bounty bar opens in ground floor"},{"y":"2008","x":"Featured in Mad Men, 500 Days of Summer"}],"tags":["Dive Bar","Nautical","Mad Men","Wilshire"],"rel":["ambassador","brownderbyog","theprince","formosa","dansungsa","sohoweho"],"w":"HMS_Bounty_(bar)","s":"active"},{"id":"wispa","h":"ktown","n":"Wi Spa","t":"Korean Spa","c":"culture","lat":34.0608,"lng":-118.2825,"a":"2700 Wilshire Blvd","i":"♨️","d":"A 24-hour Korean jjimjilbang on Wilshire Boulevard — multiple floors of saunas, hot tubs, cold plunges, clay rooms, jade rooms, salt rooms, and a rooftop deck. You check in, change into the provided shorts and t-shirt, and enter a world where time stops. Korean families, hipsters, jet-lagged travelers, and insomniacs all end up here at 3am, sleeping on heated floors or eating bibimbap in the cafeteria. It's Koreatown's most democratic space: everyone's in the same outfit, and nobody's in a hurry.","ys":2009,"tl":[{"y":"2009","x":"Opens as Korean spa on Wilshire"},{"y":"2021","x":"National flashpoint over transgender access"}],"tags":["Korean Spa","Jjimjilbang","24 Hour","Wilshire"],"s":"active"},{"id":"chapmanmarket","h":"ktown","n":"Chapman Market","t":"Historic Market","c":"culture","lat":34.0637,"lng":-118.2968,"a":"3451 W 6th St","i":"🏛️","d":"A gorgeous 1929 Spanish Colonial Revival shopping center designed by Morgan, Walls & Clements — the same firm behind the Wiltern a few blocks away. Originally an upscale market with a motor court where shoppers could park and browse, it was one of the first car-oriented retail centers in LA. The courtyard architecture, tile work, and wrought iron are impeccable. It's been through various reinventions but the bones remain beautiful — a reminder that Koreatown sits on layers of LA history that predate the Korean community.","ys":1929,"tl":[{"y":"1928","x":"Morgan, Walls & Clements commissioned — plans for drive-in market"},{"y":"1929","x":"Chapman Park Market opens — one of first auto-oriented markets in the US"},{"y":"1988","x":"Designated Los Angeles Historic-Cultural Monument #386"},{"y":"1990","x":"Wayne Ratkovich & Brenda Levin restore the building"},{"y":"2016","x":"Sold to ArcWest Partners — further restoration planned"}],"tags":["1929","Morgan Walls Clements","Spanish Revival","Drive-In Market","HCM 386"],"rel":["brownderbyog","ambassador","hmsbounty","wiltern","elcapitan","visiontheatre"],"w":"Chapman_Market","s":"active"},{"id":"jensens","h":"echopark","n":"Jensens Recreation Center","t":"Bowling Alley / Apartments","c":"culture","lat":34.0772,"lng":-118.2588,"a":"1706 W Sunset Blvd","i":"🎳","d":"Built in 1924 by Henry Christian Jensen, a German immigrant who made his fortune supplying bricks for a rapidly growing Los Angeles. Three stories: bowling alley and pool hall at street level, 46 apartments above. The Egyptian-themed interior hosted celebrity athletic events until it closed in the 1970s. The rooftop incandescent sign — a bowler throwing a strike in red, green, and white incandescent bulbs — went dark for fifty years before a 1997 cultural affairs grant brought it back to life. Now its Blue Bottle Coffee at street level and renovated studios upstairs, but the sign bowls every night. HCM No. 652.","ys":1924,"tl":[{"y":"1924","x":"Built by brick magnate Henry Jensen"},{"y":"1975","x":"Recreation center closes"},{"y":"1997","x":"Iconic rooftop sign restored after 50 dark years"},{"y":"1998","x":"Declared HCM No. 652"}],"tags":["Historic","Incandescent Sign","Echo Park Landmark","Mixed-Use Pioneer"],"w":"Jensen%27s_Recreation_Center","s":"active"},{"id":"burritoking","h":"echopark","n":"Burrito King","t":"Burrito Stand","c":"food","lat":34.0777,"lng":-118.2638,"a":"2109 W Sunset Blvd","i":"👑","d":"Claims to be the first burrito stand in all of Los Angeles, opened in 1968 by Julian Montoya at the corner of Sunset and Alvarado. At its peak, Montoya built a burrito empire stretching from Anaheim to Texas to Bogota, Colombia. Warren Zevon introduced a visiting film crew to the stand on camera. Gram Parsons and Tom Waits were regulars. Ed Ruscha documented the facade. LA Phil musicians showed up in concert dress. Governor Jerry Brown was a regular when he lived nearby. The empire crumbled — competition, former employees opening their own stands, a rejected earthquake insurance policy right before Northridge — and now only the original remains. The cartoon burro in his crown watches over Sunset.","ys":1968,"tl":[{"y":"1968","x":"Julian Montoya opens at Sunset & Alvarado"},{"y":"1977","x":"Warren Zevon features it in Dutch documentary"},{"y":"1995","x":"Empire collapses to single location"}],"tags":["Late Night","Mexican","Warren Zevon","First Burrito Stand"],"rel":["speranza","astrofamily","elysianpark"],"w":"Burrito_King","s":"active"},{"id":"taix","h":"echopark","n":"Taix French Restaurant","t":"French Restaurant","c":"food","lat":34.0793,"lng":-118.269,"a":"1911 W Sunset Blvd","i":"🇫🇷","d":"The Taix family arrived from the Hautes-Alpes region of France in 1870, opened a bakery downtown in 1882, then a restaurant in 1927 — making it the oldest French restaurant in Los Angeles. During Prohibition they served medicinal wine to city officials in a private back room. Moved to Echo Park in 1962. The rambling Los Angeles chalet with its banquet halls, fireplace bar, and the 321 Lounge became a gathering place for generations — Dodger pregames, first dates, retirement dinners, neighborhood anchoring. The preservation fight was ugly: developer bought the property, councilman gutted the landmark nomination, only the signs and bartop were deemed worth saving. Closes March 29, 2026 for demolition. HCM No. 1227. The neighborhood will never be the same.","ys":1927,"ye":2026,"tl":[{"y":"1870","x":"Taix family arrives from France"},{"y":"1927","x":"Restaurant opens downtown"},{"y":"1962","x":"Moves to Echo Park"},{"y":"2019","x":"Property sold to developer"},{"y":"2026","x":"Closes March 29 for demolition"}],"tags":["French","Oldest Restaurant","Preservation Fight","RIP"],"rel":["elcompadre","masa","burritoking","shortstop"],"w":"Taix_(restaurant)","s":"closed"},{"id":"angelustemple","h":"echopark","n":"Angelus Temple","t":"Megachurch","c":"culture","lat":34.0763,"lng":-118.261,"a":"1100 Glendale Blvd","i":"⛪","d":"Aimee Semple McPherson opened this 5,300-seat domed megachurch in 1923 and essentially invented American televangelism, broadcasting sermons on KFSG radio with illustrated theatrical productions that packed the house every Sunday. Then May 18, 1926: she vanished while swimming at Venice Beach. Presumed drowned. Memorial services held. One follower drowned herself in grief. Then 36 days later McPherson stumbled out of the desert in Agua Prieta, Mexico, claiming she had been kidnapped, drugged, tied to a chair in a shack, and escaped by cutting her bonds with a tin can lid and walking 20 miles through the desert. Skeptics pointed out her shoes were not scuffed and she was not sunburned. The prevailing theory: she was hiding in Carmel with her married radio engineer Kenneth Ormiston. Grand jury convened, charges filed, then dropped. Never resolved. She kept preaching until her death from a barbiturate overdose in 1944. Her funeral was the biggest Southern California had ever seen.","ys":1923,"tl":[{"y":"1923","x":"Opens with 5,300 seats"},{"y":"1924","x":"Launches KFSG radio station"},{"y":"1926","x":"McPherson vanishes — kidnapping or Carmel tryst?"},{"y":"1927","x":"Criminal charges dropped"},{"y":"1944","x":"McPherson dies of overdose"}],"tags":["Megachurch","Radio Pioneer","Scandal","Pentecostal"],"rel":["echoparklake","angeleno","olvera"],"w":"Angelus_Temple","s":"active"},{"id":"dodgerstadium","h":"echopark","n":"Dodger Stadium","t":"Baseball Stadium","c":"culture","lat":34.0722,"lng":-118.248,"a":"1000 Vin Scully Ave","i":"⚾","d":"The third-oldest MLB ballpark and the largest by seating capacity, opened in 1962. But the origin story is one of the ugliest in Los Angeles. Chavez Ravine was a Mexican-American community of around 300 families — their own schools, churches, grocery stores — until the city seized it by eminent domain in the early 1950s for public housing that was never built. When the Dodgers moved from Brooklyn, the land was handed to Walter O Malley instead. Families were physically dragged from their homes on live television. The community was bulldozed. The stadium that rose in its place is gorgeous — the palm trees, the sunset views, Vin Scully calling games for 67 years — but the ground it sits on carries a weight that no pennant can lift.","ys":1962,"tl":[{"y":"1957","x":"Chavez Ravine families evicted by eminent domain"},{"y":"1957","x":"Dodgers leave Brooklyn"},{"y":"1962","x":"Stadium opens"},{"y":"2020","x":"COVID testing and vaccination mega-site"}],"tags":["Baseball","Chavez Ravine","Eminent Domain","Vin Scully"],"rel":["elysianpark","echoparklake","sportsarena","coliseum","dodgerstadium","angeleno"],"w":"Dodger_Stadium","s":"active"},{"id":"elysianpark","h":"echopark","n":"Elysian Park","t":"Public Park","c":"culture","lat":34.0799,"lng":-118.2366,"a":"929 Academy Rd","i":"🌳","d":"The oldest public park in Los Angeles, established in 1886 on 575 acres of hilly terrain overlooking downtown. The Chavez Ravine Arboretum inside it dates to 1893 and is the oldest planted botanical garden in Southern California. The park wraps around Dodger Stadium and carries the ghost of the community that was destroyed to build it. On a clear day you can see from the San Gabriels to the ocean. The LAPD Police Academy is here too, which adds a certain tension given the neighborhoods history with law enforcement. One of the few large green spaces in a part of the city that desperately needs them.","ys":1886,"tl":[{"y":"1886","x":"Established as LA oldest park"},{"y":"1893","x":"Chavez Ravine Arboretum planted"}],"tags":["Park","Oldest in LA","Arboretum","Chavez Ravine"],"w":"Elysian_Park%2C_Los_Angeles","s":"active"},{"id":"eastwestplayers","h":"littletokyo","n":"East West Players","t":"Theater Company","c":"culture","lat":34.0508,"lng":-118.2402,"a":"120 Judge John Aiso St","i":"🎭","d":"The oldest Asian American theater company in the nation, founded in 1965 by nine artists including James Hong and Mako who were tired of being cast as stereotypical caricatures in Hollywood. Started in a church basement in Silver Lake, moved to a 99-seat black box, then in 1998 into the 240-seat David Henry Hwang Theater inside the Union Center for the Arts — a former 1923 church where Japanese Americans stored their belongings before being sent to internment camps during WWII. The building held their possessions while the government held their freedom. George Takei, John Cho, Daniel Dae Kim all came through here. Seventy-five percent of all Asian Pacific performers in LA acting unions have worked at East West Players.","ys":1965,"tl":[{"y":"1965","x":"Founded by James Hong, Mako, and seven others"},{"y":"1972","x":"Moves to Santa Monica Blvd"},{"y":"1998","x":"Moves into Union Center for the Arts in Little Tokyo"}],"tags":["Theater","Asian American","James Hong","Civil Rights"],"rel":["jaccc","janm","groundlings","worldstage","kouraku","farbar"],"w":"East_West_Players","s":"active"},{"id":"wolfcrane","h":"littletokyo","n":"Wolf & Crane","t":"Bar","c":"nightlife","lat":34.0479,"lng":-118.2398,"a":"366 E 2nd St","i":"🥃","d":"Little Tokyos neighborhood bar, opened by Michael Francesconi and Mathew Glaser — the same Park Hospitality duo behind Echo Parks Lowboy, Bar Flores, and Donnas. The name nods to the Japanese folktale Tsuru no Ongaeshi. Claims the largest Japanese whisky collection on the West Coast. The kind of place where the bartender knows your name and the lighting is always perfect. A bridge between the old Little Tokyo and the new downtown.","ys":2015,"tl":[{"y":"2015","x":"Opens in Little Tokyo"},{"y":"2019","x":"Owners expand to Echo Park with Lowboy and Bar Flores"}],"tags":["Japanese Whisky","Craft Cocktails","Little Tokyo","Park Hospitality"],"s":"active"},{"id":"kouraku","h":"littletokyo","n":"Kouraku","t":"Ramen Restaurant","c":"food","lat":34.0501,"lng":-118.2407,"a":"314 E 2nd St","i":"🍜","d":"Opened in 1976, widely recognized as the first ramen restaurant in the United States. The late Hiroshi Yamauchi took over in 1986 and built a late-night following with Japanese comfort food — the Tenshin Chahan Ankake, a shrimp omelette on pork fried rice with gravy, became legendary. Now served by adorable BellaBot robots. A place that existed for decades before ramen became a religion in America.","ys":1976,"tl":[{"y":"1976","x":"Opens as first US ramen restaurant"},{"y":"1986","x":"Hiroshi Yamauchi takes over"}],"tags":["Ramen","First in US","Japanese Comfort Food","Late Night"],"rel":["fugetsudo","sushigen","wolfcrane","kouraku","jvillageplaza"],"s":"active"},{"id":"sushigen","h":"littletokyo","n":"Sushi Gen","t":"Sushi Restaurant","c":"food","lat":34.0467,"lng":-118.2387,"a":"422 E 2nd St","i":"🍣","d":"Tucked inside the Honda Plaza strip mall, Sushi Gen has been one of the best sushi deals in Los Angeles for decades. The lunch sashimi special draws a line that snakes through the mall every day — thick cuts of impossibly fresh fish at prices that make Westside omakase look like robbery. No frills, no scene, just fish and rice executed at a level that keeps people coming back for thirty-plus years.","ys":1982,"tl":[{"y":"1982","x":"Opens in Honda Plaza"}],"tags":["Sushi","Best Deal","Honda Plaza","Lunchtime Line"],"s":"active"},{"id":"goforbroke","h":"littletokyo","n":"Go For Broke Monument","t":"War Memorial","c":"culture","lat":34.0497,"lng":-118.2389,"a":"160 N Central Ave","i":"🎖","d":"A granite monument honoring the Japanese Americans who served in the United States military during World War II — most famously the 442nd Regimental Combat Team, whose motto was Go For Broke. While their families sat behind barbed wire in internment camps, these men fought across Europe and became the most decorated unit in American military history: over 18,000 individual awards in less than two years, including 21 Medals of Honor. The monument sits in Little Tokyo, steps from the buildings where their families stored their belongings before being taken away. The proximity is the point.","ys":1999,"tl":[{"y":"1943","x":"442nd Regimental Combat Team activated"},{"y":"1945","x":"War ends — most decorated unit in US history"},{"y":"1999","x":"Monument dedicated in Little Tokyo"}],"tags":["WWII","442nd","Japanese American","Medal of Honor"],"rel":["janm","jaccc","hongwanji"],"w":"Go_for_Broke_Monument","s":"active"},{"id":"jaccc","h":"littletokyo","n":"JACCC / Aratani Theater","t":"Cultural Center","c":"culture","lat":34.0474,"lng":-118.2419,"a":"244 S San Pedro St","i":"🏯","d":"The Japanese American Cultural and Community Center opened in 1980 as one of the largest cultural arts centers in the country. The 800-seat Aratani Theater hosts everything from taiko drumming to contemporary dance to the annual Nisei Week celebrations. Hidden inside: the James Irvine Japanese Garden, formally called Seiryu-en (Garden of the Clear Stream), designed in the Zen tradition of Kyoto gardens — a 170-foot cascading stream, handcrafted cedar bridges, stone lanterns. You take an elevator down one floor and follow a winding hallway to find it. One of the great hidden spaces in all of Los Angeles.","ys":1980,"tl":[{"y":"1980","x":"JACCC opens in Little Tokyo"},{"y":"1983","x":"James Irvine Garden completed"}],"tags":["Cultural Center","Aratani Theater","Japanese Garden","Nisei Week"],"rel":["janm","goforbroke","eastwestplayers","kyotogarden"],"s":"active"},{"id":"kyotogarden","h":"littletokyo","n":"Kyoto Garden","t":"Rooftop Japanese Garden","c":"culture","lat":34.0505,"lng":-118.2427,"a":"120 S Los Angeles St","i":"🌸","d":"A half-acre Japanese garden perched on the rooftop of what is now the DoubleTree by Hilton, originally built in 1977 as the Garden in the Sky when the building was the New Otani Hotel. Modeled after a 16th-century Tokyo garden created for samurai lord Kato Kiyomasa. Cascading waterfalls, koi ponds, meandering stone paths, a traditional teahouse — all sitting on top of a parking structure in the middle of downtown. You take a small elevator to the third floor and suddenly you are in Kyoto. Spike Jonze filmed scenes from Her here. The hotel has changed hands and names three times but the garden endures.","ys":1977,"tl":[{"y":"1977","x":"Opens as Garden in the Sky at New Otani Hotel"},{"y":"2007","x":"Hotel becomes Kyoto Grand"},{"y":"2012","x":"Becomes DoubleTree by Hilton"},{"y":"2013","x":"Spike Jonze films Her here"}],"tags":["Japanese Garden","Rooftop","Hidden Gem","Her Film Location"],"rel":["jvillageplaza","jaccc","janm"],"s":"active"},{"id":"nuart","h":"westla","n":"Nuart Theatre","t":"Art House Cinema","c":"culture","lat":34.0465,"lng":-118.448,"a":"11272 Santa Monica Blvd","i":"🎬","d":"Built in 1929 and opened with the world premiere of Sweethearts on Parade — Douglas Fairbanks and Mary Pickford in attendance. Became the first Landmark Theatre in 1974 and never looked back. The arthouse institution of the Westside: Rocky Horror Picture Show shadowcast every Saturday since 1976, Divine arriving on a motorcycle with a trash truck full of Cycle Sluts for the Pink Flamingos premiere, the director's cut Blade Runner screenings that inspired its theatrical re-release, John Waters filming a No Smoking PSA where he told patrons to smoke anyway. David Lynch screened here. The sunburst terrazzo and Art Deco marquee from a 1940s remodel greet you at the door. Three hundred seats, one screen, infinite cult credibility.","ys":1929,"tl":[{"y":"1929","x":"Built and opened with Hollywood premiere"},{"y":"1974","x":"Becomes first Landmark Theatre"},{"y":"1976","x":"Rocky Horror begins Saturday midnight runs"},{"y":"2022","x":"Major renovation, 275 new reclining seats"}],"tags":["Arthouse","Rocky Horror","Cult Cinema","Landmark"],"rel":["silentmovie","vistatheater","afi","jurassictech"],"w":"Nuart_Theatre","s":"active"},{"id":"giantrobot","h":"westla","n":"Giant Robot","t":"Pop Culture Store / Gallery","c":"shop","lat":34.0404,"lng":-118.4434,"a":"2015 Sawtelle Blvd","i":"🤖","d":"What started as a scrappy Asian American pop culture zine in 1994 became a brick-and-mortar store in 2001 that helped catalyze the revival of Sawtelle Japantown. Eric Nakamura's shop stocks Japanese toys, indie art, obscure magazines, and things you did not know you needed. The adjacent GR2 gallery shows emerging artists. Giant Robot was the cool older sibling that told the neighborhood it was okay to be weird and specific and Asian and proud of it. The store helped transform Sawtelle from a quiet strip of nurseries and old-school Japanese businesses into the food and culture destination it is today.","ys":2001,"tl":[{"y":"1994","x":"Giant Robot zine launches"},{"y":"2001","x":"Store opens on Sawtelle"},{"y":"2005","x":"Helps catalyze Sawtelle Japantown revival"}],"tags":["Asian Pop Culture","Zine","Gallery","Sawtelle Pioneer"],"rel":["tsujita","nuart","ripcityskates"],"s":"active"},{"id":"tsujita","h":"westla","n":"Tsujita LA","t":"Ramen Restaurant","c":"food","lat":34.0396,"lng":-118.4427,"a":"2057 Sawtelle Blvd","i":"🍜","d":"When Takehiro Tsujita opened his restaurant on Sawtelle in August 2011, he did not even serve ramen at first — just tsukemen, the dipping style where cold noodles meet a thick tonkotsu broth simmered for 60 hours with bonito added for depth. The lines formed immediately and never stopped. Lunch-only limited availability added to the mystique. Tsujita did not just put Sawtelle on the map as a ramen destination — it rewired how Los Angeles thought about Japanese noodles entirely. The three-step eating ritual (plain dip, lime squeeze, remaining broth as soup) became a pilgrimage.","ys":2011,"tl":[{"y":"2011","x":"Opens on Sawtelle — lines form immediately"}],"tags":["Ramen","Tsukemen","Sawtelle","Lines Around the Block"],"s":"active"},{"id":"yamaguchi","h":"westla","n":"Yamaguchi Bonsai Nursery","t":"Japanese Nursery","c":"shop","lat":34.0422,"lng":-118.4449,"a":"1905 Sawtelle Blvd","i":"🌿","d":"Operating since 1949, Yamaguchi is one of the last surviving Japanese nurseries on Sawtelle Boulevard. At one time there were as many as 26 nurseries in the neighborhood, a living connection to the Japanese American agricultural tradition that shaped Southern California. The nursery specializes in bonsai trees, exotic plants, and gardening supplies. Walking in feels like stepping into the Sawtelle that existed before the ramen lines — quiet, green, deeply rooted. A reminder of what this community built with their hands when they were not allowed to build anywhere else.","ys":1949,"tl":[{"y":"1949","x":"Opens on Sawtelle Blvd"}],"tags":["Bonsai","Japanese Nursery","Since 1929","Living History"],"rel":["tsujita","kuruvungna"],"s":"active"},{"id":"kuruvungna","h":"westla","n":"Kuruvungna Springs","t":"Sacred Indigenous Site","c":"culture","lat":34.04566,"lng":-118.45915,"a":"1439 S Barrington Ave","i":"💧","d":"Before Los Angeles was Los Angeles, the Tongva people lived at this natural spring site and called it Kuruvungna. It was one of the villages that sustained the indigenous population of the LA basin for thousands of years before Spanish colonization. The springs flow on the campus of University High School — one of the only places in the city where you can see water emerging from the earth the way it has for millennia. Maintained by the Gabrielino Tongva Springs Foundation, open for visits on the first Saturday of each month. The deepest layer of history in a city that constantly paves over its past.","ys":1000,"tl":[{"y":"Pre-contact","x":"Tongva village at natural springs"},{"y":"1924","x":"University High School built on site"},{"y":"2005","x":"Springs Foundation preserves and opens site"}],"tags":["Tongva","Indigenous","Natural Springs","Pre-Colonial"],"rel":["yamaguchi","lazoo"],"s":"active"},{"id":"cecilhotel","h":"downtown","n":"Cecil Hotel","t":"Hotel / Affordable Housing","c":"hotel","lat":34.0441,"lng":-118.2519,"a":"640 S Main St","i":"🏚","d":"Opened in 1924 as a 700-room hotel for business travelers, the Cecil became one of the most notorious buildings in America. Richard Ramirez, the Night Stalker, lived here during his 1985 murder spree — guests occasionally saw him in the lobby covered in blood. Austrian serial killer Jack Unterweger stayed in 1991 while murdering three women. In 2013, Elisa Lam was found dead in the rooftop water tank after guests complained the water tasted funny. The Netflix documentary Crime Scene turned it into a global obsession. At least sixteen people have died here under suspicious circumstances. The building was rebranded as Stay on Main, then converted to affordable housing, but the dark energy has never left. Fourteen stories of bad luck on Main Street.","ys":1924,"tl":[{"y":"1924","x":"Opens as business hotel"},{"y":"1985","x":"Night Stalker Richard Ramirez lives here"},{"y":"1991","x":"Jack Unterweger stays while killing"},{"y":"2013","x":"Elisa Lam found in water tank"},{"y":"2021","x":"Netflix Crime Scene documentary"}],"tags":["Dark Tourism","Serial Killers","Elisa Lam","True Crime"],"rel":["hotelfigueroa","acehotel","biltmore"],"w":"Cecil_Hotel_(Los_Angeles)","s":"active"},{"id":"hotelfigueroa","h":"downtown","n":"Hotel Figueroa","t":"Historic Hotel","c":"hotel","lat":34.0455,"lng":-118.2641,"a":"939 S Figueroa St","i":"🏨","d":"Built in 1926 as the largest commercial building funded by women for women in the United States. Originally a YWCA hotel where solo female travelers could book rooms without a male chaperone — a radical act in the 1920s. It housed 400 guest rooms, a coffee shop, salons, and became a hub for political rallies and press conferences during the suffrage era. The Spanish Colonial Revival architecture survived a century of downtown neglect. After a full restoration in 2018, the Moroccan-tinged interiors returned alongside downtown LA's only ground-floor pool. A building that was literally constructed to give women a room of their own.","ys":1926,"tl":[{"y":"1926","x":"Opens as YWCA — largest women-funded building in US"},{"y":"2016","x":"Closes for full restoration"},{"y":"2018","x":"Reopens with Spanish Colonial Revival restored"}],"tags":["Feminist History","YWCA","Spanish Colonial","Downtown Pool"],"rel":["cecilhotel","biltmore","acehotel","edisonbar","casadelmar","baycities"],"w":"Hotel_Figueroa","s":"active"},{"id":"georgianhotel","h":"santamonica","n":"The Georgian Hotel","t":"Boutique Hotel","c":"hotel","lat":34.0138,"lng":-118.4972,"a":"1415 Ocean Ave","i":"🏨","d":"That unmistakable turquoise Art Deco facade on Ocean Avenue — you have seen it even if you do not know you have seen it. Opened in 1933 by businesswoman Rosamond Borde as an intimate seaside hideaway for Hollywood elites. During Prohibition it operated as a speakeasy, drawing Bugsy Siegel and Fatty Arbuckle through its doors. Clark Gable and Carole Lombard were regulars. Rose Kennedy stayed. Eighty-four rooms, every single one with an ocean view, the Veranda restaurant doing cocktails at sunset. One of the last boutique hotels on the coast that feels like old money rather than new tech.","ys":1933,"tl":[{"y":"1933","x":"Opens as Hollywood hideaway"},{"y":"1932","x":"Operates speakeasy during Prohibition"}],"tags":["Art Deco","Speakeasy","Ocean View","Bugsy Siegel"],"w":"Georgian_Hotel_(Santa_Monica)","s":"active"},{"id":"hotelnormandie","h":"ktown","n":"Hotel Normandie","t":"Historic Hotel","c":"hotel","lat":34.0633,"lng":-118.3007,"a":"605 S Normandie Ave","i":"🏨","d":"Designed by Walker and Eisen — the same architects behind the Wiltern and the Fine Arts Building — and opened in 1926. Author Malcolm Lowry stayed here while working on his writing. The terrazzo lobby floors are original. After a $5 million renovation, the ground floor became home to the Normandie Club, widely credited with launching Koreatown's cocktail revolution, and Cassell's Hamburgers, a beloved patty institution since 1948 that relocated here. The hotel that quietly anchors the cultural identity of a neighborhood most people only know for Korean BBQ.","ys":1926,"tl":[{"y":"1926","x":"Opens — designed by Walker & Eisen"},{"y":"1948","x":"Cassell's Hamburgers founded (later moves here)"},{"y":"2018","x":"$5M renovation, Normandie Club opens"}],"tags":["Walker & Eisen","Cocktail Revolution","Koreatown Anchor","Art Deco"],"rel":["ambassador","biltmore","brownderbyog","hmsbounty","boardwalk","venicecanals"],"w":"Hotel_Normandie_(Los_Angeles)","s":"active"},{"id":"cadillachotel","h":"venice","n":"Cadillac Hotel","t":"Historic Beachfront Hotel","c":"hotel","lat":33.9941,"lng":-118.4795,"a":"8 Dudley Ave","i":"🏨","d":"A Venetian Renaissance Revival palace right on the Venice boardwalk, opened in 1914 during Abbot Kinney's original vision of Venice as a cultural resort. Charlie Chaplin stayed here in Venice's golden age. The building has cycled through luxury, decline, and back — at its lowest it was a flophouse, now restored. The rooftop sundeck overlooks the boardwalk circus below: the muscle men, the street performers, the skate park, the drum circle. A hundred years of Venice in one building.","ys":1914,"tl":[{"y":"1914","x":"Opens during Venice golden age"},{"y":"1925","x":"Charlie Chaplin stays"},{"y":"2005","x":"Restored to boutique hotel"}],"tags":["Venice Boardwalk","Venetian Renaissance","Charlie Chaplin","1914"],"s":"active"},{"id":"casadelmar","h":"santamonica","n":"Casa del Mar","t":"Luxury Beachfront Hotel","c":"hotel","lat":34.0064,"lng":-118.4913,"a":"1910 Ocean Way","i":"🏨","d":"Debuted in 1926 as a members-only beach club — brothers Jack and Til Harter spared no expense on the Italian Renaissance Revival design by architect Charles F. Plummer. National Register of Historic Places. The beachfront palace went through decades as everything from a military hotel during WWII to a retirement home before being restored to luxury in 1999. Sister property to Shutters on the Beach next door. Standing on its terrace at sunset, watching the Pacific turn gold, you understand why people came to California in the first place.","ys":1926,"tl":[{"y":"1926","x":"Opens as members-only beach club"},{"y":"1941","x":"US Navy takes over building during WWII"},{"y":"1999","x":"Restored to luxury hotel"}],"tags":["Beachfront","Italian Renaissance","National Register","Members Club"],"rel":["georgianhotel","chezjay","thelobster","baycities","kingeddy","montybar"],"s":"active"},{"id":"thevarnish","h":"downtown","n":"The Varnish","t":"Speakeasy","c":"nightlife","lat":34.0448,"lng":-118.2496,"a":"118 E 6th St (behind Cole's)","i":"🍸","d":"Hidden behind an unmarked door in the back of Cole's — the oldest public house in Los Angeles — The Varnish opened in 2009 and helped ignite the craft cocktail revival that reshaped how LA drinks. Sasha Petraske protege Eric Alperin built a tiny room of red leather and candlelight where bartenders make everything from scratch and the ice is hand-cut. No standing room, no TVs, no blenders. Just spirits, technique, and conversation. It won a James Beard Award. The speakeasy-behind-the-speakeasy that proved LA could compete with New York on cocktails.","ys":2009,"ye":2024,"tl":[{"y":"2009","x":"Opens behind Cole's"},{"y":"2012","x":"Wins James Beard Award for Outstanding Bar Program"}],"tags":["Speakeasy","Craft Cocktails","James Beard","Behind Coles"],"s":"closed"},{"id":"dansungsa","h":"ktown","n":"Dan Sung Sa","t":"Korean Pojangmacha Bar","c":"nightlife","lat":34.0637,"lng":-118.2946,"a":"3317 W 6th St","i":"🇰🇷","d":"A pojangmacha — Korean street tent bar — transplanted indoors on 6th Street. The menu is a laminated sheet of numbered items with no English translations and no photos. You point at a number. They bring you something. It will be delicious and strange and you will wash it down with soju and beer. The fluorescent lighting is harsh, the tables are cramped, and it feels exactly like stumbling into a bar in 1970s Seoul. The kind of place that makes Koreatown irreplaceable — not curated, not explained, just there for people who know.","ys":1997,"tl":[{"y":"1997","x":"Opens as pojangmacha-style bar"}],"tags":["Pojangmacha","Soju","No English Menu","Late Night"],"rel":["theprince","hmsbounty","brassmonkey","wispa","formosa","dansungsa"],"s":"active"},{"id":"theprince","h":"ktown","n":"The Prince","t":"Korean Bar & Restaurant","c":"nightlife","lat":34.0596,"lng":-118.2949,"a":"3198 1/2 W 7th St","i":"🍺","d":"Red leather booths, wood paneling, stained glass windows — The Prince looks like a 1940s steakhouse that fell asleep and woke up in Koreatown. Korean-American ownership since the 1990s. The fried chicken is legendary. Mad Men filmed here (Don Draper's favorite booth is in the back). New Girl filmed here too. The place photographs like a noir frame and drinks like a dive bar. One of those LA spots where the past and present coexist without anyone making a fuss about it.","ys":1949,"tl":[{"y":"1949","x":"Opens as Windsor Restaurant"},{"y":"1995","x":"Becomes The Prince under Korean ownership"},{"y":"2012","x":"Mad Men and New Girl film here"}],"tags":["Mad Men","Fried Chicken","Red Leather","Koreatown Classic"],"s":"active"},{"id":"chachalounge","h":"silverlake","n":"Cha Cha Lounge","t":"Dive Bar","c":"nightlife","lat":34.0994,"lng":-118.2594,"a":"2375 Glendale Blvd","i":"💃","d":"Directly across the street from the Red Lion Tavern — German beer hall on one side, Tijuana dive bar on the other. That is the Silver Lake experience in 30 feet of crosswalk. Cha Cha is tequila-fueled, foosball-in-the-back, sticky-floor chaos decorated in Mexican kitsch and Christmas lights that stay up year-round. The crowd gets rowdy. Nobody cares what you are wearing. Stumble distance from the Red Lion is both a feature and a hazard. The kind of bar that makes you love a neighborhood.","ys":2005,"tl":[{"y":"2005","x":"Opens in December across from Red Lion"}],"tags":["Dive Bar","Foosball","Silver Lake","Tequila"],"rel":["4100bar","akbar","tikiti","bigfootlodge","drawingroom","dresden"],"s":"active"},{"id":"goodluckbar","h":"losfeliz","n":"Good Luck Bar","t":"Cocktail Bar","c":"nightlife","lat":34.0986,"lng":-118.2873,"a":"1514 Hillhurst Ave","i":"🏮","d":"Chinese-themed cocktail bar opened in 1994 by Sean MacPherson, inspired by Yee Mee Loo, a lamented 1940s Chinatown watering hole. Red lanterns, a 360-degree bar, pagoda details, a dragon-festooned ceiling, and drinks in ceramic coconuts. The Potent Potion was the house signature — spiced rum, pineapple, coconut cream. For 25 years it was the definitive Los Feliz date spot, the bar where a thousand first dates turned into marriages. Evicted in May 2019 when the building was sold for hotel development. The developer kept the neon sign as a souvenir.","ys":1994,"ye":2019,"tl":[{"y":"1994","x":"Sean MacPherson opens on Hillhurst"}],"tags":["Chinese Theme","Red Lanterns","Los Feliz","Strong Drinks"],"s":"closed"},{"id":"brassmonkey","h":"ktown","n":"Brass Monkey","t":"Karaoke Dive Bar","c":"nightlife","lat":34.0614,"lng":-118.2994,"a":"659 S Mariposa Ave","i":"🎤","d":"Arguably the most notorious karaoke bar in Los Angeles. Opened in 1971 and tucked into the rear of an office building at 3440 Wilshire, this ski-lodge-styled Koreatown dive has an encyclopedic songbook and weekend wait times that routinely hit 45 minutes. The crowd is a perfect cross-section of the city — Korean college kids, downtown professionals, bachelorette parties, people who should not be singing but are anyway. Seth MacFarlane sings Sinatra here. Manny Pacquiao has done karaoke here. Democracy through karaoke.","ys":1971,"tl":[{"y":"1971","x":"Opens in Koreatown"}],"tags":["Karaoke","Koreatown","Ski Lodge","45 Minute Wait"],"rel":["dansungsa","theprince","hmsbounty","kingeddy","montybar","thevarnish"],"s":"active"},{"id":"lacitabar","h":"downtown","n":"La Cita Bar","t":"Latin Dance Bar","c":"nightlife","lat":34.0507,"lng":-118.2496,"a":"336 S Hill St","i":"💃","d":"Neon sign out front, cumbia on the speakers, bodies packed on the dance floor. La Cita has been the Latin dance heartbeat of downtown since the 1960s. One room: dark, divey, and loud. DJs and live bands on weekends. The music ranges from cumbia to reggaeton to punk en espanol depending on the night. The kind of bar where you walk in knowing nobody and leave knowing everybody. One of the few downtown spots that survived gentrification without losing its soul.","ys":1963,"tl":[{"y":"1963","x":"Opens as Latin bar downtown"}],"tags":["Cumbia","Latin Dance","Downtown OG","Neon"],"s":"active"},{"id":"tonyssaloon","h":"artsdistrict","n":"Tony's Saloon","t":"Neighborhood Bar","c":"nightlife","lat":34.0347,"lng":-118.2317,"a":"2017 E 7th St","i":"🍺","d":"One of the first bars to open in what would become the Arts District, back when the neighborhood was warehouses and not much else. The patio is big and leafy, the crowd is mixed, and the bartenders have been pouring for people who actually live nearby since before Bestia and ROW DTLA made the area a destination. Tony's is what a neighborhood bar should be: unpretentious, consistent, and open late. The Arts District anchor that predates the Arts District brand.","ys":2008,"tl":[{"y":"2008","x":"Opens in pre-gentrification Arts District"}],"tags":["Arts District OG","Neighborhood Bar","Patio","Pre-Gentrification"],"rel":["alsbar","moroccanlounge","breweryart","larryedmunds","booksoup","skylight"],"s":"active"},{"id":"iliadbookshop","h":"noho","n":"Iliad Bookshop","t":"Used Bookstore","c":"shop","lat":34.1688,"lng":-118.3614,"a":"5400 Cahuenga Blvd","i":"📚","d":"North Hollywood's cathedral of used books — over 60,000 volumes crammed into a space that feels like it should not be able to hold half that many. Open since 1988 and run by people who actually read. Science fiction, poetry, California history, philosophy, film theory, pulp paperbacks — all of it organized by someone with a system only they fully understand.","ys":1988,"tl":[{"y":"1988","x":"Opens in North Hollywood"}],"tags":["Used Books","60000 Volumes","North Hollywood","Valley's Best"],"w":"The_Iliad_Bookshop","s":"active"},{"id":"hennesseyingalls","h":"santamonica","n":"Hennessey + Ingalls","t":"Architecture & Art Bookstore","c":"shop","lat":34.0333,"lng":-118.4935,"a":"1520 Montana Ave","i":"📐","d":"The definitive architecture and art bookstore in the western United States, open since 1963. If you are designing a building, a garden, a typeface, or a city, this is where you come. Monographs on every major architect. Photography books. Urban planning. Landscape design. Typography. The staff knows their inventory the way a sommelier knows a wine list. Originally in the Venice area, now on Montana Avenue in Santa Monica. The kind of specialist bookstore that should not survive in the Amazon era and yet does, because nothing online can replace the experience of pulling a Tadao Ando monograph off a shelf you did not know existed.","ys":1963,"tl":[{"y":"1963","x":"Founded in Los Angeles"},{"y":"2014","x":"Moves to Montana Ave in Santa Monica"}],"tags":["Architecture Books","Art Books","Since 1963","Specialist"],"rel":["lastbookstore","booksoup","skylight","fugetsudo","jvillageplaza","giantrobot"],"s":"active"},{"id":"kinokuniya","h":"littletokyo","n":"Kinokuniya","t":"Japanese Bookstore","c":"shop","lat":34.0523,"lng":-118.2395,"a":"123 Astronaut E S Onizuka St","i":"📚","d":"The Little Tokyo outpost of Japan's largest bookstore chain, tucked in the Japanese Village Plaza mall. Manga in Japanese and English, Japanese stationery that will ruin all other stationery for you, art books, magazines you cannot find anywhere else in the city, and the kind of pens and notebooks that make you want to start writing by hand again. The cultural anchor of Little Tokyo's retail life. Also the only place in LA where you can buy a Hobonichi Techo planner without ordering it from Tokyo.","ys":2005,"tl":[{"y":"2005","x":"Opens in Japanese Village Plaza"}],"tags":["Manga","Japanese Books","Stationery","Village Plaza"],"s":"active"},{"id":"coffeetable","h":"silverlake","n":"The Coffee Table","t":"Neighborhood Cafe (Closed)","c":"food","lat":34.1078,"lng":-118.2662,"a":"2930 Rowena Ave","i":"☕","d":"Opened in 1997 by former music industry exec Mike Zamarripa and Brett Schoenhals, who turned a former doctor's office on Rowena Avenue into the neighborhood living room Silver Lake did not know it needed. Mosaic-tiled tables, red velvet cupcakes, a back patio with a fountain, and a no-WiFi-on-weekends policy that forced people to actually talk to each other. The Coffee Table was one of the first cafes to catalyze Rowena into a restaurant row, paving the way for Edendale and everything that followed. When the lease ran out in 2011 and the building was sold for luxury condos, customers showed up on the last day to buy the furniture and cry. A second location in Eagle Rock held on until 2017. The gentrification engine that got gentrified.","ys":1997,"ye":2011,"tl":[{"y":"1997","x":"Opens on Rowena Ave in Silver Lake"},{"y":"2004","x":"Second location opens in Eagle Rock"},{"y":"2011","x":"Silver Lake location closes — condos coming"},{"y":"2017","x":"Eagle Rock location closes permanently"}],"tags":["Early Gentrification","Rowena Ave","Mosaic Tables","Neighborhood Loss"],"rel":["cafetropical","casitadel","astrofamily","drawingroom","speranza"],"s":"closed"},{"id":"astrofamily","h":"silverlake","n":"Astro Family Restaurant","t":"24-Hour Diner","c":"food","lat":34.1045,"lng":-118.2587,"a":"2300 Fletcher Dr","i":"🍳","d":"Designed by Armet & Davis — the same firm behind Norms, Pann's, and the Denny's prototype — this Googie masterpiece was built in 1959 as Conrad's Family Restaurant, replacing a hamburger stand that had occupied the Fletcher Drive corner since 1931. The folded-plate roofline angles down to sharp points at each end, a mid-century space-age silhouette that architectural historian Alan Hess called \"People's Moderne.\" Peter Metsos took over in 1974 and renamed it Astro. It has run 24 hours ever since. The orange booths, the enormous menu, the 3 AM huevos rancheros — it is all exactly as it should be. Designated a Los Angeles Historic-Cultural Monument in 2024.","ys":1959,"tl":[{"y":"1931","x":"Original hamburger stand opens at Fletcher & Glendale"},{"y":"1959","x":"Conrad's Family Restaurant built — Armet & Davis design"},{"y":"1974","x":"Peter Metsos takes over — renamed Astro"},{"y":"2024","x":"Designated Los Angeles Historic-Cultural Monument"}],"tags":["1959","Armet & Davis","Googie","24 Hour","HCM"],"s":"active"},{"id":"astroburger","h":"weho","n":"Astro Burger","t":"Burger Stand","c":"food","lat":34.0908,"lng":-118.3524,"a":"7475 Santa Monica Blvd","i":"🍔","d":"A no-frills burger counter on Melrose that has been feeding people who cannot afford the neighborhood since 1979. The menu covers burgers, gyros, souvlaki, breakfast burritos, and shakes — basically anything a human could want at any hour. The neon sign and orange-and-brown interior are a time capsule. The key to Astro Burger is that it is open until 3:30 AM on weekends, making it the last pit stop between the bars of West Hollywood and regrettable decisions. A monument to post-midnight hunger.","ys":1979,"tl":[{"y":"1979","x":"Opens on Santa Monica Blvd"}],"tags":["Late Night Burgers","Post-Bar","Neon Sign","Since 1979"],"rel":["subliminalprojects","coffeetable","casitadel","benfranks","jensens"],"s":"active"},{"id":"ballerhardware","h":"silverlake","n":"Baller Hardware","t":"Neighborhood Hardware Store","c":"shop","lat":34.1045,"lng":-118.2735,"a":"2505 Hyperion Ave","i":"🔧","d":"Ed and Edith Baller opened this hardware store in 1959 on the corner of Hyperion Avenue and Tracy Street. Four generations later, Craig Cowie — Papa Baller's grandson — runs the place, owns the property, and undercuts the big boxes. The original phone number was NOrmandie 5-4149. Shepard Fairey painted a mural on the side wall, where the art supply annex sits across the street. In 2021 they opened a second location on York Boulevard in Highland Park, carrying the same ethos to another gentrifying neighborhood. Workers from old houses come here because the staff actually knows how to advise on 130-year-old architecture — something Home Depot will never offer.","ys":1959,"tl":[{"y":"1959","x":"Ed & Edith Baller open hardware store at Hyperion & Tracy"},{"y":"2021","x":"Second location opens on York Blvd in Highland Park"}],"tags":["1959","Family Owned","Four Generations","Hyperion Ave"],"rel":["snowwhitecottages","wacko","rockaway","weismanfoundation","subliminalprojects"],"s":"active"},{"id":"drawingroom","h":"losfeliz","n":"The Drawing Room","t":"Dive Bar","c":"nightlife","lat":34.1037,"lng":-118.287,"a":"1800 Hillhurst Ave","i":"🥃","d":"One of the darkest dive bars in Los Angeles, and that is saying something. The Drawing Room on Hillhurst is the kind of place where your eyes need five minutes to adjust when you walk in from daylight. A strip-mall corner dive with cheap drinks, no pretense, a jukebox, a gold dragon mural across two red walls, and the strong possibility that the person on the stool next to you has given up on their screenplay. Open since 1983 and run by the same family since 1997. Cash only, opens at 6 AM, and Sunday karaoke brings out the entire neighborhood. The antithesis of everything trendy about Los Feliz.","ys":1983,"tl":[{"y":"1983","x":"Opens on Hillhurst"},{"y":"2005","x":"Becomes beloved Los Feliz dive"}],"tags":["Dive Bar","Darkest Bar","Hillhurst","Speakeasy Origins"],"s":"active"},{"id":"palermo","h":"losfeliz","n":"Palermo","t":"Italian Restaurant","c":"food","lat":34.1048,"lng":-118.2916,"a":"1858 N Vermont Ave","i":"🍝","d":"Old-school Sicilian on Vermont in Los Feliz, opened by Anthony Fanara in 1976. Started as an 18-seat space on Hillhurst, moved to its current Vermont location in 1982 and expanded to 180 seats. Burgundy leather booths, Italian seascape murals, and portions that would feed a family of four. Famous for the Pizza Rosa, the Tony sauce, and the free garlic bread basket that arrives before you even sit down. The owner remembers regulars by name. Palermo has survived every wave of Los Feliz gentrification by refusing to change anything about itself.","ys":1976,"tl":[{"y":"1976","x":"Opens on Vermont Ave"}],"tags":["Old School Italian","Red Sauce","Vermont Ave","Unchanged"],"rel":["speranza","micelis","elcid","figaro","palermo","casitadel"],"s":"active"},{"id":"speranza","h":"silverlake","n":"Speranza Italian Kitchen","t":"Italian Restaurant","c":"food","lat":34.1056,"lng":-118.273,"a":"2547 Hyperion Ave","i":"🍝","d":"A cozy Italian spot on Hyperion Avenue in Silver Lake that has managed the rare trick of being both a neighborhood restaurant and a destination. The pasta is handmade. The dining room is intimate. The wine list favors Italian selections that actually pair with the food rather than just looking expensive. Speranza means hope in Italian, and in a neighborhood where restaurants come and go like LA relationships, the name feels deliberate. A Silver Lake date-night staple.","ys":2005,"tl":[{"y":"2005","x":"Opens on Hyperion Ave in Silver Lake"}],"tags":["Handmade Pasta","Date Night","Silver Lake Italian","Intimate"],"s":"active"},{"id":"neutravdl","h":"silverlake","n":"Neutra VDL Studio & Residences","t":"Modernist House Museum","c":"culture","lat":34.0984,"lng":-118.2604,"a":"2300 Silver Lake Blvd","i":"🏛","d":"In 1932, Viennese-American architect Richard Neutra built himself a radical glass house on the edge of Silver Lake Reservoir with a $3,000 no-interest loan from Dutch industrialist C.H. Van der Leeuw. He called it the VDL Research House — a laboratory to prove that three families could live on a 60-by-70-foot lot without sacrificing privacy or light. Frank Lloyd Wright visited. Charles and Ray Eames visited. Young architects like Gregory Ain and Raphael Soriano started their careers here. A fire destroyed the original in 1963, and Neutra and his son Dion rebuilt it — now designated a National Historic Landmark. The house is owned by Cal Poly Pomona and open for Saturday tours led by architecture students. The only Neutra house regularly open to the public.","ys":1932,"tl":[{"y":"1932","x":"Built as VDL Research House with Van der Leeuw loan"},{"y":"1963","x":"Destroyed by fire — Neutra and son Dion rebuild"},{"y":"1990","x":"Wife Dione donates to Cal Poly Pomona"},{"y":"2016","x":"Designated National Historic Landmark"}],"tags":["Richard Neutra","National Historic Landmark","Modernism","Silver Lake Reservoir"],"w":"Neutra_VDL_Studio_and_Residences","s":"active"},{"id":"jurassictech","h":"culvercity","n":"Museum of Jurassic Technology","t":"Cabinet of Curiosities","c":"culture","lat":34.0258837,"lng":-118.395063,"a":"9341 Venice Blvd, Culver City, CA 90232","i":"🦕","d":"Founded in 1988 by David and Diana Wilson in a nondescript storefront on Venice Boulevard, the Museum of Jurassic Technology is an institution dedicated to the advancement of knowledge and the public appreciation of the Lower Jurassic — a geological period that predates all technology by about 150 million years. Nobody can explain what this museum is. The dimly lit rooms contain micro-sculptures in the eye of a needle, Soviet space dogs in oil portraits, exhibits about bats that fly through lead walls, and a Tula Tea Room where you are served Georgian tea in a replica of Tsar Nicholas II's study. Lawrence Weschler wrote an entire book trying to explain it. He could not. The New York Times called it a museum about museums. It won a MacArthur Genius Grant. You will leave confused, moved, and unsure whether anything you saw was real. The most LA thing in LA.","ys":1988,"tl":[{"y":"1988","x":"Founded by David and Diana Wilson"},{"y":"1995","x":"Lawrence Weschler publishes Mr. Wilson's Cabinet of Wonder"},{"y":"2001","x":"David Wilson awarded MacArthur Fellowship"},{"y":"2005","x":"Tula Tea Room opens"}],"tags":["MacArthur Genius","Cabinet of Curiosities","Unexplainable","Tea Room"],"rel":["titostacos","chilijohns","applepan","lovell","hollyhock","sennett"],"w":"Museum_of_Jurassic_Technology","s":"active"},{"id":"originaltommys","h":"ktown","n":"Original Tommy's Burger","t":"Burger Stand","c":"food","lat":34.0694,"lng":-118.2763,"a":"2575 Beverly Blvd","i":"🍔","d":"In 1946, Tommy Koulax opened a hamburger stand at the corner of Beverly and Rampart with a $275 investment. He served chili burgers through a window and people lined up. They have not stopped lining up since. The original location on Beverly Boulevard is open 24 hours and serves the same chili-soaked double cheeseburger that has been ruining shirts and saving nights since the Truman administration. The chili is the thing — a meat-heavy slurry that drapes over everything and cannot be eaten without consequences. One of LA's essential burger stands and a founding member of the city's chili burger tradition alongside Chili John's and the Apple Pan.","ys":1946,"tl":[{"y":"1946","x":"Tommy Koulax opens stand with $275"},{"y":"1965","x":"Becomes 24-hour operation"},{"y":"2005","x":"Chain expands but original endures"}],"tags":["Chili Burger","Since 1946","24 Hour","$275 Investment"],"rel":["chilijohns","applepan","titostacos"],"s":"active"},{"id":"snowwhitecottages","h":"losfeliz","n":"Snow White Cottages","t":"Storybook Architecture","c":"culture","lat":34.1083,"lng":-118.274,"a":"2900 block Griffith Park Blvd","i":"🏠","d":"In 1931, builder Ben Sherwood constructed eight fairy-tale cottages on Griffith Park Boulevard — thatched roofs, black timber framing, rusticated masonry — prime examples of the storybook architectural style that swept 1920s and 1930s LA. The cottages sit just blocks from Walt Disney's original Hyperion Avenue studio, and Disney animators including Claude Coats lived here during the production of Snow White and the Seven Dwarfs in 1937. Whether the cottages inspired the film's design or vice versa remains debated, but the proximity is too poetic to be coincidence. Later tenants included Elliott Smith, who wrote music here before his mysterious death in 2003. David Lynch used them as the Sierra Bonita apartment complex in Mulholland Drive. Fairy-tale houses with a dark side — very LA.","ys":1931,"tl":[{"y":"1931","x":"Ben Sherwood builds eight storybook cottages"},{"y":"1937","x":"Snow White and the Seven Dwarfs released"},{"y":"2001","x":"Featured in Mulholland Drive"},{"y":"2003","x":"Elliott Smith dies — lived in cottage 2906"}],"tags":["Storybook Architecture","Walt Disney","Elliott Smith","Mulholland Drive"],"s":"active"},{"id":"holylandexhibition","h":"silverlake","n":"Holyland Exhibition","t":"Private Museum","c":"culture","lat":34.0966,"lng":-118.2545,"a":"2215 Lake View Ave","i":"⛪","d":"In 1924, Australian preacher Antonia F. Futterer — often called the inspiration for Indiana Jones, though that claim is contested — founded the Holyland Bible Knowledge Society in a house in Silver Lake. Futterer had gone to the Middle East searching for the Ark of the Covenant. He did not find it. What he did find were hundreds of artifacts: 5,000-year-old oil lamps, a 2,700-year-old sarcophagus, an ancient Damascus game table inlaid with 10,000 pearls. He shipped it all back to Silver Lake, where it has been on display in a five-room house museum ever since. Tours are by appointment only. Afterward, they serve you grape juice and apricot leather from Damascus. Open 365 days a year. A century of eccentric devotion hidden in a residential neighborhood.","ys":1924,"tl":[{"y":"1924","x":"Futterer founds Holyland Bible Knowledge Society"},{"y":"1926","x":"Expeditions to Holy Land begin"},{"y":"1931","x":"Publishes Palestine Speaks"}],"tags":["Ark of the Covenant","Futterer","Appointment Only","100 Years"],"rel":["subliminalprojects","ennishouse","hollyhock","sowden","ballerhardware"],"s":"active"},{"id":"tomoffinlandhouse","h":"echopark","n":"Tom of Finland House","t":"LGBTQ+ Art Archive & Museum","c":"culture","lat":34.0783,"lng":-118.2547,"a":"1421 Laveta Terrace","i":"🏳️‍🌈","d":"A 1911 Craftsman on Laveta Terrace in Echo Park where Finnish artist Touko Laaksonen — known as Tom of Finland — lived and created his iconic homoerotic illustrations from 1980 until his death in 1991. His hyper-masculine, leather-clad figures influenced Jean-Paul Gaultier, Thierry Mugler, and Freddie Mercury. Robert Mapplethorpe and John Waters visited regularly. In 1984, Tom and house owner Durk Dehner founded the Tom of Finland Foundation, which today holds over 100,000 erotic artworks — the world's largest repository. Tom's attic studio remains preserved exactly as he left it, brushes and final unfinished drawing on the desk. HCM #1135. Tours by appointment. The foundation announced in 2025 it may relocate to protect collections after fire map changes, though the house itself remains a landmark.","ys":1911,"tl":[{"y":"1911","x":"Craftsman house built in Sunset Boulevard Heights"},{"y":"1980","x":"Touko Laaksonen (Tom of Finland) moves in"},{"y":"1984","x":"Tom of Finland Foundation established"},{"y":"1991","x":"Tom dies — attic studio preserved"},{"y":"2016","x":"Designated HCM #1135"}],"tags":["LGBTQ+ History","Homoerotic Art","HCM 1135","Mapplethorpe"],"rel":["blackcat","thecircus","akbar","subliminalprojects"],"w":"Tom_of_Finland#Los_Angeles","s":"active"},{"id":"weismanfoundation","h":"bevhills","n":"Frederick R. Weisman Art Foundation","t":"Private Art Collection","c":"culture","lat":34.0828,"lng":-118.4275,"a":"265 N Carolwood Dr","i":"🖼","d":"In a Mediterranean Revival mansion in Holmby Hills designed by Gordon B. Kaufmann — the same architect who designed the Hoover Dam — entrepreneur Frederick Weisman filled every room with Picassos, Kandinskys, Mirós, Magrittes, Rothkos, Warhols, and Rauschenbergs. Over 400 works hung floor to ceiling. His favorite trick was guiding visitors into an upstairs bathroom where a lifelike Duane Hanson sculpture of a nude couple would startle them. David Hockney painted the Weismans in his famous 1968 double portrait American Collectors. After Weisman's death in 1994, his widow Billie Milam Weisman opened the collection for free docent-guided tours by appointment. A 1991 postmodern annex by architect Franklin D. Israel houses larger works. The best free art experience in Los Angeles that most people have never heard of.","ys":1982,"tl":[{"y":"1928","x":"Gordon B. Kaufmann designs Mediterranean Revival mansion"},{"y":"1982","x":"Frederick Weisman purchases estate for collection"},{"y":"1991","x":"Franklin D. Israel designs art pavilion annex"},{"y":"1994","x":"Weisman dies — foundation opens for free tours"}],"tags":["Picasso","Warhol","Hockney","Free Tours","Hoover Dam Architect"],"w":"Frederick_R._Weisman_Art_Foundation","s":"active"},{"id":"atomicrecords","h":"burbank","n":"Atomic Records","t":"Record Store","c":"shop","lat":34.1672,"lng":-118.3485,"a":"3812 W Magnolia Blvd, Burbank","i":"💿","d":"A Burbank record store that has been digging through crates for the Valley since the early 1990s. Vinyl, CDs, DVDs, vintage concert tees, and the kind of stuff that fell off the back of a truck in the best possible way. The hand-painted exterior is a landmark on Magnolia Boulevard. Atomic caters to the collector who knows what they are looking for and the browser who does not know what they are looking for until they find it. One of the last independent record stores in the Valley holding the line against streaming.","ys":1996,"tl":[{"y":"1996","x":"Opens on Magnolia Blvd in Burbank"}],"tags":["Vinyl","Burbank","Independent","Magnolia Blvd"],"rel":["ballerhardware","greystone","lacma","thebroad"],"s":"active"},{"id":"hivegallery","h":"downtown","n":"The Hive Gallery","t":"Underground Art Gallery","c":"culture","lat":34.0441,"lng":-118.2528,"a":"729 S Spring St","i":"🐝","d":"Nathan Cartwright opened this artist-run gallery on Spring Street in 2005, just as the Downtown Art Walk was gaining steam. Part gallery, part community center, part downtown art-scene barometer — the Hive has 25+ working artists, two exhibition spaces, and a $50-and-under store. Monthly themed group shows pack the place, with emerging artists hanging next to established ones. Audrey Kawasaki started here selling pieces for $350 — now they go for $20,000. The kind of DIY institution that makes Gallery Row feel alive rather than curated.","ys":2005,"tl":[{"y":"2005","x":"Nathan Cartwright opens Hive Gallery on Spring Street"},{"y":"2005","x":"Becomes anchor of Downtown Art Walk — Gallery Row"},{"y":"2015","x":"Launches annual Line Attack and Tarot exhibitions"}],"tags":["DIY Gallery","Spring Street","Artist-Run","Downtown Art Walk","Gallery Row"],"rel":["superchief","artsharela","subliminalprojects"],"s":"active"},{"id":"subliminalprojects","h":"echopark","n":"Subliminal Projects","t":"Art Gallery","c":"culture","lat":34.0773,"lng":-118.2575,"a":"1331 W Sunset Blvd","i":"🎨","d":"Founded by Shepard Fairey and Blaize Blouin in 1995 as a skateboard brand that evolved into an art gallery championing the artists that the blue-chip gallery world would not touch. Street art, skate culture, graphic design, activism — Subliminal Projects was among the first LA galleries to argue these were legitimate fine art. Now on Sunset Boulevard in Echo Park, the space has hosted shows by emerging and marginalized artists for three decades, with concerts and events that regularly spill into the parking lot. Fairey's OBEY empire grew from here. Billy Idol played here. Bad Brains held a tribute show with Dave Grohl. The gallery that helped redefine what LA art could look like.","ys":1995,"tl":[{"y":"1995","x":"Founded as skateboard brand by Shepard Fairey and Blaize Blouin"},{"y":"2003","x":"Relocated and expanded as gallery"},{"y":"2008","x":"Fairey creates Obama HOPE poster"},{"y":"2017","x":"Celebrates 21 years with salon-style group show"}],"tags":["Shepard Fairey","OBEY","Street Art","Skateboard Culture"],"rel":["hivegallery","superchief","wacko","snowwhitecottages","ballerhardware"],"s":"active"},{"id":"fidmmuseum","h":"downtown","n":"FIDM Museum & Galleries","t":"Fashion & Design Museum","c":"culture","lat":34.0442,"lng":-118.2599,"a":"919 S Grand Ave","i":"👗","d":"The Fashion Institute of Design and Merchandising maintains a museum inside its downtown LA campus that holds over 15,000 costumes and textiles dating from the 18th century to the present. Every year after the Oscars, FIDM mounts its Art of Motion Picture Costume Design exhibition featuring the nominated films' actual costumes — one of the best free exhibitions in the city. The permanent collection spans haute couture to streetwear, and the rotating exhibitions pull from Hollywood's costume archives with the authority of a school that has been training the industry's designers since 1969.","ys":1969,"tl":[{"y":"1969","x":"FIDM founded"},{"y":"2005","x":"Annual Oscar costume exhibition becomes institution"}],"tags":["Fashion","Costume Design","Oscar Costumes","Free Exhibition"],"s":"active"},{"id":"marcianofoundation","h":"ktown","n":"Marciano Art Foundation","t":"Contemporary Art Museum","c":"culture","lat":34.0619,"lng":-118.323,"a":"4357 Wilshire Blvd","i":"🏛","d":"Maurice and Paul Marciano — cofounders of Guess jeans — purchased a 1961 Scottish Rite Masonic Temple designed by Millard Sheets on Wilshire Boulevard and spent $25 million converting it into a contemporary art museum housing over 1,500 works. It opened in 2017. Then in November 2019, days after 70 employees announced a union drive, the Marcianos laid off 60 workers and closed the museum — one of LA's most dramatic cultural casualties of the decade. But the story did not end there. In February 2024, MAF quietly resumed programming. Independent curator Hanneke Skerath was named director in July 2024. The foundation now operates on a scaled-down model: free admission with timed-entry reservations, Tuesday through Saturday, with rotating exhibitions from the collection alongside partnerships with the LA Philharmonic and other arts organizations. The Masonic Relic Room — displaying original lodge paraphernalia left behind in the building — remains permanently on view.","ys":2017,"tl":[{"y":"1961","x":"Scottish Rite Masonic Temple built — designed by Millard Sheets"},{"y":"2017","x":"Marciano Art Foundation opens — $25M conversion"},{"y":"2019","x":"Abruptly closes after unionization attempt — 60 laid off"},{"y":"2024","x":"Quietly reopens — Hanneke Skerath named director"}],"tags":["Guess Jeans","Masonic Temple","Millard Sheets","Reopened 2024"],"rel":["lacma","craftcontemporary","silentmovie","thebroad","lastbookstore"],"w":"Marciano_Art_Foundation","s":"active"},{"id":"freakbeatrecords","h":"valley","n":"Freakbeat Records","t":"Record Store","c":"shop","lat":34.1477,"lng":-118.43,"a":"13616 Ventura Blvd, Sherman Oaks","i":"💿","d":"Founded in 2003 by Tim Gracyk and Bob Say, Freakbeat is a fiercely curated record store on Ventura Boulevard in Sherman Oaks specializing in psychedelic, garage, punk, mod, soul, and anything that falls outside the mainstream. The staff has opinions and will share them. The inventory skews toward the rare, the obscure, and the British. Freakbeat is the Valley's answer to Amoeba — smaller, weirder, and more likely to change your taste in music. The kind of store where you walk in for one record and walk out with seven you had never heard of.","ys":2003,"tl":[{"y":"2003","x":"Opens on Ventura Blvd in Sherman Oaks"}],"tags":["Psychedelic","Garage Rock","Curated","Ventura Blvd"],"s":"active"},{"id":"craftcontemporary","h":"fairfax","n":"Craft Contemporary","t":"Craft & Design Museum","c":"culture","lat":34.0623,"lng":-118.3556,"a":"5814 Wilshire Blvd","i":"🏺","d":"Formerly the Craft and Folk Art Museum, this small institution across from LACMA on Museum Row has been quietly championing the intersection of craft, design, and contemporary art since 1973. Where LACMA goes broad, Craft Contemporary goes deep — fiber arts, ceramics, woodworking, textiles, glass — always pushing the question of where craft ends and fine art begins. The building is modest. The exhibitions are not. A welcome counterpoint to the mega-museums next door and a reminder that human hands making things is its own kind of high art.","ys":1973,"tl":[{"y":"1973","x":"Founded as Craft and Folk Art Museum"},{"y":"2019","x":"Rebrands as Craft Contemporary"}],"tags":["Museum Row","Fiber Arts","Ceramics","Since 1973"],"rel":["lacma","marcianofoundation","amoeba","towerrec","atomicrecords"],"w":"Craft_Contemporary","s":"active"},{"id":"villagestudios","h":"westla","n":"The Village Studios","t":"Recording Studio","c":"music","lat":34.0452,"lng":-118.4515,"a":"1616 Butler Ave","i":"🎵","d":"A 1922 Masonic Temple on Butler Avenue in West LA that was converted into a recording studio in 1968 by Geordie Hormel — yes, of the Hormel chili dynasty. The original stained glass windows and secret passages remain. The Maharishi Mahesh Yogi used the building as his LA meditation center. Jim Morrison recorded his poetry here on his 27th birthday in 1970. Fleetwood Mac had Warner Bros. spend a million dollars rebuilding Studio D specifically for the Tusk sessions in 1979 — Stevie Nicks demanded a vocal booth that looked like a sunset in Tahiti. Steely Dan recorded Aja here. The Rolling Stones tracked Goats Head Soup. Over six decades: Bob Dylan, Lady Gaga, Coldplay, Dr. Dre, Snoop Dogg. One building, a thousand gold records.","ys":1968,"tl":[{"y":"1922","x":"Built as Masonic Temple"},{"y":"1968","x":"Geordie Hormel converts to recording studio"},{"y":"1970","x":"Jim Morrison records poetry on 27th birthday"},{"y":"1979","x":"Fleetwood Mac rebuilds Studio D for Tusk"},{"y":"1995","x":"Jeff Greenberg takes over, revitalizes complex"}],"tags":["Masonic Temple","Fleetwood Mac Tusk","Steely Dan Aja","Jim Morrison Poetry"],"rel":["sunsetsound","mccabes"],"w":"Village_Recorder","s":"active"},{"id":"sunsetsound","h":"hollywood","n":"Sunset Sound","t":"Recording Studio","c":"music","lat":34.0979,"lng":-118.3349,"a":"6650 Sunset Blvd","i":"🎵","d":"Created in 1958 by Tutti Camarata — Walt Disney's Director of Recording — from a former auto repair garage whose sloping floor turned out to be acoustically perfect for reducing standing wave reflections. Disney himself said he would rather be a client than a boss when Camarata proposed building it. For its first four years, the studio recorded Disney films exclusively: Mary Poppins, 101 Dalmatians, Bambi. Then rock and roll showed up. The Doors recorded nearly their entire catalog here. The Rolling Stones tracked Beggars Banquet and finished Exile on Main Street. Led Zeppelin mixed Led Zeppelin IV. Prince made Studio 3 his home base from 1981 to 1987, recording most of Purple Rain there. Over 200 gold records. The original echo chambers work. Independently owned by the Camarata family. The oldest independent studio in LA in original hands.","ys":1958,"tl":[{"y":"1958","x":"Tutti Camarata builds studio in former auto garage"},{"y":"1964","x":"Mary Poppins soundtrack recorded"},{"y":"1967","x":"The Doors record debut album"},{"y":"1972","x":"Rolling Stones finish Exile on Main Street"},{"y":"1984","x":"Prince records Purple Rain in Studio 3"}],"tags":["Doors Debut","Purple Rain","Exile on Main Street","Walt Disney","Original Echo Chambers"],"rel":["villagestudios","hollywoodbowl","capitol","towerrec"],"w":"Sunset_Sound_Recorders","s":"active"},{"id":"hollywoodbowl","h":"hollywood","n":"Hollywood Bowl","t":"Amphitheater","c":"music","lat":34.1119,"lng":-118.3371,"a":"2301 N Highland Ave","i":"🎶","d":"A natural amphitheater in the Hollywood Hills that has been the summer home of the Los Angeles Philharmonic since 1922 and the single most important outdoor music venue in America. The iconic band shell has been redesigned multiple times — most notably by Frank Lloyd Wright's son Lloyd Wright in 1928 and by Frank Gehry in 2004. Nearly 18,000 seats in concentric arcs rising up the hillside. The tradition is to bring wine and a picnic, spread a blanket on a bench, and watch the sun set behind the shell before the music starts. The Beatles played here in 1964. Jimi Hendrix played here. Billie Holiday sang here. Monty Python performed here. Every great musician has stood on that stage looking out at those hills. Summer in Los Angeles does not officially begin until the Bowl opens.","ys":1922,"tl":[{"y":"1922","x":"Opens as LA Philharmonic summer home"},{"y":"1928","x":"Lloyd Wright designs iconic shell"},{"y":"1964","x":"The Beatles perform"},{"y":"2004","x":"Frank Gehry redesigns shell"}],"tags":["LA Phil","Outdoor Concert","Picnic Tradition","Frank Gehry Shell"],"w":"Hollywood_Bowl","s":"active"},{"id":"titostacos","h":"culvercity","n":"Tito's Tacos","t":"Taco Stand","c":"food
