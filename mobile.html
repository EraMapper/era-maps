bot Kinney dredged these canals in 1905 and imported real gondoliers from Italy. Opening day drew 40,000 people. By the 1920s the water was stagnant; most canals were paved over in 1929. The six surviving canals fell into disrepair for decades until a 1992 restoration. Now they're lined with multimillion-dollar homes, arched footbridges, and ducks. The most surreal residential neighborhood in LA.","ys":1905,"tl":[{"y":"1905","x":"Kinney digs canals, imports gondoliers"},{"y":"1929","x":"Most canals paved over"},{"y":"1982","x":"National Register of Historic Places"},{"y":"1992","x":"Restored — now luxury housing"}],"tags":["Canals","Gondoliers","National Register","Kinney"],"rel":["boardwalk","veniceartwall","windward","cadillachotel","goldsgym","jeffho"],"w":"Venice_Canal_Historic_District","s":"active"},{"id":"musclebeach","h":"venice","n":"Muscle Beach Venice","t":"Outdoor Gym","c":"culture","lat":33.9852,"lng":-118.4727,"a":"1800 Ocean Front Walk","i":"💪","d":"The outdoor weight pen where Arnold Schwarzenegger, Franco Columbu, and Lou Ferrigno trained in the 1970s. Not to be confused with the original Santa Monica Muscle Beach (1930s gymnastics). This Venice version opened in 1963 and became the epicenter of bodybuilding culture. Joe Gold's gym was nearby. Pumping Iron (1977) was essentially a documentary about this exact spot.","ys":1963,"tl":[{"y":"1963","x":"Venice Muscle Beach opens"},{"y":"1975","x":"Arnold, Franco, Lou train here"},{"y":"1977","x":"Pumping Iron filmed here"}],"tags":["Bodybuilding","Arnold","Pumping Iron","Outdoor Gym"],"w":"Muscle_Beach","s":"active"},{"id":"jeffho","h":"venice","n":"Jeff Ho Surfboards & Zephyr","t":"Surf/Skate Shop","c":"shop","lat":34.0071,"lng":-118.4887,"a":"2011 Main St, Santa Monica","i":"🛹","d":"The shop where the Zephyr skateboard team was born — Jay Adams, Tony Alva, Stacy Peralta. Jeff Ho shaped surfboards and sponsored the Z-Boys, who invented modern skateboarding by riding empty swimming pools during the 1970s drought. The Lords of Dogtown movie and Dogtown and Z-Boys documentary tell the story. The original shop is long gone — the corner of Main and Bay Streets where it stood has been redeveloped. But this corner of Venice changed global youth culture forever.","ys":1971,"ye":1978,"tl":[{"y":"1971","x":"Jeff Ho Surfboards opens on Main St"},{"y":"1975","x":"Z-Boys team formed"},{"y":"1977","x":"Drought — pool skating invented"},{"y":"1978","x":"Original shop closes"}],"tags":["Z-Boys","Skateboarding","Dogtown","Tony Alva","Closed"],"rel":["boardwalk","musclebeach","goldsgym","skatepark","ripcityskates","windward"],"s":"closed"},{"id":"venicepost","h":"venice","n":"Venice Post Office","t":"New Deal Landmark","c":"culture","lat":33.9878,"lng":-118.4715,"a":"1601 Main St","i":"📮","d":"A 1939 New Deal building with a Edward Biberman mural showing Abbot Kinney surrounded by beachgoers, oil derricks, and a roller coaster — a miniature history of Venice on one wall. LACMA called it one of the best WPA murals in the country. The post office closed in 2012; producer Joel Silver bought it for $7.5 million.","ys":1939,"tl":[{"y":"1939","x":"Built — WPA/New Deal"},{"y":"1941","x":"Biberman mural painted"},{"y":"2012","x":"Post office closes"},{"y":"2013","x":"Joel Silver buys for $7.5M"}],"tags":["New Deal","WPA Mural","Kinney","Historic"],"rel":["windward","venicecanals","cadillachotel","venicewest","smallworld","boardwalk"],"w":"Venice_Post_Office","s":"active"},{"id":"windward","h":"venice","n":"Windward Circle & Colonnades","t":"Venice of America Remnant","c":"culture","lat":33.9884,"lng":-118.4712,"a":"Windward Ave & Main St","i":"🏛️","d":"The Venetian colonnades along Windward Avenue are the last surviving architectural remnants of Abbot Kinney's original 1905 Venice of America. The arched facades were designed by Felix Peano to evoke St. Mark's Square. Look closely at the column capitals — some faces are modeled after Kinney himself. Windward Circle was the original lagoon where the canals converged. Now a traffic roundabout.","ys":1905,"tl":[{"y":"1905","x":"Built as Venice of America centerpiece"},{"y":"1929","x":"Lagoon paved, canals filled"}],"tags":["Kinney","Venice of America","Colonnades","1905"],"rel":["boardwalk","venicecanals","venicepost","pop"],"w":"Venice,_Los_Angeles","s":"active"},{"id":"googlevenice","h":"venice","n":"Google / Snap Venice HQ","t":"Tech Campus","c":"culture","lat":33.9948,"lng":-118.4781,"a":"340 Main St","i":"🖥️","d":"When Google leased 100,000 sq ft in Venice in 2011, followed by Snapchat taking over multiple buildings on Market Street, Venice became \"Silicon Beach.\" Rents tripled. Artists who'd lived here for decades were priced out. The same cycle that happened to SoHo in New York, happening in real time on the boardwalk. The tech money didn't change Venice's weirdness — it just made it more expensive.","ys":2011,"tl":[{"y":"2011","x":"Google leases 100,000 sq ft"},{"y":"2013","x":"Snap HQ on Market Street"},{"y":"2018","x":"\"Silicon Beach\" peaks"}],"tags":["Silicon Beach","Google","Snap","Gentrification"],"s":"active"},{"id":"scandia","h":"sunset","n":"Scandia","t":"Scandinavian Restaurant","c":"food","lat":34.0905,"lng":-118.3891,"a":"9040 Sunset Blvd","i":"🗡️","d":"The Scandinavian power restaurant at Sunset and Doheny where Frank Sinatra kept a private office upstairs with his own shower. Five American presidents dined here. The signature dish was the Viking Sword — pork, chateaubriand, and turkey flambéed on an actual sword, carried aloft through the dining room. Warren Beatty and Natalie Wood were regulars. A 30,000-bottle wine cellar. Danish immigrants Ken and Teddy Hansen opened it in 1946 and made it the most prestigious restaurant on the Strip. Sold to the Petersens (Motor Trend magazine) in 1978. Closed 1989 when drug dealing outside drove away the old-money clientele. The building sat empty for 25 years. Demolished for a Marriott.","ys":1946,"ye":1989,"tl":[{"y":"1946","x":"Ken & Teddy Hansen open Scandia"},{"y":"1955","x":"Sinatra keeps private office upstairs"},{"y":"1978","x":"Sold to Petersens"},{"y":"1989","x":"Closes — drug dealing outside"},{"y":"2015","x":"Building demolished for hotel"}],"tags":["Sinatra","Viking Sword","Danish","Five Presidents","Demolished"],"rel":["chasens","spago","tailcock","bhhotel"],"s":"demolished"},{"id":"kelbos","h":"fairfax","n":"Kelbo's","t":"Tiki Restaurant","c":"food","lat":34.0744,"lng":-118.3615,"a":"101 N Fairfax Ave","i":"🌺","d":"Two Navy vets named Kelley and Bouck combined their names and opened a tiki restaurant on Pico in 1947 using recipes from their Hawaii deployment. This Fairfax location across from CBS Television City became a hangout for TV crew. Francis Ford Coppola was a dishwasher here before he was fired — his mind seemed elsewhere. Lucille Ball dropped the first coin in the wishing well. The Go-Go's threw a party here in 1981. Tiki decor by Eli Hedley, same designer as Don the Beachcomber. Every plate came with pineapple. The building became a strip club called Fantasy Island.","ys":1947,"ye":1994,"tl":[{"y":"1947","x":"Opens on Pico Blvd — Thomas Kelley & Jack Bouck"},{"y":"1950","x":"Fairfax location opens across from CBS"},{"y":"1963","x":"Coppola dishwashes, gets fired"},{"y":"1981","x":"Go-Go's throw a party"},{"y":"1994","x":"Last location closes"}],"tags":["Tiki","Coppola","Lucille Ball","Go-Gos","CBS"],"rel":["farmersmarket","canters","tikiti","donbeach","chasens","polo"],"s":"closed"},{"id":"lawrys","h":"bevhills","n":"Lawry's The Prime Rib","t":"Restaurant","c":"food","lat":34.0681,"lng":-118.3761,"a":"100 N La Cienega Blvd","i":"🥩","d":"Open since 1938 on Restaurant Row. Lawrence Frank wanted one restaurant that did one thing perfectly: prime rib carved tableside from silver carts. That's it. That's the menu. The spinning salad bowl, the Yorkshire pudding, the creamed corn, the silver service — nothing has changed in 87 years. Before every Rose Bowl game, both teams eat here on separate nights. It is the platonic ideal of a restaurant that refuses to evolve and is better for it.","ys":1938,"tl":[{"y":"1938","x":"Opens on Restaurant Row"},{"y":"1942","x":"Spinning salad bowl introduced"}],"tags":["Prime Rib","Restaurant Row","Rose Bowl","Silver Carts"],"w":"Lawry%27s_The_Prime_Rib","s":"active"},{"id":"littlejoes","h":"chinatown","n":"Little Joe's","t":"Italian Restaurant","c":"food","lat":34.0641,"lng":-118.237,"a":"900 N Broadway","i":"🍝","d":"The Italian restaurant in Chinatown's old Italian neighborhood. Before Chinatown moved north, this area was home to LA's Italian community, and Little Joe's was their canteen from 1927 to 1998. Red checkered tablecloths, spaghetti with meat sauce, and a neon sign that became a neighborhood icon. When it closed after 71 years, it took the last vestige of Italian LA with it. The building was demolished. The neon sign was saved — it's in a collection somewhere, glowing for no one.","ys":1927,"ye":1998,"tl":[{"y":"1927","x":"Opens in old Italian neighborhood"},{"y":"1955","x":"Neon sign becomes landmark"},{"y":"1998","x":"Closes after 71 years"},{"y":"2005","x":"Building demolished — sign saved"}],"tags":["Italian","Chinatown","Neon Sign","71 Years"],"rel":["grandcentral","philippes","coles","musso","pigwhistle","nickodell"],"s":"demolished"},{"id":"villacapri","h":"hollywood","n":"Villa Capri","t":"Italian Restaurant","c":"food","lat":34.1035,"lng":-118.3372,"a":"6735 Yucca St","i":"🍷","d":"Frank Sinatra's personal Italian restaurant. He ate here so often that he essentially had a private dining room. Patsy D'Amore (who also owned the original Patsy's pizza) ran the kitchen. James Dean ate his last dinner here on September 30, 1955, before driving to Salinas and dying in a car crash. The restaurant closed in the 1980s. A building on Yucca Street that hosted the last meal of an American icon.","ys":1950,"ye":1982,"tl":[{"y":"1950","x":"Patsy D'Amore opens on McCadden Place"},{"y":"1955","x":"James Dean eats his last dinner here"},{"y":"1982","x":"Closes"}],"tags":["Sinatra","James Dean","Last Meal","Italian"],"s":"closed"},{"id":"cassells","h":"ktown","n":"Cassell's Hamburgers","t":"Burger Joint","c":"food","lat":34.0635,"lng":-118.2937,"a":"3266 W 6th St","i":"🍔","d":"Al Cassell started grinding his own beef in 1948 in a tiny shop on 3rd Street, then moved to this Koreatown location. He ground the meat fresh every day and cooked each patty to order on a flat-top grill. No freezer. No microwave. The potato salad was homemade. The lemonade was real. Food critics called it the best hamburger in LA for 40 years straight. Closed in 2012, reopened inside the Hotel Normandie. The new version is good. The original was religion.","ys":1948,"tl":[{"y":"1948","x":"Al Cassell starts grinding beef"},{"y":"1965","x":"Critics: best burger in LA"},{"y":"2012","x":"Original location closes"},{"y":"2014","x":"Reopens in Hotel Normandie"}],"tags":["Best Burger","Hand Ground","No Freezer","Koreatown"],"rel":["originaltommys","applepan","shipscoffee","tikiti","donbeach","scandia"],"w":"Cassell%27s_Hamburgers","s":"active"},{"id":"tailcock","h":"bevhills","n":"Tail o' the Cock","t":"Restaurant & Bar","c":"food","lat":34.0595,"lng":-118.3763,"a":"477 S La Cienega Blvd","i":"🐓","d":"The deal-making restaurant of La Cienega's Restaurant Row, 1939-1985. Shelton McHenry's landmark where every entertainment lawyer, agent, and producer had lunch here. The bar was legendary — dark wood, strong drinks, the kind of place where careers were made and ended between appetizer and dessert. The name was delightfully suggestive and nobody acknowledged it. Closed 1987. The entertainment industry lost its unofficial commissary.","ys":1948,"ye":1985,"tl":[{"y":"1948","x":"Opens on La Cienega"},{"y":"1965","x":"Entertainment industry HQ"},{"y":"1987","x":"Closes"}],"tags":["Deal-Making","Entertainment","La Cienega","Power Lunch"],"s":"closed"},{"id":"papoos","h":"hollywood","n":"Papoo's Hot Dog Show","t":"Hot Dog Stand","c":"food","lat":34.1018,"lng":-118.3154,"a":"5773 Hollywood Blvd","i":"🌭","d":"A hot dog stand in a tiny space on Hollywood Blvd where the walls were covered in celebrity headshots and bizarre memorabilia. The owner, Papoo, was a character — an Armenian immigrant who held court like a philosopher king while serving chili dogs. The place was a dump and that was the point. Closed when Papoo died. You can't franchise a personality.","ys":1975,"ye":2005,"tl":[{"y":"1975","x":"Opens on Hollywood Blvd"},{"y":"2005","x":"Closes when Papoo dies"}],"tags":["Hot Dogs","Character","Hollywood Blvd","One of a Kind"],"rel":["musso","grandcentral","ontra","papoos"],"s":"closed"},{"id":"ontra","h":"hollywood","n":"Ontra Cafeteria","t":"Cafeteria","c":"food","lat":34.1014,"lng":-118.3267,"a":"1719 N Vine St","i":"🍽️","d":"The cheapest meal in Hollywood from the 1920s through the 1980s. Cafeteria-style, no frills, but the food was decent and the price was right. Struggling actors, musicians, and writers who couldn't afford Musso & Frank ate at Ontra. It was the anti-glamour of Hollywood — a fluorescent-lit room full of people who hadn't made it yet. Some of them eventually did.","ys":1927,"ye":1988,"tl":[{"y":"1927","x":"Opens on Vine Street"},{"y":"1988","x":"Closes after six decades"}],"tags":["Cafeteria","Cheap","Struggling Actors","Anti-Glamour"],"s":"closed"},{"id":"bullocksbway","h":"downtown","n":"Bullock's (Broadway)","t":"Department Store","c":"shop","lat":34.0449,"lng":-118.2523,"a":"639 S Broadway","i":"🏬","d":"The flagship that defined LA retail. John G. Bullock opened this store in 1907 at 7th and Broadway and it grew into a behemoth — swallowing adjacent buildings until it covered the entire block to Hill Street, 860,000 square feet of retail space. By 1920, Bullock's and Robinson's together had turned this intersection into the most important shopping corridor west of Chicago. Closed 1983 as downtown retail collapsed. Now the Saint Vincent Jewelry Center — 500 jewelers in the carcass of a department store.","ys":1907,"ye":1983,"tl":[{"y":"1907","x":"Opens at 7th & Broadway"},{"y":"1912","x":"Expands — doubles in size"},{"y":"1934","x":"860,000 sq ft — fills entire block"},{"y":"1983","x":"Closes — becomes jewelry center"}],"tags":["Department Store","Broadway","Parkinson","Jewelry Center"],"rel":["broadwaydtla","jwrobinsons","desmondsdtla","barkerbros","peoplesdept"],"w":"Bullock%27s","s":"closed"},{"id":"bullockswilshire","h":"ktown","n":"Bullocks Wilshire","t":"Art Deco Department Store","c":"shop","lat":34.0614,"lng":-118.2885,"a":"3050 Wilshire Blvd","i":"🏛️","d":"The most beautiful department store ever built in America. Opened 1929, designed by John and Donald Parkinson in full Art Deco glory — a 241-foot copper tower, marble walls, elevator doors in brass and gunmetal, a painted glass ceiling in the Tea Room. The first LA store designed for car culture: the fanciest entrance was in back, near the parking lot. Mae West, Clark Gable, Walt Disney shopped here. Angela Lansbury worked as a clerk. During the 1992 riots, looters smashed every display case on the first floor — but the elevators had been shut off and the building had no escalators, saving the upper floors. Now Southwestern Law School, restored at $29 million.","ys":1929,"ye":1993,"tl":[{"y":"1929","x":"Opens — Art Deco masterpiece"},{"y":"1932","x":"Mae West, Gable, Disney shop here"},{"y":"1978","x":"Added to National Register"},{"y":"1992","x":"Damaged in riots — looters smash first floor"},{"y":"1993","x":"Closes"},{"y":"1997","x":"Southwestern Law School opens library"}],"tags":["Art Deco","Parkinson","Riots","Law School","National Register"],"rel":["bullocksbway","imagnin","saksbh","mayco","easterncolumbia"],"w":"Bullocks_Wilshire","s":"closed"},{"id":"easterncolumbia","h":"downtown","n":"Eastern Columbia Building","t":"Art Deco Department Store","c":"shop","lat":34.0427,"lng":-118.2559,"a":"849 S Broadway","i":"🏢","d":"The turquoise jewel of Broadway. Designed by Claud Beelman, opened 1930 — thirteen stories of glossy turquoise terra cotta with gold leaf accents and a four-sided clock tower that was exempted from LA's 150-foot height limit. Polish immigrant Adolph Sieroty started with a clock shop in 1892 and built it into this. The radio jingle \"Eastern Columbia, Broadway at Ninth\" was so catchy that Jack Benny parodied it. Johnny Depp bought five penthouses here after it became condos in 2006. The clocks work.","ys":1930,"tl":[{"y":"1930","x":"Opens — turquoise Art Deco landmark"},{"y":"1946","x":"Jack Benny parodies the jingle"},{"y":"1957","x":"Department store closes"},{"y":"1985","x":"Designated Historic-Cultural Monument"},{"y":"2006","x":"Converted to 147 condos — Johnny Depp buys 5"}],"tags":["Art Deco","Turquoise","Clock Tower","Johnny Depp","Condos"],"rel":["bradbury","eastern","latower","latheater","bullockswilshire","bullocksbway"],"w":"Eastern_Columbia_Building","s":"active"},{"id":"broadwaydtla","h":"downtown","n":"The Broadway (Department Store)","t":"Department Store","c":"shop","lat":34.0493,"lng":-118.2497,"a":"401 S Broadway","i":"🏬","d":"Arthur Letts opened The Broadway in 1896 and it became the anchor of the Broadway shopping district. By 1934, it occupied most of the block between 6th, 7th, Broadway, and Hill — 806,000 square feet. Letts also financed Bullock's, making him the godfather of LA retail. The Broadway eventually grew to 82 stores in the southwestern US. All converted to Macy's in 1996. The DTLA flagship building survives as mixed-use retail.","ys":1896,"ye":1996,"tl":[{"y":"1896","x":"Arthur Letts opens The Broadway"},{"y":"1934","x":"806,000 sq ft — dominates the block"},{"y":"1996","x":"All 82 stores become Macy's"}],"tags":["Arthur Letts","Department Store","Broadway District","Macy's"],"s":"closed"},{"id":"jwrobinsons","h":"downtown","n":"J.W. Robinson's","t":"Department Store","c":"shop","lat":34.0462,"lng":-118.2587,"a":"600 W 7th St","i":"🏬","d":"Joseph Winchester Robinson opened his store in 1883 on Spring Street, making it one of the oldest department stores in LA. It moved to 7th and Grand in 1915 and became the upscale counterpart to Bullock's — where old money shopped. Robinson's eventually merged with May Company to become Robinsons-May, then was absorbed into Macy's. The downtown building was incorporated into the 7th Market Place (now FIGat7th). Five corporate mergers to erase 113 years of identity.","ys":1883,"ye":2006,"tl":[{"y":"1883","x":"Opens on Spring Street"},{"y":"1915","x":"Moves to 7th and Grand"},{"y":"1993","x":"Merges with May Company"},{"y":"2006","x":"All stores become Macy's"}],"tags":["Oldest","Spring Street","7th Street","Macy's"],"rel":["bullocksbway","broadwaydtla","desmondsdtla","imagnin"],"s":"closed"},{"id":"hamburgers","h":"downtown","n":"Hamburger's Department Store","t":"Department Store","c":"shop","lat":34.0435,"lng":-118.2553,"a":"801 S Broadway","i":"🏬","d":"David and Asher Hamburger opened their store in 1881 on Main Street. By 1908 they'd built a massive new building at 8th and Broadway with thirteen acres of floor space — the largest department store west of Chicago. The 1916 ads bragged about its size. In 1923, May Company bought Hamburger's and kept the Broadway location as its LA flagship. The building stands. If your surname is Hamburger and you're in the department store business, you own your destiny.","ys":1881,"ye":1923,"tl":[{"y":"1881","x":"Opens on Main Street"},{"y":"1908","x":"New building — 13 acres of floor space"},{"y":"1923","x":"Bought by May Company"}],"tags":["Hamburger","May Company","Largest","Broadway"],"w":"May_Company_(Los_Angeles)","s":"closed"},{"id":"desmondsdtla","h":"downtown","n":"Desmond's","t":"Clothing Store","c":"shop","lat":34.0466,"lng":-118.2528,"a":"615 S Broadway","i":"👔","d":"One of LA's premier menswear stores, founded in 1862 as a hat shop by Irish immigrant Daniel Desmond — making it older than the city's incorporation. The gorgeous Art Deco building at 616 S. Broadway (1924) is a downtown architectural gem that survived because it was too beautiful to tear down. Desmond's grew to 19 branch stores across Southern California before the chain collapsed in 1981 as downtown retail died. The building was renovated in 2019 for mixed use and became a Historic-Cultural Monument in 2020.","ys":1862,"ye":1981,"tl":[{"y":"1862","x":"Daniel Desmond opens hat shop on LA Plaza"},{"y":"1924","x":"Art Deco flagship opens on Broadway"},{"y":"1927","x":"Expands to branch stores across LA"},{"y":"1981","x":"Chain closes after 119 years"}],"tags":["Oldest Business","Art Deco","Menswear","Broadway"],"rel":["bullocksbway","broadwaydtla","jwrobinsons","barkerbros","peoplesdept"],"s":"closed"},{"id":"barkerbros","h":"downtown","n":"Barker Bros.","t":"Furniture Store","c":"shop","lat":34.0488,"lng":-118.2594,"a":"818 W 7th St","i":"🛋️","d":"The furniture store that furnished Los Angeles. Founded in the 1880s, Barker Bros. at 7th and Flower was where you went to outfit your new California bungalow, your mid-century modern ranch house, your 1970s condo. Four generations of Angelenos bought their first couch here. The downtown flagship closed in 1984. The building was incorporated into Citicorp Plaza, now FIGat7th. An entire century of LA domestic life, sold from one address.","ys":1926,"ye":1984,"tl":[{"y":"1888","x":"Founded"},{"y":"1926","x":"7th and Flower flagship opens"},{"y":"1984","x":"Downtown flagship closes"}],"tags":["Furniture","7th Street","Four Generations"],"s":"closed"},{"id":"peoplesdept","h":"downtown","n":"People's Department Store","t":"Department Store","c":"shop","lat":34.0417,"lng":-118.2568,"a":"949 S Broadway","i":"🏬","d":"The department store for working-class and immigrant families when Bullock's and Robinson's priced them out. Located on the south end of Broadway where rents were cheaper and the shoppers were Mexican-American, African-American, and working-class white. When the upscale stores fled downtown for the suburbs, Broadway south of 7th became a thriving Latino retail corridor. People's was one of the anchors. The building later became a retail center serving the same community (exact closing date unknown).","ys":1947,"ye":1985,"tl":[{"y":"1947","x":"Serves working-class downtown shoppers"},{"y":"1975","x":"Broadway becomes Latino retail corridor"}],"tags":["Working Class","Latino","Broadway","Immigrant"],"rel":["bullocksbway","broadwaydtla","barkerbros","desmondsdtla","grandcentral","pantry"],"s":"closed"},{"id":"cliftons","h":"downtown","n":"Clifton's Republic","t":"Cafeteria & Fantasia","c":"food","lat":34.0454,"lng":-118.2529,"a":"648 S Broadway","i":"🌲","d":"Clifford Clinton's Depression-era cafeteria with a pay-what-you-can policy — the sign read \"Dine Free Unless Delighted.\" The interior is a fantasy forest with fake redwood trees, a waterfall, stuffed animals, and a chapel. During the Depression, it fed up to 15,000 people a day. Clinton was also an anti-corruption crusader who helped take down the LAPD's corrupt mayor. Closed 2011, reopened 2015 after a $10M restoration. The trees, the waterfall, the weirdness — all survived.","ys":1935,"tl":[{"y":"1935","x":"Opens — \"Dine Free Unless Delighted\""},{"y":"1935","x":"Feeds 15,000/day during Depression"},{"y":"2011","x":"Closes for renovation"},{"y":"2015","x":"Reopens — $10M restoration"}],"tags":["Depression","Pay What You Can","Fantasy Forest","Waterfall"],"w":"Clifton%27s","s":"active"},{"id":"themasque","h":"hollywood","n":"The Masque","t":"Punk Club","c":"music","lat":34.1007,"lng":-118.335,"a":"1655 N Cherokee Ave","i":"🎸","d":"The birthplace of LA punk. In 1977, Scottish immigrant Brendan Mullen found 10,000 square feet of basement under the Pussycat porn theater for $850/month. Within weeks, X, the Germs, the Weirdos, and the Go-Go's were playing to crowds of true outsiders. A stairway led nowhere — up into the ceiling of the theater above. The fire marshal shut it down after five months. The benefit concerts to save it turned into riots. Flea wrote a two-page memorial when Mullen died. The Red Hot Chili Peppers named a song after him.","ys":1977,"ye":1978,"tl":[{"y":"1977","x":"Mullen opens basement club"},{"y":"1977","x":"First show Aug 18 — Weirdos headline"},{"y":"1978","x":"Fire marshal shuts it down"},{"y":"1978","x":"Benefit concerts turn into riots"},{"y":"2009","x":"Mullen dies — Flea writes tribute"}],"tags":["Punk","X","Germs","Go-Gos","Flea","Brendan Mullen"],"rel":["alsbar","cathaydg","rajis","okidog","masque","hongkongcafe"],"w":"The_Masque","s":"closed"},{"id":"cathaydg","h":"hollywood","n":"Cathay de Grande","t":"Punk Venue","c":"music","lat":34.1,"lng":-118.3249,"a":"1600 N Argyle Ave","i":"🎤","d":"The Hollywood punk and deathrock club where Christian Death, 45 Grave, and TSOL defined the dark side of the LA scene. A Chinese restaurant-turned-nightclub that smelled like egg rolls and sweat. The stage was tiny, the ceiling was low, and the crowd was feral. Closed in 1985 after problems with neighbors and police. For a few years in the early '80s, this was the darkest room in LA.","ys":1980,"ye":1985,"tl":[{"y":"1980","x":"Opens as punk venue"},{"y":"1981","x":"Christian Death, 45 Grave era"},{"y":"1985","x":"Closes — farewell show by Circle Jerks"}],"tags":["Punk","Deathrock","Christian Death","TSOL"],"s":"closed"},{"id":"hollywoodforever","h":"hollywood","n":"Hollywood Forever Cemetery","t":"Cemetery & Cultural Venue","c":"culture","lat":34.0892,"lng":-118.319,"a":"6000 Santa Monica Blvd","i":"🪦","d":"Founded in 1899 as Hollywood Memorial Park. Rudolph Valentino is here. So are Dee Dee Ramone, Johnny Ramone, Jayne Mansfield, Mel Blanc (his headstone says \"That's All Folks\"). In 2002 it started showing movies projected on the mausoleum wall — thousands of people on blankets watching films in a graveyard. Dia de los Muertos celebrations draw 30,000+. The dead and the living share the space without awkwardness.","ys":1899,"tl":[{"y":"1899","x":"Founded as Hollywood Memorial"},{"y":"1926","x":"Valentino buried — 100,000 mourners"},{"y":"2002","x":"Cinespia movie screenings begin"}],"tags":["Cemetery","Valentino","Ramones","Cinespia","Dia de los Muertos"],"rel":["walkfame","chinese","paramount","griffith","musso","schwabs"],"w":"Hollywood_Forever_Cemetery","s":"active"},{"id":"ccbrowns","h":"hollywood","n":"C.C. Brown's","t":"Ice Cream Parlor","c":"food","lat":34.1018,"lng":-118.342,"a":"7007 Hollywood Blvd","i":"🍨","d":"The ice cream parlor that invented the hot fudge sundae in 1906. For 90 years it was a Hollywood Blvd institution — the fudge recipe never changed, the booths were original. Stars came in after premieres at the Chinese Theatre down the street. Closed in 1996 when the lease wasn't renewed. The hot fudge recipe supposedly died with the last owner. Ninety years of history, gone for a rent increase.","ys":1906,"ye":1996,"tl":[{"y":"1906","x":"Opens — invents hot fudge sundae"},{"y":"1929","x":"Moves to Hollywood Blvd"},{"y":"1996","x":"Closes after 90 years"}],"tags":["Ice Cream","Hot Fudge Sundae","Inventor","Hollywood Blvd"],"s":"closed"},{"id":"donbeach","h":"hollywood","n":"Don the Beachcomber","t":"Tiki Bar (Original)","c":"nightlife","lat":34.102,"lng":-118.338,"a":"1722 N McCadden Pl","i":"🍹","d":"Ernest Gantt opened this in 1933 and invented the tiki bar. He legally changed his name to Donn Beach. He created the Zombie cocktail and limited customers to two because people kept falling down. The bar had fake rain on the roof, bamboo walls, and ship lanterns. It spawned Trader Vic's and every tiki bar that followed. The original location is long gone but the concept conquered the world.","ys":1933,"ye":1985,"tl":[{"y":"1933","x":"Opens — invents the tiki bar concept"},{"y":"1934","x":"Creates the Zombie cocktail"},{"y":"1942","x":"Spawns worldwide tiki movement"},{"y":"1985","x":"Original location closes"}],"tags":["Tiki","Zombie Cocktail","Inventor","First"],"rel":["tikiti","kelbos","tailcock","yamashiro","amoeba","towerrec"],"w":"Don_the_Beachcomber","s":"closed"},{"id":"amoebarec","h":"hollywood","n":"Amoeba Music","t":"Record Store","c":"shop","lat":34.1012,"lng":-118.3248,"a":"6200 Hollywood Blvd","i":"💿","d":"The largest independent record store in the world. When it opened in 2001 in the old Bowling Center, it was already an anachronism — a 43,000 sq ft temple to physical music in the age of Napster. It survived by being too essential to die. Secret in-store performances by everyone from Paul McCartney to Metallica. In 2021 it moved to the new building at 6200 Hollywood. Independent. Enormous. Alive.","ys":2001,"tl":[{"y":"2001","x":"Opens in old bowling alley — 43,000 sq ft"},{"y":"2005","x":"Secret shows: McCartney, Metallica"},{"y":"2021","x":"Moves to new Hollywood location"}],"tags":["Records","Independent","Largest","Surviving"],"w":"Amoeba_Music","s":"active"},{"id":"hollywoodstarlanes","h":"hollywood","n":"Hollywood Star Lanes","t":"Bowling Alley","c":"culture","lat":34.0909,"lng":-118.3037,"a":"5227 Santa Monica Blvd","i":"🎳","d":"The bowling alley where they filmed The Big Lebowski. The Dude abides here — or he did until 2002 when it was demolished for a school. Built in 1960, it was a 32-lane mid-century beauty. In the movie, Jeff Bridges, John Goodman, and Steve Buscemi rolled here while discussing nihilism. Fans made pilgrimages. Then it was gone. The Dude would not approve.","ys":1960,"ye":2002,"tl":[{"y":"1960","x":"Opens — 32 lanes"},{"y":"1997","x":"Big Lebowski filmed here"},{"y":"2002","x":"Demolished for school"}],"tags":["Big Lebowski","Bowling","Demolished","Coen Brothers"],"rel":["schwabs","pigwhistle","cinerama","picwoodbowl","burgundyroom","threeclubs"],"s":"demolished"},{"id":"jumbos","h":"hollywood","n":"Jumbo's Clown Room","t":"Dive Bar & Burlesque","c":"music","lat":34.102,"lng":-118.3024,"a":"5153 Hollywood Blvd","i":"🤡","d":"A bikini bar on the wrong end of Hollywood Blvd since 1970. Courtney Love danced here before Hole. So did other future stars who needed rent money. The neon clown sign is iconic. The dancers choose their own music — you might see a woman pole dancing to Radiohead. It's not a strip club. It's a dive bar where people happen to dance on the bar. The distinction matters to the regulars.","ys":1970,"tl":[{"y":"1970","x":"Opens as dive bar"},{"y":"1985","x":"Courtney Love dances here"}],"tags":["Burlesque","Courtney Love","Dive Bar","Neon"],"w":"Jumbo%27s_Clown_Room","s":"active"},{"id":"goodtimes","h":"hollywood","n":"Good Times at Davey Wayne's","t":"70s Bar","c":"nightlife","lat":34.1003,"lng":-118.324,"a":"1611 N El Centro Ave","i":"🕺","d":"You enter through a refrigerator door in what looks like a suburban garage. Inside: a 1970s fever dream with shag carpet, wood paneling, and a backyard with astroturf. Opened in 2014. The kind of bar that could only exist in LA — a theme park for drinking, and somehow it works.","ys":2014,"tl":[{"y":"2014","x":"Opens — enter through refrigerator"}],"tags":["70s","Theme Bar","Hidden Entrance"],"rel":["threeclubs","harvardstone","jumbos","boardners","frolicroom"],"s":"active"},{"id":"burgundyroom","h":"hollywood","n":"Burgundy Room","t":"Dive Bar","c":"nightlife","lat":34.0945,"lng":-118.3289,"a":"1621½ N Cahuenga Blvd","i":"🍷","d":"The last real dive bar in central Hollywood. Red lighting, cheap drinks, no pretension. While every other bar on Cahuenga went upscale, Burgundy Room refused. It's the bar you end up at after everywhere else disappoints you. Open since 1919, making it one of the oldest bars in Hollywood.","ys":1919,"tl":[{"y":"1919","x":"Opens during Prohibition"}],"tags":["Dive Bar","Oldest","Red Light","No Pretension"],"s":"active"},{"id":"nickodell","h":"hollywood","n":"Nickodell","t":"Restaurant & Bar","c":"food","lat":34.0836,"lng":-118.3204,"a":"5511 Melrose Ave","i":"🍸","d":"The restaurant bar directly across from the Paramount Studios gate. From the 1930s through the 1980s, every writer, director, and producer at Paramount drank here after work. The bar was so close to the lot that runners would come fetch people mid-drink when they were needed on set. Billy Wilder was a regular. Closed 1993. Now a bank.","ys":1934,"ye":1993,"tl":[{"y":"1934","x":"Opens across from Paramount"},{"y":"1955","x":"Billy Wilder era"},{"y":"1993","x":"Closes — becomes a bank"}],"tags":["Paramount","Billy Wilder","Old Hollywood","Demolished"],"rel":["musso","micelis","paramount","pigwhistle","ccbrowns","columbiadrug"],"s":"demolished"},{"id":"schwabs","h":"sunset","n":"Schwab's Pharmacy","t":"Drugstore & Legend","c":"shop","lat":34.0978,"lng":-118.364,"a":"8024 Sunset Blvd","i":"💊","d":"The most famous drugstore in America. Legend says Lana Turner was discovered at the soda fountain — she wasn't, but the myth was better than reality and nobody corrected it for 50 years. Writers cashed checks here. Actors waited for phone calls. F. Scott Fitzgerald had a heart attack buying cigarettes here in 1940. Demolished 1988 for a strip mall. Hollywood ate itself.","ys":1932,"ye":1983,"tl":[{"y":"1932","x":"Opens on Sunset Blvd"},{"y":"1937","x":"Lana Turner \"discovered\" legend begins"},{"y":"1940","x":"F. Scott Fitzgerald heart attack"},{"y":"1983","x":"Closes"},{"y":"1988","x":"Building demolished for strip mall"}],"tags":["Lana Turner","F. Scott Fitzgerald","Legend","Demolished"],"w":"Schwab%27s_Pharmacy","s":"demolished"},{"id":"headlinerec","h":"hollywood","n":"Headline Records","t":"Punk Record Shop","c":"shop","lat":34.0836,"lng":-118.3576,"a":"7706 Melrose Ave","i":"💿","d":"The punk and hardcore record store on Melrose since 1990. If Amoeba is the museum, Headline is the church. Specializing in punk, metal, hardcore, and everything the mainstream ignores. The kind of store where the guy behind the counter knows more about music than your favorite critic.","ys":1990,"tl":[{"y":"1990","x":"Opens on Melrose"}],"tags":["Punk","Records","Independent","Melrose"],"rel":["amoeba","towerrec","amoebarec","blackcat","boardners"],"s":"active"},{"id":"smogcutter","h":"hollywood","n":"Smog Cutter","t":"Karaoke Dive","c":"nightlife","lat":34.0871,"lng":-118.2868,"a":"864 N Virgil Ave","i":"🎤","d":"A karaoke dive on Virgil in East Hollywood where the regulars sang like they were auditioning for their lives. The crowd was a cross-section of the neighborhood: Filipino families, Silver Lake hipsters, old-timers who had been coming since the 70s. The karaoke was dead serious — no ironic performances tolerated. Cheap beer, sticky floors, a stage with a disco ball. Closed in 2017, mourned by everyone who ever sang there badly and meant it.","ys":1940,"ye":2017,"tl":[{"y":"1940","x":"Opens on Virgil Ave"},{"y":"2005","x":"Becomes beloved karaoke institution"},{"y":"2017","x":"Closes"}],"tags":["Karaoke","Dive Bar","Cash Only","East Hollywood"],"s":"closed"},{"id":"teaszer","h":"sunset","n":"Coconut Teaszer","t":"Rock Club","c":"music","lat":34.0979,"lng":-118.3643,"a":"8117 Sunset Blvd","i":"🥥","d":"Started as Harry's Open Pit BBQ. Len Fagan added live music in 1987 and renamed it. It became the club where unsigned bands got their break — Green Day, Weezer, Rage Against the Machine, Tool, Hole, Stone Temple Pilots all played early shows here. Heidi Fleiss ran her call girl operation from the bar. Painted purple for a band promo and it stayed that way for years. No pay-to-play. Len Fagan just cared about music. He died of COVID in 2020.","ys":1987,"ye":2003,"tl":[{"y":"1987","x":"Len Fagan opens Coconut Teaszer"},{"y":"1991","x":"Green Day first LA showcase"},{"y":"1993","x":"Weezer weekly residency"},{"y":"2003","x":"Closes"},{"y":"2020","x":"Len Fagan dies of COVID"}],"tags":["Green Day","Weezer","Rage Against the Machine","Len Fagan"],"rel":["whisky","roxy","gazarri","keyclub","safarisams","teaszer"],"w":"Coconut_Teaszer","s":"closed"},{"id":"keyclub","h":"sunset","n":"The Key Club","t":"Rock Club","c":"music","lat":34.0909,"lng":-118.389,"a":"9039 Sunset Blvd","i":"🔑","d":"Built on the site of Gazzarri's after the Northridge earthquake wrecked the original building in 1994. Billboard Live opened the new 650-capacity multi-level venue in 1996; it was rechristened the Key Club in 1998. Three floors, tall stage viewable from above and below, rooftop bar. Continued the Strip's live music tradition through the 2000s. Final show March 14, 2013. The space became 1 OAK (velvet-rope dance club), then reopened as Keys in 2024. The Strip's transition from guitars to bottle service, summarized in one address.","ys":1998,"ye":2013,"tl":[{"y":"1996","x":"Billboard Live opens on former Gazzarri's site"},{"y":"1998","x":"Becomes The Key Club"},{"y":"2013","x":"Final show March 14 — becomes 1 OAK"}],"tags":["Gazzarris","Van Halen","Strip","Nightclub"],"s":"transformed","prev":"gazarri"},{"id":"towerrec","h":"sunset","n":"Tower Records","t":"Record Store","c":"shop","lat":34.091,"lng":-118.3836,"a":"8801 Sunset Blvd","i":"📀","d":"The Sunset Strip Tower Records was the most famous record store in the world. Two stories, open until midnight. Elton John spent $25,000 in a single visit. Every album release party happened here. The parking lot was a scene. It closed in 2006 when Tower went bankrupt nationwide, and the building sat empty like a tombstone. A Gibson guitar showroom opened in the space. It wasn't the same. Nothing could be.","ys":1971,"ye":2006,"tl":[{"y":"1971","x":"Opens on Sunset"},{"y":"1985","x":"Elton John drops $25K in one visit"},{"y":"2006","x":"Closes — Tower goes bankrupt"}],"tags":["Records","Elton John","Sunset","Bankrupt"],"rel":["tower","amoeba","amoebarec","rhino","capitol"],"w":"Tower_Records","s":"closed"},{"id":"disco9000","h":"sunset","n":"Disco 9000","t":"Disco Club","c":"music","lat":34.09,"lng":-118.389,"a":"9000 Sunset Blvd","i":"🪩","d":"The 1977 blaxploitation film Disco 9000 was set here — a Black-owned club at 9000 Sunset where owner Fass Black refused to play the mob's records. The movie captured a real cultural moment: funk, soul, and early disco pushing into a boulevard dominated by white rock clubs. Whether a real club called Disco 9000 operated at this exact address is unclear, but the film is a time capsule of Black LA nightlife claiming space on the Strip.","ys":1976,"ye":1977,"tl":[{"y":"1976","x":"Disco 9000 film directed by D. Urville Martin"},{"y":"1977","x":"Film released — captures Black disco on Sunset"}],"tags":["Disco","Black LA","Sunset Strip","Funk","Film Location"],"s":"closed"},{"id":"hamburgerhamlet","h":"sunset","n":"Hamburger Hamlet","t":"Restaurant","c":"food","lat":34.0903,"lng":-118.392,"a":"9201 Sunset Blvd","i":"🍔","d":"The upscale burger chain that started on Sunset in 1950. Liza Minnelli loved the lobster bisque. Deal-making happened in the leather booths. It was a burger restaurant where people dressed up — only in LA. At its peak there were 24 locations. All gone now. The last one closed in 2012.","ys":1950,"ye":2012,"tl":[{"y":"1950","x":"Opens on Sunset Blvd"},{"y":"1965","x":"Expands to 24 locations"},{"y":"2012","x":"Last location closes"}],"tags":["Burgers","Liza Minnelli","Old Hollywood","Chain"],"rel":["benfranks","canters","scandia","carneys","coles","pantry"],"s":"closed"},{"id":"philippes","h":"downtown","n":"Philippe's The Original","t":"Deli","c":"food","lat":34.0588,"lng":-118.236,"a":"1001 N Alameda St","i":"🥖","d":"Claims to have invented the French Dip sandwich in 1918 when Philippe Mathieu accidentally dropped a roll in au jus. Cole's downtown disputes this. Both are lying and both are right — it doesn't matter. Philippe's has been at this location since 1951, serving 10-cent coffee, sawdust floors, and communal tables. The lamb dip is the correct order. Do not ask for turkey.","ys":1908,"tl":[{"y":"1908","x":"Philippe Mathieu opens deli"},{"y":"1918","x":"French Dip \"invented\" (or was it Cole's?)"},{"y":"1951","x":"Moves to current Alameda location"}],"tags":["French Dip","Invented","Sawdust Floors","Oldest"],"w":"Philippe%27s","s":"active"},{"id":"thesmell","h":"downtown","n":"The Smell","t":"All-Ages Venue","c":"music","lat":34.0504,"lng":-118.2452,"a":"247 S Main St","i":"🎵","d":"A volunteer-run, all-ages, no-alcohol, no-bouncers DIY venue in downtown LA since 1998. No Smoking. No Drinking. No Drugs. Just music. Bands like No Age, HEALTH, Abe Vigoda, and Mika Miko came up here. It survived because it costs almost nothing to run. The BYOV (bring your own venue) ethos made it a safe space for kids who couldn't get into bars. Admission runs $5 to $15.","ys":1998,"tl":[{"y":"1998","x":"Opens — all-ages, volunteer-run"},{"y":"2006","x":"No Age, HEALTH, Mika Miko scene"}],"tags":["DIY","All-Ages","No Age","Punk"],"w":"The_Smell","s":"active"},{"id":"olympicaud","h":"downtown","n":"Olympic Auditorium","t":"Boxing & Wrestling Arena","c":"culture","lat":34.0342,"lng":-118.268,"a":"1801 S Grand Ave","i":"🥊","d":"Built for the 1932 Olympics, it became LA's premier boxing and wrestling arena. Joe Louis fought here. So did Muhammad Ali. Mexican lucha libre packed the house on Fridays. Roller derby on Saturdays. Punk shows in the '80s — Black Flag, Circle Jerks, Social Distortion played the ring. The building that hosted everything LA's polite society didn't want to see. Closed 2005. Now a megachurch.","ys":1925,"ye":2005,"tl":[{"y":"1925","x":"Opens for 1932 Olympics prep"},{"y":"1937","x":"Joe Louis era"},{"y":"1965","x":"Lucha libre Fridays"},{"y":"1983","x":"Black Flag, punk in the ring"},{"y":"2005","x":"Closes — becomes church"}],"tags":["Boxing","Lucha Libre","Punk","Olympics","Ali"],"w":"Olympic_Auditorium_(Los_Angeles)","s":"closed"},{"id":"montybar","h":"downtown","n":"Monty Bar","t":"Dive Bar","c":"nightlife","lat":34.0516,"lng":-118.2668,"a":"1222 W 7th St","i":"🍺","d":"A spacious dive in a century-old building at 7th and Lucas that opened in 2011. The interior looks like it hasn't been touched since the building went up — dark wood, high ceilings, booths that go on forever. Cheap drinks, DJ nights ranging from reggae to Abba, and a vibe that's unpretentious in a part of downtown that's rough around the edges. The bar top was reportedly driven down in pieces from San Francisco, bought on Craigslist.","ys":2011,"tl":[{"y":"2011","x":"Opens on 7th St"}],"tags":["Dive Bar","Cheap Drinks","DTLA"],"rel":["chapmanmarket","elcapitan","visiontheatre","alsbar","moroccanlounge","echo"],"s":"active"},{"id":"casitadel","h":"silverlake","n":"Casita del Campo","t":"Mexican Restaurant & Cabaret","c":"food","lat":34.0975,"lng":-118.2751,"a":"1920 Hyperion Ave","i":"💃","d":"Opened in 1962 by Rudy del Campo, a dancer who played one of the Sharks in West Side Story and used his film money to buy a small pink house on Hyperion. Became a safe haven for Hollywood's closeted stars — Rock Hudson drank in curtained booths here. Upstairs: families eating enchiladas and drinking enormous margaritas under a giant rubber tree. Downstairs: the Cavern Club, a drag cabaret running since 1994. The del Campo family runs it to this day.","ys":1962,"tl":[{"y":"1962","x":"Opens as Mexican restaurant"},{"y":"1994","x":"Cavern Club drag cabaret opens in basement"},{"y":"2022","x":"Celebrates 60th anniversary"}],"tags":["Mexican","Drag","Cavern Club","Dual Identity"],"s":"active"},{"id":"bigfootlodge","h":"atwater","n":"Bigfoot Lodge","t":"Cabin Bar","c":"nightlife","lat":34.1236,"lng":-118.2679,"a":"3172 Los Feliz Blvd","i":"🦶","d":"A cabin-themed dive bar on Los Feliz Blvd where the walls are knotty pine, the drinks are strong, and there's a fireplace. It feels like a hunting lodge in the wrong zip code. The name promised Bigfoot and the bar delivered on the vibe — dark, woodsy, and slightly unhinged.","ys":1999,"tl":[{"y":"1999","x":"Opens — cabin in the city"},{"y":"2026","x":"Listed for sale at $2.25M — 1933 Group exploring next chapter"}],"tags":["Cabin","Dive Bar","Theme Bar"],"rel":["thirstycrow","4100bar","goodluckbar","stories","skylight","subliminalprojects"],"s":"active"},{"id":"wacko","h":"losfeliz","n":"Wacko / La Luz de Jesus","t":"Art Gallery & Gift Shop","c":"shop","lat":34.1004,"lng":-118.29,"a":"4633 Hollywood Blvd","i":"🎨","d":"Billy Shire opened La Luz de Jesus gallery inside his Wacko gift shop in 1986, creating the epicenter of the Lowbrow art movement. Robert Williams, Mark Ryden, The Pizz, Shag — the artists who weren't welcome in mainstream galleries showed here. The shop itself is a museum of weird: Day of the Dead figurines, vintage kitsch, books about serial killers. Los Feliz's spiritual headquarters.","ys":1986,"tl":[{"y":"1986","x":"La Luz de Jesus opens inside Wacko"},{"y":"1995","x":"Lowbrow art movement epicenter"}],"tags":["Lowbrow Art","Robert Williams","Mark Ryden","Gallery"],"w":"La_Luz_de_Jesus","s":"active"},{"id":"alcove","h":"losfeliz","n":"Alcove Cafe & Bakery","t":"Cafe","c":"food","lat":34.1062,"lng":-118.2877,"a":"1929 Hillhurst Ave","i":"☕","d":"The Los Feliz patio cafe where every screenwriter in the neighborhood has written at least one bad screenplay. Housed in a 1916 Spanish duplex and an 1897 Craftsman cottage, it opened in 2004 and became the de facto living room of the neighborhood. The connected Big Bar does cocktails at night. If Los Feliz Village has a town square, this is it.","ys":2004,"tl":[{"y":"2004","x":"Opens on Hillhurst in two of the oldest houses in Los Feliz"}],"tags":["Cafe","Screenwriters","Patio","Village"],"rel":["housepies","figaro","brownderby"],"s":"active"},{"id":"starwood","h":"weho","n":"The Starwood","t":"Rock Club","c":"music","lat":34.091,"lng":-118.365,"a":"8151 Santa Monica Blvd","i":"⭐","d":"The club that bridged glam and punk. Van Halen played here dozens of times before getting signed. The Runaways, Quiet Riot, X, the Go-Go's — the Starwood didn't care about genre. It hosted everything from Kiss to Black Flag. Eddie Nash (of Wonderland murders infamy) was involved in the ownership. Closed 1981, demolished for a mini-mall. The most important rock club nobody outside LA remembers.","ys":1973,"ye":1981,"tl":[{"y":"1973","x":"Opens on Santa Monica Blvd"},{"y":"1976","x":"Van Halen residency"},{"y":"1977","x":"Punk shows begin — X, Germs"},{"y":"1981","x":"Closes — demolished"}],"tags":["Van Halen","Punk","Glam","Eddie Nash","Demolished"],"w":"Starwood_(nightclub)","s":"demolished"},{"id":"tailpup","h":"weho","n":"Tail o' the Pup","t":"Hot Dog Stand","c":"food","lat":34.0889,"lng":-118.3769,"a":"8512 Santa Monica Blvd","i":"🌭","d":"Architect Milton Black designed it in 1946 for celebrity dance couple Veloz and Yolanda. A hot dog stand shaped like a hot dog — it was the most photographed piece of novelty architecture in LA. The ultimate example of \"programmatic architecture\" — buildings shaped like what they sell. When it closed in 2005, the 18-foot hot dog was put in storage and declared an LA cultural landmark in 2006. The 1933 Group bought and restored the original structure, reopening it in 2022 on Santa Monica Blvd — blocks from its original site, in a building where the Doors once recorded. The hot dog came home.","ys":1946,"tl":[{"y":"1946","x":"Built — a hot dog shaped like a hot dog"},{"y":"2005","x":"Closes — hot dog goes into storage"},{"y":"2006","x":"Declared LA cultural landmark"},{"y":"2022","x":"1933 Group reopens on Santa Monica Blvd"}],"tags":["Programmatic Architecture","Novelty","Hot Dog","Restored","1933 Group"],"w":"Tail_o%27_the_Pup","s":"active"},{"id":"okidog","h":"weho","n":"Oki-Dog","t":"Punk Hot Dog Stand","c":"food","lat":34.0865,"lng":-118.3616,"a":"860 N Fairfax Ave","i":"🌭","d":"The hot dog stand on Fairfax where punk kids congregated in the early '80s. Two hot dogs wrapped in a tortilla with chili and pastrami — the \"Oki-Dog.\" After shows at the Starwood or the Masque, this is where everyone ended up at 2am. The parking lot was the after-party. Darby Crash ate here. Circle Jerks ate here. It eventually moved to Pico but the Fairfax location was the one that mattered.","ys":1976,"tl":[{"y":"1976","x":"Opens on Fairfax"},{"y":"1982","x":"Punk kids claim the parking lot"},{"y":"2010","x":"Moves to Pico Blvd"}],"tags":["Punk","Hot Dogs","Darby Crash","After-Hours"],"rel":["themasque","starwood","schwabs","farmersmarket","swingers","astroburger"],"s":"active"},{"id":"canters","h":"fairfax","n":"Canter's Deli","t":"Jewish Deli","c":"food","lat":34.0783,"lng":-118.3613,"a":"419 N Fairfax Ave","i":"🥯","d":"A Fairfax institution since 1931. The pastrami is correct. The Kibitz Room in the back has been a live music venue since the '60s — Guns N' Roses played early shows there, so did Jakob Dylan. Used to be 24 hours — at 3am it was the only place in LA where Orthodox Jews, punks, drag queens, and drunk tourists all ate matzo ball soup at the same counter. Now only open 24 hours on Saturday nights. The waitresses have been there longer than most marriages.","ys":1931,"tl":[{"y":"1931","x":"Opens on Fairfax — moves to current location 1953"},{"y":"1965","x":"Kibitz Room live music begins"},{"y":"1986","x":"Guns N' Roses play the Kibitz Room"}],"tags":["Pastrami","Kibitz Room","Guns N Roses","Jewish"],"w":"Canter%27s","s":"active"},{"id":"farmersmarket","h":"fairfax","n":"Original Farmers Market","t":"Food Market","c":"food","lat":34.0721,"lng":-118.3614,"a":"6333 W 3rd St","i":"🍎","d":"Started in 1934 when farmers parked their trucks on an empty lot during the Depression and sold produce from the tailgates. The oil derrick is there because the Gilmore family struck oil on this land in 1900. Now over 100 vendors. Bob's Coffee & Doughnuts has been in the same stall since 1970. The Grove mall was built next door in 2002, which feels like an insult.","ys":1934,"tl":[{"y":"1934","x":"Farmers park trucks on empty lot"},{"y":"1900","x":"Gilmore family strikes oil here"},{"y":"1970","x":"Bob's Coffee & Doughnuts opens"},{"y":"2002","x":"The Grove built next door"}],"tags":["Depression Era","Oil","Farmers","Bob's Doughnuts"],"rel":["canters","swingers","dupars","kelbos","natenal","fatfarm"],"w":"Original_Farmers_Market","s":"active"},{"id":"toionsunset","h":"fairfax","n":"Toi on Sunset","t":"Thai Restaurant","c":"food","lat":34.0981,"lng":-118.353,"a":"7505½ Sunset Blvd","i":"🍜","d":"Rock-n-roll Thai food in a garage-like space covered floor-to-ceiling in band photos, posters, and memorabilia. Opened 1986 in Hollywood's music store district and immediately became the late-night canteen for every band playing the nearby clubs. Stays open past midnight — sometimes until 2 AM on weekends. Pioneered vegetarian Thai in LA with tofu dishes and their Buddha Chili two decades before it was trendy. The pad thai is cheap, the portions are massive, and the walls tell the story of 40 years of LA rock.","ys":1986,"tl":[{"y":"1986","x":"Opens at Sunset & Gardner — rock-n-roll Thai"},{"y":"2000","x":"Late-night institution for club crowds"}],"tags":["Thai","Rock n Roll","Late Night","Musicians"],"s":"active"},{"id":"poseur","h":"fairfax","n":"Poseur","t":"Punk Fashion","c":"shop","lat":34.0837768,"lng":-118.3516795,"a":"7415 Melrose Ave","i":"🧷","d":"THE punk clothing store on Melrose in the 1980s. If you needed bondage pants, a Misfits shirt, or a leather jacket with studs, Poseur was the only answer. It defined what \"punk fashion\" looked like in LA before Hot Topic made it mainstream and meaningless. The name was perfect — half the customers were poseurs and everyone knew it, including the poseurs.","ys":1983,"ye":1995,"tl":[{"y":"1980","x":"Opens on Melrose"},{"y":"1995","x":"Closes as Melrose changes"}],"tags":["Punk","Fashion","Melrose","1980s"],"s":"closed"},{"id":"aronsrec","h":"hollywood","n":"Aron's Records","t":"Record Store","c":"shop","lat":34.0922,"lng":-118.3381,"a":"1150 N Highland Ave","i":"💿","d":"The record store on Highland that had everything — new releases, used vinyl, imports, and a staff that could tell you the pressing plant origin of your obscure 7-inch. Founded by Manny Aron in 1965 on Melrose, it moved to this Highland location in 1989. When Amoeba opened down the street in 2001, it was the beginning of the end. Closed 2006.","ys":1965,"ye":2006,"tl":[{"y":"1965","x":"Manny Aron opens at 7725 Melrose Ave"},{"y":"1989","x":"Moves to 1150 N Highland — former meat market, 9000 sq ft"},{"y":"2001","x":"Amoeba Music opens nearby — competition intensifies"},{"y":"2006","x":"Closes after 41 years"}],"tags":["Records","Vinyl","Independent","Highland","Beat Scene"],"rel":["amoeba","towerrec","rockaway","marcianofoundation","craftcontemporary"],"s":"closed"},{"id":"lacma","h":"fairfax","n":"LACMA & La Brea Tar Pits","t":"Museum & Prehistoric Site","c":"culture","lat":34.0639,"lng":-118.3592,"a":"5905 Wilshire Blvd","i":"🦣","d":"The tar pits have been trapping animals for 50,000 years. Mammoths, saber-toothed cats, dire wolves — all pulled into the asphalt and preserved. LACMA was built next to them in 1965 because LA decided to put its art museum next to a prehistoric death trap. Chris Burden's Urban Light — the 202 vintage street lamps — became the most Instagrammed art installation in LA.","ys":1965,"tl":[{"y":"50000 BC","x":"Tar pits trapping animals"},{"y":"1965","x":"LACMA opens"},{"y":"2008","x":"Urban Light installed — 202 lamps"}],"tags":["Tar Pits","Mammoth","LACMA","Urban Light"],"w":"La_Brea_Tar_Pits","s":"active"},{"id":"ambassador","h":"ktown","n":"Ambassador Hotel","t":"Hotel & Nightclub","c":"hotel","lat":34.0617,"lng":-118.2983,"a":"3400 Wilshire Blvd","i":"🏨","d":"Opened in 1921, the Ambassador was LA's most glamorous hotel for 40 years. The Cocoanut Grove nightclub inside hosted the Oscars six times. Bing Crosby was discovered here. But on June 5, 1968, Robert F. Kennedy was assassinated in the kitchen pantry after winning the California primary. The hotel never fully recovered. It closed in 1989 and was demolished in 2005 for a school complex. They kept the pantry location unmarked.","ys":1921,"ye":1989,"tl":[{"y":"1921","x":"Opens — most glamorous hotel in LA"},{"y":"1934","x":"Cocoanut Grove hosts the Oscars"},{"y":"1968","x":"RFK assassinated in kitchen"},{"y":"1989","x":"Closes"},{"y":"2005","x":"Demolished for school"}],"tags":["RFK","Cocoanut Grove","Oscars","Assassination","Demolished"],"rel":["cocoanut","biltmore","chateau","garden","roosevelt","hmsbounty"],"w":"Ambassador_Hotel_(Los_Angeles)","s":"demolished"},{"id":"cocoanut","h":"ktown","n":"Cocoanut Grove","t":"Nightclub","c":"music","lat":34.0617,"lng":-118.2983,"a":"Inside Ambassador Hotel","i":"🌴","d":"The nightclub inside the Ambassador Hotel, decorated with fake palm trees from the set of Rudolph Valentino's \"The Sheik.\" The Oscars were held here six times. Bing Crosby got his start singing here. Sammy Davis Jr., Barbra Streisand, Frank Sinatra — everyone played the Grove. The palm trees were the most famous props in Hollywood, and they were secondhand.","ys":1921,"ye":1989,"tl":[{"y":"1921","x":"Opens with secondhand Valentino palm trees"},{"y":"1934","x":"Oscars held here six times"},{"y":"1945","x":"Sinatra, Sammy Davis Jr. era"},{"y":"1989","x":"Closes with the Ambassador"}],"tags":["Oscars","Sinatra","Bing Crosby","Palm Trees"],"w":"Cocoanut_Grove_(nightclub)","s":"closed"},{"id":"tombgins","h":"fairfax","n":"Tom Bergin's","t":"Irish Pub","c":"food","lat":34.06,"lng":-118.3626,"a":"840 S Fairfax Ave","i":"☘️","d":"LA's oldest Irish pub, open since 1936. The ceiling is covered with paper shamrocks — one for every regular. There are thousands. If you drink here long enough, you get your own shamrock. It's the closest thing LA has to a loyalty program with actual emotional weight. Temporarily closed, reopened, closed again. The shamrocks wait.","ys":1936,"tl":[{"y":"1936","x":"Opens — ceiling shamrocks begin"},{"y":"2018","x":"Temporarily closes"},{"y":"2019","x":"Reopens"}],"tags":["Irish Pub","Shamrocks","Oldest","Tradition"],"rel":["formosa","hmsbounty","dantanas","chasens","canters","philippes"],"w":"Tom_Bergin%27s","s":"active"},{"id":"langers","h":"ktown","n":"Langer's Deli","t":"Deli","c":"food","lat":34.0563,"lng":-118.2752,"a":"704 S Alvarado St","i":"🥪","d":"The pastrami sandwich at Langer's is, by wide consensus, the best in America. The #19 — pastrami, swiss, coleslaw, Russian dressing on twice-baked rye — is the thing people fly to LA to eat. Open since 1947 in MacArthur Park. The neighborhood changed around it. Langer's didn't move, didn't change the recipe, didn't flinch. They just kept slicing pastrami.","ys":1947,"tl":[{"y":"1947","x":"Opens near MacArthur Park"}],"tags":["Pastrami","#19","Best in America","MacArthur Park"],"w":"Langer%27s_Delicatessen","s":"active"},{"id":"mayco","h":"fairfax","n":"May Company Building","t":"Department Store / Museum","c":"shop","lat":34.0635,"lng":-118.3568,"a":"5905 Wilshire Blvd","i":"🏬","d":"The gold-tiled Art Deco corner at Fairfax and Wilshire is one of the most recognizable buildings in LA. May Company opened it in 1939. The gold cylindrical corner was designed to be seen from a car — one of the first buildings designed for the automobile age. Now it's the Academy Museum of Motion Pictures. The gold tiles survived everything.","ys":1939,"ye":2019,"tl":[{"y":"1939","x":"Opens — gold Art Deco corner"},{"y":"1992","x":"May Company closes"},{"y":"2021","x":"Becomes Academy Museum of Motion Pictures"}],"tags":["Art Deco","Gold Tiles","Academy Museum","May Company"],"rel":["bullockswilshire","imagnin","helmsbakery","ambassador","palladium","visiontheatre"],"w":"May_Company_Building_(Miracle_Mile,_Los_Angeles)","s":"closed"},{"id":"wiltern","h":"ktown","n":"The Wiltern","t":"Theater","c":"music","lat":34.0611,"lng":-118.3092,"a":"3790 Wilshire Blvd","i":"🎭","d":"The turquoise Art Deco tower at Wilshire and Western. Built in 1931 as a movie palace, nearly demolished in the 1980s, saved by preservationists. Now it's one of LA's best live music venues — the Ziggy Stardust-green terra cotta exterior is visible from blocks away. The interior is pure Art Deco fantasy. It survived because people fought for it.","ys":1931,"tl":[{"y":"1931","x":"Opens as movie palace"},{"y":"1982","x":"Nearly demolished"},{"y":"1985","x":"Restored and reopened"}],"tags":["Art Deco","Turquoise","Saved","Live Music"],"w":"Pellissier_Building_and_Wiltern_Theatre","s":"active"},{"id":"brownderbyog","h":"ktown","n":"The Brown Derby (Wilshire)","t":"Restaurant","c":"food","lat":34.0623,"lng":-118.2978,"a":"3377 Wilshire Blvd","i":"🎩","d":"The original hat-shaped Brown Derby opened on Wilshire in 1926. Shaped like a derby hat, 50 feet in diameter. It became the most famous restaurant in Hollywood — the Cobb salad was invented at the Hollywood Blvd location. The Wilshire building was demolished in 1980. A replica hat sat on top of a strip mall for years. The hat survives; the restaurant doesn't.","ys":1926,"ye":1979,"tl":[{"y":"1926","x":"Opens — shaped like a hat"},{"y":"1929","x":"Cobb salad invented at Hollywood location"},{"y":"1980","x":"Wilshire location demolished"}],"tags":["Brown Derby","Cobb Salad","Hat Building","Demolished"],"w":"Brown_Derby","s":"demolished"},{"id":"piontchick","h":"lincolnheights","n":"Pioneer Chicken","t":"Fast Food Chain","c":"food","lat":34.0340729,"lng":-118.2156219,"a":"904 S Soto St, Los Angeles, CA 90023","i":"🍗","d":"LA's homegrown fried chicken empire. H.R. Kaufman, a Navy vet, opened the first Pioneer Chicken next to Pioneer Market in Echo Park in 1961. By the late 1970s there were 270 locations across the West Coast, with OJ Simpson and Kareem Abdul-Jabbar doing the TV ads and Pioneer Pete driving his chuck wagon across every sign. Warren Zevon immortalized it in Carmelita. Bankruptcy in 1988, Popeyes bought the carcass in 1993 and converted almost everything. Two locations survived — the holdout franchisees at Soto St and Bell Gardens refused to flip. The Soto St location is one of the last two on earth. The fried chicken is better than it has any right to be.","ys":1961,"tl":[{"y":"1961","x":"H.R. Kaufman opens first Pioneer Chicken in Echo Park next to Pioneer Market"},{"y":"1979","x":"Peak: 270 locations across California, Arizona, and Hawaii"},{"y":"1988","x":"Kaufman files for Chapter 11 bankruptcy"},{"y":"1993","x":"Popeyes buys the chain — converts almost all locations"},{"y":"2009","x":"Original Echo Park location closes"}],"tags":["Fast Food","Fried Chicken","LA Icon","Nostalgia"],"w":"Pioneer_Chicken","s":"active"},{"id":"helmsbakery","h":"culvercity","n":"Helms Bakery","t":"Bakery & Delivery","c":"shop","lat":34.0309,"lng":-118.3851,"a":"8800 Venice Blvd","i":"🍞","d":"From 1931 to 1969, Helms delivery trucks brought fresh bread to every neighborhood in LA. The coaches — converted trucks with fold-down sides — were a daily sight on residential streets. Kids would run out when they heard the horn. The bakery provided all the bread for the 1932 Olympics. The building now houses the Helms Bakery District, a design center. The delivery trucks are the thing everyone over 60 remembers.","ys":1931,"ye":1969,"tl":[{"y":"1931","x":"Opens — delivery trucks fan out across LA"},{"y":"1932","x":"Provides bread for the Olympics"},{"y":"1969","x":"Closes — trucks stop rolling"}],"tags":["Bread","Delivery","Olympics","Nostalgia"],"rel":["farmersmarket","mayco","polo","spago2","scandia"],"w":"Helms_Bakery","s":"closed"},{"id":"chasens","h":"bevhills","n":"Chasen's","t":"Restaurant","c":"food","lat":34.0777,"lng":-118.3887,"a":"9039 Beverly Blvd","i":"🍲","d":"The restaurant where Old Hollywood went to be Old Hollywood. Frank Sinatra had a booth. Elizabeth Taylor had the chili flown to the set of Cleopatra in Rome. Reagan proposed to Nancy here. Jimmy Stewart ate here every week for decades. The chili recipe was the most famous secret in town. Closed 1995 after 59 years. Bristol Farms built a supermarket on the site and kept one booth as a memorial. A booth in a grocery store. That's how Hollywood mourns.","ys":1936,"ye":1995,"tl":[{"y":"1936","x":"Opens — Sinatra claims a booth"},{"y":"1963","x":"Taylor has chili flown to Rome"},{"y":"1995","x":"Closes — becomes Bristol Farms"}],"tags":["Sinatra","Elizabeth Taylor","Reagan","Chili","Old Hollywood"],"w":"Chasen%27s","s":"closed"},{"id":"hongkongcafe","h":"chinatown","n":"Hong Kong Cafe","t":"Punk Venue","c":"music","lat":34.0659,"lng":-118.2379,"a":"425 Gin Ling Way, Chinatown","i":"🐉","d":"A Chinese restaurant in Chinatown that booked punk shows in 1979-1980. The Alley Cats, The Go-Go's (pre-fame), X, the Bags — all played to crowds of punks crammed between tables of confused diners eating chow mein. The collision of punk and Chinatown was beautifully absurd. Short-lived but foundational to the scene.","ys":1979,"ye":1981,"tl":[{"y":"1979","x":"Starts booking punk bands"},{"y":"1980","x":"Go-Go's, X play among diners"},{"y":"1981","x":"Stops booking music"}],"tags":["Punk","Chinatown","Go-Gos","X","Absurd"],"rel":["masque","rajis","cathaydg","alsbar","cassells","dupars"],"s":"closed"},{"id":"shipscoffee","h":"westla","n":"Ships Coffee Shop","t":"Googie Diner","c":"food","lat":34.0445,"lng":-118.42,"a":"10534 W Pico Blvd","i":"☕","d":"The last great Googie coffee shop in LA. The angular roof, the neon sign, the toasters at every table so you could make your own toast. Built in 1956, it was the platonic ideal of Space Age diner design. Demolished 2000 for a condo. The toasters were the thing. Every table had its own toaster. You will never see that again anywhere.","ys":1956,"ye":1996,"tl":[{"y":"1956","x":"Opens — toasters at every table"},{"y":"1996","x":"LA Conservancy tries to save it"},{"y":"2000","x":"Demolished for condos"}],"tags":["Googie","Space Age","Toasters","Demolished"],"w":"Ships_Coffee_Shop","s":"demolished"},{"id":"woolworths","h":"hollywood","n":"Woolworth's","t":"Five and Dime","c":"shop","lat":34.1012,"lng":-118.338,"a":"6764 Hollywood Blvd","i":"🏬","d":"The Hollywood Blvd Woolworth's was an anchor of the boulevard for decades. Lunch counter, cheap goods, the democratic promise of American retail where everyone could afford something. When Hollywood Blvd declined in the '70s and '80s, Woolworth's hung on until 1997. The building stands. The counter is gone.","ys":1935,"ye":1997,"tl":[{"y":"1935","x":"Opens on Hollywood Blvd"},{"y":"1997","x":"Closes with national chain"}],"tags":["Five and Dime","Lunch Counter","Hollywood Blvd"],"s":"closed"},{"id":"flippers","h":"hollywood","n":"Flippers Roller Boogie Palace","t":"Roller Disco","c":"music","lat":34.1017,"lng":-118.354,"a":"Sierra Bonita & Hollywood","i":"🛼","d":"The roller disco that defined the late '70s roller skating craze in LA. Opened 1979, it drew celebrities and scenesters for two glorious years. Cher skated here. The place was pure disco fantasy on wheels. When the fad died in 1981, Flippers died with it. Two years of existence, but if you were there, you never forgot it.","ys":1979,"ye":1981,"tl":[{"y":"1979","x":"Opens — roller disco craze peaks"},{"y":"1981","x":"Closes when fad dies"}],"tags":["Roller Disco","Cher","1970s","Short-Lived"],"rel":["stardust","disco9000","palladium","studioone","hollywoodbowl","flippers"],"s":"closed"},{"id":"stardust","h":"hollywood","n":"Stardust Ballroom","t":"Dance Hall","c":"music","lat":34.0979,"lng":-118.3115,"a":"5612 Sunset Blvd","i":"💫","d":"A classic Sunset Blvd ballroom from the '40s that hosted everything from big band to punk. Black Flag played here. Circle Jerks. X. The juxtaposition of a chandeliered dance hall with hardcore punk was pure LA. Closed and converted to a church, then various businesses. The ballroom ceiling doesn't know what decade it's in.","ys":1942,"ye":1993,"tl":[{"y":"1942","x":"Opens as dance hall"},{"y":"1985","x":"Punk shows — Black Flag, X"},{"y":"1993","x":"Closes as music venue"}],"tags":["Ballroom","Black Flag","Punk","Big Band"],"s":"closed"},{"id":"epitaphrec","h":"silverlake","n":"Epitaph Records","t":"Punk Record Label","c":"music","lat":34.0817,"lng":-118.272,"a":"2798 Sunset Blvd","i":"💀","d":"Brett Gurewitz of Bad Religion founded Epitaph in 1980 in his garage. It became the most important punk label in America — Bad Religion, The Offspring, Rancid, NOFX, Pennywise. The Offspring's Smash (1994) sold 11 million copies and was the best-selling indie album ever. The label operates out of Silver Lake. A garage label that changed the music industry.","ys":1981,"tl":[{"y":"1980","x":"Founded in Brett Gurewitz's garage"},{"y":"1994","x":"Offspring's Smash — 11M copies"}],"tags":["Punk","Bad Religion","Offspring","Indie Label"],"rel":["satellite","echo","knittingfactory","starshoes","safarisams","jumbos"],"w":"Epitaph_Records","s":"active"},{"id":"lace","h":"hollywood","n":"LACE (Los Angeles Contemporary Exhibitions)","t":"Gallery / Performance Space","c":"culture","lat":34.1013306,"lng":-118.3318833,"a":"6522 Hollywood Blvd, Los Angeles, CA 90028","i":"🎨","d":"Nonprofit gallery founded in 1978 by thirteen artists in a downtown loft. LACE was ground zero for performance art and video in LA when nobody else would show it — Laurie Anderson, Chris Burden, Mike Kelley, and Gronk all exhibited in the early years. Moved from downtown to 6522 Hollywood Blvd in 1994, becoming a storefront gallery on the Walk of Fame where tourists accidentally stumble into experimental art. Temporarily displaced by the Hollywood Arts Collective development — offices relocated to Sunset Blvd while the new building goes up.","ys":1978,"tl":[{"y":"1978","x":"Founded by 13 artists in a downtown LA loft"},{"y":"1982","x":"Joy Silverman appointed first executive director"},{"y":"1994","x":"Moves to 6522 Hollywood Blvd — storefront gallery on the Walk of Fame"}],"tags":["Art Gallery","Performance Art","Nonprofit","Hollywood"],"w":"Los_Angeles_Contemporary_Exhibitions","s":"active"},{"id":"playboymans","h":"bevhills","n":"Playboy Mansion","t":"Estate","c":"culture","lat":34.0775,"lng":-118.4292,"a":"10236 Charing Cross Rd","i":"🐰","d":"Hugh Hefner bought the Holmby Hills Gothic-Tudor estate in 1971 for $1.05 million. For the next 46 years it was the most famous private residence in America — the grotto, the peacocks, the parties, the mythology. Hefner died in 2017. Daren Metropoulos bought it for $100 million with the condition that Hefner could live there until death. The grotto has been filled in. The peacocks remain.","ys":1971,"tl":[{"y":"1971","x":"Hefner buys for $1.05M"},{"y":"2017","x":"Hefner dies"},{"y":"2017","x":"Sold for $100M"}],"tags":["Hefner","Grotto","Parties","Holmby Hills"],"rel":["greystone","bhhotel","weismanfoundation","knittingfactory","starshoes","sllounge"],"w":"Playboy_Mansion","s":"active"},{"id":"safarisams","h":"hollywood","n":"Safari Sam's","t":"Music Venue","c":"music","lat":34.098,"lng":-118.303,"a":"5214 Sunset Blvd","i":"🎵","d":"An East Hollywood music venue in the 2000s that filled the gap after clubs like the Coconut Teaszer closed. Indie rock, experimental, underground hip-hop. The room was small enough that every show felt intimate. Part of the East Sunset ecosystem that includes the Satellite and Silverlake Lounge.","ys":2004,"ye":2012,"tl":[{"y":"2004","x":"Opens on East Sunset"},{"y":"2012","x":"Closes"}],"tags":["Indie","East Hollywood","Small Room"],"s":"closed"},{"id":"knittingfactory","h":"hollywood","n":"Knitting Factory","t":"Music Venue","c":"music","lat":34.1021,"lng":-118.3428,"a":"7021 Hollywood Blvd","i":"🧶","d":"The LA outpost of New York's legendary Knitting Factory. Opened 2009 in the heart of Hollywood Blvd, it tried to bring experimental and indie credibility to a boulevard dominated by tourist traps. Multiple rooms, good sound. Closed 2014. The boulevard swallowed it.","ys":2009,"ye":2014,"tl":[{"y":"2009","x":"Opens on Hollywood Blvd"},{"y":"2014","x":"Closes"}],"tags":["Indie","Experimental","New York Transplant"],"rel":["descontrol","safarisams","starshoes","epitaphrec","tower","towerrec"],"s":"closed"},{"id":"virginrec","h":"hollywood","n":"Virgin Megastore","t":"Record Store","c":"shop","lat":34.1015,"lng":-118.3405,"a":"6801 Hollywood Blvd","i":"📀","d":"The massive Virgin Records store on Hollywood Blvd that opened in 2001 with three floors and a DJ booth. Richard Branson's attempt to outdo Tower Records. It lasted less than a decade. The building sat empty. Then it became a lingerie store. The trajectory from vinyl temple to bra outlet tells you everything about the 2000s.","ys":2001,"ye":2007,"tl":[{"y":"2001","x":"Opens — three floors"},{"y":"2007","x":"Closes with national chain"}],"tags":["Records","Branson","Hollywood Blvd","Closed"],"s":"closed"},{"id":"1720venue","h":"southla","n":"1720","t":"Warehouse Venue","c":"music","lat":34.023,"lng":-118.2417,"a":"1720 E 16th St","i":"🎵","d":"A modern warehouse venue in the Arts District that books experimental, electronic, and underground shows. The kind of concrete-floored, industrial-chic space that could only exist in the post-gentrification Arts District. Represents the current era of LA music — not the Strip, not Hollywood, but the eastside industrial corridors.","ys":2017,"tl":[{"y":"2017","x":"Opens in Arts District warehouse"}],"tags":["Arts District","Warehouse","Electronic","Modern"],"rel":["chapmanmarket","wiltern","elcapitan","cocoanut","musso","ambassador"],"s":"active"},{"id":"zebulon","h":"silverlake","n":"Zebulon","t":"Music Venue & Bar","c":"music","lat":34.1072,"lng":-118.2547,"a":"2478 Fletcher Dr","i":"🎵","d":"Originally a Brooklyn venue that relocated to Frogtown in 2017. Jazz, experimental, world music in a warehouse space by the LA River. It represents the eastward migration of LA's creative scene — away from Hollywood and the Strip, toward the river and the industrial edges. The sound system is excellent and the programming is fearless.","ys":2017,"tl":[{"y":"2017","x":"Relocates from Brooklyn to Frogtown"}],"tags":["Jazz","Experimental","Brooklyn Transplant","Frogtown"],"w":"Zebulon_Cafe_Concert","s":"active"},{"id":"superchief","h":"downtown","n":"Superchief Gallery","t":"Art Gallery","c":"culture","lat":34.0366,"lng":-118.2435,"a":"739 Kohler St","i":"🎨","d":"The downtown gallery showing the artists that other galleries are too polished for. Founded in Brooklyn in 2012 by Edward Zipco and Bill Dunleavy, the LA outpost opened in May 2014 in a massive warehouse on Kohler Street. Graffiti, lowbrow, street art, punk aesthetics. Free openings with cheap beer.","ys":2014,"tl":[{"y":"2014","x":"LA warehouse gallery opens on Kohler St"}],"tags":["Street Art","Graffiti","Free","Arts District"],"s":"active"},{"id":"redwood","h":"downtown","n":"The Redwood Bar & Grill","t":"Pirate Dive Bar","c":"nightlife","lat":34.0527,"lng":-118.2474,"a":"316 W 2nd St","i":"🏴‍☠️","d":"A pirate-themed dive bar in downtown LA that hosts punk and rock shows in the back. The building dates to 1942, when it served as a watering hole for lawyers, journalists, and politicians near the LA Times building. The current owners took over in 2006 and gave it the buccaneer treatment — ship decor in the front, a tiny venue in the back. Downtown's scrappiest music venue, celebrating 20 years in 2026.","ys":1942,"tl":[{"y":"1942","x":"Original Redwood Room opens near LA Times building"},{"y":"2006","x":"Relaunches as pirate-themed dive bar and music venue"}],"tags":["Pirate","Punk","Dive Bar","Downtown"],"rel":["kingeddy","montybar","thevarnish","carneys","dupars"],"s":"active"},{"id":"bobsbigboy","h":"burbank","n":"Bob's Big Boy (Burbank)","t":"Drive-In Restaurant","c":"food","lat":34.1525,"lng":-118.3461,"a":"4211 Riverside Dr, Burbank","i":"🍔","d":"The oldest remaining Bob's Big Boy in America, built in 1949. Wayne McAllister's Googie design is a California State Point of Historical Interest. Every Friday night is classic car night in the parking lot — the tradition has run continuously since the 1980s. The Big Boy statue out front is an LA icon. The coffee shop where architecture, nostalgia, and a double-decker burger converge.","ys":1949,"tl":[{"y":"1949","x":"Opens — oldest surviving location"},{"y":"1993","x":"California Historical Landmark"}],"tags":["Googie","Big Boy","Classic Cars","Friday Nights"],"w":"Bob%27s_Big_Boy","s":"active"},{"id":"picwoodbowl","h":"westla","n":"Picwood Bowl / Theater","t":"Bowling & Cinema","c":"culture","lat":34.0401,"lng":-118.4283,"a":"10846 W Pico Blvd","i":"🎳","d":"A 24-hour bowling alley on Pico Blvd with a sunken cocktail lounge and three levels of seating. Open all night, it was the place insomniacs and night owls ended up when everywhere else closed. Demolished for a shopping mall — replaced by a generic retail complex. The bowling alley that never slept, killed by someone who needed a Pottery Barn.","ys":1955,"ye":1985,"tl":[{"y":"1955","x":"Opens — 24-hour bowling"},{"y":"1985","x":"Demolished for Westside Pavilion mall"}],"tags":["Bowling","24 Hours","Pico","Demolished"],"rel":["golfnstuff","hollywoodstarlanes","familyfunarcade","jeffho","skatepark","giantrobot"],"s":"demolished"},{"id":"ripcityskates","h":"westla","n":"Rip City Skates","t":"Skate Shop","c":"shop","lat":34.0344,"lng":-118.4733,"a":"2709 Santa Monica Blvd","i":"🛹","d":"One of the legendary West LA skate shops that fueled the skateboarding revolution. When skating was an outlaw activity, shops like Rip City were the community centers — where you found out about secret spots, new decks, and whose pool was empty. The culture that Venice's Dogtown Z-Boys started needed retail infrastructure. Rip City was part of it.","ys":1978,"tl":[{"y":"1978","x":"Opens"}],"tags":["Skateboarding","West LA","Dogtown"],"s":"active"},{"id":"familyfunarcade","h":"sfvalley","n":"Family Fun Arcade","t":"Arcade","c":"culture","lat":34.2563,"lng":-118.5008,"a":"Balboa Blvd, Granada Hills","i":"🕹️","d":"The fighting game mecca of Los Angeles. While most arcades died in the '90s, Family Fun Arcade on Balboa Blvd in Granada Hills survived on the strength of its competitive fighting game community. Opened in 1973 as a family attraction with pinball and Pong, it transformed after Street Fighter II arrived in 1991. Marvel vs Capcom, Tekken — the best players in Southern California came here. It was grimy, the carpet was terrible, and it was sacred ground for an entire generation of gamers. Closed December 31, 2012 after 38 years.","ys":1973,"ye":2012,"tl":[{"y":"1973","x":"Opens as family arcade in Granada Hills"},{"y":"1991","x":"Street Fighter II transforms it into fighting game mecca"},{"y":"2012","x":"Closes after 38 years"}],"tags":["Arcade","Fighting Games","Street Fighter","Granada Hills"],"rel":["golfnstuff","picwoodbowl","cjbarrymores","rhino","amoeba"],"s":"closed"},{"id":"recordsurplus","h":"westla","n":"Record Surplus","t":"Record Store","c":"shop","lat":34.0385,"lng":-118.4673,"a":"12436 Santa Monica Blvd","i":"💿","d":"The West LA record store where the bins went deep. Specializing in used vinyl, it was the place for crate-diggers looking for obscure jazz, funk, and soul pressings. Not flashy like Amoeba, not punk like Headline — Record Surplus was for the serious collectors who knew what they wanted and were willing to dig for it.","ys":1985,"tl":[{"y":"1985","x":"Opens on Santa Monica Blvd"}],"tags":["Vinyl","Used Records","Crate-Digging","West LA"],"s":"active"},{"id":"golfnstuff","h":"southla","n":"Golf 'N' Stuff","t":"Mini Golf & Arcade","c":"culture","lat":33.9024,"lng":-118.0819,"a":"10555 E Firestone Blvd, Norwalk","i":"⛳","d":"The mini-golf and go-kart chain that was every LA kid's birthday party in the '80s and '90s. Bumper boats where you got soaked, an arcade that ate quarters, and mini-golf holes themed around volcanoes and windmills. The Norwalk location became famous when it appeared in The Karate Kid. A suburban paradise for children; an air-conditioned purgatory for parents.","ys":1969,"tl":[{"y":"1969","x":"Opens in Norwalk on Firestone Blvd"},{"y":"1984","x":"Featured in The Karate Kid"}],"tags":["Mini Golf","Go-Karts","Karate Kid","Birthday Parties"],"rel":["picwoodbowl","cjbarrymores","familyfunarcade","originaltommys","titostacos","carneys"],"s":"active"},{"id":"smcivic","h":"santamonica","n":"Santa Monica Civic Auditorium","t":"Concert Venue","c":"music","lat":34.0096,"lng":-118.4901,"a":"1855 Main St, Santa Monica","i":"🎵","d":"The 3,000-seat auditorium that hosted the Oscars from 1961-1968, and then became one of LA's most important concert venues. The Ramones played here. Black Flag played here. The T.A.M.I. Show was filmed here in 1964 — James Brown, The Rolling Stones, Marvin Gaye on the same bill. The building sat unused for years and was nearly demolished. Being restored as of 2024.","ys":1958,"tl":[{"y":"1958","x":"Opens"},{"y":"1961","x":"Oscars move here"},{"y":"1964","x":"T.A.M.I. Show filmed — Brown vs Stones"},{"y":"1983","x":"Punk shows — Ramones, Black Flag"}],"tags":["Oscars","TAMI Show","James Brown","Ramones","Black Flag"],"rel":["hollywoodbowl","theforum","madamewongs","palladium","thelobster","pacificocean"],"w":"Santa_Monica_Civic_Auditorium","s":"active"},{"id":"smpier","h":"santamonica","n":"Santa Monica Pier","t":"Amusement Pier","c":"culture","lat":34.0108,"lng":-118.4956,"a":"200 Santa Monica Pier","i":"🎡","d":"The pier opened in 1909 and nearly died a dozen times. The city tried to demolish it in the 1970s. Residents organized and saved it. The carousel has been spinning since 1922 — it appeared in The Sting. Pacific Park opened in 1996 with the solar-powered Ferris wheel. It's the end of Route 66 and the western edge of America. Every tourist photo of LA includes this pier. Somehow it's standing.","ys":1909,"tl":[{"y":"1909","x":"Municipal pier opens"},{"y":"1922","x":"Carousel installed — spinning since"},{"y":"1973","x":"City tries to demolish — residents revolt"},{"y":"1996","x":"Pacific Park & Ferris wheel"}],"tags":["Route 66","Carousel","Ferris Wheel","The Sting"],"w":"Santa_Monica_Pier","s":"active"},{"id":"zuckys","h":"santamonica","n":"Zucky's Delicatessen","t":"Deli","c":"food","lat":34.0199,"lng"
