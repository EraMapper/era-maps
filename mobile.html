anded into current gallery space"},{"y":"2020","x":"Adopts Hermosa Beach Murals Project"}],"tags":["Museum","History","Surf Culture","Punk","South Bay"],"rel":["hermosapier","lighthousecafe"],"w":"Hermosa_Beach,_California","s":"active"},{"id":"hermosabiltmore","h":"hermosabeach","n":"Hermosa Biltmore Hotel","t":"Historic Hotel","c":"culture","lat":33.8637626,"lng":-118.402081,"a":"1400 The Strand, Hermosa Beach","i":"🏨","d":"The Surf and Sand Club opened in June 1925 — an eight-story reinforced concrete colossus on The Strand between 14th and 15th Streets, designed by Pasadena architects Hunt and Chambers. Indoor pool, bowling alley, billiard rooms, 225 sleeping quarters. The Depression killed the club; the Biltmore hotel chain acquired it in the early 1930s. After WWII it cycled through owners who couldn't afford upkeep. An evangelical ministry took possession in 1963 and got convicted of securities fraud by 1967. Squatters set a fire in 1968. Demolished 1969. The site sat empty for 26 years until Noble Park opened in 1995 — paid for by a $90,000 donation from Joe and Betty Noble.","ys":1925,"ye":1969,"tl":[{"y":"1925","x":"Surf and Sand Club opens — eight stories on The Strand"},{"y":"1930","x":"Biltmore Hotel chain acquires property"},{"y":"1963","x":"Cup of Cold Water Ministry takes over"},{"y":"1967","x":"Ministers convicted of securities fraud"},{"y":"1969","x":"Demolished after fire and decay"}],"tags":["1920s","Demolished","The Strand","South Bay"],"rel":["hermosapier","lighthousecafe"],"s":"demolished"},{"id":"mbpier","h":"manhattanbeach","n":"Manhattan Beach Pier","t":"Historic Pier","c":"culture","lat":33.8843296,"lng":-118.4121416,"a":"2 Manhattan Beach Blvd, Manhattan Beach","i":"🌊","d":"The oldest standing concrete pier on the West Coast. Designed by city engineer A.L. Harris, dedicated July 5, 1920 — a 928-foot cement structure with a rounded end to deflect wave damage. The octagonal Roundhouse pavilion went up in 1922. Dale Velzy started the first commercial surf shop under the pier in 1949, building boards for the postwar generation. The pier nearly fell apart by the late 1980s; a jogger was injured by falling concrete. Restored to its 1920s appearance and rededicated in 1992. Declared a State Historic Landmark in 1995. The Volleyball Walk of Fame lines the deck with plaques honoring Manhattan Beach Open champions.","ys":1920,"tl":[{"y":"1920","x":"Pier dedicated July 5 — 928 feet of concrete"},{"y":"1922","x":"Roundhouse pavilion completed"},{"y":"1949","x":"Dale Velzy starts first surf shop under pier"},{"y":"1992","x":"Restored and rededicated"},{"y":"1995","x":"State Historic Landmark designation"}],"tags":["1920","State Landmark","Surfing","Dale Velzy","South Bay"],"rel":["roundhouseaquarium","brucesbeach"],"w":"Manhattan_Beach_Pier","s":"active"},{"id":"roundhouseaquarium","h":"manhattanbeach","n":"Roundhouse Aquarium","t":"Aquarium & Teaching Center","c":"culture","lat":33.8833517,"lng":-118.4145971,"a":"Manhattan Beach Pier, Manhattan Beach","i":"🐠","d":"The octagonal building at the end of the Manhattan Beach Pier was built in 1922 as a Mediterranean-style pavilion. In 1979, a group of marine science advocates founded Oceanographic Teaching Stations and converted it into an aquarium and teaching center — it opened to the public in 1981. Free admission, donation-based. Educates 300,000 visitors a year with touch tanks, tide pools, and marine life exhibits. Skechers president Michael Greenberg donated $1.26 million for a complete interior overhaul in 2018, honoring his late son Harrison.","ys":1922,"tl":[{"y":"1922","x":"Octagonal pavilion built at pier's end"},{"y":"1979","x":"Oceanographic Teaching Stations founded"},{"y":"1981","x":"Aquarium opens to public"},{"y":"1992","x":"Rebuilt during pier restoration"},{"y":"2018","x":"$4M renovation — Harrison Greenberg Foundation"}],"tags":["Aquarium","Marine Science","Free","South Bay"],"rel":["mbpier"],"w":"Roundhouse_Aquarium","s":"active"},{"id":"brucesbeach","h":"manhattanbeach","n":"Bruce's Beach","t":"Historic Park","c":"community","lat":33.8944739,"lng":-118.4152154,"a":"2600 Highland Ave, Manhattan Beach","i":"✊","d":"In 1912, Willa and Charles Bruce bought beachfront land and built a resort for Black families — one of the few places in segregated Southern California where Black people could enjoy the ocean. By 1916 it had a lodge, cafe, dance hall, and changing rooms. White neighbors harassed them from day one. In 1924, Manhattan Beach condemned the property under eminent domain, claiming it needed a park. The resort was demolished in 1927. No park was built for 30 years. Renamed Bruce's Beach in 2007 after advocacy by Mitch Ward, Manhattan Beach's first Black mayor. In 2022, LA County returned the land to the Bruce family descendants — the first time a U.S. government returned property to a Black family. The family sold it back for $20 million in 2023.","ys":1912,"tl":[{"y":"1912","x":"Willa and Charles Bruce buy beachfront land"},{"y":"1916","x":"Thriving resort with lodge, cafe, dance hall"},{"y":"1924","x":"City condemns property via eminent domain"},{"y":"1927","x":"Resort demolished — land sits empty for decades"},{"y":"2007","x":"Park renamed Bruce's Beach"},{"y":"2022","x":"Land returned to Bruce family descendants"}],"tags":["Civil Rights","Racial Justice","Black History","South Bay"],"rel":["mbpier"],"w":"Bruce%27s_Beach","s":"active"},{"id":"polliwogpark","h":"manhattanbeach","n":"Polliwog Park & Red House","t":"Park & Museum","c":"culture","lat":33.8881334,"lng":-118.3845889,"a":"1601 Manhattan Beach Blvd, Manhattan Beach","i":"🏡","d":"The Red House — a 900-square-foot beach cottage built around 1905 at 205 15th Street for Amos and Sarah Raymer — is one of the oldest surviving structures in Manhattan Beach. Board-and-batten siding, extended roof slope designed to deflect sand. When a later owner planned to demolish it in 1986, residents rallied. The cottage was moved to Polliwog Park in July 1987 and refurbished as the Manhattan Beach Historical Society museum. Polliwog Park itself, developed in 1964 on school district land, is the largest park in the South Bay at 18 acres — pond, amphitheater, dog park, botanical garden, and a playground first built in 1973.","ys":1905,"tl":[{"y":"1905","x":"Beach cottage built at 205 15th Street"},{"y":"1964","x":"Polliwog Park developed — 18 acres"},{"y":"1987","x":"Red House moved to park — becomes museum"},{"y":"2023","x":"$2.95M playground renovation completed"}],"tags":["Historic Cottage","1905","Museum","South Bay"],"rel":["mbpier","brucesbeach"],"s":"active"},{"id":"thekettle","h":"manhattanbeach","n":"The Kettle","t":"24-Hour Diner","c":"food","lat":33.8853645,"lng":-118.4096832,"a":"1138 Highland Ave, Manhattan Beach","i":"☕","d":"Opened in 1973 by Wally Botello on the site of a former gas station — Manhattan Beach's first 24-hour restaurant. Arthur J. Simms, who had run the MGM Studios commissary and built the Ben Frank's chain, bought it on Christmas Day 1975. Three generations of the Simms family have run it since. The giant kettle on the roof is programmatic signage — a 1970s echo of the giant doughnuts and hot dogs that defined LA roadside architecture in the 1930s. The interior features Evelyn Ackerman's Panelcarve animal designs between booths. The chef has been there 50 years. The general manager, 32 years. LA Conservancy-recognized.","ys":1973,"tl":[{"y":"1973","x":"Opens as Manhattan Beach's first 24-hour spot"},{"y":"1975","x":"Arthur Simms buys it on Christmas Day"},{"y":"2014","x":"Celebrates 40 years — free muffins day"},{"y":"2024","x":"City Council honors 50 years of service"}],"tags":["24-Hour","Three Generations","Simms Family","South Bay"],"rel":["mbpier"],"w":"The_Kettle_(restaurant)","s":"active"},{"id":"1808thestrand","h":"manhattanbeach","n":"1808 The Strand","t":"Historic Beach Cottage","c":"culture","lat":33.8664,"lng":-118.4031,"a":"1808 The Strand, Manhattan Beach","i":"🏠","d":"The oldest home on The Strand in Manhattan Beach, built in 1922. A one-bedroom, 1,068-square-foot beach cottage with original details including a vintage ice box, antique stove, exposed beam ceilings, and a loft. It represents the era before Manhattan Beach's beachfront became a wall of multimillion-dollar modern homes. Listed for sale in 2025 at $12.75 million — $11,938 per square foot — along with its adjacent neighbor. Almost certainly destined for demolition. A reminder of what the coast looked like before money replaced charm.","ys":1922,"tl":[{"y":"1922","x":"Beach cottage built on The Strand"},{"y":"2025","x":"Listed for $12.75M — likely facing demolition"}],"tags":["1922","Beach Cottage","The Strand","South Bay"],"rel":["mbpier","polliwogpark"],"s":"active"},{"id":"beachpizzabuilding","h":"manhattanbeach","n":"Beach Pizza Building","t":"Historic Commercial Building","c":"food","lat":33.8986,"lng":-118.417,"a":"3301 Highland Ave, Manhattan Beach","i":"🍕","d":"Built in 1929 by Howard Zahn in Spanish Colonial style — the first commercial drive-up store in Manhattan Beach. Originally the Camp and Clark Drive-In Market with apartments upstairs. The arched windows and stucco facade survive beneath decades of modifications. Designated a Manhattan Beach Historic Landmark. Now home to Beach Pizza, which has been slinging pies here for years. The building's recent restoration uncovered a 1948 building permit, cement handprints from 1972, and an old meat scale behind the counter.","ys":1929,"tl":[{"y":"1929","x":"Built by Howard Zahn — first drive-up market in MB"},{"y":"2010","x":"Designated Manhattan Beach Historic Landmark"}],"tags":["1929","Spanish Colonial","Historic Landmark","South Bay"],"rel":["thekettle","mbpier"],"s":"active"},{"id":"oldtonys","h":"redondobeach","n":"Old Tony's on the Pier","t":"Seafood Restaurant","c":"food","lat":33.8392189,"lng":-118.3915462,"a":"210 Fisherman's Wharf, Redondo Beach","i":"🦞","d":"WWII veteran and former commercial fisherman Tony Trutanich opened Tony's Cafe on the Redondo Beach Pier on March 1, 1952. He insisted on this spot instead of the pier's end — you see waves crashing here, not flat dark water. Hawaiian shirts on the staff, Mai Tais in souvenir glasses, autographed headshots of Sinatra, Hope, and Carson papering the walls. The octagonal crow's nest bar went up in 1963, designed by Trutanich himself. Survived the devastating 1988 pier fire. Tony died in 2007 at 84; his sons run it now. They've given away an estimated 8.4 million Mai Tai glasses.","ys":1952,"tl":[{"y":"1952","x":"Tony Trutanich opens Tony's Cafe — March 1"},{"y":"1963","x":"Octagonal crow's nest bar added"},{"y":"1988","x":"Survives devastating pier fire"},{"y":"2007","x":"Tony dies at 84 — sons take over"}],"tags":["1952","Mai Tai","Pier","Trutanich Family","South Bay"],"rel":["funfactory"],"w":"Redondo_Beach_Pier","s":"active"},{"id":"funfactory","h":"redondobeach","n":"Redondo Fun Factory","t":"Arcade & Amusement Center","c":"community","lat":33.8408259,"lng":-118.3913085,"a":"123 International Boardwalk, Redondo Beach","i":"🎮","d":"A massive indoor arcade and amusement center hidden under a parking garage on the Redondo Beach Pier since 1972. Over 300 games, a Tilt-a-Whirl, kiddie rides, and a mural painted by a local muralist known as Wizard in 1975. The place was a time capsule — dusty carnival prizes, Skee-Ball, Pong-era machines, and a general atmosphere of beautiful decay. Billed as the largest indoor family entertainment center on the West Coast. Owner Steve Shoemaker ran it for decades. The city bought out the lease for $9 million in 2017 to make way for waterfront redevelopment. Final day: October 13, 2019.","ys":1972,"ye":2019,"tl":[{"y":"1972","x":"Opens under the pier parking garage"},{"y":"1975","x":"Wizard paints iconic Fun Factory mural"},{"y":"1988","x":"Survives pier fire"},{"y":"2017","x":"City buys out lease for $9M"},{"y":"2019","x":"Final day of operation — October 13"}],"tags":["Arcade","Tilt-a-Whirl","Pier","South Bay"],"rel":["oldtonys"],"s":"closed"},{"id":"hotelredondo","h":"redondobeach","n":"Hotel Redondo","t":"Historic Hotel","c":"culture","lat":33.8375754,"lng":-118.3896489,"a":"309 Esplanade, Redondo Beach","i":"🏨","d":"Opened May 1, 1890 — two years before the city incorporated. A 225-room Victorian palace on a bluff overlooking the Pacific, built by Oregon steamship operators Thompson and Ainsworth for roughly $500,000. Steam heat, electricity, Otis elevators, a billiard room, ballroom, and a dining room with a nightly orchestra. An 18-hole golf course and 12 acres of carnation fields surrounded it. Trains brought beachgoers; steamships brought tourists. The Boston Red Sox trained here in 1911. Prohibition killed the business. Sold for scrap lumber in 1925 — $300 for a building that cost half a million. The site is now Veterans Park.","ys":1890,"ye":1925,"tl":[{"y":"1890","x":"Opens May 1 — 225 rooms, Victorian splendor"},{"y":"1907","x":"Pavilion and seaside attractions expand"},{"y":"1911","x":"Boston Red Sox spring training camp"},{"y":"1925","x":"Sold for $300 scrap — Prohibition kills it"}],"tags":["1890","Victorian","Demolished","South Bay"],"rel":["oldtonys","theplunge"],"w":"Hotel_Redondo","s":"demolished"},{"id":"theplunge","h":"redondobeach","n":"The Plunge","t":"Historic Saltwater Pool","c":"culture","lat":33.8391,"lng":-118.391,"a":"Redondo Beach Pier area, Redondo Beach","i":"🏊","d":"Built in 1909 by Henry Huntington — a four-story Moorish-style bathhouse covering 43,688 square feet of waterfront. Advertised as the largest indoor saltwater heated pool in the world. Pumps drew over one million gallons of seawater daily, heated by the nearby Pacific Light and Power steam plant. Could hold 1,000+ swimmers at once. Tower, diving boards, trapeze. George Freeth, the legendary Hawaiian surfer Huntington brought to California in 1907, performed daredevil stunts here. Closed September 1941 as beach culture shifted outdoors. Demolished 1943. A parking structure occupies the site today.","ys":1909,"ye":1943,"tl":[{"y":"1909","x":"Huntington builds world's largest saltwater plunge"},{"y":"1919","x":"Record 7,400 swimmers in a single day"},{"y":"1941","x":"Closes September — declining attendance"},{"y":"1943","x":"Demolished"}],"tags":["1909","Demolished","Huntington","George Freeth","South Bay"],"rel":["hotelredondo"],"s":"demolished"},{"id":"beachbumburts","h":"redondobeach","n":"Beachbum Burt's","t":"Tiki Restaurant & Bar","c":"music","lat":33.846849,"lng":-118.395103,"a":"605 N Harbor Dr, Redondo Beach","i":"🌴","d":"Burt Hixson dreamed big. In March 1974 he opened an 18,000-square-foot South Seas palace at King Harbor — 98,000 imported palm fronds hand-dipped in fire retardant for the thatched roof. The harp music he initially booked flopped. Then the John Brown Band showed up around 1976 and the place exploded into one of the premier folk-rock party scenes in Southern California. Staff were called Cousins; Hixson was Uncle Burt. Sunday afternoon beach parties with bikini-clad crowds lined up around the block. Named Restaurateur of the Year 1977-78. Closed mid-1980s. The Cheesecake Factory opened in the building in June 1988.","ys":1974,"ye":1985,"tl":[{"y":"1974","x":"Opens March — 98,000 palm fronds on the roof"},{"y":"1977","x":"John Brown Band transforms it into a rock venue"},{"y":"1978","x":"Hixson wins Restaurateur of the Year"},{"y":"1985","x":"Closes — cannot compete with adjacent Red Onion"}],"tags":["Tiki","King Harbor","John Brown Band","South Bay"],"rel":["oldtonys","funfactory"],"s":"closed"},{"id":"morrellhouse","h":"redondobeach","n":"Morrell House","t":"Historic House Museum","c":"culture","lat":33.8568588,"lng":-118.3780956,"a":"298 Flagler Lane, Redondo Beach","i":"🏡","d":"Built in 1906 by Ed Morrell on Catalina Avenue — at 2,346 square feet, about twice the size of most Redondo Beach houses at the time and the only one on the block with indoor plumbing and electricity. The Morrell family lived here until the 1950s. Faced demolition in 1989; the Redondo Beach Historical Society saved it by moving the house to Heritage Court in Dominguez Park. Volunteers restored it over a decade — new foundation, new roof, earthquake retrofitting, hand-stripped paint, old wavy glass window replacements. Designated a local landmark in 1991. Now a museum and event space with period furniture donated by Velma Morrell, who lived to 100.","ys":1906,"tl":[{"y":"1906","x":"Ed Morrell builds house on Catalina Ave"},{"y":"1989","x":"Saved from demolition — moved to Heritage Court"},{"y":"1991","x":"Designated Redondo Beach local landmark"}],"tags":["1906","Historic House","Museum","South Bay"],"rel":["hotelredondo"],"s":"active"},{"id":"thepolynesian","h":"redondobeach","n":"The Polynesian","t":"Tiki Restaurant","c":"music","lat":33.8391,"lng":-118.391,"a":"Redondo Beach Pier, Redondo Beach","i":"🗿","d":"A tiki restaurant on the Redondo Beach Pier, opened in 1969 by the Brilliantes family. Famous for its giant 13-foot redwood tiki statue carved by legendary Sausalito artist Barney West in the 1960s. The restaurant changed names several times over the years but the tiki culture endured. Destroyed in the devastating pier fire of May 27, 1988, which started beneath the Breakers Seafood Restaurant and swept through the northern portion of the pier. The tiki statue survived without a scorch mark and was moved to a city maintenance yard where it lay forgotten for 30 years until a jogger rediscovered it.","ys":1969,"ye":1988,"tl":[{"y":"1969","x":"Brilliantes family opens The Polynesian on the pier"},{"y":"1988","x":"Destroyed in May 27 pier fire — tiki survives"}],"tags":["Tiki","Pier Fire","Barney West","South Bay"],"rel":["oldtonys","funfactory"],"s":"closed"},{"id":"castagnolas","h":"redondobeach","n":"Castagnola's Lobster House","t":"Seafood Restaurant","c":"food","lat":33.8486,"lng":-118.3963,"a":"665 N Harbor Dr, Redondo Beach","i":"🦐","d":"Part of the Castagnola seafood empire started by an Italian immigrant family in Santa Barbara. The Redondo Beach location opened in the King Harbor area in the late 1960s — a massive ship's motif establishment on Harbor Drive overlooking the yacht marina. Known for Treasure Chest early-bird dinners, lobster, sourdough bread, and prime rib. The crowd skewed older and more subdued than neighboring Beachbum Burt's and the Red Onion — the house band reportedly played Sweet Caroline every single night. Locations also in Pasadena, Marina del Rey, and Canoga Park. The Redondo Beach location closed in the 1990s.","ys":1968,"ye":1995,"tl":[{"y":"1968","x":"Opens at King Harbor — ship's motif, lobster menu"},{"y":"1974","x":"Treasure Chest dinners draw crowds"},{"y":"1995","x":"Redondo Beach location closes"}],"tags":["Seafood","King Harbor","Lobster","South Bay"],"rel":["beachbumburts","oldtonys"],"s":"closed"},{"id":"pinocchios","h":"burbank","n":"Pinocchio Restaurant & Monte Carlo Deli","t":"Italian Restaurant & Deli","c":"food","lat":34.17004,"lng":-118.3412947,"a":"3103 Magnolia Blvd, Burbank","i":"🤥","d":"Mark Brankovich, born in Yugoslavia and raised in Northern Italy, bought the Monte Carlo Deli in 1969. In 1971 he expanded into the adjacent space and opened Pinocchio Restaurant — cafeteria-style red sauce Italian with lasagna, meatball subs, eggplant parm, and 24 flavors of gelato. The rooftop neon Pinocchio sign dates to 1952, predating the restaurant itself. Sinatra plays on the speakers. Wine comes in goblets. Red vinyl booths, dark wood, and an unsettling army of Pinocchio dolls staring from every nook. Three generations of Burbank families have lined up with trays here. The attached deli sells homemade Italian sausage baked fresh daily.","ys":1969,"tl":[{"y":"1969","x":"Brankovich buys Monte Carlo Deli"},{"y":"1971","x":"Pinocchio Restaurant opens next door"},{"y":"1952","x":"Rooftop neon sign installed (predates restaurant)"}],"tags":["Italian","Red Sauce","Burbank","Magnolia Park"],"rel":["smokehouse","portos"],"s":"active"},{"id":"dimples","h":"burbank","n":"Dimples","t":"Karaoke Bar","c":"music","lat":34.1540284,"lng":-118.3374831,"a":"3413 W Olive Ave, Burbank","i":"🎤","d":"Sal Ferraro opened Dimples on April 15, 1982, after discovering an early karaoke machine at a Hollywood look-alike party. Billed as America's first karaoke bar. Across from Warner Bros., it became a magnet for celebrities done taping — Charlize Theron, Britney Spears, Katy Perry, Charles Barkley all sang here. The walls were buried in Hollywood memorabilia. Ferraro was 84 when the city approved the $165 million Talaria mixed-use project on the site. Closed January 2015. A Whole Foods and luxury apartments stand where thousands of terrible singers once found their voice.","ys":1982,"ye":2015,"tl":[{"y":"1982","x":"Sal Ferraro opens Dimples — April 15"},{"y":"2013","x":"Featured on Bar Rescue Season 3"},{"y":"2014","x":"City approves Talaria redevelopment project"},{"y":"2015","x":"Closes January — demolished for Whole Foods and condos"}],"tags":["Karaoke","First in America","Demolished","Burbank"],"rel":["warnerbros"],"s":"demolished"},{"id":"santoros","h":"burbank","n":"Santoro's Submarine Sandwiches","t":"Sandwich Shop","c":"food","lat":34.1823812,"lng":-118.3280097,"a":"1423 W Burbank Blvd, Burbank","i":"🥖","d":"Pat Santoro was one of five brothers running a sub shop in Massachusetts. In 1956 he got tired of the cold and moved to Burbank. He opened a sandwich shop on Burbank Boulevard and immediately started sponsoring local youth sports teams. The formula has not changed: fresh-baked rolls, top-quality meat, vegetables diced fresh every day, a house blend of spices and oil. No lettuce. Provolone only. Closed Sundays except Super Bowl Sunday. Pat's son Dick took over; current owner Sal Palilla has run it for nearly 30 years. An Italian combo cost 65 cents in 1959. The sandwich is the same. The price is not.","ys":1956,"tl":[{"y":"1956","x":"Pat Santoro opens shop on Burbank Blvd"},{"y":"2025","x":"ABC7 features 70-year legacy"}],"tags":["1956","Sandwiches","Boston Roots","Burbank"],"rel":["pinocchios"],"s":"active"},{"id":"grandcentralair","h":"glendale","n":"Grand Central Air Terminal","t":"Historic Airport Terminal","c":"culture","lat":34.1629092,"lng":-118.2865723,"a":"1310 Air Way, Glendale","i":"✈️","d":"Before LAX, this was LA's airport. Opened February 22, 1929, with the first concrete runway on the West Coast — 3,800 feet. Architect Henry Gogerty designed the terminal in Spanish Colonial Revival and Art Deco. American Airlines was born here. Amelia Earhart flew from here. Howard Hughes built his H-1 Racer in a shed on the field. Wrong Way Corrigan took off from this runway. Charles Lindbergh piloted the first transcontinental scheduled flight from Glendale on July 28, 1929, with Mary Pickford and Douglas Fairbanks aboard. Noise complaints shortened the runway; the airport closed in 1959. Walt Disney bought the property for Imagineering. Disney restored the terminal to its 1929 glory in 2012-2015. National Register of Historic Places since 2017.","ys":1929,"tl":[{"y":"1929","x":"Opens February 22 — first concrete runway on West Coast"},{"y":"1935","x":"Howard Hughes builds H-1 Racer on site"},{"y":"1959","x":"Airport closes — noise complaints kill it"},{"y":"1961","x":"Walt Disney purchases property for Imagineering"},{"y":"2017","x":"Added to National Register of Historic Places"}],"tags":["1929","Aviation","Art Deco","National Register","Glendale"],"rel":["warnerbros","disneystudios"],"w":"Grand_Central_Airport_(California)","s":"active"},{"id":"tongahut","h":"valley","n":"Tonga Hut","t":"Tiki Bar","c":"music","lat":34.1864413,"lng":-118.4121799,"a":"12808 Victory Blvd, North Hollywood","i":"🗿","d":"LA's oldest tiki bar, opened in 1958 by brothers Ace and Ed Libby after they worked at a Polynesian restaurant on Sepulveda. They named it after the Kingdom of Tonga and hired an architect who drew the floor plan in chalk on the floor — bar, fountains, booths. Original bamboo walls, pecky cedar, kidney-shaped drop ceiling, and the Drooling Bastard fountain all survive. When tiki fell out of fashion in the 1970s, Tonga Hut endured as a neighborhood dive. New owners in 2005 restored it to mid-century glory: fountains running again, velvet paintings by Jasin Sallin, classic recipes from Beachbum Berry's Grog Log. Complete all 78 cocktails in a year and earn your plaque on the Loyal Order of the Drooling Bastard wall.","ys":1958,"tl":[{"y":"1958","x":"Ace and Ed Libby open Tonga Hut"},{"y":"2005","x":"New owners restore tiki glory"},{"y":"2014","x":"Palm Springs location opens"}],"tags":["Tiki","1958","Oldest in LA","Drooling Bastard","Valley"],"rel":["donbeach","tikiti"],"w":"Tonga_Hut","s":"active"},{"id":"hotelcafe","h":"hollywood","n":"Hotel Cafe","t":"Live Music Venue","c":"music","lat":34.1004017,"lng":-118.3298327,"a":"1623 N Cahuenga Blvd, Hollywood","i":"🎵","d":"Screenwriters Marko Shafer and Max Mamikunian opened a coffee shop in 2000 to fund their writing careers. After 9/11 gutted business, Gary Jules asked to play a set. The room went silent. Everyone listened. The coffee shop became a music venue and never looked back. Intimate, phone-free, so quiet between songs you can hear the ice in someone's glass. Adele, Mumford & Sons, Sara Bareilles, and Meiko were all discovered here. Grey's Anatomy music supervisor Alexandra Patsavas used the venue as a talent pipeline. Two stages added in 2004. Announced closure of the Cahuenga location in late 2025 — relocating to a larger space on Sunset Blvd inside Lumina Hollywood, expected to reopen 2027.","ys":2000,"tl":[{"y":"2000","x":"Opens as a coffee shop on Cahuenga Blvd"},{"y":"2001","x":"Gary Jules plays — music venue born"},{"y":"2004","x":"Second stage added"},{"y":"2025","x":"Announces move to Sunset Blvd — Cahuenga closing 2026"}],"tags":["Singer-Songwriter","Intimate","Adele","Cahuenga","Hollywood"],"rel":["fonda","troubadour"],"w":"Hotel_Caf%C3%A9","s":"active"},{"id":"thegriffin","h":"atwater","n":"The Griffin","t":"Gastropub & Bar","c":"community","lat":34.1252166,"lng":-118.2646987,"a":"3000 Los Feliz Blvd, Atwater Village","i":"🍺","d":"Opened in 2007 in a cavernous brick space with arched ceilings, Gothic chandeliers, circular fireplaces, and red vinyl booths — medieval dungeon-chic in Atwater Village. Became the go-to neighborhood gastropub: hipster-friendly without being insufferable, good burgers, decent craft beer, pool table in the back. Used as Nick Miller's bar in the TV show New Girl. In 2018, a Proud Boys gathering at the bar sparked a confrontation with local activists and a PR crisis. New ownership took over in 2019 and rebranded it as The Moon Room, then that closed too. The space reopened in February 2022 as The High Low, run by the Thunderbird/Verdugo Bar crew. The Griffin name is gone.","ys":2007,"ye":2019,"tl":[{"y":"2007","x":"Opens — brick arches, fireplaces, red booths"},{"y":"2011","x":"Featured as Nick's bar in New Girl"},{"y":"2018","x":"Proud Boys incident sparks controversy"},{"y":"2019","x":"Sold to new owner — becomes Moon Room"}],"tags":["New Girl","Gastropub","Atwater Village"],"rel":["redlion"],"s":"closed"},{"id":"arroyochophouse","h":"pasadena","n":"Arroyo Chop House","t":"Steakhouse","c":"food","lat":34.1365082,"lng":-118.147135,"a":"536 S Arroyo Pkwy, Pasadena","i":"🥩","d":"The Smith Brothers — Bob and Gregg — opened the Parkway Grill across the street in 1984. When they heard a competitor was eyeing the vacant space opposite, they decided they'd rather be their own competition. Arroyo Chop House opened in 1997, bringing the LA steakhouse boom to Pasadena. Craftsman-style interior in rich mahogany, seductive booth lighting, 1,500-degree oven for searing. Exclusively USDA Prime beef — only 2% of production earns that grade. Tableside Caesar salad, Grand Marnier souffle, Hama Hama oysters in season. Wine Spectator award every year since 1999. Pasadena Weekly's Best Steakhouse from 2011 to 2021.","ys":1997,"tl":[{"y":"1997","x":"Smith Brothers open across from their Parkway Grill"},{"y":"1999","x":"First Wine Spectator award — annual since"},{"y":"2011","x":"Pasadena Weekly Best Steakhouse streak begins"}],"tags":["Steakhouse","Smith Brothers","Craftsman","Pasadena"],"rel":["gamblehouse","icehousepas"],"s":"active"},{"id":"gussbbq","h":"pasadena","n":"Gus's BBQ","t":"Barbecue Restaurant","c":"food","lat":34.1163919,"lng":-118.1501717,"a":"808 Fair Oaks Ave, South Pasadena","i":"🍖","d":"In 1946, three relatives named Gus, Jack, and Mike left their family bar in Cleveland, drove Route 66, and opened a restaurant on Fair Oaks Avenue in South Pasadena. Sixty years later, brothers Chris and John Bicos — who grew up in their father's Pasadena restaurants — bought it, shut it down, and rebuilt it as an authentic Southern BBQ joint. They kept the iconic neon sign with its little pigs and chickens. Opened the new concept in 2008, right into the recession. Hand-rubbed racks smoked on pecan logs for 16 hours. Sunset Magazine named it one of the top 10 BBQ restaurants on the West Coast. On historic Route 66.","ys":1946,"tl":[{"y":"1946","x":"Gus, Jack, and Mike drive from Cleveland — open on Fair Oaks"},{"y":"2007","x":"Bicos brothers buy it and shut down for remodel"},{"y":"2008","x":"Reopens as authentic Southern BBQ"}],"tags":["1946","Route 66","BBQ","South Pasadena"],"rel":["fairoaks"],"s":"active"},{"id":"catfiddle","h":"hollywood","n":"The Cat & Fiddle","t":"British Pub","c":"food","lat":34.0847455,"lng":-118.3384097,"a":"742 N Highland Ave, Los Angeles, CA 90038","i":"🍺","d":"Hollywood's British pub, opened in 1982 by London bassist Kim Gardner and his wife Paula. Gardner played in The Creation, The Birds with Ron Wood, and Ashton Gardner & Dyke before deciding he'd rather pour pints than tour. First location was a tiny spot on Laurel Canyon Blvd — so successful the neighbors got it shut down for zoning violations. Moved to the Fred C. Thomson Building on Sunset Blvd in 1985 where it became a music industry landmark for nearly 30 years. Rod Stewart, Robert Plant, Eric Clapton, Morrissey, Christopher Lloyd, Drew Barrymore — all regulars. Kim died in 2001. Daughters Eva, Ashlee, and Camille took over. Sunset location closed in 2014 when the landlord doubled the rent. Reopened at 742 N Highland Ave in 2017 in the former Highland Grounds space.","ys":1982,"tl":[{"y":"1982","x":"Kim and Paula Gardner open the Cat & Fiddle in Laurel Canyon"},{"y":"1984","x":"Shut down by neighbors over zoning — forced to relocate"},{"y":"1985","x":"Moves to Sunset Blvd — becomes music industry watering hole"},{"y":"2001","x":"Kim Gardner dies — daughters take over operations"},{"y":"2014","x":"Sunset Blvd location closes after landlord doubles rent"},{"y":"2017","x":"Reopens at 742 N Highland Ave in former Highland Grounds space"}],"tags":["British Pub","Music Industry","Hollywood","Restaurant"],"rel":["musso","boardner"],"w":"The_Cat_%26_Fiddle","s":"transformed","prev":"highlandgrounds"},{"id":"highlandgrounds","h":"hollywood","n":"Highland Grounds","t":"Coffeehouse / Music Venue (Closed)","c":"music","lat":34.0847455,"lng":-118.3384097,"a":"742 N Highland Ave, Los Angeles, CA 90038","i":"☕","d":"One of LA's oldest coffeehouse music venues. Opened in 1989 on Highland Ave half a block from Melrose when the coffeehouse idea was big and fresh. Poetry nights, Shakespeare on the Patio, Actor's Gang mock radio shows, storyteller nights, Kerouac nights, open mic. The open mic launched careers — Tenacious D and Jason Mraz both came up through Highland Grounds. Rilo Kiley played here in 1998. Wood-burning pizza oven, courtyard fire pit, eventually got a full liquor license. Pulled the plug on live music after 17 years in December 2006, renamed itself D!VE, tried to pivot to a bar. Didn't last. The space sat empty until the Cat & Fiddle moved in 2017.","ys":1989,"ye":2006,"tl":[{"y":"1989","x":"Opens as coffeehouse music venue on Highland Ave"},{"y":"1998","x":"Rilo Kiley performs — part of a generation of acts launched here"},{"y":"2006","x":"Closes after 17 years of live music — renames to D!VE"}],"tags":["Coffeehouse","Music Venue","Open Mic","Hollywood","Closed"],"rel":["catfiddle","hotelcafe"],"s":"transformed","next":"catfiddle"},{"id":"bootlegtheater","h":"echopark","n":"Bootleg Theater","t":"Theater / Music Venue (Closed)","c":"music","lat":34.0672617,"lng":-118.2722577,"a":"2220 Beverly Blvd, Los Angeles, CA 90057","i":"🎭","d":"A 1930s warehouse turned performance space in Historic Filipinotown. Jason and Alicia Adams opened Bootleg Theater on April 17, 1997 and ran it for 23 years. Exposed beam ceiling, a bar stage and a theater stage, genre-agnostic programming that mixed music, theater, dance, and film. John Carpenter played his first ever live concert here. Phoebe Bridgers, Arcade Fire, Big Thief, Conor Oberst all came through. Pussy Riot played their first LA show at the Bootleg. COVID shutdowns plus a partner dispute killed it — property sold in 2020. Reopened in 2021 as 2220 Arts + Archives under new cooperative ownership. Same sound equipment, same building, completely different identity.","ys":1997,"ye":2020,"tl":[{"y":"1997","x":"Jason and Alicia Adams open Bootleg Theater"},{"y":"2009","x":"John Carpenter plays his first ever live concert"},{"y":"2017","x":"Phoebe Bridgers, Big Thief era — Bootleg becomes essential Eastside venue"},{"y":"2020","x":"COVID and partner dispute force sale — Bootleg closes after 23 years"}],"tags":["Music Venue","Theater","DIY","Closed"],"rel":["satellite","sllounge","zebulon"],"s":"closed"},{"id":"theairliner","h":"lincolnheights","n":"The Airliner","t":"Bar / Music Venue","c":"music","lat":34.073875,"lng":-118.216238,"a":"2419 N Broadway, Los Angeles, CA 90031","i":"✈️","d":"A Lincoln Heights bar since 1923, over a century of reinvention. Started as a lounge attached to a steakhouse on Broadway. Spent most of the 20th century as a neighborhood dive, briefly became a catering business in the 1990s, then Luis Quiroz and Danny Vega reopened it as a music venue in 2005. Became famous as home of Low End Theory, the Wednesday night electronic and instrumental hip hop showcase that defined the LA beat scene. Thom Yorke, Erykah Badu, ?uestlove, and DJ Shadow all showed up unannounced. Featured on Bar Rescue in 2018. Closed, reopened under new ownership in 2023 with Asian-inspired bar food and natural wines. The bones are the same — two floors, long bar, back patio — but the identity keeps shapeshifting.","ys":1923,"tl":[{"y":"1923","x":"Opens as a bar and lounge on Broadway in Lincoln Heights"},{"y":"2005","x":"Reopens as a music venue under Luis Quiroz and Danny Vega"},{"y":"2006","x":"Low End Theory launches — defines the LA beat scene"},{"y":"2018","x":"Featured on Bar Rescue"},{"y":"2023","x":"Reopens again with new owners serving Asian bar food and natural wine"}],"tags":["Music Venue","Dive Bar","Electronic","Hip Hop","Lincoln Heights"],"rel":["echobar","satellite"],"s":"active"},{"id":"powerhouse","h":"hollywood","n":"Power House","t":"Dive Bar","c":"nightlife","lat":34.1021287,"lng":-118.3384586,"a":"1714 N Highland Ave, Los Angeles, CA 90028","i":"🍺","d":"Hollywood dive since 1947, on the corner of Hollywood and Highland where nobody looks down. While tourists stumble past the Walk of Fame and the Chinese Theatre one block south, Power House pours cheap whiskey for locals who know better. Velvet booths, dartboards, VHS tapes playing on a TV with no sound, live music and DJs most nights. Closed briefly in 2014 for renovation — some regulars mourned it as the death of Hollywood's last real dive — but reopened the same year with a cocktail program that somehow didn't ruin the place. Happy hour every day. The kind of bar where the bartender remembers your name after two visits.","ys":1947,"tl":[{"y":"1947","x":"Opens on Highland Ave in the heart of Hollywood"},{"y":"2014","x":"Closes for renovation — LA Weekly publishes an obituary"},{"y":"2014","x":"Reopens with cocktail program — retains dive bar soul"}],"tags":["Dive Bar","Hollywood","Rock and Roll"],"rel":["boardner","catfiddle","musso"],"s":"active"},{"id":"thesardine","h":"longbeach","n":"The Sardine","t":"Punk Venue / Record Shop","c":"music","lat":33.7340721,"lng":-118.2881104,"a":"1101 S Pacific Ave, San Pedro, CA 90731","i":"🐟","d":"Punk bar and record shop in San Pedro, run by Todd Congelliere and Isaac Thotz of Recess Records. Opened in 2016. The front is a bar with a concrete counter and booth seating — skateboard decks and Tales from the Crypt comics on the walls. The back is Recess Ops, a live music room with red velvet curtains and a stage. Outdoor patio with picnic tables and a second bar. B'last!, Subhumans, M.D.C. on the calendar. A punk record label running a punk bar in a harbor town where punk never needed permission.","ys":2016,"tl":[{"y":"2016","x":"Todd Congelliere and Isaac Thotz open The Sardine on Pacific Ave in San Pedro"},{"y":"2017","x":"Recess Ops showroom launches — punk and hardcore bookings"},{"y":"2022","x":"Named an Independent Venue Week participant"}],"tags":["Punk","Record Shop","Music Venue","San Pedro","DIY"],"rel":["alexsbar"],"s":"active"},{"id":"sevengrand","h":"downtown","n":"Seven Grand","t":"Whiskey Bar","c":"nightlife","lat":34.0470275,"lng":-118.2559336,"a":"515 W 7th St, 2nd Floor, Los Angeles, CA 90014","i":"🥃","d":"Downtown's hunting lodge whiskey cathedral. Opened Derby Day 2007 by Cedd Moses and the 213 Hospitality group on the second floor at the corner of 7th and Grand. Fox hunt wallpaper, taxidermy on every wall, a 150-year-old pool table, and a library ladder required to reach the top shelf of an international whiskey wall that runs 700+ bottles deep. Bar Jackalope hides behind a hidden door inside. Live blues and jazz most nights. The kind of place where you buy your own bottle, they put your name on it, and lock it in a glass cabinet for next time.","ys":2007,"tl":[{"y":"2007","x":"Opens on Derby Day — 213 Hospitality stakes claim in downtown"},{"y":"2010","x":"Bar Jackalope speakeasy opens inside Seven Grand"},{"y":"2015","x":"Whiskey wall passes 700 bottles from six continents"}],"tags":["Whiskey Bar","Cocktail Bar","Downtown","213 Hospitality"],"rel":["goldengopher","varnish","coles"],"w":"Seven_Grand_(bar)","s":"active"},{"id":"goldengopher","h":"downtown","n":"Golden Gopher","t":"Dive Bar","c":"nightlife","lat":34.0450353,"lng":-118.2562027,"a":"417 W 8th St, Los Angeles, CA 90014","i":"🍺","d":"Downtown's oldest bar, operating under a 1905 liquor license that lets it sell bottles to-go — one of the last places in the city with that privilege. Building went up in 1905, became a bar sometime after, survived Prohibition selling near-beer, and got its name around 1939 from a Minnesotan outfit who leased the space and named it after the University of Minnesota mascot. Declined into a biker dive through the late 20th century. Cedd Moses and 213 Hospitality acquired it in 2004, spent $600K restoring the vintage neon sign and historic fixtures. Taylor Swift danced through it in the 'Delicate' video. Pac-Man arcade in the corner. The Roosevelt ownership story is almost certainly fiction.","ys":1905,"tl":[{"y":"1905","x":"Building constructed — first liquor license issued"},{"y":"1939","x":"Renamed Golden Gopher by Minnesotan operators"},{"y":"2004","x":"Cedd Moses / 213 Hospitality acquires and restores the space"},{"y":"2018","x":"Taylor Swift films Delicate music video inside"}],"tags":["Dive Bar","Historic","Downtown","213 Hospitality"],"rel":["sevengrand","coles","kingeddys"],"w":"The_Golden_Gopher","s":"active"},{"id":"perch","h":"downtown","n":"Perch","t":"Rooftop Bar & Restaurant","c":"food","lat":34.0489961,"lng":-118.2514107,"a":"448 S Hill St, Los Angeles, CA 90013","i":"🥂","d":"French-inspired rooftop bistro on the 15th and 16th floors of the 1924 Pershing Square Building. Opened around 2011 and became downtown's most reliable rooftop destination — unobstructed skyline views, fire pits, live jazz, and cocktails that lean Parisian. The building was designed by Claud Beelman and Aleck Curlett in Italian Renaissance Revival style. Perch occupies two floors: restaurant and indoor bar on 15, open-air terrace on 16. The kind of place that makes you forget you're in a city with no subway culture because you took an elevator instead.","ys":2011,"tl":[{"y":"2011","x":"Opens on 15th and 16th floors of Pershing Square Building"},{"y":"2015","x":"Becomes downtown's signature rooftop bar"}],"tags":["Rooftop","French Bistro","Downtown","Skyline Views"],"rel":["sevengrand","goldengopher","coles"],"s":"active"},{"id":"juniorsdeli","h":"westwood","n":"Junior's Delicatessen","t":"Delicatessen (Closed)","c":"food","lat":34.0405955,"lng":-118.4291824,"a":"2379 Westwood Blvd, Los Angeles, CA 90064","i":"🥪","d":"Westside deli institution for 53 years. Marvin Saul — Korean War vet who arrived in LA with 35 cents in his pocket — opened the original Junior's on Pico Blvd in 1959. Moved to a bigger space on Westwood Blvd in 1967 and never looked back. Not the best corned beef in town (that was Langer's), not the best chicken soup (Canter's), but the best location and warmest room on the Westside. Mel Brooks was a regular. Bruce Willis too. Marvin died in 2011. Sons David and John couldn't work out a new lease. Closed New Year's Eve 2012. Building burned down in March 2024.","ys":1959,"ye":2012,"tl":[{"y":"1959","x":"Marvin Saul opens Junior's on Pico Blvd with $300"},{"y":"1967","x":"Moves to 2379 Westwood Blvd — becomes a Westside landmark"},{"y":"2011","x":"Founder Marvin Saul dies"},{"y":"2012","x":"Closes December 31 after rent dispute — 53 years gone"},{"y":"2024","x":"Building destroyed by fire"}],"tags":["Delicatessen","Jewish Deli","Westside","Closed"],"rel":["canters","natenal"],"s":"closed"},{"id":"warehouserest","h":"marinadelrey","n":"The Warehouse Restaurant","t":"Restaurant & Bar","c":"food","lat":33.9833851,"lng":-118.4449178,"a":"4499 Admiralty Way, Marina del Rey, CA 90292","i":"🦞","d":"One of the first businesses in Marina del Rey, opened November 4, 1969 by cameraman Burt Hixson. Built the place out of salvaged wharf posts, shipping crates, fishing nets, and weathered lumber trucked in from abandoned San Pedro shipyards. The walls are hung with Hixson's own photographs from decades of international travel. Polynesian-themed waterfront dining with marina views, koi pond out front, salsa dancing on Friday nights. Currently owned by Lee and Martha Spencer, who also run the Smoke House in Burbank. Over 55 years in business and counting.","ys":1969,"tl":[{"y":"1969","x":"Burt Hixson opens The Warehouse on Admiralty Way"},{"y":"1970","x":"Becomes a marina landmark — salvaged shipyard decor draws crowds"},{"y":"2024","x":"Celebrates 55th anniversary under Spencer family ownership"}],"tags":["Restaurant","Seafood","Waterfront","Marina del Rey"],"s":"active"},{"id":"theroost","h":"atwater","n":"The Roost","t":"Dive Bar","c":"nightlife","lat":34.1243222,"lng":-118.2665861,"a":"3100 Los Feliz Blvd, Los Angeles, CA 90039","i":"🐓","d":"Atwater Village dive bar of uncertain vintage — even the LA Times couldn't pin down when it opened. The building has been a bar since the 1950s or 1960s, first as The Wigwam (which had an actual wigwam on the roof), then Donna's Red Carpet, then Robin's Roost, then just The Roost. Elliott Smith was a regular in his last years, sitting alone at the end of the bar with a notebook almost every night. He wrote a song about it. Owner Sai bought it from a previous owner, added Thai food to satisfy the liquor license, and upset regulars by removing the legendary popcorn machine. Cash only. Stiffest pour in town.","ys":1956,"tl":[{"y":"1956","x":"Building becomes a bar — operates as The Wigwam (approximate date)"},{"y":"2003","x":"Elliott Smith, a regular, dies October 21 — he had been at The Roost the night before"},{"y":"2016","x":"Sai takes over — adds Thai food, removes the popcorn machine"}],"tags":["Dive Bar","Elliott Smith","Atwater Village","Cash Only"],"rel":["bigfoot","tikibar"],"s":"active"},{"id":"footsies","h":"lincolnheights","n":"Footsie's","t":"Dive Bar","c":"nightlife","lat":34.084565,"lng":-118.221164,"a":"2640 N Figueroa St, Los Angeles, CA 90065","i":"🍺","d":"Cypress Park dive in a 1924 building that's been a bar since 1933. Started as Cliff's Inn, run by expert marksman Major R. Slater — known for steaks, cocktails, and annual free venison dinners. Got held up by armed bandits at least twice. Ferdinand 'Footsie' Gioia bought it around 1948 and gave it his name. The wood-paneled interior caught the eye of Hollywood — appeared in Bad Santa and two episodes of Southland. Leather booths, semi-nude paintings, a trap door to the basement, live music most nights. The kind of bar where nobody asks what you do for a living.","ys":1933,"tl":[{"y":"1933","x":"Opens as Cliff's Inn under Major R. Slater on Figueroa St"},{"y":"1948","x":"Ferdinand 'Footsie' Gioia buys it — renames to Footsie's"},{"y":"2003","x":"Interior appears in Bad Santa"}],"tags":["Dive Bar","Cypress Park","Film Location","Northeast LA"],"rel":["theroost"],"s":"active"},{"id":"santaanita","h":"pasadena","n":"Santa Anita Park","t":"Racetrack","c":"culture","lat":34.138329,"lng":-118.043717,"a":"285 W Huntington Dr, Arcadia, CA 91007","i":"🏇","d":"First formal racetrack in California, opened Christmas Day 1934 to a crowd of 30,777 that included Clark Gable, Will Rogers, and Al Jolson. Built by movie producer Hal Roach and dentist-turned-promoter Charles Strub on land from Lucky Baldwin's estate. Gordon Kaufmann designed the Art Deco grandstand. Seabiscuit's home track — his 1940 Big Cap win made him the world's richest racehorse. During WWII the parking lot became a Japanese American internment assembly center holding 19,000 people, including five-year-old George Takei. Hosted equestrian events at the 1984 Olympics and will again in 2028.","ys":1934,"tl":[{"y":"1934","x":"Opens Christmas Day — first formal racetrack in California"},{"y":"1940","x":"Seabiscuit wins the Santa Anita Handicap"},{"y":"1942","x":"Converted to Japanese American internment assembly center — 19,000 detained"},{"y":"1984","x":"Hosts equestrian events at the Summer Olympics"},{"y":"2028","x":"Selected to host equestrian events at the LA Olympics"}],"tags":["Horse Racing","Art Deco","Olympics","Japanese Internment","Seabiscuit"],"rel":["rosebowl","huntington"],"w":"Santa_Anita_Park","s":"active"},{"id":"losglobos","h":"silverlake","n":"Los Globos","t":"Nightclub / Music Venue","c":"music","lat":34.0839142,"lng":-118.2743829,"a":"3040 Sunset Blvd, Los Angeles, CA 90026","i":"🪩","d":"Built as an American Legion dance hall in 1929, Los Globos has cycled through more identities than most venues survive. It was one of LA's first openly gay nightclubs. It hosted the first legal rave in the US — Sextacy in 1989. For years it was a neighborhood Latin dance club. Steve Edelson bought it around 2011, renovated both floors, and turned it into a seven-nights-a-week operation booking everything from Brit punk to Moth storytelling events. Unrestricted dance license means you can dance till dawn on weekends. Two stages, beautiful tile work, and steps to the smoking patio that have broken more ankles than the music has hearts.","ys":1929,"tl":[{"y":"1929","x":"Built as American Legion dance hall on Sunset Blvd"},{"y":"1989","x":"Hosts Sextacy — the first legal rave in the United States"},{"y":"2011","x":"Steve Edelson buys and renovates — reopens seven nights a week"}],"tags":["Nightclub","Dance","Rave History","Silver Lake","Latin"],"rel":["echobar","satellite","sllounge"],"s":"active"},{"id":"elcarmen","h":"fairfax","n":"El Carmen","t":"Tequila Bar / Mexican Restaurant","c":"food","lat":34.0721024,"lng":-118.367271,"a":"8138 W 3rd St, Los Angeles, CA 90048","i":"🤼","d":"Opened in 1929 as El Carmen Cafe by Encarnacion Elias Gomez — widow of General Arnulfo Gomez, assassinated two years earlier while running for president of Mexico. She started the restaurant to feed her family. Original location was at 3rd and La Brea; moved to the current spot in 1951. DW Griffith, Cecil B DeMille, Boris Karloff, Vincent Price, and Diego Rivera all ate here. Passed through the Gomez family for generations until Sean MacPherson bought it in 1997 and turned it into a Lucha Libre-themed tequila cathedral. 400+ tequilas and mezcals. Rounded rattan ceiling, Mexican tile everywhere. Reputedly haunted by Encarnacion's ghost.","ys":1929,"tl":[{"y":"1929","x":"Encarnacion Elias Gomez opens El Carmen Cafe at 3rd and La Brea"},{"y":"1951","x":"Moves to 8138 W 3rd St as Los Angeles expands westward"},{"y":"1997","x":"Sean MacPherson buys it — transforms into Lucha Libre tequila bar"}],"tags":["Tequila Bar","Mexican","Haunted","Lucha Libre","Fairfax"],"rel":["canters","farmersmarket","pinks"],"s":"active"},{"id":"pinks","h":"fairfax","n":"Pink's Hot Dogs","t":"Hot Dog Stand","c":"food","lat":34.0838505,"lng":-118.3442797,"a":"709 N La Brea Ave, Los Angeles, CA 90038","i":"🌭","d":"Paul and Betty Pink borrowed $50 from Betty's mother in 1939 to buy a pushcart near La Brea and Melrose. Hot dogs were 10 cents. No electricity — they ran an extension cord from the hardware store down the alley. The landlord raised rent from $15 to $25 in 1941; a bank manager who liked their hot dogs loaned them $4,000 to buy the property. The permanent building went up in 1946. Orson Welles allegedly ate 18 chili dogs in one sitting while shooting Citizen Kane. Celebrity wall of headshots. The corner was designated Pink's Square in 2019.","ys":1939,"tl":[{"y":"1939","x":"Paul and Betty Pink open pushcart at La Brea and Melrose — 10-cent chili dogs, 5-cent cokes"},{"y":"1941","x":"Borrow $4,000 to buy property after landlord raises rent — they will never move"},{"y":"1946","x":"Permanent building constructed at 709 N La Brea"},{"y":"1985","x":"Paul and Betty retire; son Richard takes over with wife Gloria and sister Beverly"},{"y":"2019","x":"LA City Council designates corner as Pink's Square"}],"tags":["Hot Dogs","Hollywood Legend","Fairfax","Pushcart","Institution"],"rel":["canters","farmersmarket"],"w":"Pink%27s_Hot_Dogs","s":"active"},{"id":"randysdonuts","h":"southla","n":"Randy's Donuts","t":"Donut Shop","c":"food","lat":33.9618159,"lng":-118.3703694,"a":"805 W Manchester Blvd, Inglewood, CA 90301","i":"🍩","d":"A 32-foot steel donut on the roof of an otherwise ordinary drive-up stand near LAX. Russell Wendell opened it in 1952 as Big Donut Drive-In #2. The giant donut was engineered by Richard Bradshaw, who also worked on the LAX Theme Building. Robert Eskow bought it in 1976 and renamed it after his son Randy. Tony Stark ate donuts while sitting inside the sign in Iron Man 2. The Space Shuttle Endeavour rolled past it on its way to the California Science Center in 2012. Open 24 hours. One of LA's most photographed buildings and it sells donuts for two dollars.","ys":1952,"tl":[{"y":"1952","x":"Opens as Big Donut Drive-In #2 under Russell Wendell"},{"y":"1976","x":"Robert Eskow buys it — renames after his son Randy"},{"y":"2010","x":"Featured in Iron Man 2"},{"y":"2012","x":"Space Shuttle Endeavour passes by on its way through LA"}],"tags":["Donut Shop","Programmatic Architecture","LA Icon","Film Location"],"w":"Randy%27s_Donuts","s":"active"},{"id":"casabianca","h":"eaglerock","n":"Casa Bianca Pizza Pie","t":"Pizzeria","c":"food","lat":34.139204,"lng":-118.2029066,"a":"1650 Colorado Blvd, Los Angeles, CA 90041","i":"🍕","d":"Eagle Rock's temple of pizza, opened January 1955 by Sam and Jennie Martorana with Sam's brother Joe. They brought their pizza skills from Tony's in Chicago and never left. Jonathan Gold called it the best pizza in LA — sausage, roasted garlic, fried eggplant on a thin crust. Cash only since 1955, checkered tablecloths, Frank Sinatra on the speakers, and a line out the door every Saturday. Featured in Clint Eastwood's Jersey Boys. Son Ned and daughter Andrea run it now. Granddaughter Lindsay is next. Three generations of Martoranas, one recipe, zero credit cards.","ys":1955,"tl":[{"y":"1955","x":"Sam and Jennie Martorana open Casa Bianca on Colorado Blvd — cash only from day one"},{"y":"2010","x":"Jonathan Gold names it the best pizza in Los Angeles"},{"y":"2014","x":"Featured in Clint Eastwood's Jersey Boys"}],"tags":["Pizza","Italian","Eagle Rock","Cash Only","Jonathan Gold"],"rel":["colombos"],"s":"active"},{"id":"valleyinn","h":"valley","n":"Valley Inn Restaurant","t":"Steakhouse / Supper Club","c":"food","lat":34.1536391,"lng":-118.4693082,"a":"4557 Sherman Oaks Ave, Sherman Oaks, CA 91403","i":"🥩","d":"Last of the Valley supper clubs. Jim and Otto Nassar built and opened it in 1947 when Sherman Oaks was orange groves and not much else. The bar was custom-built in England in the 1880s and shipped to San Pedro — it's the real deal. Chick Hearn and John Wooden practically lived here; they named a dining room after Wooden when he died in 2010. Bobby Troup used to perform after the restaurant closed for the night, then everyone would go back to George Gobel's house in Encino. Pot roast and potato pancakes from the original recipe. Same pin-cushion booths, same antique cash register.","ys":1947,"tl":[{"y":"1947","x":"Jim and Otto Nassar open Valley Inn in Sherman Oaks"},{"y":"1970","x":"Becomes a fixture for Lakers broadcaster Chick Hearn and UCLA coach John Wooden"},{"y":"2010","x":"Dining room named after John Wooden following his death"}],"tags":["Steakhouse","Supper Club","Sherman Oaks","Valley","Old School"],"s":"active"},{"id":"yangchow","h":"chinatown","n":"Yang Chow","t":"Restaurant","c":"food","lat":34.0627,"lng":-118.2385,"a":"819 N Broadway","i":"🦐","d":"Five brothers from Yangzhou opened a tiny diner beneath the Bing Wong Hotel in 1977 and accidentally invented one of LA's most craved dishes. The Slippery Shrimp — battered, fried, slicked in sweet chili sauce — got an LA Times writeup in the early 1980s and people showed up with the clipping in hand asking for it by name. Three generations later, Yang Chow is Chinatown's most durable restaurant, outlasting gentrification, COVID, and the slow decline of old Chinatown around it.","ys":1977,"tl":[{"y":"1977","x":"Yun brothers open beneath Bing Wong Hotel"},{"y":"1982","x":"LA Times highlights Slippery Shrimp — lines form"},{"y":"1995","x":"Expands to Canoga Park and Pasadena locations"},{"y":"2020","x":"Survives COVID and Chinatown's hardest years"}],"tags":["Chinese","Chinatown","Restaurant","Family-Owned"],"rel":["wongs","littlejoes","hongkongcafe"],"w":"Yang_Chow","s":"active"},{"id":"vidiots","h":"eaglerock","n":"Vidiots","t":"Video Store & Cinema","c":"culture","lat":34.1349023,"lng":-118.2151265,"a":"4884 Eagle Rock Blvd","i":"📼","d":"Two women opened a video rental store in Santa Monica in 1985 and built it into the most beloved film library in Los Angeles. Vidiots carried 50,000 titles — the weird stuff Blockbuster would never stock, the out-of-print VHS tapes, the foreign films nobody else bothered with. Streaming killed the Santa Monica location in 2017, but the Vidiots Foundation raised millions and reopened in 2023 inside the restored 1929 Eagle Theatre. Now a 271-seat cinema, rental library, and bar. The cockroach of LA film culture — it refuses to die.","ys":1985,"tl":[{"y":"1985","x":"Patty Polinger and Cathy Tauber open in Santa Monica"},{"y":"2012","x":"Becomes 501(c)(3) nonprofit as streaming threatens"},{"y":"2017","x":"Santa Monica storefront closes after 32 years"},{"y":"2023","x":"Reopens in restored Eagle Theatre, Eagle Rock"}],"tags":["Film","Video Store","Cinema","Nonprofit"],"rel":["nuart","braindeadstudios","vistatheatre"],"w":"Vidiots_(store)","s":"active"},{"id":"kingtaco1","h":"lincolnheights","n":"King Taco #1","t":"Restaurant","c":"food","lat":34.0940588,"lng":-118.2265045,"a":"1118 N Cypress Ave","i":"🌮","d":"Raul Martinez converted a 1950s ice cream truck into a mobile taqueria in 1974 and parked it next to an East LA bar. Within six months the demand was so intense he opened a brick-and-mortar at this Cypress Park corner in 1975. King Taco didn't just build a chain — it fundamentally changed what Americans thought a taco was. Before Martinez, LA knew hard-shell Taco Bell. After him, soft tortilla carne asada became the city's default. Jonathan Gold credited King Taco with defining the modern Los Angeles taco. Nominated for Historic-Cultural Monument status in 2025.","ys":1974,"tl":[{"y":"1974","x":"Raul Martinez launches taco truck in East LA"},{"y":"1975","x":"First brick-and-mortar opens at Cypress Ave"},{"y":"1988","x":"Iconic pole sign installed"},{"y":"1995","x":"14 locations, $21 million annual revenue"},{"y":"2025","x":"Nominated for Historic-Cultural Monument"}],"tags":["Mexican","Taco","Fast Food","Latino Heritage","Family-Owned"],"rel":["burritoking","elcompadre"],"w":"King_Taco","s":"active"},{"id":"themayan","h":"downtown","n":"The Mayan Theatre","t":"Nightclub & Theater","c":"music","lat":34.041,"lng":-118.2589,"a":"1038 S Hill St","i":"🏛️","d":"A 1927 theater designed in full Mayan Revival style by Morgan, Walls & Clements, with pre-Columbian sculptures by Francisco Cornejo covering every surface. It opened as a musical comedy house, became a Spanish-language cinema, then a porn theater for two decades under filmmaker Carlos Tobalina. In 1990 Sammy Chao converted it into a nightclub that ran for 35 years — Lucha VaVOOM, salsa nights, rock shows from Jack White to Muse. Chao's operation closed September 2025; new operators reopened it in early 2026. One of only four surviving Mayan Revival theaters in America.","ys":1927,"tl":[{"y":"1927","x":"Opens as musical comedy theater"},{"y":"1948","x":"Becomes Spanish-language cinema under Frank Fouce"},{"y":"1971","x":"Carlos Tobalina buys it — 18 years of adult films"},{"y":"1989","x":"Designated Historic-Cultural Monument"},{"y":"1990","x":"Sammy Chao reopens as nightclub"},{"y":"2025","x":"Chao era ends, closes September 13"},{"y":"2026","x":"Reopens under new operators"}],"tags":["Nightclub","Theater","Architecture","Mayan Revival","Historic"],"rel":["belascotheatre","orpheum","acehotel"],"w":"Mayan_Theater","s":"active"},{"id":"taylorssteakhouse","h":"ktown","n":"Taylor's Steakhouse","t":"Steakhouse","c":"food","lat":34.0578852,"lng":-118.3022451,"a":"3361 W 8th St","i":"🥩","d":"Tex and Margie Taylor bought O'Kelley's Tavern at Olympic and Western in 1953, renamed it Taylor's Tavern, and billed it as the Biggest Little Bar in Los Angeles. By 1970 the crowd outgrew the place and they moved a few blocks to 8th and Ardmore, where Taylor's became a Koreatown time capsule. Button-tufted red leather booths, dim lighting that makes everyone look ten years younger, and a menu straight out of 1958 — culotte steak, Steak Diane, pot roast on Mondays, kosher braised short ribs on Fridays. Son Bruce took over in 1978 and opened a second location in La Cañada Flintridge in 1995. Dress code enforced: no flip-flops, no tank tops, collared shirts for men.","ys":1953,"tl":[{"y":"1953","x":"Tex and Margie Taylor buy O'Kelley's Tavern at Olympic and Western"},{"y":"1970","x":"Moves to 3361 W 8th St to accommodate growing crowds"},{"y":"1978","x":"Son Bruce Taylor takes over"},{"y":"1995","x":"Opens second location in La Cañada Flintridge"}],"tags":["Steakhouse","Koreatown","Old School","Dress Code"],"rel":["musso","lawrys"],"s":"active"},{"id":"nickscafe","h":"chinatown","n":"Nick's Cafe","t":"Diner","c":"food","lat":34.0660426,"lng":-118.2331767,"a":"1300 N Spring St","i":"🍳","d":"A Greek immigrant named Nick Viropolous opened a tiny lunch counter across from the main rail yard on Spring Street in 1948 and famously refused to give it a name for 41 years. Regulars called it the Corner Cafe, the Ham House, whatever stuck. The bone-in ham sliced to order on the U-shaped counter became legendary. Two LAPD homicide detectives bought it in the mid-1990s and finally named it Nick's Cafe. Boxing manager Rod Davis took over in 2009. Model train circles overhead on a ceiling track. Cash only. Featured in Brooklyn Nine-Nine, Bosch, NCIS: Los Angeles, and Southland.","ys":1948,"tl":[{"y":"1948","x":"Nick Viropolous opens an unnamed lunch counter on Spring St"},{"y":"1995","x":"LAPD detectives buy the cafe — finally give it a name"},{"y":"2009","x":"Rod Davis takes over as owner"},{"y":"2012","x":"Featured in Brooklyn Nine-Nine and Bosch"}],"tags":["Diner","Cash Only","Film Location","Chinatown","Ham"],"rel":["philippes","coles"],"s":"active"},{"id":"eastsidemarket","h":"chinatown","n":"Eastside Market Italian Deli","t":"Deli","c":"food","lat":34.0651831,"lng":-118.2465864,"a":"1013 Alpine St","i":"🥪","d":"Domenic Pontrelli, born in Puglia, opened an Italian meat market in Lincoln Heights and moved it to this Alpine Street corner in 1929 when the business outgrew its first home. One of many Italian markets in what was then LA's thriving Little Italy, with San Antonio Winery and St. Peter's Church nearby. Johnny Angiuli started sweeping floors in 1959, learned the butcher trade, and bought the place with his brother Frank in 1974. Johnny built the deli counter one burner at a time. The #7 — roast beef and pastrami dunked in homemade tomato sauce — moves 700 pounds of roast beef a week. Sons Anthony, Rocco, and Vito run it now. Featured on Diners, Drive-Ins and Dives. LA Historic-Cultural Monument.","ys":1929,"tl":[{"y":"1929","x":"Domenic Pontrelli opens Italian meat market on Alpine St"},{"y":"1959","x":"Johnny Angiuli starts as floor sweeper"},{"y":"1974","x":"Angiuli brothers buy Eastside Market"},{"y":"2019","x":"Celebrates 90th anniversary with Alpine St block party"}],"tags":["Deli","Italian","Little Italy","Family-Owned","Historic"],"rel":["philippes","coles","langers"],"s":"active"},{"id":"thegalley","h":"santamonica","n":"The Galley","t":"Seafood Restaurant & Bar","c":"food","lat":34.0033303,"lng":-118.4852213,"a":"2442 Main St, Santa Monica","i":"⚓","d":"The oldest restaurant in Santa Monica, opened on the pier around 1934 as a seafood cafe with a small saltwater aquarium stocked by local fishermen. Ralph Stephan ran it for 54 years. Moved to Main Street in 1946 and the South Seas Bar has been there since — the only part of the original interior that survived renovations. Ron Schur, a former standup comic from New York who gave up on comedy due to (his words) a lack of courage and talent, became a regular in the early 1980s. Obsessed with the secret salad dressing recipe, he badgered the waitress Millie until she told him to just buy the place. He did, in 1989. Captain Ron has been at the helm ever since. Christmas lights year-round.","ys":1934,"tl":[{"y":"1934","x":"Opens as a seafood cafe on the Santa Monica pier"},{"y":"1946","x":"Moves to 2442 Main St — South Seas Bar built"},{"y":"1989","x":"Ron Schur buys the restaurant after obsessing over the salad dressing"}],"tags":["Seafood","Bar","Santa Monica","Oldest Restaurant"],"rel":["chezjay","hinano","smpier"],"s":"active"},{"id":"proudbird","h":"westla","n":"The Proud Bird","t":"Aviation Restaurant & Food Hall","c":"food","lat":33.935454,"lng":-118.3779695,"a":"11022 Aviation Blvd","i":"✈️","d":"WWII bomber pilot David Tallichet flew 20-plus combat missions before founding Specialty Restaurants Corporation, the company that pioneered destination dining. In 1967 he opened The Proud Bird at the end of LAX's runways — named after Continental Airlines' slogan — as a white-tablecloth temple to aviation. Filet mignon, aerospace executives, vintage aircraft on the lawn, and planes landing every two minutes close enough to feel the exhaust. A 1984 fire destroyed the grand ballroom and killed firefighter Benjamin Pinel. When the restaurant nearly closed in 2013, the community — particularly the Black neighborhoods near LAX who'd held proms and events there for decades when other venues turned them away — rallied to save it. Tallichet's son John renovated it as a food hall in 2017 with Bludso's BBQ as the anchor tenant. Tuskegee Airmen exhibit inside. DC-3 on the lawn.","ys":1967,"tl":[{"y":"1967","x":"David Tallichet opens The Proud Bird next to LAX runways"},{"y":"1984","x":"Fire destroys grand ballroom — firefighter Benjamin Pinel dies"},{"y":"2007","x":"Founder David Tallichet dies"},{"y":"2013","x":"Community rallies to prevent closure — 20-year lease signed"},{"y":"2017","x":"Reopens as food hall with Bludso's BBQ and aviation exhibits"}],"tags":["Aviation","Food Hall","LAX","Film Location","Community"],"rel":["randysdonuts"],"s":"active"},{"id":"otomisan","h":"lincolnheights","n":"Otomisan","t":"Japanese Restaurant","c":"food","lat":34.043,"lng":-118.2084,"a":"2506½ E 1st St","i":"🍱","d":"Oldest continuously operating Japanese restaurant in the city of Los Angeles. Mr. and Mrs. Seto opened Otemo Sushi Cafe in 1956 in a 1920s storefront built by the Nishiyama family, who had operated a grocery and barbershop there before being forced into internment camps during WWII. The Seinos bought it in the 1970s and renamed it Otomisan. Yayoi Watanabe took over in 2006 after the previous owner died. Jeff Ige runs it now. Twelve counter stools, a few booths, and the best tempura in LA according to everyone who has eaten it. The building was designated Los Angeles Historic-Cultural Monument No. 1250 in 2022 for its connection to Japanese American entrepreneurship in Boyle Heights.","ys":1956,"tl":[{"y":"1956","x":"Mr. and Mrs. Seto open Otemo Sushi Cafe in Boyle Heights"},{"y":"1970","x":"Seino family buys it — renames to Otomisan"},{"y":"2006","x":"Yayoi Watanabe takes over"},{"y":"2022","x":"Designated LA Historic-Cultural Monument No. 1250"}],"tags":["Japanese","Boyle Heights","Historic","Cash Only","Oldest"],"rel":["fugetsudo","janm","yangchow"],"s":"active"},{"id":"themint","h":"fairfax","n":"The Mint","t":"Live Music Venue","c":"music","lat":34.0522049,"lng":-118.3716059,"a":"6010 W Pico Blvd","i":"🎵","d":"Acoustically engineered as a recording studio in 1937 and operating as a music venue ever since, The Mint has outlasted every other club on Pico Boulevard. Music Machine, Club 88, the Alligator Lounge — all gone. The Mint endures. Stevie Wonder, Ray Charles, Willie Dixon, Natalie Cole, Herbie Hancock all played the small stage. Brendan Mullen booked RHCP here early on. Ben Harper, Macy Gray, Bonnie Raitt, Jackson Browne, and Wallflowers in the modern era. The room seats maybe 150 and every seat hears every note because the bones of the building were designed for sound. Jazz Sundays, live music seven nights a week, and a food menu that runs until midnight.","ys":1937,"tl":[{"y":"1937","x":"Opens as a recording studio and bar on Pico Blvd"},{"y":"1950","x":"Begins hosting live acts"},{"y":"1983","x":"Red Hot Chili Peppers play early shows"},{"y":"2007","x":"Celebrates 70th anniversary"}],"tags":["Live Music","Jazz","Blues","Mid-City","Historic"],"rel":["troubadour","whisky","viper"],"s":"active"},{"id":"clublingerie","h":"hollywood","n":"Club Lingerie","t":"Rock Club (Closed)","c":"music","lat":34.0982302,"lng":-118.3314468,"a":"6507 Sunset Blvd","i":"🎸","d":"Originally a 1970s soul club called Soul'd Out, it became Club Lingerie when Brendan Mullen — the Scotsman who'd already created the punk incubator The Masque — started booking acts in 1981. Owned by Kurt Fisher and Elmer Valentine (co-founder of the Whisky a Go-Go), with Mullen's eclectic taste driving the calendar. Punk one night, R&B the next, early hip-hop the next. Mullen gave the Red Hot Chili Peppers their first major gig opening for Bad Brains in 1983 after Kiedis and Flea barged in with a boombox. Jane's Addiction, Nirvana, Rage Against the Machine, the Pixies, Weezer, Korn, Hole, Sublime — they all came through. In February 1983, Mullen mounted the first full-spectrum hip-hop event outside New York, with Grandmaster Flash and Fab 5 Freddy. Closed April 1995.","ys":1981,"ye":1995,"tl":[{"y":"1981","x":"Brendan Mullen begins booking — Club Lingerie era starts"},{"y":"1983","x":"RHCP get first major gig opening for Bad Brains"},{"y":"1983","x":"First hip-hop festival outside NYC — Grandmaster Flash and Fab 5 Freddy"},{"y":"1992","x":"Rage Against the Machine plays early show"},{"y":"1995","x":"Closes in April after financial problems"}],"tags":["Rock Club","Punk","Hip Hop","Brendan Mullen","Closed"],"rel":["whisky","themasque","roxy","knittingfactory"],"s":"closed"},{"id":"cowsend","h":"venice","n":"The Cow's End Cafe","t":"Coffee House","c":"food","lat":33.97942,"lng":-118.46576,"a":"34 Washington Blvd, Venice","i":"☕","d":"Clabe Hartley grew up in Old Town Chicago and Panama, where coffee houses were community gathering places for artists and workers alike. In 1989 he recreated that feeling half a block from the Venice Pier. The Cow's End became Venice's living room — locals, tourists, dog owners, surfers, screenwriters, all mixed together at communal tables inside a rambling space with mismatched furniture and an upstairs loft. The Latin Cappuccino (condensed milk, steamed half-and-half, two shots of espresso) comes straight from Hartley's Panamanian childhood. Free coffee for first responders for over 30 years. Completed a major renovation in early 2025 and came out looking sharp.","ys":1989,"tl":[{"y":"1989","x":"Clabe Hartley opens The Cow's End half a block from Venice Pier"},{"y":"2025","x":"Completes major renovation"}],"tags":["Coffee House","Venice","Community","Dogs Welcome"],"rel":["abbotkinney","sidewalkcafe","venicesign"],"s":"active"},{"id":"regenttheater","h":"downtown","n":"The Regent Theater","t":"Music Venue & Historic Theater","c":"music","lat":34.0470995,"lng":-118.2479763,"a":"448 S Main St","i":"🎭","d":"The oldest remaining theater on South Main Street, opened as the National Theatre in 1914 when Main Street had twenty competing venues. Renamed The Regent around 1917. Spent decades as a grindhouse and eventually became an all-night adult movie theater before closing in 2000. Developer Tom Gilmore used it for Art Walk events starting 2006. Music promoter Mitchell Frank of Spaceland Productions took over in 2012, spent two years renovating, and reopened it as a standing-room music venue in November 2014. Gothic Revival ceiling, sloped floor (no fixed seats), 1,100 capacity, Prufrock Pizzeria in the front storefront. Live Nation acquired Spaceland in 2019. Featured in La La Land, Kolchak: The Night Stalker, and Devil in a Blue Dress.","ys":1914,"tl":[{"y":"1914","x":"Opens as the National Theatre on Main Street"},{"y":"1917","x":"Renamed The Regent"},{"y":"2000","x":"Closes after years as an adult movie theater"},{"y":"2014","x":"Mitchell Frank reopens as live music venue after two-year renovation"},{"y":"2019","x":"Live Nation acquires Spaceland Productions and the Regent"}],"tags":["Music Venue","Historic Theater","Gothic Revival","Downtown","Film Location"],"rel":["orpheum","milliondollar","belascotheatre","themayan"],"w":"Regent_Theatre_(Los_Angeles)","s":"active"},{"id":"dinoslodge","h":"weho","n":"Dino's Lodge","t":"Celebrity Restaurant (Demolished)","c":"food","lat":34.0937558,"lng":-118.3768939,"a":"8524 Sunset Blvd","i":"🍸","d":"Dean Martin and his partner Maury Samuels bought the Alpine Lodge on the Sunset Strip in 1958 and renamed it Dino's Lodge. Dean's brother Bill managed the place. Out front: a giant neon caricature of Dean's face that became one of Hollywood's campiest landmarks. The 77 Sunset Strip TV series filmed its opening credits there, turning Dino's into a national symbol of cool. The interior was dark wood paneling and leather booths meant to look like Martin's personal den. Sinatra and Elizabeth Taylor showed up for parties. Then 77 Sunset Strip made it famous to tourists and the celebrities fled. Jerry Lewis opened a rival restaurant three blocks away out of spite and stole Dino's chefs. Martin cut ties by 1962. The neon face hung there for another 25 years. Block demolished in 2013.","ys":1958,"ye":1978,"tl":[{"y":"1958","x":"Dean Martin and Maury Samuels open Dino's Lodge"},{"y":"1958","x":"77 Sunset Strip uses Dino's in opening credits"},{"y":"1961","x":"Jerry Lewis opens rival restaurant three blocks away"},{"y":"1978","x":"Closes after two decades as a tourist trap"},{"y":"2013","x":"Entire block demolished for development"}],"tags":["Rat Pack","Sunset Strip","Demolished","Dean Martin","77 Sunset Strip"],"rel":["ciros","trocadero","cocknbull","chateau"],"s":"demolished"},{"id":"ladescarga","h":"hollywood","n":"La Descarga","t":"Rum Bar & Speakeasy","c":"nightlife","lat":34.0921137,"lng":-118.3094593,"a":"1159 N Western Ave","i":"🥃","d":"The Houston Brothers' first speakeasy and the template for every immersive cocktail bar they've built since. Opened in 2010 in a nondescript East Hollywood apartment building — you check in with a doorman, climb a dingy candlelit stairwell, and step through a dusty armoire into pre-revolutionary Havana. Two-story bandstand, live Cuban brass bands, burlesque shows, salsa dancing until 2 AM. Over 100 rums behind the bar. A separate cigar lounge in the back with its own bar. Strict dress code enforced: no hoodies, no sneakers, no shorts. Reservations required on weekends. The kind of place that makes you wonder why every bar doesn't try this hard.","ys":2010,"tl":[{"y":"2010","x":"Houston Brothers open La Descarga — their first speakeasy"},{"y":"2012","x":"Named one of the best bars in America by multiple publications"}],"tags":["Speakeasy","Rum Bar","Cuban","Burlesque","Dress Code"],"rel":["edisonbar","thevarnish","threeclubs"],"s":"active"},{"id":"brightoncoffee","h":"bevhills","n":"Brighton Coffee Shop","t":"Diner","c":"food","lat":34.0678176,"lng":-118.4047946,"a":"9600 Brighton Way, Beverly Hills","i":"☕","d":"A cafe has operated from this Beverly Hills corner since 1928, when Mrs. Lily Cooper served customers out of a Spanish Colonial Revival drive-in market. The cafe moved to its current corner space in 1937 and has served breakfast continuously ever since under various names — Hardy's, Terry's, Nelly's — before William and Mrs. Huss renamed it the Brighton Coffee Shop in 1968. The oldest operating coffee shop in Beverly Hills. Doris Day loved the banana pancakes. Counter seating, a handful of tables, newspapers to read while you wait. Steps from Rodeo Drive but priced for humans. Designated Beverly Hills Historic Marker No. 20.","ys":1937,"tl":[{"y":"1937","x":"Cafe moves to corner space at 9600 Brighton Way"},{"y":"1968","x":"Renamed Brighton Coffee Shop by the Huss family"},{"y":"2022","x":"Designated Beverly Hills Historic Marker No. 20"}],"tags":["Diner","Beverly Hills","Historic","Breakfast","Coffee"],"rel":["schwabs","canters","natenal"],"s":"active"},{"id":"avalon","h":"hollywood","n":"Avalon Hollywood","t":"Nightclub & Historic Theater","c":"music","lat":34.1034,"lng":-118.3267,"a":"1735 N Vine St","i":"🪩","d":"The theater at Hollywood and Vine opened January 24, 1927 as the Hollywood Playhouse. It became a WPA Federal Theatre during the Depression, then CBS took it as El Capitan for radio broadcasts. Jerry Lewis had his weekly show here in 1963. ABC renamed it The Hollywood Palace and ran a hit variety show featuring Bing Crosby, Judy Garland, and the Rolling Stones for seven years. The Beatles played their first West Coast gig here in 1964. In 1978 Dennis Lidtke bought the building from ABC, ripped out the seats, installed the largest light and sound system in LA, and created The Palace — the West Coast Studio 54. Prince, Madonna, the Rolling Stones partied here. Eurythmics, Culture Club, The Clash, and Duran Duran all made US debuts on its stage. The Ramones played their final show here on August 6, 1996. Renamed Avalon in 2002. Insomniac acquired it in 2025.","ys":1927,"tl":[{"y":"1927","x":"Opens as Hollywood Playhouse on Vine Street"},{"y":"1964","x":"Beatles play their first West Coast show"},{"y":"1964","x":"The Hollywood Palace variety show debuts on ABC"},{"y":"1978","x":"Dennis Lidtke converts it into The Palace nightclub"},{"y":"1996","x":"Ramones play their 2,263rd and final show"},{"y":"2002","x":"Renamed Avalon Hollywood"},{"y":"2025","x":"Insomniac Events acquires the venue"}],"tags":["Nightclub","Historic Theater","Beatles","EDM","Hollywood"],"rel":["palladium","fonda","capitol","pantages"],"w":"Avalon_Hollywood","s":"active"},{"id":"meltdowncomics","h":"hollywood","n":"Meltdown Comics","t":"Comic Book Store & Comedy Venue (Closed)","c":"shop","lat":34.0978892,"lng":-118.3536343,"a":"7522 W Sunset Blvd","i":"💥","d":"Gaston Dominguez-Letelier opened a 14,000-square-foot comic book cathedral on Sunset Boulevard in 1993 and turned it into something no other comic shop had been. The logo was designed by Dan Clowes. The NerdMelt Showroom in the back — a joint venture with Nerdist — launched an entire generation of LA alternative comedy. Kumail Nanjiani and Jonah Ray shot The Meltdown with Jonah and Kumail there for Comedy Central from 2014 to 2016. Robin Williams dropped in for unannounced sets. D&D games on Sunday afternoons. Bitcoin ATM by the door. After 25 years, Dominguez-Letelier closed the doors March 30, 2018. The Simpsons based an episode on it. The building burned to the ground in 2020.","ys":1993,"ye":2018,"tl":[{"y":"1993","x":"Gaston Dominguez-Letelier opens Meltdown Comics on Sunset Blvd"},{"y":"2012","x":"NerdMelt Showroom opens in back room with Nerdist"},{"y":"2014","x":"The Meltdown with Jonah and Kumail debuts on Comedy Central"},{"y":"2018","x":"Closes March 30 after 25 years"},{"y":"2020","x":"Building burns to the ground"}],"tags":["Comic Books","Comedy","Nerd Culture","Hollywood","Closed"],"rel":["amoebarec","booksoup","wacko"],"s":"closed"},{"id":"johnniepastrami","h":"culvercity","n":"Johnnie's Pastrami","t":"Deli & Diner","c":"food","lat":34.0082043,"lng":-118.4138272,"a":"4017 Sepulveda Blvd, Culver City","i":"🥪","d":"Brothers Eddie and Eli Passy opened a pastrami stand on Sepulveda Boulevard in 1952 when the neighborhood was bars and bowling alleys. They stayed open until 3:30 AM to catch the late-night crowd. The pastrami — boiled, then steamed, then stuffed into a soft French roll — is unlike any deli version. It comes with free kosher-style pickles made from a secret spice recipe. Tabletop jukeboxes in every booth, original neon sign, fire pits on both patios. Eddie's brother-in-law Bob Bass bought in in 1962. Both Eddie and Bob danced behind the counter when good songs came on the jukebox. Bob died in 2012; his wife Sue runs it now. Vienna Beef Hall of Fame inductee. Adam Sandler, Jimmy Fallon, Mark Wahlberg, Magic Johnson — all regulars.","ys":1952,"tl":[{"y":"1952","x":"Eddie and Eli Passy open on Sepulveda — pastrami 70 cents, open until 3:30 AM"},{"y":"1962","x":"Eli departs; brother-in-law Bob Bass buys in"},{"y":"1994","x":"Eddie Passy dies; Bob Bass becomes sole owner"},{"y":"2012","x":"Bob Bass passes; wife Sue continues operation unchanged"},{"y":"2016","x":"Inducted into Vienna Beef Hall of Fame"}],"tags":["Deli","Pastrami","Culver City","Diner","Neon"],"rel":["langers","canters","philippes"],"s":"active"},{"id":"prs","h":"losfeliz","n":"Philosophical Research Society","t":"Library & Cultural Center","c":"culture","lat":34.1131212,"lng":-118.2776505,"a":"3910 Los Feliz Blvd","i":"📚","d":"Manly Palmer Hall published The Secret Teachings of All Ages at 27 and founded this nonprofit campus in 1934 to house the world's wisdom traditions under one roof. Robert Stacy-Judd designed the Mayan Revival buildings in 1936. The library holds over 50,000 volumes on comparative religion, alchemy, mysticism, and the esoteric — many of them rare first editions locked behind cabinet glass. Alan Watts lectured here. Richard Neutra lectured here. Charles and Linda Bukowski got married here in 1985. Hall died in 1990 under circumstances hi
