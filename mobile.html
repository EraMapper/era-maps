lling Companions (1999). Originally opened around 1992 at 8545 Santa Monica Blvd before moving to 8730. Closed by 1999, but not before igniting more than a few real-life romances over espresso.","ys":1992,"ye":1999,"tl":[{"y":"1992","x":"Opens on Santa Monica Blvd in West Hollywood"},{"y":"1995","x":"Moves to 8730 Santa Monica Blvd, featured in film Bar Girls"},{"y":"1997","x":"Appears in Ellen's historic coming-out \"Puppy Episode\""},{"y":"1999","x":"Closes"}],"tags":["Coffeehouse","LGBTQ","West Hollywood"],"rel":["theabbey","studione"],"s":"closed"},{"id":"lanzabros","h":"lincolnheights","n":"Lanza Brothers Market","t":"Italian Deli","c":"food","lat":34.0669,"lng":-118.221264,"a":"1803 N Main St","i":"🥖","d":"The last surviving Italian business from when Lincoln Heights was LA's Little Italy. Founded in 1926 by John Lanza, who immigrated from Italy in the late 1800s and lived on the same block as the shop. Three generations of Lanzas ran the market before Louis Lanza retired and sold to John Kim, who promised not to change a thing. The Italian combo sandwich — Boar's Head cold cuts piled on a chewy six-inch roll — costs less than a Subway footlong and is infinitely better. A century old and counting.","ys":1926,"tl":[{"y":"1926","x":"John Lanza opens the market in Lincoln Heights' Italian community"},{"y":"1960","x":"Lincoln Heights' Italian population disperses to suburbs"},{"y":"2010","x":"Second-generation owner Louis Lanza retires, sells to John Kim"}],"tags":["Italian Deli","Market","Lincoln Heights"],"rel":["eastsidemarket","nickscafe"],"s":"active"},{"id":"blueroom","h":"burbank","n":"The Blue Room","t":"Bar","c":"community","lat":34.174867,"lng":-118.300189,"a":"916 S San Fernando Blvd","i":"🍸","d":"Burbank's oldest bar has been pouring drinks since 1947 behind a corrugated metal facade that gives nothing away. Inside: turquoise leather booths, blue lighting, a jukebox with actual range, and matronly waitresses who treat you like extended family. Cash only. Christopher Nolan filmed Memento here — it's Ferdy's Bar where Natalie tests Leonard's memory with spiked beer. Michael Mann used it in Heat. Tuesday night jazz, no cover. Family-owned for over 75 years.","ys":1947,"tl":[{"y":"1947","x":"Opens on San Fernando Blvd in Burbank"},{"y":"1995","x":"Featured as a location in Michael Mann's Heat"},{"y":"2000","x":"Christopher Nolan films Memento scenes here (Ferdy's Bar)"},{"y":"2024","x":"Remains family-owned, one of the oldest bars in Burbank"}],"tags":["Dive Bar","Burbank","Film Location"],"rel":["dimples","smokehouse"],"w":"The_Blue_Room_(bar)","s":"active"},{"id":"oldlazoo","h":"losfeliz","n":"Old Los Angeles Zoo","t":"Zoo Ruins","c":"community","lat":34.132537,"lng":-118.279301,"a":"4730 Crystal Springs Dr","i":"🦁","d":"The concrete ruins of LA's original zoo sit in a Griffith Park canyon like a post-apocalyptic picnic ground. Opened in 1912 with 15 animals and a $2,000 budget, it was underfunded from day one — sewage leaked into the LA River, lions died from horse meat during WWI, and a 625-pound lion named Rufus got stuck in a moat overnight during the 1930s WPA renovation. Despite drawing two million visitors a year, critics called it \"an inadequate, ugly, poorly designed collection of beat-up cages.\" Voters approved an $8 million bond in 1958. The animals moved to the new LA Zoo in 1966. The old cages were left to crumble. Picnic tables went in. Film crews followed — Anchorman and Starsky & Hutch shot scenes among the ruins.","ys":1912,"ye":1966,"tl":[{"y":"1912","x":"Opens in Griffith Park with 15 animals and a $2,000 budget"},{"y":"1914","x":"Aviary and bear pits constructed"},{"y":"1935","x":"Major WPA renovation — new bear caves, grottos, and enclosures"},{"y":"1958","x":"Voters approve $8 million bond for a new zoo"},{"y":"1966","x":"Closes in August, animals transferred to new LA Zoo two miles north — enclosures left as ruins"}],"tags":["Griffith Park","Zoo","Ruins","Film Location"],"rel":["griffith","lazoo"],"w":"Griffith_Park_Zoo","s":"closed"},{"id":"burgerateLA","h":"fairfax","n":"The Burger That Ate L.A.","t":"Restaurant","c":"food","lat":34.083426,"lng":-118.35618,"a":"7624 Melrose Ave","i":"🍔","d":"A burger joint literally shaped like a giant cheeseburger — glass bricks formed the ketchup and onions, a domed roof made the bun, and a scale model of LA City Hall perched on top. Alison Martino called it \"the 1980s version of the Brown Derby.\" It was the defining landmark of Melrose Avenue's wild era, appearing in a People Magazine ad by 1982 and prominently in both Beverly Hills 90210 and the Melrose Place pilot. Drew Barrymore and Axl Rose ate here. By late 1994 it was gone, briefly reincarnated as Acapulco Chicken Cafe before Starbucks took over — keeping the building's distinctive rounded shape.","ys":1982,"ye":1994,"tl":[{"y":"1982","x":"Featured in People Magazine advertisement — programmatic burger-shaped building on Melrose Ave"},{"y":"1990","x":"Peak popularity during Melrose Avenue's cultural heyday"},{"y":"1992","x":"Featured in Melrose Place pilot and Beverly Hills 90210"},{"y":"1994","x":"Closes — building briefly becomes Acapulco Chicken Cafe, then Starbucks"}],"tags":["Programmatic Architecture","Melrose","Restaurant","Film Location"],"rel":["formosa","groundlings"],"s":"closed"},{"id":"rialtotheatre","h":"downtown","n":"Rialto Theatre","t":"Movie Palace","c":"culture","lat":34.043248,"lng":-118.254829,"a":"812 S Broadway","i":"🎬","d":"The first great movie palace on Broadway opened in 1917 as Quinn's Rialto with a screening of The Garden of Allah and a live symphony orchestra. Sid Grauman bought it two years later and covered the seats in white satin, hired a 7-foot-10 doorman, and filled the theater with fresh flowers — a trial run for the showmanship he'd perfect at his Chinese Theatre. The Rialto pioneered stadium-style seating with no balcony. Its 1930s Art Deco neon marquee became the longest on Broadway. Closed as a cinema in 1988, the auditorium was eventually gutted for an Urban Outfitters. The marquee survives.","ys":1917,"ye":1988,"tl":[{"y":"1917","x":"Opens May 21 as Quinn's Rialto on Broadway — one of LA's first stadium-seated theaters"},{"y":"1919","x":"Sid Grauman buys and remodels it — white satin seats, fresh flowers, live prologues with showgirls"},{"y":"1921","x":"Exclusive partnership with Paramount Pictures"},{"y":"1935","x":"Art Deco neon marquee installed — becomes the longest on Broadway"},{"y":"1972","x":"Switches to Spanish-language films as downtown demographics shift"},{"y":"1988","x":"Closes as a cinema in October"}],"tags":["Movie Palace","Broadway","Downtown","Film"],"rel":["orpheum","milliondollar","palacetheatre","globetheatre"],"w":"Rialto_Theater_(Los_Angeles)","s":"closed"},{"id":"hollywoodcheetahs","h":"hollywood","n":"Hollywood Cheetahs","t":"Strip Club","c":"nightlife","lat":34.0994589,"lng":-118.2894329,"a":"4600 Hollywood Blvd","i":"🐆","d":"The building on Hollywood Boulevard has hosted two distinct eras of nightlife a century apart. In the 1920s it was the Irish Shamrock Pub, a fixture of the early Hollywood movie scene. The current chapter opened in 1991 as an adult entertainment club, now one of the oldest strip clubs in the city. Open until 4 AM every night. Full bar. Monthly live performances alongside the regular lineup. The unusual phone prefix — (619) — is San Diego, a quirk of the original ownership.","ys":1991,"tl":[{"y":"1920s","x":"Building operates as the Irish Shamrock Pub during Hollywood's early movie era"},{"y":"1991","x":"Reopens as Hollywood Cheetahs adult entertainment club"}],"tags":["Strip Club","Nightlife","Hollywood"],"rel":["samshofbrau"],"s":"active"},{"id":"greenroombilliards","h":"atwater","n":"Green Room Billiards","t":"Pool Hall & Bar","c":"community","lat":34.1202167,"lng":-118.2514111,"a":"3458 N San Fernando Rd","i":"🎱","d":"A neighborhood pool hall tucked off San Fernando Road in Glassell Park, open since 1998 and still going. Six billiards tables, three snooker tables, a full bar, happy hour specials, and food that earns its own reviews. No-smoking indoors. The crowd skews local and serious — people come to actually play. Parking is in a small lot in back. The kind of place LA keeps threatening to gentrify out of existence but hasn't managed to yet.","ys":1998,"tl":[{"y":"1998","x":"Green Room Billiards opens on N San Fernando Rd in Glassell Park"}],"tags":["Pool","Billiards","Bar","Glassell Park","Atwater Village"],"rel":["clubteegee"],"s":"active"},{"id":"chachacha","h":"silverlake","n":"Cha Cha Cha","t":"Caribbean Restaurant","c":"food","lat":34.0834718,"lng":-118.2867039,"a":"656 N Virgil Ave","i":"🌴","d":"Chef Toribio Prado opened this Caribbean restaurant at the corner of Virgil and Melrose in 1986 and accidentally started a neighborhood. The LA Times called the block \"graffiti-splattered\" when Cha Cha Cha arrived; eight years later the same paper credited owner Mario Tamayo with sparking a \"renaissance.\" Jerk chicken and pitchers of sangria became the calling card. At its peak the chain had locations in Long Beach, Encino, and San Francisco. The Virgil original outlasted all of them — the Anayas bought it in 2003 and held on until 2016, when a landlord sale ended thirty years of service. The developer who built condos on the site named the building \"Cha Cha Cha\" and installed the original neon sign in the lobby without asking anyone involved with the restaurant.","ys":1986,"ye":2016,"tl":[{"y":"1986","x":"Chef Toribio Prado opens at Virgil and Melrose — LA Times calls the area \"graffiti-splattered\""},{"y":"1994","x":"LA Times credits the restaurant with starting Virgil Village's \"renaissance\""},{"y":"2003","x":"Anaya family buys out remaining investors, runs as a family business"},{"y":"2016","x":"Closes after 30 years when property is sold — condos built on site, developer uses restaurant's neon sign"}],"tags":["Caribbean","Silver Lake","Virgil Village","Restaurant","Closed"],"rel":["sqirl","hyperion"],"s":"closed"},{"id":"fishshanty","h":"bevhills","n":"The Fish Shanty","t":"Seafood Restaurant","c":"food","lat":34.0767,"lng":-118.3762,"a":"358 S La Cienega Blvd","i":"🐳","d":"You entered through the open mouth of a giant whale. That was the whole idea — programmatic architecture at its most literal, a fish shack shaped like a fish, with mosaic tiles on the fins that sparkled at sundown. Smith Brothers opened it in 1950 on Restaurant Row, the stretch of La Cienega at Burton Way that also hosted Lawry's, Tail o' the Cock, and Alan Hale's Lobster Barrel. Lavender leather booths, a ship's wheel on the wall, an aquarium with turtles at the entrance. It appeared in the 1965 black comedy The Loved One as the entrance to a British club. Closed in 1988. The building caught fire in 1989 and was demolished. A Rick Caruso luxury apartment complex with a Trader Joe's now occupies the site.","ys":1950,"ye":1988,"tl":[{"y":"1950","x":"Smith Brothers open The Fish Shanty at La Cienega and Burton Way on Restaurant Row"},{"y":"1965","x":"Featured in The Loved One as exterior of a British club"},{"y":"1988","x":"Restaurant closes after 38 years"},{"y":"1989","x":"Vacant building damaged by fire and demolished"}],"tags":["Restaurant","Programmatic Architecture","Restaurant Row","Closed","Film Location"],"rel":["beverlypark","ponyland","tailothetuck"],"w":"The_Fish_Shanty","s":"demolished"},{"id":"iltramezzino","h":"bevhills","n":"Il Tramezzino","t":"Italian Café","c":"food","lat":34.0716759,"lng":-118.401623,"a":"454 N Canon Dr","i":"🥖","d":"Veronique de Lestang opened this Italian café on Canon Drive in 1991 and immediately became a pioneer: Il Tramezzino was the first restaurant to successfully argue for and receive an outdoor seating permit from the City of Beverly Hills. The custom-baked Italian country baguettes and \"Chicken Special\" panini became neighborhood institutions. LA Times called it \"the best espresso west of New York.\" US Magazine and the Star labeled it \"the place to see and be seen.\" Matt Groening, before The Simpsons, worked at a Licorice Pizza on Sunset — he was a regular here too. A Studio City second location opened around 2004. Still open.","ys":1991,"tl":[{"y":"1991","x":"Veronique de Lestang opens Il Tramezzino on Canon Drive — first restaurant to get outdoor seating in Beverly Hills"},{"y":"2004","x":"Second location opens on Ventura Blvd in Studio City"}],"tags":["Italian","Café","Beverly Hills","Panini","Canon Drive"],"rel":["spagobh"],"s":"active"},{"id":"crazygideons","h":"artsdistrict","n":"Crazy Gideon's","t":"Electronics Store","c":"culture","lat":34.0447113,"lng":-118.2352851,"a":"830 Traction Ave","i":"📺","d":"Israeli-American Gideon Kotzer started selling closeout electronics in Gardena in 1972 after friends told him he was crazy for choosing that location. The name stuck. By the late 1980s he was on late-night TV, screaming about how crazy his prices were, smashing televisions, and getting dragged off by a busty nurse. \"If you don't shop here, you're crazy!\" He relocated to Traction Avenue in the Arts District in 1991, occupying a 1905 Beaux-Arts industrial building, and turned it into the 99-cent store of consumer electronics: bare concrete floors, handwritten cardboard signs, overflowing overstock and returns from manufacturers. The commercials ran until he couldn't compete with Best Buy and the internet. Closed in 2010. The space is now Arts District Brewing.","ys":1972,"ye":2010,"tl":[{"y":"1972","x":"Gideon Kotzer opens electronics store in Gardena — friends say he's \"crazy\" for the location"},{"y":"1991","x":"Relocates to 830 Traction Ave in the Arts District — late-night TV commercials begin"},{"y":"2001","x":"Inventory value over $5 million — also wholesaling to 200+ websites"},{"y":"2010","x":"Closes — space becomes Arts District Brewing; Kotzer returns for a beer named after him"}],"tags":["Electronics","Downtown","Arts District","TV Commercial","Closed"],"s":"closed"},{"id":"bigdeans","h":"santamonica","n":"Big Dean's Ocean Front Cafe","t":"Beach Bar","c":"community","lat":34.0102915,"lng":-118.4955998,"a":"1615 Ocean Front Walk","i":"🌊","d":"The building at the foot of the Santa Monica Pier predates the pier itself. In 1902 it was Loring's Lunchroom — no icebox until 1913. Big Dean's took over in the 1970s and has occupied the spot ever since, drawing lifeguards, bodybuilders, bicyclists, and anyone who needed a burger and a cold beer within earshot of the ocean. Cary Grant, Robert Wagner, Natalie Wood, George C. Scott, Wilt Chamberlain, and Evel Knievel all came through at various points. The Santa Monica Daily Press noted the 1917 building — an unreinforced masonry structure with a Greek temple motif — was designated a city landmark in 2016. Current owners took over in 2006 and kept the tradition intact.","ys":1902,"tl":[{"y":"1902","x":"Loring's Lunchroom opens at the foot of what will become the Santa Monica Pier"},{"y":"1913","x":"First icebox installed"},{"y":"1970s","x":"Big Dean's takes over — draws lifeguards, bodybuilders, and Hollywood celebrities"},{"y":"2006","x":"Current owners continue the tradition"},{"y":"2016","x":"Building designated a City of Santa Monica Landmark"}],"tags":["Beach Bar","Santa Monica Pier","Historic Building","Ocean Front Walk"],"rel":["mermaid","shutters"],"s":"active"},{"id":"talscafe","h":"southla","n":"Tal's Cafe","t":"Soul Food Diner","c":"food","lat":33.9747222,"lng":-118.3227778,"a":"2701 W Florence Ave","i":"🥞","d":"A Hyde Park institution since 1940, still serving breakfast and lunch from the same address on Florence Avenue. Wood paneling, exposed brick walls, an original counter with stools, green floor, globe lamps — nothing has been touched for the sake of fashion. The menu runs from orange pancakes to pork chops to catfish, all cooked to order. Regulars have been coming for decades; one reviewer wrote \"I've been to Japan and Amsterdam and no matter what I gotta come back to Tal's.\" Under new management and now Black-owned.","ys":1940,"tl":[{"y":"1940","x":"Tal's Cafe opens at 2701 W Florence Ave in Hyde Park"},{"y":"2000s","x":"Decades of regulars, featured in airline magazine lists of LA institutions"},{"y":"2020s","x":"New Black-owned management takes over, continues original menu"}],"tags":["Soul Food","South LA","Hyde Park","Diner","Black-Owned","Institution"],"s":"active"},{"id":"thriftydrugstore","h":"downtown","n":"Thrifty Drug Store","t":"Drug Store Chain","c":"community","lat":34.0490661,"lng":-118.2495296,"a":"412 S Broadway","i":"🍦","d":"Brothers Harry and Robert Borun opened the first Thrifty Cut Rate Drug Store at 412 S. Broadway in 1929, across from the original Broadway Department Store. Their trick: no fixed rent — just a percentage of gross — in buildings nobody else wanted. Pine-board tables. Raw lumber fixtures. Prices that undercut every corner drugstore in the city. By 1948 they had 78 stores. The ice cream came in 1940 from a small factory in West Hollywood, sold at the soda fountain for a nickel a scoop — a loss leader designed to bring families into the store. It became a SoCal institution, winning gold medals at the LA County Fair every year from 1952 onward. By the 1970s Thrifty Ice Cream had cult status. Rite Aid acquired the chain in 1996. The ice cream — pistachio, chocolate malted crunch, the cylindrical scoops — outlived the stores.","ys":1929,"ye":1996,"tl":[{"y":"1929","x":"Harry and Robert Borun open the first Thrifty Cut Rate Drug Store at 412 S. Broadway"},{"y":"1940","x":"Thrifty Ice Cream launches from a West Hollywood factory — 5 cents a scoop at the soda fountain"},{"y":"1948","x":"78 stores systemwide; ice cream wins first LA County Fair gold medal"},{"y":"1952","x":"Begins an unbroken streak of gold medals at the LA County Fair"},{"y":"1974","x":"Single scoop still costs a nickel — the price that defined a generation"},{"y":"1996","x":"Rite Aid acquires Thrifty PayLess — the Thrifty name fades but the ice cream survives"}],"tags":["Drug Store","Ice Cream","Broadway","Downtown","Institution"],"rel":["randysdonuts"],"w":"Thrifty_PayLess","s":"closed"},{"id":"paramountranch","h":"valley","n":"Paramount Ranch","t":"Movie Ranch","c":"culture","lat":34.11591,"lng":-118.754762,"a":"2903 Cornell Rd, Agoura Hills","i":"🎬","d":"In 1927 Paramount Pictures purchased 2,400 acres in the Santa Monica Mountains between Malibu and the Valley and turned them into a dedicated backlot. Over twenty-five years and more than a hundred productions the landscape doubled as San Francisco, a village in France, and 1200s China. Paramount sold in 1946. A man named William Hertz rebuilt a Western Town in the early 1950s specifically to rent to TV companies — Gunsmoke, Cisco Kid, Bat Masterson all shot here. The NPS acquired it in 1980. Dr. Quinn, Medicine Woman ran five seasons here from 1992 to 1997; Westworld used it as the park. The 2018 Woolsey Fire destroyed most of the Western Town. Reconstruction expected to complete 2025.","ys":1927,"tl":[{"y":"1927","x":"Paramount Pictures purchases 2,400 acres in the Santa Monica Mountains"},{"y":"1946","x":"Paramount sells after 100+ productions"},{"y":"1950s","x":"William Hertz builds Western Town for TV Westerns — Gunsmoke, Cisco Kid, Bat Masterson"},{"y":"1980","x":"National Park Service acquires the property"},{"y":"1992","x":"Dr. Quinn, Medicine Woman begins 5-season run on the Western Town set"},{"y":"2016","x":"HBO Westworld begins filming"},{"y":"2018","x":"Woolsey Fire destroys most of the Western Town in November"}],"tags":["Film Location","Western Town","Santa Monica Mountains","NPS","Westworld","Valley"],"rel":["grandcentralair"],"w":"Paramount_Ranch","s":"active"},{"id":"templebarla","h":"santamonica","n":"Temple Bar","t":"Music Venue","c":"music","lat":34.0240679,"lng":-118.4917565,"a":"1026 Wilshire Blvd","i":"🎵","d":"Louis Ryan arrived from New York in 1999 and opened Temple Bar on Wilshire with a mission: a Westside room for world music, Latin, hip-hop, soul, and funk. He had run a rock club in Greenwich Village; in Santa Monica he went the other direction. KCRW Morning Becomes Eclectic ran its own weekly night here. Brazilian music got its own night. Antibalas Afrobeat Orchestra, Raphael Saadiq, Goapele, Cheb I Sabbah — artists more likely to turn up on NPR than on KROQ. The front windows featured giant color portraits of showcased artists painted by a Venice artist named John Robertson. It lasted nine years. Final show September 30, 2008.","ys":1999,"ye":2008,"tl":[{"y":"1999","x":"Louis Ryan opens Temple Bar at 1026 Wilshire — world music venue for the Westside"},{"y":"2000","x":"KCRW's Morning Becomes Eclectic establishes weekly residency"},{"y":"2008","x":"Closes September 30 after nine years — farewell show features Seneca"}],"tags":["Music Venue","Santa Monica","World Music","KCRW","Closed"],"s":"closed"},{"id":"hollywoodburbankairport","h":"burbank","n":"Hollywood Burbank Airport","t":"Airport","c":"community","lat":34.196474,"lng":-118.354039,"a":"2627 N Hollywood Way","i":"✈️","d":"Dedicated Memorial Day weekend 1930 as United Airport, it was built by United Aircraft and Transport as a showy competitor to Grand Central Airport in Glendale — Spanish Revival terminal, largest commercial airport in the LA area until LAX eclipsed it in 1946. Renamed Union Air Terminal in 1934, Lockheed Air Terminal in 1940 when Lockheed bought it to serve wartime aircraft production, then Hollywood-Burbank, then Burbank-Glendale-Pasadena, then Bob Hope Airport, and finally Hollywood Burbank in 2016. Amelia Earhart used the field. Clark Gable and Carole Lombard flew out of here. The 1930 terminal building remained in use until a replacement broke ground in 2024.","ys":1930,"tl":[{"y":"1930","x":"Opens Memorial Day weekend as United Airport — Spanish Revival terminal, LA's largest airport"},{"y":"1934","x":"Renamed Union Air Terminal after federal anti-trust action dissolves parent company"},{"y":"1940","x":"Lockheed buys and renames Lockheed Air Terminal — wartime aircraft production surges"},{"y":"1967","x":"Renamed Hollywood-Burbank Airport"},{"y":"2003","x":"Renamed Bob Hope Airport"},{"y":"2016","x":"Rebranded Hollywood Burbank Airport"},{"y":"2024","x":"Groundbreaking for new replacement terminal — 1930 building to be retired"}],"tags":["Airport","Burbank","Aviation","Historic Terminal","WWII"],"rel":["grandcentralair"],"w":"Hollywood_Burbank_Airport","s":"active"},{"id":"claros","h":"pasadena","n":"Claro's Italian Market","t":"Italian Market & Deli","c":"food","lat":34.0805217,"lng":-118.0862769,"a":"1003 E Valley Blvd, San Gabriel","i":"🧀","d":"When 16-year-old Giuseppe Clarizio arrived in New York from Italy in 1922 he had less than $100 in his pocket and spoke no English. He made his way to California, got a job in a packing house in Vernon, and eventually saved enough to buy a small house in Gardena. In 1948 he and his wife Mary opened Claro's Italian Market on Valley Boulevard in San Gabriel, stocking imported specialty foods, handmade sausage from a family recipe, and a full deli counter. The family has run it ever since — son Frank took over, then daughters Rosemarie and Mary Linda with their husbands. Seven locations across Southern California now, but the original San Gabriel store is still headquarters.","ys":1948,"tl":[{"y":"1948","x":"Giuseppe and Mary Clarizio open Claro's Italian Market on Valley Blvd in San Gabriel"},{"y":"1964","x":"Second generation takes over under Frank Clarizio and wife Geraldine"},{"y":"2000s","x":"Third generation — Rosemarie and Mary Linda — expand to 6+ Southern California locations"}],"tags":["Italian Market","Deli","Family-Owned","San Gabriel Valley","SGV","Institution"],"rel":["eastsidemarket","lanzabros"],"w":"Claro%27s_Italian_Markets","s":"active"},{"id":"elconquistador","h":"silverlake","n":"El Conquistador","t":"Mexican Restaurant","c":"food","lat":34.0908123,"lng":-118.2777042,"a":"3701 Sunset Blvd","i":"🌮","d":"Opened December 7, 1973 by Jesus Pinto and Salvador Barajas on Sunset at the edge of Silver Lake. The decor was deliberately over the top — garish, colorful, festive, and changed seasonally. The killer margaritas were the main attraction: one review warned 'do not have more than two if you expect to drive home.' The place was also one of the few gay-owned Mexican restaurants in LA, and had a notably mixed crowd of locals from all walks of life who came for the potent drinks and the campy warmth. General manager Albert Curiel said that many staff members had grown up working there. It held on for forty years before a new landlord doubled the rent. Closed December 22, 2013.","ys":1973,"ye":2013,"tl":[{"y":"1973","x":"Jesus Pinto and Salvador Barajas open El Conquistador on December 7"},{"y":"1990s","x":"Becomes a Silver Lake institution known for lethal margaritas and flamboyant decor"},{"y":"2013","x":"New landlord Sunset Triangle Partners doubles rent — closes December 22 after 40 years"}],"tags":["Mexican","Silver Lake","Gay-Owned","Closed","Margaritas","Neighborhood Institution"],"rel":["casavega","casitadel"],"s":"closed"},{"id":"normslacienega","h":"weho","n":"NORMS Restaurant","t":"Googie Diner","c":"food","lat":34.0799657,"lng":-118.3762861,"a":"470 N La Cienega Blvd","i":"🍳","d":"Norm Roybark opened the first NORMS at Sunset and Vine in 1949, but it's the La Cienega location — designed by Armet & Davis and opened in 1957 — that became the flagship and the icon. Roybark, a former used car salesman, asked the architects to design his coffee shops like automobile showrooms: all glass, putting the customers on display. The roof was engineered as a moving billboard — horizontal diamonds that suggest sideways motion for approaching drivers. Ed Ruscha painted it on fire in 1964. Jerry Seinfeld and Carl Reiner came here for Comedians in Cars Getting Coffee. Open 24 hours every day of the year. Designated LA Historic-Cultural Monument #1090 in 2015. The property changed hands in 2024 and a demolition permit was filed, but the restaurant has committed to stay.","ys":1957,"tl":[{"y":"1949","x":"First NORMS opens at Sunset and Vine under Norm Roybark"},{"y":"1957","x":"La Cienega flagship opens — Armet & Davis Googie design on Restaurant Row"},{"y":"1964","x":"Ed Ruscha paints 'Norms La Cienega on Fire' — now in the J. Paul Getty Museum"},{"y":"2015","x":"Designated Los Angeles Historic-Cultural Monument #1090"},{"y":"2024","x":"Property sold, demolition permit filed — Raising Cane's proposed, opposed by preservationists"}],"tags":["Googie","Diner","24 Hours","Landmark","Armet & Davis","Restaurant Row","Historic-Cultural Monument"],"rel":["johniescoffee","bantamcock"],"w":"Norms_Restaurants","s":"active"},{"id":"johniescoffee","h":"fairfax","n":"Johnie's Coffee Shop","t":"Googie Coffee Shop","c":"food","lat":34.0632876,"lng":-118.3615487,"a":"6101 Wilshire Blvd","i":"☕","d":"Built in 1955-56 by Armet & Davis at the corner of Wilshire and Fairfax, it opened as Romeo's Times Square, became Ram's, then Johnie's. The upswept striped roofline, huge neon lettering, and glass walls dissolving the boundary between inside and outside were designed for one purpose: to stop passing cars. It worked for decades. By the 1980s it was a filming location: Miracle Mile, The Big Lebowski, Se7en, American History X, Training Day, 500 Days of Summer. Closed as a restaurant in 2000. Bought by the Gold family (founders of 99 Cents Only Stores) — they rented the parking lot to the 99 Cents next door and kept the building. Designated LA Historic-Cultural Monument in 2013. Briefly became Bernie's Coffee Shop for the 2016 Sanders campaign. The building still stands.","ys":1956,"ye":2000,"tl":[{"y":"1956","x":"Opens as Romeo's Times Square — Armet & Davis Googie design on the Miracle Mile"},{"y":"1964","x":"Becomes Ram's, then Johnie's shortly after"},{"y":"1988","x":"Setting for the opening of cult film Miracle Mile"},{"y":"1994","x":"Gold family (99 Cents Only Stores) purchases the property"},{"y":"1998","x":"Appears in The Big Lebowski and American History X"},{"y":"2000","x":"Closes as a restaurant — used for filming only"},{"y":"2013","x":"Designated an LA Historic-Cultural Monument — saved from Metro construction threat"},{"y":"2016","x":"Temporarily renamed Bernie's Coffee Shop for the Sanders presidential campaign"}],"tags":["Googie","Diner","Landmark","Film Location","Miracle Mile","Closed","Armet & Davis"],"rel":["normslacienega","bantamcock"],"w":"Johnie%27s_Coffee_Shop","s":"closed"},{"id":"cornfieldpark","h":"chinatown","n":"Los Angeles State Historic Park","t":"Public Park","c":"culture","lat":34.0682286,"lng":-118.2318135,"a":"1245 N Spring St","i":"🌿","d":"A 32-acre park along the LA River just north of Chinatown, on land that has been in continuous use since the original Tongva village of Yaanga. The Spanish used it; the Mexican rancho used it; the railroad used it as a railyard for over a century. After the last trains left, it became a contaminated brownfield. Community activists — particularly in the Chinatown and Lincoln Heights neighborhoods — fought for years to turn the site into a park rather than a warehouse complex. The Trust for Public Land helped acquire it and called it the Cornfield, after the informal name locals had given the weedy vacant lot. The state transferred it to California State Parks in 2001. Now the largest green space near downtown LA, with skyline views, a river trail connection, and a consistent run of major public events.","ys":2001,"tl":[{"y":"1876","x":"Southern Pacific establishes railyard on the site — in use for over a century"},{"y":"1995","x":"Last trains leave; land sits contaminated and vacant"},{"y":"2001","x":"Community activists secure the Cornfield — Trust for Public Land acquires it for a park"},{"y":"2006","x":"State of California officially opens Los Angeles State Historic Park"}],"tags":["Park","Chinatown","Cornfield","LA River","Community","Public Space"],"rel":["chinatownplaza","unionstn"],"w":"Los_Angeles_State_Historic_Park","s":"active"},{"id":"coffeeshop101","h":"hollywood","n":"101 Coffee Shop","t":"Diner","c":"food","lat":34.1053722,"lng":-118.3238583,"a":"6145 Franklin Ave","i":"☕","d":"The building on Franklin at the foot of the Hollywood Hills has been in the Adler family since 1948 and dates to 1927. The food service space ran as a pharmacy first, then became a diner in the 1930s. By the time Jon Favreau filmed Swingers there in 1994 it was called the Hollywood Hills Coffee Shop — a no-frills diner attached to what was then a Best Western, where locals and travelers off the 101 came for early breakfast. Swingers put it on the map. Restaurateur Warner Ebbink took the space in 2001 and rebranded it the 101 Coffee Shop, restoring the interior in the spirit of 1960s diners. Brad Pitt, Gwyneth Paltrow, and Johnny Depp were regulars under its previous owners. Closed March 2020 during the pandemic and never reopened. Now operating as Clark Street Diner.","ys":1930,"ye":2020,"tl":[{"y":"1927","x":"Building constructed on Franklin Ave at the 101 freeway approach"},{"y":"1930s","x":"Food service diner opens in what had been a pharmacy"},{"y":"1994","x":"Jon Favreau films Swingers here — 'the Hollywood Hills Coffee Shop' scene"},{"y":"2001","x":"Warner Ebbink reopens as 101 Coffee Shop — 1960s diner restoration"},{"y":"2020","x":"Closes March 2020 during COVID pandemic and never reopens"}],"tags":["Diner","Hollywood","Swingers","Film Location","Closed"],"rel":["normslacienega","johniescoffee"],"s":"closed"},{"id":"fortydeuce","h":"hollywood","n":"Forty Deuce","t":"Burlesque Nightclub","c":"nightlife","lat":34.0838505,"lng":-118.3237,"a":"5574 Melrose Ave","i":"💃","d":"Ivan Kane bought the space on Melrose across from the Paramount lot in 1997 and opened it as Kane — a house-of-soul club with a Cleopatra Jones DJ and Go-Go dancers that drew celebrity lines around the block. In 2002 he converted it to Forty Deuce, a neo-burlesque club that single-handedly launched the burlesque revival in Los Angeles. Robin Antin staged the original Pussycat Dolls show here before it became a global franchise. Nicole Kidman, George Clooney, and Vince Vaughn were regulars. The Hollywood Reporter called it 'the original burlesque show to which all others must be compared.' Melrose closed 2008. The address became Pour Vous in 2012. Before Kane arrived in the late 1980s, Sean MacPherson had run a seminal dive called Small's K.O. in the same space.","ys":2002,"ye":2008,"tl":[{"y":"1980s","x":"Sean MacPherson operates Small's K.O. — a seminal dive bar at this address"},{"y":"1997","x":"Ivan Kane opens Kane — a high-concept house-of-soul club opposite Paramount"},{"y":"2002","x":"Converts to Forty Deuce — neo-burlesque revival launches; Pussycat Dolls originate here"},{"y":"2008","x":"Melrose location closes in March"},{"y":"2012","x":"Address reopens as Pour Vous, a Parisian cocktail lounge"}],"tags":["Burlesque","Nightclub","Hollywood","Pussycat Dolls","Closed"],"rel":["ladescarga","clublingerie"],"s":"closed"},{"id":"lakeHollywood","h":"hollywood","n":"Lake Hollywood Park","t":"Reservoir & Park","c":"culture","lat":34.118125,"lng":-118.3313091,"a":"Lake Hollywood Dr","i":"🏞️","d":"The Hollywood Reservoir was built between 1922 and 1925 by William Mulholland to supply the expanding city. The earthen dam holds about 2 billion gallons. After the catastrophic St. Francis Dam collapse in 1928 killed over 400 people, Mulholland resigned in disgrace and the Hollywood Reservoir was briefly ordered drained out of fear — but the dam held. The 3.5-mile perimeter trail opened to the public in the 1990s and became one of the city's most beloved walks: flat, quiet, with views of the Hollywood Sign and occasional deer and coyotes. Location scouts found it too — it doubles for the Central Park Reservoir in countless productions.","ys":1925,"tl":[{"y":"1922","x":"Construction begins on Mulholland Dam and Hollywood Reservoir"},{"y":"1925","x":"Reservoir completed — begins supplying water to Hollywood"},{"y":"1928","x":"St. Francis Dam collapses killing 400+ — Hollywood Reservoir briefly ordered drained as precaution; Mulholland resigns"},{"y":"1990s","x":"Perimeter walking trail opens to the public"}],"tags":["Reservoir","Park","Mulholland","Hollywood Hills","Hiking"],"rel":["griffithpark","bronsoncaves"],"w":"Hollywood_Reservoir","s":"active"},{"id":"anticlub","h":"silverlake","n":"The Anti-Club","t":"Punk & Alternative Venue","c":"music","lat":34.0832302,"lng":-118.3021428,"a":"4658 Melrose Ave","i":"🎸","d":"Opened in 1979 by Helen Bed at what was known as Helen's Place on the far east end of Melrose, miles from the boutique strip. A converted house that looked residential until you saw the crowd. The Anti-Club was one of the axis points of the entire LA post-punk scene alongside Al's Bar and Club Lingerie. Red Hot Chili Peppers played one of their first shows here. Sonic Youth, Social Distortion, Minutemen, Redd Kross, Faith No More, Weezer, and System of a Down all played the tiny room. The owner reportedly came out from behind the bar with a gun to break up a fight during a St. Vitus set. Shows documented as late as 2011.","ys":1979,"tl":[{"y":"1979","x":"Helen Bed opens the Anti-Club at Helen's Place — 4658 Melrose"},{"y":"1983","x":"Red Hot Chili Peppers play one of their first shows here"},{"y":"1980s","x":"Becomes the anchor of the LA post-punk/alternative scene alongside Al's Bar and Club Lingerie"},{"y":"1997","x":"System of a Down, Weezer, and others continue into the late 1990s"},{"y":"2011","x":"Final documented shows on record"}],"tags":["Punk","Alternative","Music Venue","Melrose","RHCP","Post-Punk"],"rel":["clublingerie","cuffs"],"w":"Anti-Club_(Los_Angeles)","s":"active"},{"id":"retailslut","h":"fairfax","n":"Retail Slut","t":"Punk Boutique","c":"community","lat":34.0838268,"lng":-118.3538557,"a":"7517 Melrose Ave","i":"🕷️","d":"Opened in 1983 at 7517 Melrose by Helen O'Neill — one of the first stores on Melrose to specialize in British bondage gear, gothic clothing, and combat boots. Billy Idol, Cyndi Lauper, Axl Rose, and Nina Hagen shopped here. Taime Downe of Faster Pussycat and the singer from Motorcycle Boy worked the register. The most enduring story: Slash stole his signature top hat from here. The store anchored the Melrose punk aesthetic through the 1980s and 1990s, changed hands under Peter Thomas, and eventually closed as rents climbed and the internet killed the avenue's magic. The LA Weekly wrote that when it closed it felt like a rockstar you loved had died.","ys":1983,"tl":[{"y":"1983","x":"Helen O'Neill opens Retail Slut at 7517 Melrose — bondage, gothic, punk gear"},{"y":"1984","x":"Melrose peaks as LA's punk/new wave epicenter — Retail Slut is its flagship"},{"y":"1990s","x":"Changes hands under Peter Thomas; remains a Melrose institution"},{"y":"2000s","x":"Closes — widely cited as the symbolic end of the avenue's golden era"}],"tags":["Boutique","Melrose","Punk","Fashion","Slash","Closed"],"rel":["burgerateLA"],"s":"active"},{"id":"bantamcock","h":"weho","n":"The Bantam Cock","t":"Continental Restaurant","c":"food","lat":34.082,"lng":-118.3762,"a":"La Cienega Blvd at Melrose","i":"🐓","d":"Opened 1948 by Sheldon Mac McHenry as a smaller, more continental sibling to his Tail o' the Cock — on La Cienega's Restaurant Row just north of Melrose. After opening, manager Jack Buchtel was dispatched to Paris to study at the Cordon Bleu and source recipes for the Bantam's weekly specials. Among the first West Coast restaurants to feature California wines alongside French imports. A mid-1950s Mondrian-inspired remodel by architects John Rex and Douglas Honnold added a signature brass rooster sculpture by Harry Bertoia — the Diamond Chair designer. Jack Webb celebrated a birthday here in 1954. Cited in the Gebhard and Winter architecture guide. Closed 1975.","ys":1948,"ye":1975,"tl":[{"y":"1948","x":"Mac McHenry opens The Bantam Cock on La Cienega Restaurant Row"},{"y":"1948","x":"Manager Buchtel sent to Paris to study Cordon Bleu — shapes the menu"},{"y":"1956","x":"Mondrian-inspired remodel by Rex & Honnold; Harry Bertoia brass rooster installed"},{"y":"1975","x":"Closes after 27 years"}],"tags":["Restaurant Row","La Cienega","Continental","Closed","Mid-Century","Harry Bertoia"],"rel":["normslacienega","fishshanty"],"s":"closed"},{"id":"nickeldiner","h":"downtown","n":"Nickel Diner","t":"Diner","c":"food","lat":34.0459852,"lng":-118.2487792,"a":"524 S Main St, Los Angeles, CA 90013","i":"🍩","d":"Kristen Trattner and Monica May opened in 2008 in a building that had housed a 1940s diner — original hand-painted wall menus with 1940s prices still visible when they arrived. The space was in the heart of what Los Angeles calls the Nickel, a stretch of Main Street long associated with Skid Row. They kept the red vinyl booths, the formica counters, and the floor lamps turned upside down on the ceiling. The maple bacon donut became the signature, written up in Vogue, Bon Appetit, and on Food Network's Diners, Drive-Ins and Dives. LA Magazine named it one of the three best restaurants in the city. Jonathan Gold included it in his 101 Best. Closed May 28, 2023 — rising costs and a changed Downtown.","ys":2008,"ye":2023,"tl":[{"y":"2008","x":"Trattner and May open Nickel Diner — maple bacon donut becomes the city's cult dessert"},{"y":"2009","x":"Guy Fieri visits for Diners, Drive-Ins and Dives; Jonathan Gold adds it to his 101 Best"},{"y":"2023","x":"Closes May 28 after 15 years — rising costs and a changed Downtown"}],"tags":["Downtown","Diner","Maple Bacon Donut","Skid Row","DTLA","Jonathan Gold"],"rel":["qualitycafe"],"w":"Nickel_Diner","s":"closed"},{"id":"captainstable","h":"bevhills","n":"The Captain's Table","t":"Seafood Restaurant","c":"food","lat":34.0626762,"lng":-118.3762188,"a":"301 S La Cienega Blvd, Beverly Hills, CA 90211","i":"🦞","d":"Anchored at the south end of La Cienega Restaurant Row near San Vicente — a seafood house with a maritime interior, a full lobster menu, and uneven-legged chairs. Open by 1949; families newly arrived in LA made it an immediate monthly ritual for Maine lobster and Ipswich clams. By the early 1970s it had grown expensive and mediocre. Star Trek fans famously bombarded William Shatner with dinner invitations to eat where Captain Kirk would eat — no reply was ever received. The restaurant closed and the building was painted with psychedelic colors and became a discotheque. Demolished in the 1980s.","ys":1949,"ye":1975,"tl":[{"y":"1949","x":"Open at the south end of Restaurant Row — already a destination for lobster and fresh seafood"},{"y":"1969","x":"A Victor Henderson mural on the adjoining building marks the block's cultural high-water mark"},{"y":"1975","x":"Closes; building becomes a disco painted in psychedelic colors, later demolished"}],"tags":["Restaurant Row","La Cienega","Seafood","Beverly Hills","Lobster","Closed"],"rel":["fishshanty","normslacienega"],"s":"demolished"},{"id":"richlors","h":"bevhills","n":"Richlor's / Ed Debevic's","t":"Restaurant Row / Retro Diner","c":"food","lat":34.0683105,"lng":-118.375981,"a":"134 N La Cienega Blvd, Beverly Hills, CA 90211","i":"🍔","d":"Opened in 1941 next door to Lawry's, Richlor's was famed for planked hamburger steaks — the kitchen assigned one chef solely to mashed potatoes, festooned around each burger on its oak serving plank. J. Edgar Hoover was reportedly a regular. By 1962 the seafood bar claimed to have served 21 million shrimp since 1942. The Wayne McAllister-designed building was remodeled in 1961 as Lawry's Mediterrania, ending Richlor's run. The building's second act came in 1987 as the Beverly Hills outpost of Ed Debevic's — the Chicago-born retro diner chain where waitstaff were theatrically rude, jukeboxes sat at every table, and the World's Smallest Sundae was a menu staple. The Bear TV show traces its main character's drive to open a restaurant to a childhood visit to Ed Debevic's. Beverly Hills location closed around 2002; building demolished 2004.","ys":1941,"ye":2004,"tl":[{"y":"1941","x":"Richlor's opens next to Lawry's — planked hamburger steaks on Wayne McAllister's Restaurant Row"},{"y":"1942","x":"Seafood bar opens; by 1962, 21 million shrimp claimed served"},{"y":"1961","x":"Richlor's closes as building is remodeled into Lawry's Mediterrania"},{"y":"1987","x":"Ed Debevic's retro diner chain opens — rude waitstaff, 1950s nostalgia, jukeboxes"},{"y":"2004","x":"Ed Debevic's closes; Wayne McAllister building demolished"}],"tags":["Restaurant Row","La Cienega","Beverly Hills","Planked Burger","Wayne McAllister","Closed"],"rel":["normslacienega","fishshanty","bantamcock"],"s":"demolished"},{"id":"qualitycafe","h":"downtown","n":"Quality Cafe / Teragram Ballroom","t":"Diner / Music Venue","c":"culture","lat":34.051873,"lng":-118.2670329,"a":"1234 W 7th St, Los Angeles, CA 90017","i":"🎬","d":"The building at 1236 West 7th Street was a movie theater in 1913 and first appears as a restaurant in the 1942 city directory. The Quality Cafe — red vinyl booths, checkered floors, neon soda fountain — became so useful to Hollywood as an authentic diner set that by 2006 film revenue exceeded diner revenue and it stopped serving the public. Screen credits include Se7en, Training Day, Catch Me If You Can, Gone in 60 Seconds, Ghost World, Old School, Million Dollar Baby, Mad Men Season 1, and 500 Days of Summer. In 2014 the space was gutted and rebuilt as the Teragram Ballroom — a 600-capacity rock club that ranks among Downtown LA's best mid-size music venues.","ys":1942,"tl":[{"y":"1942","x":"Building first listed as a restaurant in LA city directories"},{"y":"1995","x":"Se7en uses the diner; it becomes Hollywood's go-to period diner set"},{"y":"2006","x":"Closes to the public — maintained as a film-only location"},{"y":"2014","x":"Renovated into the Teragram Ballroom; opens as a concert venue"}],"tags":["Film Location","Downtown","Diner","Teragram","Music Venue","Se7en","Training Day","Mad Men"],"rel":["nickeldiner"],"w":"Quality_Cafe_(diner)","s":"active"},{"id":"encorelounge","h":"weho","n":"Encore Cocktail Lounge","t":"Cocktail Lounge & Supper Club","c":"nightlife","lat":34.085608,"lng":-118.3762652,"a":"806 N La Cienega Blvd, West Hollywood, CA 90069","i":"🥃","d":"A supper club and cocktail lounge on the northern stretch of La Cienega, just south of Santa Monica Boulevard, in a building that had been a custom fashion emporium before the war. By December 1950 it had become enough of a mob magnet that a brawl produced two witnesses called before the Kefauver Senate Crime Investigating Committee. The Walter Gross Trio played residencies through 1953 and 1954. Bobby Troup — composer of Route 66 and regular headliner — had three teeth knocked out in the parking lot in May 1961 when a coffee salesman punched him over a woman at his table. In December 1964, a shoving match over the bill ended in the death of a West Side accountant. By the late 1970s the building housed the Jeffrey Horvitz art gallery.","ys":1950,"ye":1965,"tl":[{"y":"1950","x":"December brawl surfaces gamblers called before the Kefauver Senate Crime Committee"},{"y":"1953","x":"Walter Gross Trio holds regular residencies at the lounge"},{"y":"1961","x":"Bobby Troup loses three teeth when punched in the parking lot by a patron"},{"y":"1964","x":"December: shoving match over the bill ends in a death; Encore effectively finished"}],"tags":["La Cienega","WeHo","Supper Club","Cocktail Lounge","Kefauver","Bobby Troup","Closed"],"rel":["bantamcock","normslacienega"],"s":"closed"},{"id":"mingroom","h":"bevhills","n":"Bruce Wong's Ming Room","t":"Chinese Restaurant","c":"food","lat":34.0604111,"lng":-118.376571,"a":"358 S La Cienega Blvd, Beverly Hills, CA 90211","i":"🏮","d":"Bruce Wong was a stuntman, film actor, and technical advisor who worked in Hollywood from the 1920s through the 1940s. He opened the Ming Room at 358 South La Cienega on the southern stretch of Restaurant Row, a more intimate Chinese alternative to the prime rib palaces to the north. Wong also owned the Chinese Village Cafe at 745 N. Main Street downtown. He died in November 1953; the Chinese Village Cafe was sold just before his death, and the Ming Room closed soon after.","ys":1948,"ye":1953,"tl":[{"y":"1948","x":"Bruce Wong opens the Ming Room — the only Chinese restaurant on La Cienega Restaurant Row"},{"y":"1953","x":"Wong dies in November; the Ming Room closes shortly after"}],"tags":["Restaurant Row","La Cienega","Chinese","Beverly Hills","Closed","Bruce Wong"],"rel":["captainstable","richlors"],"s":"closed"},{"id":"wanq","h":"westla","n":"Wan-Q / Fu's Palace","t":"Chinese / Tiki Restaurant","c":"food","lat":34.05489,"lng":-118.38281,"a":"8751 W Pico Blvd, Los Angeles, CA 90035","i":"🗿","d":"Owner Benny Eng started with a conventional Cantonese menu on Pico a block east of Robertson, then in the early 1960s caught the Pop Polynesian wave and transformed the place: rattan and bamboo, tikis and waterfalls, a thatched A-frame roof visible from the street, Chinese jade tile cladding, float lamps, and a full run of tiki cocktails alongside the Chinese menu. When Wan-Q closed in the early 1990s the space cycled through a Caribbean restaurant called the Sugar Shack — which kept the tiki exterior intact — then Jamaican and Mexican tenants, before the building returned to its birthright as a Chinese restaurant. Fu's Palace has occupied the same address ever since, family-owned for over two decades, serving Cantonese and Szechuan dishes to the Pico-Robertson neighborhood.","ys":1950,"tl":[{"y":"1950","x":"Wan-Q opens on Pico Blvd as a Cantonese restaurant"},{"y":"1962","x":"Owner Benny Eng converts to Polynesian tiki — rattan, tikis, thatched roof, cocktails alongside the Chinese menu"},{"y":"1992","x":"Wan-Q closes; Sugar Shack opens with tiki exterior intact"},{"y":"2000","x":"Fu's Palace opens at the same address — family-owned, still operating today"}],"tags":["Pico","Tiki","Chinese","Polynesian","West LA","Benny Eng","Fu's Palace"],"s":"active"},{"id":"damianopizza","h":"fairfax","n":"Damiano Mr. Pizza","t":"Pizzeria","c":"food","lat":34.0786419,"lng":-118.3612542,"a":"412 N Fairfax Ave, Los Angeles, CA 90036","i":"🍕","d":"Opened in 1964 across from Canter's on Fairfax, Damiano's became the late-night institution for New York-style pizza in Los Angeles — open until 6 AM weekdays, 7 AM weekends, delivering until almost dawn. The delivery guys also ran errands: stopping at CVS for medicines and candy at 5 AM if you asked. Pitch-black interior, green neon, cheap beer. The pizza was made from water imported from New York — greasy, salty, thin-crust. One period in the 1980s the place became too dilapidated to sit inside, but people kept ordering delivery regardless. Mitchell Kitay, the final owner, was forced out in 2013 when the building's new owners — the restaurant Animal — reclaimed the space. Jon and Vinny's is there now.","ys":1964,"ye":2013,"tl":[{"y":"1964","x":"Damiano Mr. Pizza opens on Fairfax across from Canter's — late-night, open until 6 AM"},{"y":"1980s","x":"Delivery drivers run errands beyond pizza — cigarettes, pharmacy runs, whatever you needed at 5 AM"},{"y":"2013","x":"Forced out when Animal purchases the building; closes after 49 years"}],"tags":["Fairfax","Pizza","Late Night","New York Style","Delivery","Closed"],"rel":["canters"],"s":"closed"},{"id":"homerestaurantla","h":"losfeliz","n":"Home Restaurant","t":"American Bistro","c":"food","lat":34.103202,"lng":-118.286854,"a":"1760 Hillhurst Ave, Los Angeles, CA 90027","i":"🏡","d":"A neighborhood anchor on Hillhurst in Los Feliz, run by Aram and Rose Serobian for over two decades from an Arts and Crafts-style building near Hollywood Boulevard. Patio with a koi pond, a bar, and the sort of weekend brunch crowd that starts lining up before the kitchen opens. The menu runs American comfort food made carefully with seasonal produce. No reservations for weekend brunch; you wait outside on Hillhurst and watch the neighborhood pass. It has the warmth of a family operation that has quietly resisted the churn most Los Feliz restaurants succumb to.","ys":2002,"tl":[{"y":"2002","x":"Aram and Rose Serobian open Home Restaurant on Hillhurst in Los Feliz"},{"y":"2010s","x":"Brunch culture grows around the restaurant; weekend waits become part of the neighborhood rhythm"}],"tags":["Los Feliz","Hillhurst","Brunch","Neighborhood","Koi Pond","Still Open"],"s":"active"},{"id":"pizzanista","h":"artsdistrict","n":"Pizzanista!","t":"New York-Style Pizzeria","c":"food","lat":34.0347129,"lng":-118.2316061,"a":"2019 E 7th St, Los Angeles, CA 90021","i":"🍕","d":"Founded in 2011 by professional skateboarder Salman Agah — Thrasher Magazine's Skater of the Year in 1993, pioneer of switch-stance skating — with art consultant Price Latimer and her brother Roby. The idea came from a month in New York in 2008 eating through every great pizzeria and wondering why LA had almost nowhere to buy a slice. They found a pre-World War I building in the Arts District next to Tony's Saloon and opened Pizzanista with New York thin crust and dough using 200-year-old Naples sourdough cultures. A Tokyo location opened in Harajuku in 2020; Seoul followed in 2021; San Marino in 2022.","ys":2011,"tl":[{"y":"2008","x":"Salman Agah and Price Latimer spend a month eating New York pizza; the idea for Pizzanista is born"},{"y":"2011","x":"Pizzanista! opens in a pre-WWI Arts District building next to Tony's Saloon"},{"y":"2020","x":"Tokyo location opens in Harajuku; Seoul follows in 2021"},{"y":"2022","x":"Second LA location opens in San Marino"}],"tags":["Arts District","Pizza","Skateboarding","New York Style","DTLA","Still Open","Salman Agah"],"s":"active"},{"id":"basicplumbing","h":"silverlake","n":"Basic Plumbing","t":"Men's Private Club","c":"nightlife","lat":34.0956718,"lng":-118.276978,"a":"1294 Hyperion Ave, Los Angeles, CA 90029","i":"🔧","d":"Lee Struwe and Hosea Cobb opened Basic Plumbing in 1993 at 1294 Hyperion, choosing the location because it was, in Struwe's words, basically a gay area. It operated as a dry bath — a private men's club with no steam or water, just a labyrinthine interior of dark rooms and corridors for cruising and anonymous connection. By 1995 the club had been cited for zoning violations as neighbors complained about activity spilling into surrounding streets and yards. Basic Plumbing was one node in a dense queer ecology that ran the length of Hyperion from Sunset to Rowena — alongside Cuffs, Pure Trash, and the bathhouses at 2114 Hyperion. Closed around 2001 as Silver Lake's queer leather bar scene dispersed through gentrification, AIDS losses, and police pressure.","ys":1993,"tl":[{"y":"1993","x":"Struwe and Cobb open Basic Plumbing at 1294 Hyperion — a private dry bath club on Silver Lake's queer strip"},{"y":"1995","x":"Cited for zoning violations; neighbors protest activity spilling into surrounding blocks"},{"y":"2001","x":"Closes as Silver Lake's queer leather bar scene disperses through gentrification and AIDS losses"}],"tags":["Hyperion","Silver Lake","Gay","Leather","Private Club","Closed"],"rel":["blackcat","anticlub"],"s":"closed","ye":2001},{"id":"puretrash","h":"silverlake","n":"Pure Trash","t":"Gay Bar","c":"nightlife","lat":34.097339,"lng":-118.2758219,"a":"1903 Hyperion Ave, Los Angeles, CA 90027","i":"🗑️","d":"A queer bar at 1903 Hyperion with two trashy floors and a new wave and progressive disco mix, operating along the same stretch of Silver Lake's Hyperion corridor as Cuffs, Basic Plumbing, the Hyperion Baths, and Men's Action Center. Listed in the Bob Damron guides from 1980 to 1982 — the annual directory that served as the underground map of gay America. The tagline: Put a little trash in your life, but make it Pure Trash. Went out of business due to neighbor complaints after a brief two-year run — one of the earlier casualties on a Hyperion strip that would lose most of its queer venues over the next two decades to AIDS, police pressure, and gentrification.","ys":1980,"tl":[{"y":"1980","x":"Pure Trash opens on Hyperion — two floors, new wave and progressive disco"},{"y":"1980","x":"Listed in Bob Damron guides '80-'82 — the underground map of gay America"},{"y":"1982","x":"Closes after neighbor complaints — a two-year run"}],"tags":["Hyperion","Silver Lake","Gay","Leather","Bar","Closed"],"rel":["blackcat","anticlub"],"s":"closed","ye":1982},{"id":"fairchilds","h":"bevhills","n":"Fairchild's","t":"French Continental Restaurant","c":"food","lat":34.0691567,"lng":-118.3760169,"a":"N La Cienega Blvd, Beverly Hills, CA 90211","i":"🥂","d":"Opened in Spring 1953 by Peter Fairchild — portrait painter of Ava Gardner, Judy Garland, Lana Turner, Mickey Rooney, and President Eisenhower — backed by Wilshire Oil heiress Bessie Machris and her daughter Katherine, whom Fairchild married in 1954. The restaurant occupied the old Cherio Room space on La Cienega Restaurant Row. Red-coated waiters served tossed salads, snails, caviar, and Langoustines Commanders amidst gilded banquettes. In summer 1963 a labor strike by the Culinary Workers Union crippled the kitchen. Before Fairchild could act on plans to redevelop the building as a highrise, an early morning two-alarm fire swept through the restaurant and destroyed it.","ys":1953,"ye":1963,"tl":[{"y":"1953","x":"Fairchild's opens in the old Cherio Room space on La Cienega Restaurant Row"},{"y":"1954","x":"Peter Fairchild marries Katherine Machris — the Wilshire Oil heir whose family bankrolled the restaurant"},{"y":"1961","x":"Reviewer calls it frankly elegant — red-coated waiters, gilded banquettes, Langoustines Commanders"},{"y":"1963","x":"Culinary Workers Union picket collapses the kitchen; an early-morning fire destroys the restaurant"}],"tags":["Restaurant Row","La Cienega","Beverly Hills","French","Fire","Closed","Peter Fairchild"],"rel":["richlors","captainstable","normslacienega"],"s":"closed"},{"id":"aardvarks","h":"fairfax","n":"Aardvark's Odd Ark","t":"Vintage Clothing Store","c":"culture","lat":34.08381,"lng":-118.3551,"a":"7579 Melrose Ave, Los Angeles, CA 90046","i":"👕","d":"Joe Stromei started selling vintage clothing out of an old panel truck called the Odd Ark at Rose Bowl flea market, then opened his first store in Hermosa Beach in February 1972. He added the third a to Aardvark so the store would appear at the very top of any alphabetical directory. The Melrose location at 7579 became the flagship and, according to longtime staff, the oldest retail store on Melrose — there before the boutiques, before the punk rock, before Melrose became an idea. Clothing was sorted by decade and type. Celebrity traffic was constant: Robin Williams, Bruce Springsteen buying over-dyed jackets and denim vests. At peak, Aardvark's had nine Southern California locations. The Melrose store became famous for pounds-of-vintage sales — clothing sold by weight.","ys":1976,"tl":[{"y":"1972","x":"Joe Stromei opens first Aardvark's Odd Ark in Hermosa Beach from an old panel truck"},{"y":"1976","x":"Melrose Avenue location opens — becomes the flagship and the oldest retail store on the strip"},{"y":"1985","x":"Jon and Donna buy the store from Stromei; nine Southern California locations at peak"},{"y":"2010s","x":"Melrose location closes as the strip's retail character changes"}],"tags":["Melrose","Vintage","Clothing","Rock Stars","Closed"],"rel":["retailslut"],"s":"active"},{"id":"olliehammonds","h":"bevhills","n":"Ollie Hammond's Steak House","t":"24-Hour Steakhouse","c":"food","lat":34.06726,"lng":-118.3765858,"a":"91 N La Cienega Blvd, Beverly Hills, CA 90211","i":"🥩","d":"Ollie Hammond built his first steak house in 1934 with money from an inheritance — 18 stools and 2 booths on La Cienega. By 1935 it was open 24 hours a day, seven days a week, and stayed that way for over 40 years. Three locations at peak: La Cienega (across from Lawry's), Wilshire near the Ambassador Hotel, and Third and Fairfax. The La Cienega spot took guts — it served prime rib within eyeshot of Lawry's, the prime rib temple of Los Angeles. At 3 AM, while every other kitchen in the city was reheating yesterday's food, Ollie Hammond's offered a full menu with freshly baked potatoes. The Sunday corned beef hash had a cult following. The soup du jour was always a tomato-beef-noodle concoction regulars called 'spaghetti soup.' Walter Winchell was a regular. A waiter who was a dead ringer for Bill Bixby became a minor celebrity in his own right — Bixby himself visited and was reportedly spooked. Red leather booths were the trademark. Hammond served as president of the Santa Monica Rotary Club in 1969-70. The La Cienega location reportedly burned down. Last restaurant closed 1979.","ys":1934,"ye":1979,"tl":[{"y":"1934","x":"Opens with 18 stools and 2 booths on La Cienega"},{"y":"1935","x":"Goes 24 hours — never closes again for 44 years"},{"y":"1940","x":"Beverly Hills location opens"},{"y":"1942","x":"Third and Fairfax 'Town & Country' location opens"},{"y":"1979","x":"Last location closes"}],"tags":["24-Hour","Restaurant Row","La Cienega","Prime Rib","Walter Winchell"],"rel":["lawrys","richlors","captainstable","fishshanty","tailcock","scandia"],"s":"closed"},{"id":"wilwrights","h":"bevhills","n":"Wil Wright's Ice Cream","t":"Ice Cream Parlor","c":"food","lat":34.0648861,"lng":-118.3988825,"a":"200 S Beverly Dr, Beverly Hills, CA 90212","i":"🍦","d":"Wilbur Wright and two Cincinnati buddies — Disney producer Bill Walsh and screenwriter Martin Conley — opened an ice cream parlor on the Sunset Strip in 1941, then closed for the war and reopened with actress Susan Hayward as an investor. The ice cream was 22 percent butterfat — essentially the original Haagen-Dazs. Marilyn Monroe's favorite was the hot fudge sundae. Clark Gable loved the Nesselrode Bula — candied fruits, chestnuts, rum, and brandy. Elizabeth Taylor and Ingrid Bergman had quarts flown to film sets. The Beverly Hills location at 200 South Beverly Drive became the flagship — pink and red Victorian parlor decor, marble-topped tables, wire-frame chairs. Every portion came with a tiny almond macaroon in a rice paper bag stamped with an angel and the words 'It's Heavenly!' Chauffeurs double-parked outside picking up quarts for studio bosses. Locations in Hollywood, Westwood, the Sunset Strip, Sherman Oaks, and Pacific Palisades at peak. International Industries acquired the chain in 1968 but couldn't compete with Farrell's. Most parlors closed in the 1970s. On October 9, 1981, the 67-year-old founder was found beaten to death in his Hollywood Hills home. Beverly Hills Historical Marker No. 22.","ys":1941,"ye":1978,"tl":[{"y":"1941","x":"Wright, Walsh, and Conley open first parlor on Sunset Strip"},{"y":"1945","x":"Reopens after the war — Susan Hayward invests"},{"y":"1949","x":"Beverly Hills flagship opens at 200 S Beverly Dr"},{"y":"1968","x":"International Industries acquires the chain"},{"y":"1978","x":"Last parlors close — health food trend and Farrell's competition"},{"y":"1981","x":"Founder Wilbur Wright beaten to death in Hollywood Hills home"}],"tags":["Ice Cream","Beverly Hills","Marilyn Monroe","Clark Gable","Murdered Founder"],"rel":["ccbrowns","thriftydrugstore","bhhotel","natenal","rodeo"],"w":"Wil_Wright%27s_Ice_Cream","s":"closed"},{"id":"playboyclub","h":"sunset","n":"The Playboy Club","t":"Nightclub","c":"nightlife","lat":34.0931143,"lng":-118.3779598,"a":"8560 Sunset Blvd, West Hollywood, CA 90069","i":"🐰","d":"Hugh Hefner opened the LA Playboy Club on New Year's Eve 1964 at 8560 Sunset Boulevard. The club occupied the first four floors; Hefner lived in the penthouse on top in a James Bond-style apartment with a wall that slid away to reveal a full bar and a signature round bed. The towering bunny logo projected on the building became one of the Strip's most recognizable landmarks, visible in countless films and TV shows of the era. Lines wrapped the block on weekend nights. The only woman ever to run a Playboy Club was Lainie Kazan — actress, Tony winner, and October 1970 Playboy nude — who oversaw the LA branch. Lily Tomlin, David Brenner, Sonny Rollins, and Al Jarreau all performed. In 1972, the club relocated to Century City's ABC Entertainment Center, nestled under the Shubert Theater. The food was edible but overpriced; the Serving Bunnies rolled elaborate baked potato carts to your table. Birthday celebrations erupted constantly — bunny cake, candle, the whole production. When the LA club finally closed in 1986, the Times ran the classic headline: 'Playboy Clubs, Bunnies Go From Risque to Passe.' What was naughty in 1965 had become, as the paper noted, demurely dated.","ys":1964,"ye":1986,"tl":[{"y":"1964","x":"Opens New Year's Eve at 8560 Sunset — Hefner's penthouse on top"},{"y":"1965","x":"Bunny logo becomes a Sunset Strip landmark"},{"y":"1972","x":"Relocates to Century City's ABC Entertainment Center"},{"y":"1986","x":"Closes — LA Times: 'From Risque to Passe'"}],"tags":["Sunset Strip","Hefner","Bunnies","Century City","Nightclub"],"rel":["playboymans","dinoslodge","ciros","bodyshop","standardsunset","mondrianla"],"w":"Playboy_Club","s":"closed"},{"id":"lobsterbarrel","h":"weho","n":"Alan Hale's Lobster Barrel","t":"Seafood Restaurant","c":"food","lat":34.0860996,"lng":-118.3761207,"a":"826 N La Cienega Blvd, Los Angeles, CA 90069","i":"⚓","d":"Alan Hale Jr. — the Skipper from Gilligan's Island — bought into a seafood restaurant at 826 North La Cienega on Restaurant Row in the mid-1970s and plastered his name and face all over it. He was there almost every night in his skipper's hat, greeting customers as 'Little Buddy,' signing autographs, and giving away captain's hats. The interior was wood and palms, the menu ran from Lobster Newburg to Bouillabaisse Marseillaise, and the tropical bar would have made Mr. Howell proud. According to legend, David Carradine got drunk and started doing kung fu, damaging the place — Hale threw him out with a baseball bat. The waiters wore tuxedos, the wine list was serious, and the Lobster Newburg was genuinely delicious. Everyone came for the Skipper and stayed for the fish. In 1982, Hale stepped back from active ownership but the restaurant continued under his name until it closed in 1990 after fifteen years. He then opened a travel agency — because of course the man who ran the Minnow aground would book your cruise. He died January 2, 1990. About the time the Lobster Barrel closed, Sonny Bono opened a trattoria just around the corner.","ys":1975,"ye":1990,"tl":[{"y":"1975","x":"Alan Hale Jr. opens on Restaurant Row — greets everyone as Little Buddy"},{"y":"1978","x":"Carradine thrown out with a baseball bat after kung fu incident"},{"y":"1982","x":"Hale steps back from active ownership"},{"y":"1990","x":"Closes after 15 years — Hale dies January 2"}],"tags":["Restaurant Row","Gilligan's Island","The Skipper","La Cienega","Seafood"],"rel":["lawrys","fishshanty","captainstable","stinkingrose","normslacienega"],"w":"Alan_Hale_Jr.","s":"closed"},{"id":"tractons","h":"southla","n":"Tracton's","t":"Steakhouse & Supper Club","c":"food","lat":34.0228619,"lng":-118.3719068,"a":"3560 S La Cienega Blvd, Los Angeles, CA 90016","i":"🥩","d":"Harold 'Red' Tracton came from the Trachtenberg restaurant family of Pasadena. After Navy service in the Pacific, he ran Norm and Red's Green Lake Cafe in Pasadena before opening his namesake supper club at 3560 South La Cienega in 1956. Tracton's was old-school steak and lobster with an undercurrent of mob money — notables and mobster-types mingled freely, and Red played genial host to all of them. At one point in the 1960s he simultaneously ran five restaurants across LA: the La Cienega flagship, a downtown location, the Buggy Whip near LAX (still open today), the Salem House at the Farmers Market, and the Fox Hills Country Club restaurant. Johnny Cash did the commercials. The La Cienega Tracton's served enormous chopped steaks, prime rib, and a corned beef hash that regulars still remember. When the La Cienega location closed in 1978, Red moved to Encino as Tracton's House of Prime Rib on Ventura Boulevard. That lasted until 1988 when he relocated to Del Mar, across from the racetrack. Red died in 1999. His daughter Tracy runs Red Tracton's in Del Mar today — the lobster bisque recipe is unchanged.","ys":1956,"ye":1978,"tl":[{"y":"1956","x":"Opens at 3560 S La Cienega — supper club for notables and mobsters"},{"y":"1960s","x":"Five simultaneous LA restaurants including Buggy Whip near LAX"},{"y":"1978","x":"La Cienega closes — moves to Encino"},{"y":"1988","x":"Relocates to Del Mar near the racetrack"},{"y":"1999","x":"Red Tracton dies — daughter Tracy continues"}],"tags":["Steakhouse","Supper Club","La Cienega","Mob","Johnny Cash"],"rel":["lawrys","olliehammonds","visiontheatre","bhcplaza"],"s":"closed"},{"id":"kookooroo","h":"fairfax","n":"Koo Koo Roo","t":"Fast-Casual Chicken","c":"food","lat":34.076055,"lng":-118.3731707,"a":"Beverly Blvd & Orlando Ave, Los Angeles, CA 90048","i":"🐓","d":"Armenian brothers Mike and Ray Badalian opened a tiny charbroiled chicken stand in 1988 on Beverly Boulevard near the Beverly Center. The chicken was skinless, marinated in vegetable juices, grilled over open flames, and served with a foldable Middle Eastern flatbread from their Armenian heritage. On Oscar night 1990, retired New York real estate broker Kenneth Berg stopped in for takeout and watched Beverly Hills businessmen eating chicken with their bare hands in full suits. He called it the best chicken he'd ever had, invested $2.5 million, bought the brothers out, and took the company public on NASDAQ as KKRO in 1991. The stock went from $5 to $0.25 in a year. Berg reinvented it as Koo Koo Roo California Kitchens, adding turkey dinners and a deli counter. Michael Milken invested through a family trust. Berg then acquired the Arrosto Coffee chain, the Color Me Mine ceramics franchise, and — in a move that still confuses people — Hamburger Hamlet. At peak: 52 locations across North America. Jay Leno, Roseanne, and OJ attorneys Marcia Clark and Robert Shapiro were regulars. Diddy bragged about owning 21 Koo Koo Roos in Get Him to the Greek. Bankruptcies in 2003 and 2010 killed it. Last location closed 2014. New owner Daniel Farasat — an early Sweetgreen investor — acquired the brand in 2021 and announced a comeback. The original LA healthy fast-casual pioneer, a decade before Chipotle or Sweetgreen existed.","ys":1988,"ye":2014,"tl":[{"y":"1988","x":"Badalian brothers open first location — Armenian-inspired charbroiled chicken"},{"y":"1990","x":"Kenneth Berg stops in on Oscar night — invests $2.5M"},{"y":"1991","x":"Goes public on NASDAQ as KKRO — stock crashes within a year"},{"y":"1997","x":"Acquires bankrupt Hamburger Hamlet for $11.5M"},{"y":"2003","x":"Files Chapter 11 bankruptcy — 28 locations"},{"y":"2014","x":"Last location closes in Santa Monica"},{"y":"2024","x":"New owner announces comeback — popups planned"}],"tags":["Armenian","Fast-Casual","Healthy Chicken","NASDAQ","Oscar Night","Hamburger Hamlet"],"rel":["hamburgerhamlet","swingers","canters","originaltommys"],"w":"Koo_Koo_Roo","s":"closed"},{"id":"vinylfetish","h":"fairfax","n":"Vinyl Fetish","t":"Record Store","c":"shop","lat":34.0837054,"lng":-118.348877,"a":"7305 Melrose Ave","i":"💿","d":"Joseph Brooks and Henry Peck opened this punk/post-punk/goth/new wave record store on La Brea around 1979, then moved to Melrose in the early 1980s as the scene exploded. They became tastemakers — KROQ gave them a Monday night import show to debut bands like Depeche Mode, The Smiths, Bauhaus, and Culture Club. Siouxsie, Iggy Pop, the Misfits, X all did in-store signings. Paul Reubens conceived Pee-wee Herman at The Groundlings next door and wandered in between classes. Henry and Joseph also DJed at Club Lingerie. The store was the connective tissue of the entire Melrose punk scene.","ys":1980,"ye":1998,"tl":[{"y":"1979","x":"Opens on La Brea Ave — 50 import records on plexiglass panels"},{"y":"1981","x":"Moves to 7305 Melrose Ave as the scene explodes"},{"y":"1982","x":"KROQ Monday night import show — Depeche Mode, Smiths, Bauhaus"},{"y":"1983","x":"Sisters of Mercy, Siouxsie in-store signings"},{"y":"1998","x":"Melrose location closes — later locations on Vermont and Cahuenga"}],"tags":["Punk","New Wave","Goth","KROQ","Melrose","Record Store"],"rel":["aronsrec","headlinerec","poseur","retailslut","groundlings"],"s":"closed"},{"id":"koalablue","h":"fairfax","n":"Koala Blue","t":"Boutique","c":"shop","lat":34.083408,"lng":-118.350421,"a":"7366 Melrose Ave","i":"🐨","d":"Singer-actress Olivia Newton-John and Pat Farrar opened this boutique in 1983 — KOALA stood for Korner of Australia in Los Angeles. It sold Australian imports and casual fashion alongside an Aussie milk bar serving pies, vegemite sandwiches, and pavlovas. ONJ was an early adopter of Melrose Ave before the scene fully exploded. The chain grew to 49 stores worldwide before bankruptcy and closure in 1992. Sandy from Grease gets props for seeing the avenue's potential before the punks did.","ys":1983,"ye":1992,"tl":[{"y":"1983","x":"ONJ opens boutique at 7366 Melrose — Australian imports and milk bar"},{"y":"1988","x":"Chain grows to 49 stores worldwide"},{"y":"1991","x":"Bankruptcy filed — investors allege mismanagement"},{"y":"1992","x":"All stores closed"}],"tags":["Olivia Newton-John","Australian","Melrose","Boutique","Bankruptcy"],"rel":["poseur","retailslut","groundlings"],"w":"Olivia_Newton-John","s":"closed"},{"id":"tommytangs","h":"fairfax","n":"Tommy Tang's","t":"Restaurant","c":"food","lat":34.083677,"lng":-118.349257,"a":"7313 Melrose Ave","i":"🍜","d":"Thai-born chef Tommy Tang opened his own restaurant on Melrose in 1982 and essentially introduced modern Thai cuisine to America. Celebrity-filled, trendy without being pretentious. Tang went on to host a PBS cooking series, write cookbooks, and open locations in TriBeCa and Pasadena. Wolfgang Puck was doing the same thing with Austrian cuisine at Spago simultaneously — two immigrant chefs, two cuisines, both catapulting Melrose to international fame. The Melrose location closed December 31, 2003 after 21 years.","ys":1982,"ye":2003,"tl":[{"y":"1982","x":"Opens on Melrose — pioneering modern Thai cuisine"},{"y":"1986","x":"NYC location opens in TriBeCa"},{"y":"1994","x":"Pasadena location opens; PBS cooking show launches"},{"y":"2003","x":"Melrose location closes Dec 31 after 21 years"}],"tags":["Thai","Celebrity Chef","Melrose","PBS"],"rel":["spago","groundlings","poseur"],"w":"Tommy_Tang","s":"closed"},{"id":"laeyeworksmelrose","h":"fairfax","n":"l.a.Eyeworks","t":"Eyewear Store","c":"shop","lat":34.0837885,"lng":-118.351421,"a":"7407 Melrose Ave","i":"👓","d":"Barbara McReynolds and Gai Gherardi opened a single storefront on September 9, 1979 — one of the earliest businesses on the Melrose strip, predating the punk explosion. Bold, iconoclastic eyewear designed to challenge what glasses could be. Their black-and-white portrait ad campaign by Greg Gorman has featured 200+ celebrities since 1981. Paul Reubens hung out here between Groundlings classes. The owners of City Cafe (later Border Grill) opened next door. Over four decades later, privately owned and operating on Melrose.","ys":1979,"tl":[{"y":"1979","x":"Opens Sept 9 — among the first businesses on Melrose strip"},{"y":"1981","x":"Greg Gorman portrait ad campaign begins"},{"y":"2025","x":"New Fairfax campus opens — original Melrose store still operating"}],"tags":["Eyewear","Melrose Pioneer","Queer-Owned","Still Open"],"rel":["vinylfetish","groundlings","poseur","koalablue"],"s":"active"},{"id":"bordergrillmelrose","h":"fairfax","n":"Border Grill (Original)","t":"Restaurant","c":"food","lat":34.0838,"lng":-118.3516,"a":"~7413 Melrose Ave","i":"🌮","d":"Susan Feniger and Mary Sue Milliken — classically trained chefs who met at Le Perroquet in Chicago — opened City Cafe in a tiny 39-seat space next to L.A. Eyeworks on Melrose in 1981. When it outgrew the space, they moved City to La Brea and opened Border Grill in the same Melrose spot in 1985 — a 40-seat taco stand that pioneered modern Mexican cuisine a decade before anyone else. Jonathan Gold praised them. They moved to Santa Monica in 1990, expanded to Vegas, LAX, and downtown. James Beard and Julia Child award winners. The Too Hot Tamales.","ys":1985,"ye":1990,"tl":[{"y":"1981","x":"City Cafe opens next to L.A. Eyeworks — 39 seats"},{"y":"1985","x":"Border Grill replaces City Cafe — modern Mexican cuisine"},{"y":"1990","x":"Moves to Santa Monica — Melrose location closes"},{"y":"2016","x":"Santa Monica location closes after 26 years"}],"tags":["Mexican","Too Hot Tamales","Melrose","James Beard"],"rel":["laeyeworksmelrose","tommytangs","spago"],"w":"Border_Grill","s":"closed"},{"id":"johnnyrocketsmelrose","h":"fairfax","n":"Johnny Rocket's (Original)","t":"Restaurant","c":"food","lat":34.0837966,"lng":-118.353576,"a":"7507 Melrose Ave","i":"🍔","d":"Ronn Teitelbaum sold his Beverly Hills menswear chain and spent a year and a half planning a 1940s-style diner. It opened June 6, 1986 on Melrose — 20 stools, chrome kitchen, red vinyl seats, vintage countertop jukeboxes. Teitelbaum hand-patted every burger to order and served them on cardboard plates wrapped in paper. Opening night stayed open until 5 AM to serve the crowd. 600-700 customers daily. The name: Johnny for Johnny Appleseed, Rockets for the Oldsmobile Rocket 88. Based on The Apple Pan. Grew into a global franchise. Teitelbaum died of brain cancer in 2000. The original Melrose location closed October 26, 2015.","ys":1986,"ye":2015,"tl":[{"y":"1986","x":"Opens June 6 on Melrose — stays open till 5 AM on night one"},{"y":"1989","x":"First international location — Tokyo"},{"y":"2000","x":"Founder Ronn Teitelbaum dies of brain cancer"},{"y":"2015","x":"Original Melrose location closes Oct 26"},{"y":"2020","x":"FAT Brands acquires chain for $25M"}],"tags":["1950s Diner","Melrose","Franchise Origin","Apple Pan"],"rel":["applepan","carneys","benfranks"],"w":"Johnny_Rockets","s":"closed"},{"id":"elbatey","h":"echopark","n":"El Batey No. 2","t":"Market","c":"community","lat":34.0813787,"lng":-118.25473,"a":"1559 Echo Park Ave","i":"🏪","d":"Evelia Diaz ran this family-owned neighborhood market on the corner of Echo Park and Delta Avenues for 48 years. It opened around 1966 in a former Jewish deli. Evelia served a primarily Latino clientele — beans, tortillas, candy, pan dulce — and was known for cooking for customers and extending credit to regulars. The store was connected to the Nayarit restaurant legacy: former employees of Doña Natalia Barraza's Echo Park Nayarit opened their own businesses nearby, including El Batey. Mi Vida Loca (1993) filmed a shooting scene outside. In 2014, new building owners demanded a 300% rent increase. Community rallied with a buy-out event. Evelia's last day was June 6, 2014.","ys":1966,"ye":2014,"tl":[{"y":"1966","x":"Opens in former Jewish deli on Echo Park Ave"},{"y":"1993","x":"Mi Vida Loca films shooting scene outside"},{"y":"2008","x":"Survives first rent hike — Steve Lopez column in LA Times"},{"y":"2014","x":"Building sold for $9.275M — rent tripled — closes June 6"}],"tags":["Latino Heritage","Gentrification","Echo Park","Community","Mi Vida Loca"],"rel":["echo","shortstop","echoparklake","barragans"],"s":"closed"},{"id":"beautybar","h":"hollywood","n":"Beauty Bar","t":"Nightclub","c":"nightlife","lat":34.100939,"lng":-118.329428,"a":"1638 N Cahuenga Blvd","i":"💅","d":"Part of the NYC-born Beauty Bar chain — a nightclub built inside a 1950s beauty salon, complete with vintage hair dryers as decor. The Hollywood location on Cahuenga opened around 2000 and offered manicures with your martini. DJs, dance nights, and a retro-camp aesthetic that fit perfectly into the early-2000s Cahuenga Corridor nightlife boom alongside The Room next door.","ys":2000,"ye":2014,"tl":[{"y":"2000","x":"Opens on Cahuenga Blvd — manicures and martinis"},{"y":"2005","x":"Part of Cahuenga Corridor nightlife boom"}],"tags":["Nightclub","Cahuenga Corridor","Retro"],"rel":["burgundyroom","threeclubs","boardners"],"s":"closed"},{"id":"theroomhollywood","h":"hollywood","n":"The Room Hollywood","t":"Lounge Bar","c":"nightlife","lat":34.100755,"lng":-118.329306,"a":"1626 N Cahuenga Blvd","i":"🍸","d":"Intimate cocktail lounge on Cahuenga Blvd that has been a fixture of Hollywood nightlife since 1993. Multiple themed nights — R&B, reggae/dancehall, hip-hop throwbacks. Small, dark, and always packed on weekends. One of the anchor bars of the Cahuenga Corridor alongside Beauty Bar and Burgundy Room.","ys":1993,"tl":[{"y":"1993","x":"Opens on Cahuenga Blvd"},{"y":"2005","x":"Part of Cahuenga Corridor's peak nightlife era"}],"tags":["Lounge","Cahuenga Corridor","Reggae","R&B"],"rel":["beautybar","burgundyroom","threeclubs"],"s":"active"},{"id":"lavalounge","h":"hollywood","n":"Lava Lounge","t":"Tiki Dive Bar","c":"nightlife","lat":34.0988449,"lng":-118.344962,"a":"1533 N La Brea Ave","i":"🌋","d":"A tiki-themed dive bar on La Brea that opened in December 1993 and immediately became a hangout for musicians and industry types. Dark, sticky, cheap drinks, volcano decor. The kind of bar where you'd run into members of No Doubt or Beck at 1 AM. Closed in February 2007 — replaced by The Woods, a much glossier operation. For 13 years, Lava Lounge was the divey counterpoint to the polished clubs on Sunset and Cahuenga.","ys":1993,"ye":2007,"tl":[{"y":"1993","x":"Opens December on La Brea — tiki dive for musicians"},{"y":"2000","x":"Peak era — musicians, industry, late nights"},{"y":"2007","x":"Closes February — becomes The Woods"}],"tags":["Tiki","Dive Bar","La Brea","Musicians"],"rel":["donbeach","tikiti","burgundyroom"],"s":"
