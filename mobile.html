:-118.4975,"a":"431 Wilshire Blvd, Santa Monica","i":"🥪","d":"Originally opened in 1946 in Ocean Park by Hy Altman, named for his wife Wolfine \"Zucky\" Zuckerman. Moved to the Wilshire Blvd Googie building in 1954. Open 24 hours, it was the late-night beacon for insomniacs, bar-closers, and UCLA football players. Thomas Pynchon put it in Inherent Vice. Health inspectors ordered expensive renovations in 1993 that the owners couldn't afford, and Zucky's abruptly closed after 47 years. The Googie building sat empty for over a decade before becoming a bank. The neon sign was declared a Santa Monica landmark.","ys":1946,"ye":1993,"tl":[{"y":"1946","x":"Opens in Ocean Park"},{"y":"1954","x":"Moves to Googie building on Wilshire"},{"y":"1993","x":"Closes — health code renovation costs"}],"tags":["24 Hours","Deli","Googie","Neon"],"rel":["baycities","thelobster","smpier","benfranks","nuart","silentmovie"],"s":"closed"},{"id":"mayfairtheatre","h":"santamonica","n":"Mayfair Theatre / Aero Theatre","t":"Movie Theater","c":"culture","lat":34.0319,"lng":-118.4953,"a":"1328 Montana Ave, Santa Monica","i":"🎬","d":"The Aero Theatre opened in 1940 as a neighborhood movie house. American Cinematheque took it over in 2005 and made it a repertory cinema — double features, director Q&As, 35mm prints. In a city of multiplexes, the Aero is where you go to watch movies the way they were meant to be watched: on film, in a real theater, with an audience that cares.","ys":1941,"tl":[{"y":"1940","x":"Opens as Aero Theatre"},{"y":"2005","x":"American Cinematheque takes over"}],"tags":["Cinema","35mm","Repertory","Cinematheque"],"s":"active"},{"id":"buschgardens","h":"valley","n":"Busch Gardens","t":"Theme Park","c":"culture","lat":34.2203,"lng":-118.4814,"a":"16000 Roscoe Blvd, Van Nuys","i":"🦜","d":"Anheuser-Busch built a tropical garden and bird sanctuary next to their Van Nuys brewery in 1966. Free admission — you just had to walk through the brewery first and accept free beer samples. Parrots, flamingos, a boat ride through a jungle, and all the free Budweiser you could drink. Corporate America's greatest PR stunt disguised as a family outing. Closed 1979 when the brewery shut down.","ys":1966,"ye":1979,"tl":[{"y":"1966","x":"Opens — free beer and birds"},{"y":"1975","x":"Most popular free attraction in Valley"},{"y":"1979","x":"Closes with brewery"}],"tags":["Free Beer","Birds","Brewery","Van Nuys"],"rel":["valleyrelics","universalstudios","sportsmenslodge","warnerbros","disneystudios","cbsradiocity"],"w":"Busch_Gardens_(Van_Nuys)","s":"closed"},{"id":"universalstudios","h":"valley","n":"Universal Studios","t":"Studio & Theme Park","c":"culture","lat":34.1393,"lng":-118.3593,"a":"100 Universal City Plaza","i":"🎬","d":"Carl Laemmle started charging tourists 25 cents to watch movies being made in 1915. A hundred years later, it's a $3 billion theme park empire. The tram tour through the backlot is the original attraction — you pass the Psycho house, the Jaws lake, and the Bates Motel. The park sits on the pass between Hollywood and the Valley, literally bridging LA's two identities.","ys":1915,"tl":[{"y":"1915","x":"Laemmle charges 25¢ to watch filming"},{"y":"1964","x":"Modern studio tour launches"},{"y":"1990","x":"Theme park expansion"}],"tags":["Studio Tour","Theme Park","Laemmle","Backlot"],"w":"Universal_Studios_Hollywood","s":"active"},{"id":"cjbarrymores","h":"valley","n":"Mountasia Family Fun Center","t":"Family Entertainment","c":"culture","lat":34.4208,"lng":-118.5709,"a":"21516 Golden Triangle Rd, Santa Clarita","i":"🎮","d":"A seven-acre family entertainment center in Santa Clarita that was every SCV kid's birthday party destination from the mid-'90s onward. Go-karts, two mini golf courses, bumper boats, laser tag, batting cages, a rock climbing wall, and a massive arcade. In 2001 it added a Farrell's Ice Cream Parlour, bringing back the beloved chain. Closed during COVID in 2021 and reopened as MB2 Entertainment.","ys":1995,"ye":2021,"tl":[{"y":"1995","x":"Opens in Santa Clarita"},{"y":"2001","x":"Farrell's Ice Cream Parlour added"},{"y":"2021","x":"Closes during COVID, becomes MB2"}],"tags":["Birthday Parties","Go-Karts","Santa Clarita","Farrell's"],"rel":["galleria","universalstudios","bakedpotato"],"s":"closed"},{"id":"madamewongs","h":"santamonica","n":"Madame Wong's West","t":"Punk & New Wave Venue","c":"music","lat":34.0377,"lng":-118.4753,"a":"2900 Wilshire Blvd, Santa Monica","i":"🎸","d":"Esther Wong was a Chinese immigrant who accidentally became a punk rock promoter. Her original Chinatown restaurant started booking punk and new wave bands in 1978. This Westside offshoot — Madame Wong's West — booked The Police, The Knack, Oingo Boingo, The Go-Go's, and X. She had no idea what the music was about. She just knew the kids packed the room and drank. She called it \"that new music.\" It worked.","ys":1978,"ye":1991,"tl":[{"y":"1978","x":"Madame Wong's Chinatown opens"},{"y":"1979","x":"West location opens"},{"y":"1980","x":"Police, Knack, Go-Go's, X"},{"y":"1991","x":"Closes"}],"tags":["Punk","New Wave","Chinese Immigrant","The Police","Go-Gos"],"s":"closed"},{"id":"marineland","h":"palosverdes","n":"Marineland of the Pacific","t":"Oceanarium","c":"culture","lat":33.7395,"lng":-118.3999,"a":"6610 Palos Verdes Dr S","i":"🐋","d":"Opened in 1954, one year before Disneyland — the world's largest oceanarium. Designed by William Pereira, who also designed LAX and the Transamerica Pyramid. Orky and Corky the killer whales were the stars. In 1987, SeaWorld bought the park, moved the whales to San Diego in the middle of the night, poured concrete into the drains so it could never reopen, and abandoned it. The site sat as ruins for 20 years. Now it's the Terranea Resort. Orky died in 1988. Corky is alive at SeaWorld, decades later.","ys":1954,"ye":1987,"tl":[{"y":"1954","x":"Opens — world's largest oceanarium"},{"y":"1965","x":"Peak attendance era"},{"y":"1987","x":"SeaWorld steals whales in the night, closes park"},{"y":"2009","x":"Terranea Resort opens on ruins"}],"tags":["Whales","SeaWorld","Pereira","Ruins","Betrayal"],"rel":["smpier","pacificocean","sportsarena","theforum","coliseum","ascotpark"],"w":"Marineland_of_the_Pacific","s":"closed"},{"id":"sportsarena","h":"southla","n":"LA Memorial Sports Arena","t":"Arena","c":"culture","lat":34.0127,"lng":-118.2828,"a":"3939 S Figueroa St","i":"🏟️","d":"Built in 1959 next to the Coliseum. JFK accepted the Democratic nomination here in 1960. The Lakers played here. The Clippers played here. Bruce Springsteen played here. Public Enemy played here. It hosted everything from boxing to roller derby to political conventions. Demolished in 2016 for the Lucas Museum site (which was then moved to Exposition Park). A building that saw a president nominated and a thousand concerts, erased.","ys":1959,"ye":2016,"tl":[{"y":"1959","x":"Opens"},{"y":"1960","x":"JFK accepts Democratic nomination"},{"y":"1967","x":"Lakers play here"},{"y":"2016","x":"Demolished"}],"tags":["JFK","Lakers","Springsteen","Demolished"],"w":"Los_Angeles_Memorial_Sports_Arena","s":"demolished"},{"id":"ascotpark","h":"southla","n":"Ascot Park / Speedway","t":"Racetrack","c":"culture","lat":33.95,"lng":-118.256,"a":"183rd St & Vermont Ave, Gardena","i":"🏎️","d":"The half-mile dirt track in Gardena where stock cars, midgets, and sprint cars raced from the 1950s through 1990. Thursday night racing was a South Bay institution. The roar of engines carried for miles. When the land became more valuable as development, the track closed. Another piece of working-class LA entertainment replaced by condos.","ys":1957,"ye":1990,"tl":[{"y":"1957","x":"Opens — dirt track racing"},{"y":"1965","x":"Thursday night races pack the stands"},{"y":"1990","x":"Closes for development"}],"tags":["Racing","Dirt Track","South Bay","Working Class"],"rel":["lionsdrag","sportsarena","coliseum","ascotpark"],"s":"closed"},{"id":"lionsdrag","h":"longbeach","n":"Lions Drag Strip","t":"Drag Racing","c":"culture","lat":33.76,"lng":-118.21,"a":"223rd St, Wilmington","i":"🏁","d":"The most famous drag strip in Southern California. From 1955 to 1972, Lions was where hot rodders from all over LA came to race legally instead of on the streets. The Christmas Tree starting lights, the burnout box, the roar of nitro-burning funny cars. It was the crucible of SoCal car culture. The Beach Boys sang about it. Closed for the Long Beach Freeway extension. Hot rod culture lost its cathedral.","ys":1955,"ye":1972,"tl":[{"y":"1955","x":"Opens in Wilmington"},{"y":"1965","x":"Peak of hot rod culture"},{"y":"1972","x":"Closed for freeway extension"}],"tags":["Drag Racing","Hot Rod","Beach Boys","Freeway Killed It"],"w":"Lions_Drag_Strip","s":"closed"},{"id":"theforum","h":"southla","n":"The Forum","t":"Arena","c":"music","lat":33.9583,"lng":-118.3418,"a":"3900 W Manchester Blvd, Inglewood","i":"🎵","d":"The \"Fabulous Forum\" — built in 1967 by Jack Kent Cooke for his Lakers and Kings. The exterior columns were meant to evoke the Roman Forum. Showtime Lakers played here — Magic, Kareem, the fast break that changed basketball. Every major concert act of the '70s and '80s played the Forum. The teams left for Staples Center in 1999. Madison Square Garden renovated it in 2014 as a concert venue. The columns stand. Inglewood remembers.","ys":1967,"tl":[{"y":"1967","x":"Opens — Cooke builds his Forum"},{"y":"1985","x":"Showtime Lakers — Magic & Kareem"},{"y":"1999","x":"Lakers leave for Staples Center"},{"y":"2014","x":"MSG renovates for concerts"}],"tags":["Lakers","Showtime","Magic Johnson","Concerts","Inglewood"],"rel":["smcivic","coliseum","palladium","sportsarena"],"w":"Kia_Forum","s":"active"},{"id":"wattstowers","h":"southla","n":"Watts Towers","t":"Folk Art Monument","c":"culture","lat":33.9389,"lng":-118.2415,"a":"1727 E 107th St, Watts","i":"🗼","d":"Simon Rodia, an Italian immigrant tile setter, spent 33 years (1921-1954) building seventeen interconnected sculptures from steel pipes, mortar, and found objects — broken pottery, seashells, tiles, glass bottles. He worked alone, with no power tools, no scaffolding, no blueprints. The tallest tower is nearly 100 feet. When he finished, he gave the property to a neighbor and left Los Angeles forever, never returning. The city tried to demolish them in 1959. They passed the engineering stress test. They're now a National Historic Landmark.","ys":1921,"tl":[{"y":"1921","x":"Rodia begins building — alone"},{"y":"1954","x":"Finishes after 33 years, leaves LA forever"},{"y":"1959","x":"City tries to demolish — towers pass stress test"},{"y":"1990","x":"National Historic Landmark"}],"tags":["Folk Art","Simon Rodia","33 Years","Alone","National Landmark"],"rel":["leimertpark","coliseum","dunbarhotel","visiontheatre","littlejoy","goldroom"],"w":"Watts_Towers","s":"active"},{"id":"shortstop","h":"echopark","n":"The Short Stop","t":"Bar & Dance Floor","c":"nightlife","lat":34.0753,"lng":-118.2536,"a":"1455 W Sunset Blvd","i":"⚾","d":"Originally a cop bar — literally owned by the LAPD Protective League and frequented by officers from the nearby Rampart Division. When the Rampart scandal broke in 1999, the cops vanished and the hipsters moved in. DJ nights replaced dart tournaments. Now one of Echo Park's most reliably packed dance floors. The irony of gentrifiers taking over a cop bar in the neighborhood the cops terrorized is lost on nobody.","ys":1942,"tl":[{"y":"1942","x":"Opens as LAPD cop bar"},{"y":"1999","x":"Rampart scandal — cops leave"},{"y":"2003","x":"DJ nights begin"}],"tags":["Cop Bar","Rampart","Dance Floor","Echo Park"],"s":"active"},{"id":"littlejoy","h":"echopark","n":"Little Joy","t":"Cocktail Bar","c":"nightlife","lat":34.0757,"lng":-118.2544,"a":"1477 W Sunset Blvd","i":"🍸","d":"Used to be the tiny dive bar next to the Short Stop that became Echo Park's living room — cheap drinks, a backyard patio, bathroom graffiti that was a folk art gallery. Then it got remodeled. The dive grime is gone, replaced by a proper cocktail program and a polished interior. Whether this is progress or loss depends on when you first walked in. The patio is good.","ys":2005,"tl":[{"y":"2005","x":"Opens on Sunset Blvd — beloved dive"},{"y":"2022","x":"Remodeled — cocktail bar now"}],"tags":["Cocktail Bar","Remodeled","Patio","Echo Park"],"rel":["shortstop","goldroom","burritoking","littlejoy","montybar","buttonmash"],"s":"active"},{"id":"goldroom","h":"echopark","n":"Gold Room","t":"Dive Bar","c":"nightlife","lat":34.0765,"lng":-118.2571,"a":"1558 W Sunset Blvd","i":"🥃","d":"The dingiest, most beloved dive in Echo Park. Cash only, stiff pours, a pool table, and a vibe that feels like 1987 regardless of the year. The name is ironic — nothing is gold in here except the drinks. A holdout from pre-gentrification Echo Park that refuses to change. Long may it resist.","ys":1993,"tl":[{"y":"1993","x":"Opens"}],"tags":["Dive Bar","Cash Only","Pool Table","Old School"],"s":"active"},{"id":"echoparklake","h":"echopark","n":"Echo Park Lake","t":"Park & Landmark","c":"culture","lat":34.0731,"lng":-118.2606,"a":"751 Echo Park Ave","i":"🦢","d":"The lake with the lotus flowers and the pedal boats and the palm-ringed promenade. Created in the 1860s as a reservoir, it became a park in 1892. The Lady of the Lake statue dates to 1935. Chinatown (1974) filmed here. In 2020-21 a large homeless encampment surrounded the lake, becoming a flashpoint in LA's housing crisis before the city cleared it. The lotus beds bloom every July — one of the most beautiful sights in the city.","ys":1892,"tl":[{"y":"1868","x":"Created as reservoir"},{"y":"1892","x":"Becomes public park"},{"y":"1935","x":"Lady of the Lake statue"},{"y":"1974","x":"Chinatown filmed here"}],"tags":["Lake","Lotus","Chinatown","Pedal Boats"],"rel":["angelustemple","angeleno","dodgerstadium","elysianpark","taix","elcompadre"],"w":"Echo_Park_Lake","s":"active"},{"id":"masa","h":"echopark","n":"Masa of Echo Park","t":"Deep Dish Pizza","c":"food","lat":34.0776,"lng":-118.2596,"a":"1800 W Sunset Blvd","i":"🍕","d":"Chicago deep dish in Echo Park, right next to The Echo. The bread pudding is the real draw — a warm, gooey, life-changing dessert that locals guard as a secret. Small, always packed, BYOB for years. The kind of neighborhood spot that anchors a block.","ys":2007,"tl":[{"y":"2007","x":"Opens next to The Echo"}],"tags":["Deep Dish","Bread Pudding","BYOB","Echo Park"],"s":"active"},{"id":"elcompadre","h":"echopark","n":"El Compadre","t":"Mexican Restaurant & Bar","c":"food","lat":34.0751,"lng":-118.2532,"a":"1449 W Sunset Blvd","i":"🌮","d":"Flaming margaritas, mariachi bands, and a dark romantic interior that has been the setting for more first dates and breakups than any other restaurant on Sunset. The strolling guitarists are the real deal. Open since 1975, it bridges Echo Park and Silver Lake. The flaming drink is theatrical and the food is solid comfort Mexican.","ys":2004,"tl":[{"y":"1975","x":"Opens on Sunset Blvd"}],"tags":["Mexican","Flaming Margaritas","Mariachi","Date Night"],"rel":["taix","masa","barragans","burritoking","mohawkbend","goldroom"],"s":"active"},{"id":"buttonmash","h":"echopark","n":"Button Mash","t":"Arcade Bar & Restaurant","c":"food","lat":34.0741,"lng":-118.2516,"a":"1391 W Sunset Blvd","i":"🕹️","d":"An arcade bar with actual good food — not the usual pizza-and-nachos laziness. Free-to-play classic arcade cabinets, craft cocktails, and an Asian fusion menu from the Starry Kitchen team. Opened 2015 in a former laundromat. Represented the best of what gentrification could do when it actually adds something to a neighborhood instead of just replacing things. Closed in 2024 — a victim of rising rents and the post-pandemic squeeze on independent restaurants.","ys":2015,"ye":2024,"tl":[{"y":"2015","x":"Opens in former laundromat"},{"y":"2024","x":"Closes — rent and post-pandemic economics"}],"tags":["Arcade","Craft Cocktails","Asian Fusion","Echo Park"],"s":"closed"},{"id":"mohawkbend","h":"echopark","n":"Mohawk Bend","t":"Gastropub","c":"food","lat":34.0777,"lng":-118.2648,"a":"2141 W Sunset Blvd","i":"🍻","d":"Gastropub that occupied a gorgeous 1930s vaudeville theater on Sunset Blvd from 2012 to 2023. 72 craft beers on tap, all California. Vegan options that actually worked. The high ceilings and original stage area made it feel like drinking in a cathedral. One of the anchor restaurants of the Echo Park corridor before it closed in October 2023.","ys":2012,"ye":2023,"tl":[{"y":"2012","x":"Opens in former vaudeville theater"},{"y":"2023","x":"Closes October 7"}],"tags":["Craft Beer","Vegan","Theater Building","Echo Park","Closed"],"rel":["masa","buttonmash","stories"],"s":"closed"},{"id":"barragans","h":"echopark","n":"Barragan's","t":"Mexican Restaurant","c":"food","lat":34.0763,"lng":-118.2567,"a":"1538 W Sunset Blvd","i":"🇲🇽","d":"Old-school Mexican restaurant that fed Echo Park from the 1960s to 2013. The combination plates, the margaritas, the vinyl booths — everything was a time capsule of Echo Park before anyone moved here for the scene. The neighborhood's longest-running restaurant and a direct line to who lived here first. Closed at the end of 2013 as the neighborhood shifted. Park Hospitality (Michael Francesconi and Mathew Glaser) took over the sprawling site in 2017 and split it into three venues operating simultaneously: Lowboy, a cocktail bar at street level; Bar Flores, a mezcal-focused upstairs cantina with a treehouse vibe; and Donna's, a red-sauce Italian joint that became one of the hardest reservations in Echo Park. One building, three lives — the story of the neighborhood in miniature.","ys":1965,"ye":2013,"tl":[{"y":"1965","x":"Opens as Barragan's Mexican Restaurant"},{"y":"2013","x":"Closes after 50+ years"},{"y":"2019","x":"Lowboy & Bar Flores open in same building"},{"y":"2023","x":"Donna's Italian opens — all three coexist"}],"tags":["Mexican","Echo Park OG","Lowboy","Bar Flores","Donna's"],"rel":["elcompadre","masa","taix","smallworld","booksoup","wacko"],"s":"closed"},{"id":"stories","h":"echopark","n":"Stories Books & Cafe","t":"Bookstore & Cafe","c":"shop","lat":34.0773,"lng":-118.2591,"a":"1716 W Sunset Blvd","i":"📚","d":"Independent bookstore and cafe that became Echo Park's intellectual anchor. Author readings, zine launches, and the kind of curated bookshelves that make you trust the owner's taste. The cafe side is perfect for writing or pretending to write.","ys":2014,"tl":[{"y":"2014","x":"Opens on Sunset Blvd"}],"tags":["Bookstore","Cafe","Independent","Echo Park"],"s":"active"},{"id":"angeleno","h":"echopark","n":"Angeleno Heights","t":"Victorian Neighborhood","c":"culture","lat":34.0681,"lng":-118.254,"a":"Carroll Ave & Edgeware Rd","i":"🏚️","d":"LA's first suburb, built in the 1880s on a hill above Echo Park Lake. Carroll Avenue is the most intact collection of Victorian homes in Los Angeles — Queen Annes and Eastlakes that look transplanted from San Francisco. The 1300 block of Carroll has been in dozens of films (Michael Jackson's Thriller video was shot nearby). These houses predate Hollywood by 30 years. They are the oldest residential architecture in the city.","ys":1886,"tl":[{"y":"1886","x":"First Victorians built on Carroll Ave"},{"y":"1976","x":"Designated HPOZ — protected"},{"y":"1983","x":"Thriller filmed nearby"}],"tags":["Victorian","Carroll Avenue","Oldest Suburb","Thriller"],"rel":["echoparklake","elysianpark","angelustemple","lincolnpark","harvardstone","montybar"],"w":"Angeleno_Heights,_Los_Angeles","s":"active"},{"id":"kingeddy","h":"downtown","n":"King Eddy Saloon","t":"Dive Bar","c":"nightlife","lat":34.0462,"lng":-118.2477,"a":"131 E 5th St","i":"🍺","d":"The second-oldest bar in LA, open since 1906. Originally the King Edward Hotel saloon, it survived Prohibition as a \"soft drink parlor\" (it wasn't). Skid Row's watering hole for a century. The upstairs was a speakeasy, then a blues club. Bukowski drank here. Charles Mingus played upstairs. The current iteration is cleaner than the old one, but the bones are the same — scarred wood, cheap beer, ghosts.","ys":1906,"ye":2024,"tl":[{"y":"1906","x":"Opens as King Edward Hotel bar"},{"y":"1925","x":"Speakeasy during Prohibition"},{"y":"1945","x":"Blues club upstairs — Mingus plays"},{"y":"2024","x":"Closed — future uncertain"}],"tags":["Oldest Bar","Bukowski","Mingus","Skid Row","Speakeasy"],"w":"King_Eddy_Saloon","s":"closed"},{"id":"threeclubs","h":"hollywood","n":"Three Clubs","t":"Lounge & Bar","c":"nightlife","lat":34.0914,"lng":-118.3267,"a":"1123 Vine St","i":"🍸","d":"The red-curtained lounge hidden behind a strip club facade on Vine. Walk through the unmarked door and you're in a dark, sexy, vaguely noir cocktail bar that has been a film industry hideout since the 1990s. Swingers filmed scenes here. The front room looks sketchy on purpose — it keeps the wrong people out. DJ nights, stiff drinks, and a crowd that knows not to take photos.","ys":1991,"tl":[{"y":"1991","x":"Opens behind strip club facade"},{"y":"1996","x":"Swingers filmed here"}],"tags":["Hidden","Noir","Swingers","Film Industry"],"rel":["boardners","burgundyroom","harvardstone","jumbos","goodtimes","threeclubs"],"s":"active"},{"id":"harvardstone","h":"hollywood","n":"Harvard & Stone","t":"Craft Cocktail Bar","c":"nightlife","lat":34.1012,"lng":-118.304,"a":"5221 Hollywood Blvd","i":"🥃","d":"Houston brothers bar in Thai Town built inside a former auto parts store. Two rooms: a craft cocktail front with live burlesque and music, and a hidden back room called the R&D bar serving experimental drinks. The building was previously The Stone, a punk venue. The cocktail program is world-class. The go-go dancers on the bar are unexpected and unsettling in the best way.","ys":2011,"tl":[{"y":"2011","x":"Opens in former auto parts store (The Stone)"}],"tags":["Craft Cocktails","Burlesque","Thai Town","Houston Brothers"],"s":"active"},{"id":"4100bar","h":"silverlake","n":"The 4100 Bar","t":"Dive Bar","c":"nightlife","lat":34.0929,"lng":-118.2814,"a":"1087 Manzanita St","i":"🍸","d":"Dive bar at Sunset Junction that's been a bar since 1967. Previously known as Detour, Dana Hollister transformed it into the 4100 around 2000. Later run by 213 Nightlife (The Varnish, Honeycut). Massive 360-degree bar, pool tables, PBR on tap, weekend BBQ in the parking lot, jukebox of indie anthems. Rowdy on weekends. The kind of place where everyone has a Moscow Mule in a copper mug.","ys":2000,"tl":[{"y":"1967","x":"Opens as a bar at 1087 Manzanita St (later known as Detour)"},{"y":"2000","x":"Dana Hollister transforms it into the 4100 Bar"},{"y":"2014","x":"213 Nightlife takes over operations"}],"tags":["Sunset Junction","Dive Bar","Silver Lake"],"rel":["akbar","thirstycrow","bigfootlodge","chachalounge"],"s":"active"},{"id":"paramount","h":"hollywood","n":"Paramount Studios","t":"Film Studio","c":"culture","lat":34.0838,"lng":-118.3209,"a":"5515 Melrose Ave","i":"🎬","d":"The last major studio in Hollywood — every other one fled to the Valley or Culver City. Founded in 1912 as Famous Players, the Bronson Gate entrance is the most iconic studio gate in the world (the mountain logo is based on Ben Lomond in Utah, not a Hollywood hill). The backlot has faked New York City for 100 years. Lucille Ball ran Desilu here. The Godfather, Chinatown, Sunset Boulevard, Forrest Gump — all Paramount. Gloria Swanson's \"I'm ready for my close-up\" was filmed on this lot, about a studio on this lot.","ys":1912,"tl":[{"y":"1912","x":"Founded as Famous Players"},{"y":"1926","x":"Bronson Gate built"},{"y":"1927","x":"Wings wins first Best Picture"},{"y":"1950","x":"Sunset Boulevard — a film about its own studio"},{"y":"1972","x":"The Godfather"}],"tags":["Last Studio","Bronson Gate","Godfather","Sunset Boulevard","Lucille Ball"],"rel":["chaplin","disneysl","sennett","nickodell","gowergulch","amoeba"],"w":"Paramount_Pictures","s":"active"},{"id":"rhino","h":"westla","n":"Rhino Records","t":"Record Store & Label","c":"shop","lat":34.0514,"lng":-118.4383,"a":"1720 Westwood Blvd","i":"🦏","d":"Harold Bronson and Richard Foos opened a used record store in Westwood in 1973 that became one of the most important reissue labels in music history. Rhino rescued forgotten music — garage rock, novelty songs, obscure soul — and repackaged it for new generations. Their compilations were how kids in the 80s discovered the 60s. The store closed in 2006; the label lives on.","ys":1973,"ye":2006,"tl":[{"y":"1973","x":"Opens in Westwood"},{"y":"1978","x":"Launches reissue label"},{"y":"2006","x":"Store closes"}],"tags":["Record Store","Reissue Label","Westwood","Music History"],"w":"Rhino_Records","s":"closed"},{"id":"golddiggers","h":"hollywood","n":"Gold Diggers","t":"Hotel, Bar & Recording Studio","c":"hotel","lat":34.0906,"lng":-118.3126,"a":"5632 Santa Monica Blvd","i":"🏨","d":"A boutique hotel, bar, music venue, and recording studio in a converted 1920s motel in East Hollywood. The recording studio has hosted Ty Segall, Father John Misty, and others. The bar books excellent live music. The rooms are stylish and cheap by LA standards. It's the anti-Chateau — scrappy, creative, and deeply plugged into the local music scene.","ys":2018,"tl":[{"y":"2018","x":"Opens in converted 1920s building"}],"tags":["Boutique Hotel","Recording Studio","Live Music","East Hollywood"],"rel":["chateau","studioone","troubadour","formosa","clubfuck","leimertpark"],"s":"active"},{"id":"faisdodo","h":"fairfax","n":"Club Fais Do-Do","t":"Zydeco & Music Venue","c":"music","lat":34.0327,"lng":-118.3571,"a":"5257 W Adams Blvd","i":"🎺","d":"A 1930 Art Deco bank building on Adams Boulevard — originally the First Citizens Savings Bank and Trust. In the 1960s it became an underground club frequented by Sam Cooke, Billy Preston, and John Coltrane. In 1990, Steven Yablok reopened it as Cafe Club Fais Do-Do with $500 and a dream. The name is a Cajun lullaby expression: put the kids to sleep, the grown-ups are gonna party. Zydeco, swing, blues, Brazilian, jazz, hip-hop — a gumbo of everything. The 90s swing revival packed the place. Now operating primarily as a production rental space, but the Art Deco bones remain.","ys":1991,"ye":2020,"tl":[{"y":"1930","x":"Built as First Citizens Savings Bank"},{"y":"1964","x":"Becomes underground club — Sam Cooke, Coltrane"},{"y":"1991","x":"Steven Yablok opens Cafe Club Fais Do-Do"},{"y":"1997","x":"Swing revival packs the house"}],"tags":["Zydeco","Swing","Art Deco","Cajun","Bank Vault"],"s":"closed"},{"id":"cafetropical","h":"silverlake","n":"Cafe Tropical","t":"Cuban Cafe","c":"food","lat":34.0828,"lng":-118.2735,"a":"2900 W Sunset Blvd","i":"☕","d":"The Cuban coffee shop at Sunset Junction that has been Silver Lake's living room since 1975. Cash only. The iced mocha has been a neighborhood ritual for decades. The pastry case is half transcendent, half questionable, which is exactly right. Screenwriters, musicians, and regulars have been occupying these tables since before Silver Lake was a real estate category. No WiFi for years — which forced something radical: actual conversation. The back room has quietly hosted AA and other recovery meetings for decades, making it one of the rare coffee shops in the city that functions as a genuine community lifeline, not just a place to sit with a laptop.","ys":1975,"tl":[{"y":"1975","x":"Opens at Sunset Junction"}],"tags":["Cuban","Coffee","Sunset Junction","Cash Only","No WiFi"],"rel":["elcid","casitadel","coffeetable","satellite","griffith","autry"],"s":"active"},{"id":"lazoo","h":"losfeliz","n":"Los Angeles Zoo","t":"Zoo","c":"culture","lat":34.1482,"lng":-118.2854,"a":"5333 Zoo Dr","i":"🦁","d":"The current LA Zoo opened in 1966 in Griffith Park, replacing the old Griffith Park Zoo whose abandoned enclosures you can hike to — one of LA's great hidden spots. 133 acres, 1,400 animals. The old zoo ruins are more interesting to some: concrete caves and iron bars from 1912 slowly being eaten by the hillside.","ys":1966,"tl":[{"y":"1912","x":"Original Griffith Park Zoo opens"},{"y":"1966","x":"New LA Zoo opens nearby"}],"tags":["Zoo","Griffith Park","Old Zoo Ruins","1966"],"w":"Los_Angeles_Zoo","s":"active"},{"id":"autry","h":"losfeliz","n":"Autry Museum of the American West","t":"Museum","c":"culture","lat":34.1486,"lng":-118.2813,"a":"4700 Western Heritage Way","i":"🤠","d":"Gene Autry — the singing cowboy who owned a baseball team, a TV station, and a hotel — founded this museum in 1988 to preserve the mythology of the American West. Serious art alongside kitschy memorabilia. Remington bronzes to Native American artifacts to cowboy movie costumes. In Griffith Park near the zoo, which is exactly where a singing cowboy's museum belongs.","ys":1988,"tl":[{"y":"1988","x":"Gene Autry founds museum"},{"y":"2003","x":"Merges with Southwest Museum"}],"tags":["Gene Autry","Western","Griffith Park","Cowboys"],"rel":["lazoo","griffith","hollywoodbowl","angeleno","elysianpark","olvera"],"w":"Autry_Museum_of_the_American_West","s":"active"},{"id":"lincolnpark","h":"lincolnheights","n":"Lincoln Park / Eastlake","t":"Historic Park","c":"culture","lat":34.0665,"lng":-118.2008,"a":"3501 Valley Blvd","i":"🌳","d":"LA's oldest park, established in 1874. Once had a zoo (moved to Griffith Park in 1912), an alligator farm, and a lake. The park served Lincoln Heights, one of LA's oldest neighborhoods. Now home to the Plaza de la Raza cultural center. The old zoo building remnants and the lake remain. A working-class park in a working-class neighborhood for 150 years.","ys":1874,"tl":[{"y":"1874","x":"Established — oldest park in LA"},{"y":"1885","x":"Zoo added"},{"y":"1912","x":"Zoo moves to Griffith Park"}],"tags":["Oldest Park","Zoo","Lincoln Heights","Working Class"],"s":"active"},{"id":"batchelder","h":"downtown","n":"Batchelder Tile / Dutch Chocolate Shop","t":"Craftsman Tile Landmark","c":"culture","lat":34.0465,"lng":-118.2514,"a":"217 W 6th St","i":"🍫","d":"Ernest Batchelder was Pasadena's master tilemaker whose Arts & Crafts tiles decorated thousands of California bungalows. His Dutch Chocolate Shop — a confectionery with a fantastical Batchelder tile interior — was one of early LA's most beloved gathering spots. The tiles were handmade, each one unique. The tiles survive in situ at 217 W 6th St, hidden behind a nondescript storefront — one of LA's great secret landmarks. Batchelder's work is the decorative DNA of old California — fireplaces, fountains, and facades across the city carry his mark.","ys":1914,"ye":1986,"tl":[{"y":"1909","x":"Batchelder opens Pasadena kiln"},{"y":"1914","x":"Dutch Chocolate Shop opens downtown"},{"y":"1932","x":"Depression closes the business"}],"tags":["Arts & Crafts","Tiles","Pasadena","Craftsman","Chocolate"],"rel":["bradbury","angelsflight","lastbookstore","safarisams","knittingfactory","descontrol"],"s":"closed"},{"id":"starshoes","h":"hollywood","n":"Star Shoes","t":"Shoe Store / Underground Venue","c":"music","lat":34.1015,"lng":-118.3287,"a":"6364 Hollywood Blvd","i":"👟","d":"A shoe store on Hollywood Blvd that secretly hosted underground shows, DJ nights, and art events in its back room and basement in the late 90s and 2000s. Part of the network of unofficial spaces that kept Hollywood's creative pulse alive when the boulevard was at its seediest. The store was a front; the real business was the scene happening behind the racks of discount pumps.","ys":1995,"ye":2012,"tl":[{"y":"1995","x":"Starts hosting underground events"},{"y":"2005","x":"Peak of back-room scene"},{"y":"2012","x":"Closes"}],"tags":["Underground","Secret Venue","Hollywood Blvd","DIY"],"s":"closed"},{"id":"housespirits","h":"echopark","n":"House of Spirits","t":"Liquor Store","c":"shop","lat":34.0771,"lng":-118.257,"a":"1314 Echo Park Ave","i":"👻","d":"A family-owned liquor store on Echo Park Avenue with one of the greatest neon signs in Los Angeles — a 50-foot storybook cottage with a crooked chimney puffing animated neon smoke, a white picket fence, and a glowing tree. The sign was so much bigger and more beautiful than the modest store beneath it. Open for roughly 60 years, the Telis family ran it as a neighborhood institution with a great craft beer selection and the kind of customer service that makes you loyal for life. In December 2018, a fire broke out during a rainstorm and gutted the building. The store never reopened. The ruins were ransacked, and the neon liquor bottle was stolen. In 2020, the Museum of Neon Art rescued the sign for restoration, with plans to return it to Echo Park someday. The property was listed as a redevelopment opportunity. The sign was the soul of the block.","ys":1958,"ye":2018,"tl":[{"y":"1958","x":"Opens on Echo Park Ave — neon sign installed"},{"y":"2018","x":"Fire destroys building during rainstorm"},{"y":"2019","x":"Property listed for sale"},{"y":"2020","x":"MONA rescues neon sign for restoration"}],"tags":["Neon Sign","Fire","Liquor Store","MONA","Echo Park Icon"],"rel":["shortstop","goldroom","littlejoy","echoparklake","angeleno","housespirits"],"s":"closed"},{"id":"magicgas","h":"echopark","n":"Magic Gas","t":"Gas Station","c":"culture","lat":34.08152,"lng":-118.2544,"a":"1600 Echo Park Ave","i":"⛽","d":"An independent gas station on Echo Park Avenue that was one of those neighborhood landmarks nobody thought about until it was gone. The hand-painted signage and old-school pumps were a holdout from a pre-corporate LA. Eventually swallowed by Chevron. One of a thousand small local businesses that got quietly replaced by chains as the neighborhood gentrified — not with a fire or a protest, just a sign change and a coat of paint.","ys":1965,"ye":2013,"tl":[{"y":"1965","x":"Opens on Echo Park Ave"},{"y":"2013","x":"Converted to Chevron station"}],"tags":["Gas Station","Independent","Chevron","Gentrification"],"s":"closed"},{"id":"pacificdining","h":"downtown","n":"Pacific Dining Car","t":"Historic Restaurant","c":"food","lat":34.0556,"lng":-118.266,"a":"1310 W 6th St","i":"🥩","d":"Iconic 24-hour steakhouse operating since 1921 in a converted rail car, a favorite of downtown power players and night owls for a century. Destroyed by fire in 2020 and permanently closed, ending a 99-year run.","ys":1921,"ye":2020,"tl":[{"y":"1921","x":"Fred & Grace Cook open restaurant in modified railway dining car"},{"y":"1923","x":"Moves to 1310 W 6th Street in Westlake"},{"y":"1927","x":"Learns beef aging — installs on-site curing box"},{"y":"1990","x":"Expands to Santa Monica location"},{"y":"2020","x":"Closes during COVID — auctions off all furnishings"},{"y":"2023","x":"Designated Historic-Cultural Monument"},{"y":"2025","x":"Building destroyed by fire — demolished"}],"tags":["Restaurant","Steak","Historic","24-Hour","Rail Car"],"rel":["pantry","coles","grandcentral","musso","frolicroom","threeclubs"],"s":"demolished"},{"id":"joneshollywood","h":"hollywood","n":"Jones Hollywood","t":"Restaurant & Bar","c":"food","lat":34.0909,"lng":-118.3464,"a":"7205 Santa Monica Blvd","i":"🍕","d":"Beloved Italian-American comfort food spot and late-night industry hangout on Santa Monica Blvd. Known for its pizza, spaghetti, and a jukebox-fueled atmosphere that attracted musicians, actors, and creatives since the 1990s.","ys":1994,"tl":[{"y":"1994","x":"Sean MacPherson opens Jones on Santa Monica Blvd"},{"y":"2005","x":"Becomes late-night industry hangout — kitchen open until 1 AM"}],"tags":["Restaurant","Bar","Italian","Late Night","Industry Hangout"],"s":"active"},{"id":"edisonbar","h":"downtown","n":"The Edison","t":"Cocktail Bar","c":"nightlife","lat":34.0512,"lng":-118.245,"a":"108 W 2nd St","i":"⚡","d":"Opulent industrial-themed cocktail bar built in the basement of the 1910 Higgins Building, LA's first private power plant. Featured 22-foot ceilings, cast-iron relics, and prohibition-era glamour. A crown jewel of the downtown nightlife renaissance.","ys":2007,"tl":[{"y":"1910","x":"Higgins Building basement houses LA first private power plant"},{"y":"2007","x":"Andrew Meieran converts basement into The Edison"},{"y":"2012","x":"Named one of world top 20 bars by Esquire"},{"y":"2020","x":"Closes during COVID — never reopens"}],"tags":["Bar","Cocktails","Historic","Speakeasy","Power Plant"],"rel":["thevarnish","bestia","hotelfigueroa","mondrianla","chateau","riot"],"s":"active"},{"id":"standardsunset","h":"sunset","n":"The Standard Hotel","t":"Hotel & Rooftop Bar","c":"nightlife","lat":34.0959,"lng":-118.371,"a":"8300 Sunset Blvd","i":"🏊","d":"André Balazs' iconic Sunset Strip hotel with the famous upside-down sign and blue astroturf pool deck. The rooftop became ground zero for mid-2000s Hollywood nightlife. Closed during the pandemic after two decades of scene-defining parties.","ys":1999,"ye":2021,"tl":[{"y":"1962","x":"Thunderbird Motel built on Sunset Strip"},{"y":"1975","x":"Becomes Golden Crest retirement home"},{"y":"1999","x":"Andre Balazs opens The Standard — DiCaprio, Cameron Diaz invest"},{"y":"2021","x":"Closes permanently — lease increase during COVID"},{"y":"2023","x":"Ian Schrager purchases property"}],"tags":["Hotel","Rooftop","Nightlife","Sunset Strip","Pool"],"s":"closed"},{"id":"mondrianla","h":"sunset","n":"The Mondrian LA","t":"Hotel & Skybar","c":"nightlife","lat":34.0944,"lng":-118.3744,"a":"8440 Sunset Blvd","i":"🍸","d":"Ian Schrager and Philippe Starck's all-white minimalist hotel on the Sunset Strip, home to the legendary Skybar poolside lounge. A defining venue of 1990s-2000s celebrity culture where the velvet rope was king.","ys":1996,"tl":[{"y":"1959","x":"Built as apartment building on Sunset Strip"},{"y":"1984","x":"Converted to hotel"},{"y":"1996","x":"Ian Schrager redesign — Philippe Starck interiors"},{"y":"2003","x":"Skybar becomes celebrity pool scene destination"}],"tags":["Hotel","Skybar","Nightlife","Sunset Strip","Celebrity"],"rel":["standardsunset","chateau","riot","rowdtla","grandcentral","bradbury"],"s":"active"},{"id":"santeealley","h":"downtown","n":"Santee Alley","t":"Street Market","c":"culture","lat":34.0394,"lng":-118.2557,"a":"210 E Olympic Blvd","i":"🛍️","d":"The bustling open-air market in the heart of the Fashion District, a mile-long maze of vendors selling everything from bootleg designer goods to fresh fruit and quinceañera dresses. A vital economic artery for LA's immigrant communities since the 1970s.","ys":1971,"tl":[{"y":"1971","x":"Garment District street market emerges"},{"y":"1995","x":"Becomes major bargain shopping destination"}],"tags":["Market","Fashion District","Shopping","Latino Culture","Street Life"],"s":"active"},{"id":"bonaventure","h":"downtown","n":"Westin Bonaventure","t":"Landmark Hotel","c":"culture","lat":34.0528,"lng":-118.2565,"a":"404 S Figueroa St","i":"🏙️","d":"John Portman's futuristic 1977 hotel with five mirrored glass cylinders, a six-story atrium lobby, and the revolving BonaVista Lounge on the 34th floor. Featured in countless films from Buck Rogers to Interstellar. A postmodern icon that Fredric Jameson famously theorized as embodying late capitalism.","ys":1977,"tl":[{"y":"1977","x":"Opens — John Portman design with five glass towers"},{"y":"1984","x":"Featured in Buck Rogers"},{"y":"1993","x":"In the Line of Fire filmed here"}],"tags":["Hotel","Architecture","Brutalist","Film Location","Revolving Bar"],"rel":["acehotel","biltmore","springst","villagestudios","troubadour","rhino"],"s":"active"},{"id":"mccabes","h":"westla","n":"McCabe's Guitar Shop","t":"Music Store & Venue","c":"music","lat":34.026,"lng":-118.4576,"a":"3101 Pico Blvd, Santa Monica","i":"🎸","d":"Legendary guitar shop and intimate backroom concert venue operating since 1958. The 150-seat listening room has hosted everyone from Doc Watson to Lucinda Williams to Jackson Browne. A West LA folk and acoustic institution.","ys":1958,"tl":[{"y":"1958","x":"Opens as guitar shop in Santa Monica"},{"y":"1969","x":"Begins hosting concerts in back room"},{"y":"1975","x":"Jackson Browne, Joni Mitchell play"}],"tags":["Music","Guitar Shop","Concert Venue","Folk","Acoustic"],"w":"McCabe%27s_Guitar_Shop","s":"active"},{"id":"fugetsudo","h":"littletokyo","n":"Fugetsu-Do","t":"Confectionery","c":"food","lat":34.0502,"lng":-118.2404,"a":"315 E 1st St","i":"🍡","d":"Family-run Japanese confectionery making mochi and manju since 1903, one of the oldest businesses in Little Tokyo. Survived internment during WWII when the Kito family was forced to close and later returned. A living connection to pre-war Japanese American LA.","ys":1903,"tl":[{"y":"1903","x":"Seiichi Kito opens confectionery in Little Tokyo"},{"y":"1942","x":"Family incarcerated during internment"},{"y":"1945","x":"Reopens — one of few businesses to return"}],"tags":["Mochi","Japanese","Family Business","Little Tokyo","Historic"],"rel":["jvillageplaza","kinokuniya","kouraku","sushigen","goforbroke","jaccc"],"s":"active"},{"id":"janm","h":"littletokyo","n":"Japanese American National Museum","t":"Museum","c":"culture","lat":34.0496,"lng":-118.2386,"a":"100 N Central Ave","i":"🏛️","d":"Founded in 1992 in the historic Hompa Hongwanji Buddhist Temple, the museum chronicles the Japanese American experience from immigration through internment to the present. The premier institution for understanding this essential chapter of American history.","ys":1992,"tl":[{"y":"1985","x":"Founded by community activists"},{"y":"1992","x":"Opens in former Nishi Hongwanji temple"},{"y":"1999","x":"New pavilion — designed by Gyo Obata"}],"tags":["Museum","Japanese American","History","Little Tokyo","Internment"],"s":"active"},{"id":"mocageffen","h":"littletokyo","n":"MOCA Geffen Contemporary","t":"Museum","c":"culture","lat":34.0505,"lng":-118.2386,"a":"152 N Central Ave","i":"🎨","d":"Frank Gehry's 1983 conversion of a former police car warehouse into a raw, cavernous exhibition space for the Museum of Contemporary Art. Originally a 'temporary' space that became permanent thanks to its perfect proportions for large-scale installations.","ys":1983,"tl":[{"y":"1942","x":"Built as police car warehouse"},{"y":"1983","x":"Frank Gehry converts for MOCA inaugural exhibition"},{"y":"1996","x":"Renamed Geffen Contemporary"}],"tags":["Museum","Contemporary Art","Frank Gehry","Warehouse","Gallery"],"rel":["hauserwirth","thebroad","artsharela","janm","kyotogarden","kinokuniya"],"s":"active"},{"id":"jvillageplaza","h":"littletokyo","n":"Japanese Village Plaza","t":"Shopping Center","c":"culture","lat":34.0484,"lng":-118.2392,"a":"335 E 2nd St","i":"⛩️","d":"Open-air pedestrian mall designed in traditional Japanese architectural style, opened in 1978 as the commercial heart of modern Little Tokyo. Features a fire tower, stone lanterns, and a mix of restaurants, shops, and the iconic Mikawaya mochi ice cream.","ys":1978,"tl":[{"y":"1978","x":"Opens as pedestrian mall in Little Tokyo"},{"y":"1985","x":"Becomes cultural and retail center"}],"tags":["Shopping","Japanese","Little Tokyo","Architecture","Restaurants"],"s":"active"},{"id":"farbar","h":"littletokyo","n":"Far Bar","t":"Bar & Restaurant","c":"nightlife","lat":34.0496,"lng":-118.2396,"a":"347 E 1st St","i":"🥃","d":"Located in the historic 1920s Far East Building, this bar helped spark Little Tokyo's nightlife revival. Features craft beers, Asian-influenced cocktails, and an extensive whiskey collection in a space with deep community roots — the building once housed the Far East Cafe, a Japanese American social hub.","ys":2007,"tl":[{"y":"2007","x":"Opens in Little Tokyo"},{"y":"2012","x":"Anchor of Little Tokyo nightlife"}],"tags":["Bar","Little Tokyo","Cocktails","Historic","Community Hub"],"rel":["wolfcrane","kouraku","tonyssaloon","janm","goforbroke","jaccc"],"s":"active"},{"id":"hongwanji","h":"littletokyo","n":"Hompa Hongwanji Buddhist Temple","t":"Temple","c":"culture","lat":34.0492,"lng":-118.2344,"a":"815 E 1st St","i":"🛕","d":"Jodo Shinshu Buddhist temple founded in 1905, the current building designed in traditional Japanese style dates to 1969. The original 1925 temple building at 120 N Central Ave served as a processing center for Japanese American internment in 1942, and later became the first home of JANM.","ys":1905,"tl":[{"y":"1905","x":"Congregation established in Little Tokyo"},{"y":"1925","x":"Current building constructed"},{"y":"1942","x":"Dispersed during internment"}],"tags":["Temple","Buddhist","Japanese American","Historic","Religion"],"s":"active"},{"id":"hauserwirth","h":"artsdistrict","n":"Hauser & Wirth","t":"Art Gallery","c":"culture","lat":34.0461,"lng":-118.2349,"a":"901 E 3rd St","i":"🖼️","d":"International mega-gallery occupying the restored 1890s Globe Mills flour mill complex in the Arts District. Features world-class exhibitions, Piet Oudolf gardens, the restaurant Manuela, and an ARTBOOK store. Won the LA Conservancy's Chair's Award in 2018 for historic preservation.","ys":2016,"tl":[{"y":"1895","x":"Globe Mills flour mill built"},{"y":"2016","x":"Hauser & Wirth opens Arts District gallery"}],"tags":["Gallery","Contemporary Art","Arts District","Historic Mill","Garden"],"rel":["thebroad","lacma","mocageffen","artsharela","breweryart","wurstkuche"],"s":"active"},{"id":"angelcity","h":"artsdistrict","n":"Angel City Brewery","t":"Brewery","c":"food","lat":34.0461,"lng":-118.2373,"a":"216 S Alameda St","i":"🍺","d":"Craft brewery in a 1913 warehouse on the western edge of the Arts District. Became one of the neighborhood's early anchors with its spacious taproom, rotating food trucks, and public art. Named after the original Angel City Brewing Co. that operated in LA from 1897 to 1949.","ys":2011,"ye":2026,"tl":[{"y":"1897","x":"Roebling warehouse constructed"},{"y":"2011","x":"Angel City Brewery opens — first post-Prohibition craft brewery downtown"}],"tags":["Brewery","Craft Beer","Arts District","Warehouse","Community Space"],"s":"closed"},{"id":"wurstkuche","h":"artsdistrict","n":"Wurstküche","t":"Restaurant & Beer Hall","c":"food","lat":34.0456,"lng":-118.2361,"a":"800 E 3rd St","i":"🌭","d":"Exotic sausage restaurant and beer hall that helped pioneer the Arts District dining scene. Known for rattlesnake-rabbit and pheasant sausages alongside Belgian fries and an extensive craft beer list. The communal picnic tables became an early gathering point for the neighborhood's creative community.","ys":2008,"tl":[{"y":"2008","x":"Opens in Arts District — exotic sausages and Belgian beer"},{"y":"2010","x":"Early anchor of Arts District dining"}],"tags":["Restaurant","Beer Hall","Sausage","Arts District","Pioneer"],"rel":["angelcity","bestia","hauserwirth"],"s":"active"},{"id":"palominoclub","h":"noho","n":"Palomino Club","t":"Music Venue (Closed 1995)","c":"music","lat":34.196,"lng":-118.3881,"a":"6907 Lankershim Blvd, North Hollywood","i":"🤠","d":"The Valley's greatest honky-tonk. Opened around 1949 by Western swing bandleader Hank Penny, then run for decades by Tommy Thomas, who turned it into country music's most important West Coast club. Johnny Cash, Willie Nelson, Merle Haggard, Emmylou Harris — everyone played the foot-high stage, sweating under hot lights with the audience inches from their boots. The bar opened at 6am with happy hour at 8am. By the late '70s, cow-punk acts like Lone Justice, Dwight Yoakam, and the Blasters drifted over from Hollywood. Then came the Red Hot Chili Peppers, Green Day, the Pretenders. George Harrison showed up. The dressing rooms were open to the public. When it closed in 1995, nobody even grabbed the pictures off the walls.","ys":1949,"ye":1995,"tl":[{"y":"1949","x":"Opens in North Hollywood"},{"y":"1965","x":"Johnny Cash, Patsy Cline, Willie Nelson perform"},{"y":"1985","x":"Punk crossover — X, Social Distortion booked"},{"y":"1995","x":"Closes — neon sign later at Valley Relics"}],"tags":["Country","Honky-Tonk","Cow Punk","Lankershim"],"rel":["resedacc","bakedpotato","cobaltcafe","warnerbros"],"w":"Palomino_Club_(North_Hollywood)","s":"closed"},{"id":"resedacc","h":"valley","n":"Reseda Country Club","t":"Music Venue (Closed ~1999)","c":"music","lat":34.201,"lng":-118.5342,"a":"18419 Sherman Way, Reseda","i":"🎸","d":"Started as a 1950s Sav-On drugstore, then Chuck Landis — the man behind the Roxy and Largo — bought it in 1980 and turned it into the West Valley's wildest club. Originally billed as country, it immediately became ground zero for punk and metal. Metallica, Slayer, U2, Iggy Pop, James Brown, B.B. King, Captain Beefheart, Bad Religion, Social Distortion all played the same stage. Paul Thomas Anderson used it as 'Hot Traxx' in Boogie Nights — the seedy-yet-comfortable vibe was perfect. Neighborhood complaints about noise and rowdy concertgoers eventually killed it. Now it's Restauración Reseda, a Spanish-language church. The acoustics are reportedly excellent.","ys":1983,"ye":1999,"tl":[{"y":"1980","x":"Opens as punk venue in Reseda"},{"y":"1983","x":"Black Flag, Circle Jerks, TSOL play"},{"y":"1993","x":"Bad Religion, Pennywise era"},{"y":"1999","x":"Closes"}],"tags":["Punk","Metal","Boogie Nights","Sherman Way"],"rel":["palominoclub","bakedpotato","cobaltcafe","resedacc"],"w":"Reseda_Country_Club","s":"closed"},{"id":"bakedpotato","h":"studiocity","n":"The Baked Potato","t":"Jazz Club","c":"music","lat":34.1366,"lng":-118.3631,"a":"3787 Cahuenga Blvd W, Studio City","i":"🎹","d":"A tiny jazz fusion club on Cahuenga that's been packing people in since 1970. The kind of place where you're sitting so close to the musicians you can see the sweat on their fingers. Studio session players come here after long days at Capitol or Village Recorder to play what they actually want to play. The baked potatoes on the menu are massive and loaded — the whole concept is jazz and potatoes, and somehow it works perfectly. One of the last intimate live music rooms in the Valley.","ys":1970,"tl":[{"y":"1970","x":"Opens as jazz club in Studio City"},{"y":"1980","x":"Premier jazz fusion venue — Don Randi hosts"}],"tags":["Jazz","Fusion","Live Music","Cahuenga"],"w":"Baked_Potato_(jazz_club)","s":"active"},{"id":"cobaltcafe","h":"valley","n":"Cobalt Cafe","t":"DIY Venue","c":"music","lat":34.2011,"lng":-118.607,"a":"22047 Sherman Way, Canoga Park","i":"🖤","d":"Founded by Dave Politi on January 17, 1991 — three days before the Gulf War started. Canoga Park's scrappy all-ages venue that launched an absurd number of careers: Linkin Park (as Hybrid Theory), Incubus, Hoobastank, AFI, Avenged Sevenfold, Strung Out, Less Than Jake all came through. Started as a coffeehouse with poetry readings and open mics, modeled after San Francisco coffee culture. Moved to Sherman Way in 1994, three days before the Northridge earthquake. For 23 years it was the West Valley's primary cultural outpost — the kids who couldn't get to Hollywood had their own scene. Closed December 2014 after owner health issues and financial strain.","ys":1991,"ye":2014,"tl":[{"y":"1991","x":"Dave Politi opens coffeehouse in Canoga Park"},{"y":"1994","x":"Moves to Sherman Way — Northridge quake 3 days later"},{"y":"2000","x":"Linkin Park, Incubus, Hoobastank launch here"},{"y":"2014","x":"Closes after 23 years"}],"tags":["Punk","DIY","All Ages","Canoga Park"],"rel":["palominoclub","resedacc","bakedpotato"],"s":"closed"},{"id":"warnerbros","h":"burbank","n":"Warner Bros Studios","t":"Film Studio","c":"culture","lat":34.1511,"lng":-118.336,"a":"3400 Warner Blvd, Burbank","i":"🎬","d":"The brothers Warner — Harry, Albert, Sam, and Jack — moved here from their Sunset Blvd studio in 1928. Casablanca was shot on these lots. So was Rebel Without a Cause, A Streetcar Named Desire, and Bonnie and Clyde. The backlot has the New York Street set with fake fire escapes and cracked sidewalks. Friends filmed at Stage 24 for ten years. The Big Bang Theory across the way. The water tower with Yakko, Wakko, and Dot became an icon of '90s childhood. More than any other studio, Warner Bros IS Burbank.","ys":1928,"tl":[{"y":"1926","x":"Acquires First National Studios lot in Burbank"},{"y":"1928","x":"Studio operations begin"}],"tags":["Film Studio","Casablanca","Friends","Burbank"],"w":"Warner_Bros._Studios,_Burbank","s":"active"},{"id":"disneystudios","h":"burbank","n":"Walt Disney Studios","t":"Film Studio","c":"culture","lat":34.157,"lng":-118.325,"a":"500 S Buena Vista St, Burbank","i":"🏰","d":"Walt moved the studio from Los Feliz to Burbank in 1940, just in time for Fantasia's release. The Burbank lot was designed to Walt's specifications — low-slung animation buildings arranged around a courtyard so animators could walk and think. During WWII, the military requisitioned parts of the lot for anti-aircraft defense. The main Animation Building is where Cinderella, Sleeping Beauty, The Jungle Book, and every Renaissance-era film from Little Mermaid to Lion King were drawn by hand. The building houses animators today.","ys":1940,"tl":[{"y":"1940","x":"Walt Disney moves from Hyperion Ave to Burbank"},{"y":"1940","x":"Fantasia and Pinocchio produced"},{"y":"1966","x":"Walt Disney dies"}],"tags":["Animation","Disney","Burbank","Film"],"rel":["warnerbros","cbsradiocity","disneysl","disneysl"],"w":"Walt_Disney_Studios_(Burbank)","s":"active"},{"id":"cbsradiocity","h":"studiocity","n":"CBS Studio Center","t":"Film Studio","c":"culture","lat":34.1457,"lng":-118.3908,"a":"4024 Radford Ave, Studio City","i":"📺","d":"Started as Mack Sennett's studio in 1928 — the Keystone Kops were born nearby. Became Republic Pictures, the factory that pumped out B-westerns and serials through the '40s and '50s. Gene Autry and Roy Rogers rode horses through these gates. CBS bought it in 1967 and it became the home of Seinfeld, Mary Tyler Moore Show, and dozens of sitcoms. The name 'Studio City' literally comes from this studio's presence. Radford Avenue might be the most important street in television history that nobody outside the industry has heard of.","ys":1928,"tl":[{"y":"1928","x":"Built as Mack Sennett Studios for silent comedy"},{"y":"1935","x":"Republic Pictures takes over"},{"y":"1967","x":"CBS acquires — becomes CBS Studio Center"}],"tags":["Republic Pictures","Seinfeld","CBS","Studio City"],"rel":["warnerbros","disneystudios","palominoclub"],"w":"CBS_Studio_Center","s":"active"},{"id":"casavega","h":"valley","n":"Casa Vega","t":"Mexican Restaurant","c":"food","lat":34.1469,"lng":-118.4228,"a":"13301 Ventura Blvd, Sherman Oaks","i":"🌮","d":"Rafael Vega's mother crossed the border into National City in 1934 to give birth to him. In 1956, at 22, he opened this place on Ventura Blvd when Mexican restaurants barely existed outside Olvera Street. The interior hasn't changed much — wrap-around red leather booths, dim lighting, a hardwood bar where the margaritas hit hard. Marlon Brando was a regular. Cary Grant. Dean Martin and Desi Arnaz. Tarantino shot scenes here for Once Upon a Time in Hollywood — Brad Pitt and Leo in those same red booths. James Beard Foundation named it an American Classic in 2022. Rafael died of COVID in 2021. His daughter Christy runs it now. The family bought the building for the first time in 2026 after renting for 70 years.","ys":1956,"tl":[{"y":"1956","x":"Rafael Ray Vega opens on Ventura Blvd"},{"y":"1960","x":"Red leather booths, strong margaritas"}],"tags":["Mexican Food","Celebrity","Ventura Blvd","Tarantino"],"rel":["artsdeli","bobsbigboy","chilijohns","sportsmenslodge","farmersmarket","canters"],"w":"Casa_Vega","s":"active"},{"id":"dupars","h":"fairfax","n":"Du-par's","t":"Diner & Bakery","c":"food","lat":34.072,"lng":-118.3604,"a":"6333 W 3rd St (Farmers Market)","i":"🥧","d":"Dunn and Parsons opened Du-par's at the Original Farmers Market on 3rd and Fairfax in 1938. The Studio City location on Ventura Blvd, the Valley outpost beloved by old-timers and industry people after late shoots, has since closed. The original Farmers Market location on 3rd Street remains open — the hot cakes famous, the banana cream pie a religious experience. The kind of diner where the pie case near the door tells you everything you need to know.","ys":1938,"tl":[{"y":"1938","x":"Dunn and Parsons open at Farmers Market"},{"y":"1952","x":"Expands to Valley locations"}],"tags":["Diner","Pies","Breakfast","Ventura Blvd"],"w":"Du-par%27s","s":"active"},{"id":"artsdeli","h":"valley","n":"Art's Delicatessen","t":"Jewish Deli","c":"food","lat":34.1432,"lng":-118.3989,"a":"12224 Ventura Blvd, Studio City","i":"🥪","d":"Art Ginsburg opened this place in 1957, and for nearly 70 years it's been the Valley's answer to Canter's and Langer's. Massive pastrami sandwiches, matzo ball soup, chopped liver, lox and bagels — the full Jewish deli canon served in a room where every booth seems to contain someone who either works in the industry or used to. The Valley had a huge Jewish population boom in the '50s and '60s, and Art's became the unofficial commissary. Celebrity regulars have included everyone from Bob Hope to George Lopez.","ys":1957,"tl":[{"y":"1957","x":"Art Ginsburg opens deli in Studio City"},{"y":"1965","x":"Entertainment industry lunch spot"}],"tags":["Jewish Deli","Pastrami","Ventura Blvd","Studio City"],"rel":["casavega","chilijohns","bobsbigboy"],"w":"Arts_Delicatessen","s":"active"},{"id":"sportsmenslodge","h":"valley","n":"Sportsmen's Lodge","t":"Hotel & Historic Site","c":"culture","lat":34.1462,"lng":-118.4132,"a":"12833 Ventura Blvd, Studio City","i":"🎣","d":"Before it was a hotel, before it was a restaurant, before Studio City even had its name — this was a trout fishing spot. The natural springs fed ponds where Angelenos came to fish starting in the 1880s. By the 1920s it was Hollywood Trout Farms. Clark Gable, Humphrey Bogart, Bette Davis, and Ava Gardner fished and drank here. The 1971 earthquake diverted the natural spring and ended the fishing era. Brian Wilson lounged by the Olympic pool. Jack Elam lived in a top-floor suite and once forgot where he'd parked his car — 'somewhere in the Valley.' The banquet hall hosted every major Valley event for half a century. It's the story of the Valley itself: rural paradise that woke up one day surrounded by city.","ys":1880,"ye":2020,"tl":[{"y":"1913","x":"Lodge built for fishermen along LA River"},{"y":"1962","x":"Rebuilt as hotel and event venue"},{"y":"2020","x":"Demolished for development — community backlash"}],"tags":["Historic","Trout Fishing","Old Hollywood","Ventura Blvd"],"rel":["casavega","garlandhotel","universalstudios","artsdeli","resedacc","palominoclub"],"w":"Sportsmens_Lodge","s":"demolished"},{"id":"idlehour","h":"noho","n":"Idle Hour","t":"Bar & Historic Building","c":"nightlife","lat":34.1584,"lng":-118.37,"a":"4824 Vineland Ave, North Hollywood","i":"🛢️","d":"A bar shaped like a giant barrel. Built in 1941 as part of LA's golden age of programmatic architecture — the same instinct that gave the city the Brown Derby hat, the Tail o' the Pup hot dog, and the Donut Hole. The barrel sat empty and decaying for years before being restored and reopened as a cocktail bar. It's now a NoHo landmark, the kind of delightfully weird building that could only exist in Los Angeles, where the line between architecture and advertising was always blurry.","ys":1941,"tl":[{"y":"1941","x":"Built as giant barrel-shaped bar — Programmatic architecture"},{"y":"2015","x":"Reopened as craft cocktail bar after restoration"}],"tags":["Programmatic Architecture","Cocktails","NoHo","Barrel"],"w":"Idle_Hour_(bar)","s":"active"},{"id":"vitellos","h":"valley","n":"Vitello's","t":"Italian Restaurant","c":"food","lat":34.1489,"lng":-118.3792,"a":"4349 Tujunga Ave, Studio City","i":"🍝","d":"A perfectly nice Studio City Italian restaurant that became infamous overnight. On May 4, 2001, Robert Blake — Baretta himself — ate dinner here with his wife Bonnie Lee Bakley. When they returned to his car parked on a side street, Blake claimed he'd left his gun in the restaurant and went back inside. While he was gone, someone shot Bakley in the head. Blake was acquitted of murder in 2005 but found liable in a civil wrongful death suit. The restaurant is open. People eat there. The booth is there. The Valley has always had darkness underneath the sunshine.","ys":1964,"tl":[{"y":"1964","x":"Sal Vitello opens Italian restaurant in Studio City"},{"y":"2001","x":"Robert Blake wife Bonny Lee Bakley killed outside"}],"tags":["True Crime","Robert Blake","Italian","Studio City"],"w":"Vitello%27s","s":"active"},{"id":"greatwallla","h":"valley","n":"Great Wall of Los Angeles","t":"Public Mural","c":"culture","lat":34.1722,"lng":-118.4137,"a":"Coldwater Canyon Ave & Burbank Blvd, Valley Glen","i":"🎨","d":"Half a mile of mural stretching along the Tujunga Wash flood control channel — one of the longest murals in the world. Designed by Judith Baca and painted between 1976 and 1983 by over 400 youth from rival gangs, different races, different neighborhoods. It tells California's hidden history: the Tongva, Chinese railroad workers, the Dust Bowl, Japanese internment, Zoot Suit riots, the birth of surf culture, Chavez and the farmworkers. In 2021, SPARC received  million to extend it to a full mile, continuing the story through the 2020s. It's in a concrete drainage ditch in Valley Glen and it's one of the most important public artworks in America.","ys":1976,"tl":[{"y":"1974","x":"Judith Baca begins planning mural"},{"y":"1976","x":"Painting begins — 400+ youth"},{"y":"1983","x":"Half-mile mural completed"}],"tags":["Mural","Judith Baca","Social Justice","Valley Glen"],"rel":["disneystudios","sennett","valleyrelics"],"w":"Great_Wall_of_Los_Angeles","s":"active"},{"id":"valleyrelics","h":"valley","n":"Valley Relics Museum","t":"Pop Culture Museum","c":"culture","lat":34.2158,"lng":-118.5004,"a":"7900 Balboa Blvd, Lake Balboa","i":"📼","d":"Two airport hangars at Van Nuys Airport stuffed with the physical memory of the San Fernando Valley. Neon signs rescued from demolished restaurants. Arcade games you can actually play. The VW bus from Fast Times at Ridgemont High. Yearbooks, postcards, BMX bikes, vintage photographs — every object a thread connecting to some business or place or moment that mattered to someone who grew up in the 818. Open Saturdays only, free admission. The Palomino Club's long-lost neon sign, thought destroyed, was found in a Chatsworth warehouse in 2014 and ended up here. This is where the Valley remembers itself.","ys":2013,"tl":[{"y":"2013","x":"Tommy Gelinas opens museum in Van Nuys hangar"},{"y":"2014","x":"Palomino neon sign recovered"}],"tags":["Pop Culture","Neon Signs","Nostalgia","Van Nuys Airport"],"rel":["greatwallla","buschgardens","universalstudios"],"w":"Valley_Relics_Museum","s":"active"},{"id":"missionsanfernando","h":"valley","n":"Mission San Fernando Rey de España","t":"Historic Mission","c":"culture","lat":34.2733,"lng":-118.462,"a":"15151 San Fernando Mission Blvd, Mission Hills","i":"⛪","d":"Founded in 1797 — the 17th of California's 21 Spanish missions and the reason the entire Valley has its name. The Convento building with its 21 Roman arches is the oldest structure in the Valley, built between 1808 and 1822. The mission converted Tongva and Tataviam people to Catholicism, a process that was devastating to indigenous communities across California. Secularized in 1834, traded between Spain, Mexico, and the United States. The 1971 earthquake badly damaged it. Bob Hope is buried in the memorial garden behind the church. The mission is the Valley's origin story — everything that came after started here.","ys":1797,"tl":[{"y":"1797","x":"Founded by Padre Fermin Lasuen"},{"y":"1834","x":"Secularized by Mexican government"},{"y":"1971","x":"Damaged in Sylmar earthquake — rebuilt"}],"tags":["Spanish Mission","1797","Tongva","Mission Hills"],"rel":["campocahuenga","olvera","leonisadobe"],"w":"Mission_San_Fernando_Rey_de_España","s":"active"},{"id":"galleria","h":"valley","n":"Sherman Oaks Galleria","t":"Shopping Mall","c":"culture","lat":34.1552,"lng":-118.4666,"a":"15301 Ventura Blvd, Sherman Oaks","i":"🛍️","d":"Ground zero for Valley Girl culture. When Moon Unit Zappa recorded 'Valley Girl' with her father Frank in 1982, this was the mall she was parodying — the 'like, totally' epicenter. Fast Times at Ridgemont High and Valley Girl (1983) both drew from the scene here. In the '80s, the Galleria was a cathedral of teen consumerism: food court, Contempo Casuals, hot dog on a stick, kids cruising the escalators with feathered hair and Members Only jackets. It was demolished and rebuilt as an open-air complex in 1999. The original enclosed mall is gone but the idea of it — the Valley mall as teenage universe — permanently entered American culture.","ys":1981,"ye":1999,"tl":[{"y":"1981","x":"Opens as enclosed mall in Sherman Oaks"},{"y":"1982","x":"Fast Times at Ridgemont High filmed here"},{"y":"1994","x":"Northridge earthquake damages structure"},{"y":"1999","x":"Demolished and rebuilt as open-air center"}],"tags":["Valley Girl","Mall Culture","1980s","Frank Zappa"],"rel":["universalstudios","cjbarrymores","valleyrelics"],"w":"Sherman_Oaks_Galleria","s":"demolished"},{"id":"campocahuenga","h":"studiocity","n":"Campo de Cahuenga","t":"Historic Site","c":"culture","lat":34.1397,"lng":-118.3624,"a":"3919 Lankershim Blvd, Studio City","i":"📜","d":"The most historically important spot in the Valley that almost nobody knows about. On January 13, 1847, Mexican General Andrés Pico and U.S. Lieutenant Colonel John C. Frémont signed the Treaty of Cahuenga here, ending hostilities in California and effectively handing the territory to the United States. The original adobe may have been built as early as 1795. It later served as a Butterfield Stage stop. The foundations were rediscovered during Metro Rail construction. A small replica adobe sits across from the Universal City subway station. Open first and third Saturdays only, noon to four. The place where California changed hands, hidden in plain sight next to a freeway off-ramp.","ys":1795,"tl":[{"y":"1795","x":"Adobe built as rancho outpost"},{"y":"1847","x":"Treaty of Cahuenga signed — ends California fighting in Mexican-American War"},{"y":"1950","x":"Replica built as monument"}],"tags":["Treaty of Cahuenga","Mexican-American War","1847","Historic"],"rel":["missionsanfernando","leonisadobe","warnerbros"],"w":"Campo_de_Cahuenga","s":"active"},{"id":"foldedwings","h":"noho","n":"Portal of the Folded Wings","t":"Aviation Shrine","c":"culture","lat":34.1864,"lng":-118.362,"a":"10621 Victory Blvd, North Hollywood","i":"✈️","d":"A wildly ornate 1924 rotunda at the entrance to Valhalla Memorial Park, built as a tribute to aviation pioneers. Mosaic tiles, Byzantine arches, and elaborate stonework surround niches containing the ashes of early aviators including Amelia Earhart's mechanic, record-setting pilots, and aviation engineers. It's the kind of monument that feels like it belongs in Rome, not on Victory Boulevard in North Hollywood. The San Fernando Valley had deep ties to early aviation — airfields dotted the flat terrain before suburbs filled in. This strange, beautiful shrine is the last physical echo of that era.","ys":1924,"tl":[{"y":"1924","x":"Built as Valhalla cemetery entrance"},{"y":"1953","x":"Rededicated as Shrine to Aviation"}],"tags":["Aviation","1924","Monument","Valhalla"],"rel":["natenal","nethercutt","bobsbigboy","carneys"],"w":"Portal_of_the_Folded_Wings_Shrine_to_Aviation","s":"active"},{"id":"cupidshotdogs","h":"valley","n":"Cupid's Hot Dogs","t":"Hot Dog Stand","c":"food","lat":34.1937,"lng":-118.57,"a":"20030 Vanowen St, Winnetka","i":"🌭","d":"A family-run chili dog chain that started in the Valley right after WWII ended. The recipe hasn't changed. The concept hasn't changed. You get a chili dog, you get a tamale, maybe a burger. The original Northridge location is gone but the remaining spots serve the same thing your grandparents ate in 1946. It's the kind of place that makes you realize fast food used to mean something different — a family recipe served fast, not a corporate formula replicated ten thousand times.","ys":1946,"tl":[{"y":"1946","x":"Opens on Van Nuys Blvd"},{"y":"1950","x":"Valley institution — signature chili dogs"}],"tags":["Chili Dogs","Post-War","Family-Run","Valley"],"w":"Cupids_Hot_Dogs","s":"active"},{"id":"leonisadobe","h":"valley","n":"Leonis Adobe","t":"Historic House Museum","c":"culture","lat":34.1575,"lng":-118.6405,"a":"23537 Calabasas Rd, Calabasas","i":"🏚️","d":"Built in the 1840s as a small Monterey-style adobe, then expanded by Miguel Leonis, a Basque-French rancher who owned huge portions of the western Valley. Leonis was a controversial figure — powerful, possibly violent, married to a Chumash woman named Espiritu. The house is now a museum that teaches visitors about 1880s California ranch life through interactive activities like grinding corn and churning butter. It's one of the oldest surviving residences in the region and a window into the Valley before it was the Valley — when this was all ranches, missions, and wide-open land.","ys":1844,"tl":[{"y":"1844","x":"Adobe built — oldest surviving home in LA area"},{"y":"1880","x":"Miguel Leonis acquires property"},{"y":"1966","x":"Restored as museum"}],"tags":["Adobe","1840s","Ranching","Calabasas"],"rel":["missionsanfernando","campocahuenga","warnerbros"],"w":"Leonis_Adobe","s":"active"},{"id":"nethercutt","h":"valley","n":"Nethercutt Museum","t":"Car Collection & Museum","c":"culture","lat":34.3073,"lng":-118.464,"a":"15151 Bledsoe St, Sylmar","i":"🚗","d":"A jaw-dropping private collection of antique and classic automobiles in Sylmar, open to the public by reservation. J.B. Nethercutt made his fortune with Merle Norman Cosmetics and spent decades amassing what might be the most beautiful car collection in America — Duesenbergs, Rolls-Royces, and custom coachwork from the 1890s through the 1970s. Every car is restored to concours condition. The collection also includes mechanical musical instruments, including a massive Wurlitzer theater organ. Southern California is the historic home of car culture, and this is its shrine.","ys":1971,"tl":[{"y":"1971","x":"J.B. Nethercutt begins displaying car collection"},{"y":"2004","x":"Museum opens to public — free tours"}],"tags":["Classic Cars","Collection","Sylmar","Automotive"],"rel":["valleyrelics","universalstudios"],"w":"Nethercutt_Collection","s":"active"},{"id":"garlandhotel","h":"noho","n":"The Garland Hotel","t":"Boutique Hotel","c":"culture","lat":34.1444,"lng":-118.3692,"a":"4222 Vineland Ave, North Hollywood","i":"🏨","d":"Beverly Garland — the actress who starred in Roger Corman B-movies and became the original recurring guest star on My Three Sons — opened this motor lodge in 1972 with her husband Fillmore Crank. She wanted a comfortable, unpretentious hotel near the studios for working actors who didn't need the Chateau Marmont. It's now a boutique hotel with a mid-century vibe, a pool, and a shuttle to Universal. Beverly ran the place herself for decades and was known for greeting guests personally. She died in 2008. The hotel kept her name and her spirit — a working actor's hotel in a working actor's neighborhood.","ys":1972,"tl":[{"y":"1972","x":"Beverly Garland opens hotel near Universal"}],"tags":["Motor Lodge","Beverly Garland","NoHo","1972"],"rel":["sportsmenslodge","universalstudios","warnerbros","echo","zebulon","thesmell"],"w":"The_Garland_(hotel)","s":"active"},{"id":"moroccanlounge","h":"artsdistrict","n":"The Moroccan Lounge","t":"Concert Venue","c":"music","lat":34.0487,"lng":-118.2337,"a":"901 E 1st St","i":"🎵","d":"An 1885 Moorish-accented building turned 250-person concert venue, run by the team behind New York's Bowery Ballroom and Mercury Lounge. A partition separates the full-service bar from the intimate performance hall — an unusual amount of polish for a room this small. The Arts District needed a proper music venue, and this is it. The building's ornate arches have survived the neighborhood's transformation from warehouses to lofts to whatever comes next.","ys":2017,"tl":[{"y":"2017","x":"Opens as 250-capacity music venue"}],"tags":["Live Music","Bowery Ballroom","1885","Intimate"],"w":"The_Moroccan_Lounge","s":"active"},{"id":"artsharela","h":"artsdistrict","n":"Art Share LA","t":"Artist Community","c":"culture","lat":34.0446,"lng":-118.2363,"a":"801 E 4th Pl","i":"🎭","d":"A 28,000-square-foot former textile workshop purchased in 1997 and converted into a creative center. Thirty subsidized live/work lofts upstairs, exhibitions and community classes below. Poetry nights, performance art, gallery openings. It's the Arts District model in miniature: take a building nobody wants, fill it with artists who can't afford anywhere else, and watch a neighborhood grow around it.","ys":1997,"tl":[{"y":"1997","x":"Founded as artist-run nonprofit in former factory"}],"tags":["Live/Work","Gallery","Community","Textile"],"rel":["hauserwirth","mocageffen","breweryart","superchief","artsharela","sciarc"],"s":"active"},{"id":"breweryart","h":"artsdistrict","n":"Brewery Art Colony","t":"Artist Colony","c":"culture","lat":34.0656,"lng":-118.219,"a":"620 Moulton Ave","i":"🏭","d":"The world's largest artist live/work community, housed in a former Pabst Blue Ribbon brewery. When it opened in 1982, it helped establish the legal framework for the Artist in Residence ordinance that allowed people to live in industrial spaces. Over 100 studios, two gallery spaces, and twice-yearly art walks that draw thousands. The LA Times called it the world's largest art complex. The building that proved artists could turn abandoned factories into neighborhoods.","ys":1982,"tl":[{"y":"1889","x":"Pabst Blue Ribbon brewery built"},{"y":"1982","x":"Artists move into abandoned brewery"}],"tags":["Art Colony","Pabst Brewery","Live/Work","1982"],"w":"Brewery_Art_Colony","s":"active"},{"id":"sciarc","h":"artsdistrict","n":"SCI-Arc","t":"Architecture School","c":"culture","lat":34.0432,"lng":-118.2328,"a":"960 E 3rd St","i":"📐","d":"The Southern California Institute of Architecture occupies a renovated freight depot along the railroad tracks — a quarter-mile-long building that's one of the most striking adaptive reuse projects in the city. Founded in 1972 as a renegade alternative to conventional architecture programs, SCI-Arc moved to the Arts District in 2001 and became an anchor for the neighborhood's identity. Public lectures, exhibitions, and screenings keep it connected to the community.","ys":2001,"tl":[{"y":"1972","x":"Founded by Ray Kappe"},{"y":"2001","x":"Moves to freight depot under 4th Street Bridge"}],"tags":["Architecture","Train Depot","Education","2001"],"rel":["breweryart","artsharela","bonaventure","hauserwirth"],"w":"Southern_California_Institute_of_Architecture","s":"active"},{"id":"rowdtla","h":"artsdistrict","n":"ROW DTLA","t":"Retail Complex","c":"shop","lat":34.0336,"lng":-118.2414,"a":"777 S Alameda St","i":"🛍️","d":"A massive former American Apparel factory converted into an upscale outdoor retail and dining complex. The gentrification story of the Arts District in one building: a garment factory where hundreds of workers sewed clothes becomes a curated marketplace of boutiques and restaurants. Smorgasburg LA sets up here on Sundays. Whether you see it as revitalization or displacement depends on who you ask.","ys":2017,"tl":[{"y":"1917","x":"Built as Atlas Iron & Metal Works warehouse"},{"y":"2017","x":"Reopens as ROW DTLA mixed-use campus"}],"tags":["Retail","American Apparel","Gentrification","Smorgasburg"],"s":"active"},{"id":"bestia","h":"artsdistrict","n":"Bestia","t":"Italian Restaurant","c":"food","lat":34.0337,"lng":-118.2292,"a":"2121 E 7th Pl","i":"🍝","d":"The restaurant that put the Arts District on the national food map. Ori Menashe and Genevieve Gergis opened Bestia in a converted warehouse in 2012, and suddenly people who'd never set foot east of Alameda were making reservations weeks in advance. House-made pastas, whole-animal cooking, a wood-fired oven. It proved the neighborhood could support destination dining, which accelerated everything that came after — for better and worse.","ys":2012,"tl":[{"y":"2012","x":"Ori Menashe & Genevieve Gergis open Bestia"},{"y":"2013","x":"Bon Appetit Best New Restaurant finalist"}],"tags":["Italian","Warehouse","Destination Dining","2012"],"rel":["wurstkuche","angelcity","edisonbar","hauserwirth","cocoanut","mavericksflat"],"s":"active"},{"id":"dunbarhotel","h":"southla","n":"Dunbar Hotel","t":"Historic Hotel","c":"hotel","lat":34.0071,"lng":-118.2566,"a":"4225 S Central Ave","i":"🏨","d":"Built in 1928 as the Hotel Somerville, it was the first first-class hotel in Los Angeles built by and for Black guests. Renamed the Dunbar in 1930 after poet Paul Laurence Dunbar. During the golden age of Central Avenue jazz, everyone stayed here: Duke Ellington, Louis Armstrong, Billie Holiday, Langston Hughes, W.E.B. Du Bois. The lobby was where deals were made and careers launched. After Central Avenue declined, the building deteriorated for decades before being restored as senior housing. The ground floor is now a community space.","ys":1928,"tl":[{"y":"1928","x":"Opens as Somerville Hotel on Central Ave"},{"y":"1931","x":"Renamed Dunbar — Ellington, Holiday, Armstrong stay"},{"y":"1974","x":"Closes as hotel"},{"y":"2014","x":"Reopened as senior housing after 30M restoration"}],"tags":["Central Avenue","Jazz","Black History","1928"],"w":"Dunbar_Hotel","s":"active"},{"id":"visiontheatre","h":"southla","n":"Vision Theatre","t":"Performing Arts","c":"culture","lat":34.0047,"lng":-118.331,"a":"3341 W 43rd Pl","i":"🎭","d":"An Art Deco gem that opened as the Leimert Theatre in April 1932, designed by Morgan, Walls & Clements — the same firm behind the Wiltern, the Mayan, and El Capitan. It served the surrounding Leimert Park community for decades before falling into disrepair. After a multi-million dollar renovation, it reopened as a city-run performing arts venue. The architecture alone is worth the visit: Spanish Colonial details layered with Deco geometry, a survivor from the era when every neighborhood deserved a movie palace.","ys":1932,"tl":[{"y":"1931","x":"Opens as Leimert Theatre — Morgan, Walls & Clements"},{"y":"1975","x":"Falls into disrepair"},{"y":"1994","x":"City acquires — long renovation begins"},{"y":"2024","x":"Reopens after 14.4M restoration"}],"tags":["Art Deco","Leimert Park","1932","Morgan Walls Clements"],"rel":["dunbarhotel","worldstage","leimertpark","wiltern","chapmanmarket","elcapitan"],"w":"Vision_Theatre","s":"active"},{"id":"leimertpark","h":"southla","n":"Leimert Park Village","t":"Cultural Hub","c":"culture","lat":34.0039,"lng":-118.3309,"a":"4395 Leimert Blvd","i":"🥁","d":"John Singleton called it the Black Greenwich Village. Developer Walter Leimert started the subdivision in 1928 as a model planned community — buried utility wires, minimized car traffic near schools, trees lining every street. By the 1960s it had become the cultural heart of Black Los Angeles. Sunday drum circles in the plaza. Vendors selling handmade crafts. Poetry slams at the KAOS Network, which also birthed Project Blowed — the open mic that launched Aceyalone, Jurassic Five, and an entire generation of LA hip-hop.","ys":1928,"tl":[{"y":"1928","x":"Walter H. Leimert develops planned community"},{"y":"1965","x":"Becomes center of African American culture"},{"y":"1989","x":"World Stage opens on Degnan Blvd"},{"y":"2022","x":"Metro K Line station opens"}],"tags":["Black Culture","Drum Circle","Project Blowed","Hip-Hop"],"w":"Leimert_Park","s":"active"},{"id":"worldstage","h":"southla","n":"The World Stage","t":"Jazz Venue","c":"music","lat":34.0053,"lng":-118.3317,"a":"4321 Degnan Blvd","i":"🎷","d":"A small jazz performance and workshop space on Degnan Boulevard in Leimert Park, founded by drummer Billy Higgins and poet Kamau Daoud. The Thursday night jam sessions have been running for decades — working musicians, students, and legends all sh
