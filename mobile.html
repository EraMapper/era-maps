o Venice Boardwalk chaos for over 40 years. The patio tables sat right on the boardwalk — you could eat a mediocre burger while watching a man on roller skates play a flaming guitar. The food was never the point; the location was the entire experience. Closed during COVID in 2020 after decades of being the boardwalk's living room. The building remains, the patio sits empty, and the boardwalk lost its dining room.","ys":1976,"tl":[{"y":"1976","x":"Opens alongside Small World Books"},{"y":"2022","x":"Survives COVID, Amazon, and gentrification"}],"tags":["Boardwalk Dining"],"rel":["boardwalk","rosecafe","cno","abbotkinney"],"s":"active"},{"id":"abbotkinney","h":"venice","n":"Abbot Kinney Blvd","t":"Shopping Street","c":"shop","lat":33.989,"lng":-118.4624,"a":"Abbot Kinney Blvd","i":"🛍️","d":"GQ called it the Coolest Block in America in 2012 and that was both the peak and the beginning of the end. The one-mile stretch of boutiques, galleries, and restaurants was named for Venice's founder in 1990. Before the hype: auto body shops, taco stands, and artists who could afford the rent. The First Friday art walks started in 2007 — free gallery openings, food trucks, street music. Then the landlords noticed. Rents quadrupled. The galleries became luxury retail. The taco stands became juice bars. It is a beautiful street. It is no longer a cool one. Cool requires risk, and the rent is too high for risk.","ys":1991,"tl":[{"y":"1990","x":"Street renamed for Venice founder"},{"y":"2007","x":"First Fridays art walk begins"},{"y":"2012","x":"GQ: Coolest Block in America"}],"tags":["Coolest Block"],"rel":["jeffho","veniceartwall","smallworld","boardwalk","skatepark","venicecanals"],"w":"Abbot_Kinney_Boulevard","s":"active"},{"id":"veniceartwall","h":"venice","n":"Venice Art Walls","t":"Legal Graffiti","c":"culture","lat":33.9809,"lng":-118.4684,"a":"Ocean Front Walk","i":"🎨","d":"Legal graffiti walls near the beach where anyone can paint freely on weekends. Established in the 1960s as part of Venice's commitment to public art, they have been a proving ground for street artists for decades. The walls are repainted constantly — nothing is permanent, which is the point. Banksy, Retna, Risk, and hundreds of unknowns have painted here. On any given Saturday, you can watch someone create a mural in real time, layer over someone else's work, and contribute to a conversation that has been happening in spray paint for 60 years.","ys":1961,"tl":[{"y":"1961","x":"Art walls established on the beach"}],"tags":["Street Art"],"s":"active"},{"id":"venicepier","h":"venice","n":"Venice Pier & Amusement Park","t":"Historic Amusement Park","c":"culture","lat":33.9825,"lng":-118.4614,"a":"Washington Blvd & Ocean","i":"🎡","d":"Abbot Kinney's original 1905 pier extended 1,600 feet into the ocean with a grand auditorium and midway. By the 1920s, it was a full amusement park with roller coasters. Three separate piers competed for crowds. All destroyed by fire — the 1920 pier fire, the 1924 pier collapse. The current Venice Pier is a rebuilt shadow of the originals.","ys":1905,"ye":1967,"tl":[{"y":"1905","x":"Kinney's pier opens — 1,600 feet long"},{"y":"1920","x":"Fire destroys Kinney's pier"},{"y":"1924","x":"Another pier collapses"},{"y":"1946","x":"Pacific Ocean Park plans"},{"y":"1966","x":"All gone"}],"tags":["Amusement Park","Fires","Kinney","Demolished"],"s":"demolished"},{"id":"hinano","h":"venice","n":"Hinano Cafe","t":"Dive Bar","c":"nightlife","lat":33.9795,"lng":-118.4666,"a":"15 Washington Blvd","i":"🍺","d":"Beach dive bar since 1962. Jim Morrison drank here — heavily and often. Cash only, burgers and beer, no pretension. The interior is dark even when it's blinding outside. The burgers are surprisingly great. The regulars are a mix of surfers, bikers, locals, and people who wandered in from the boardwalk and never left. No craft cocktails, no small plates, no Wi-Fi. The Hinano is what every beach bar pretends to be and none of them are.","ys":1962,"tl":[{"y":"1962","x":"Opens near the beach"},{"y":"1967","x":"Morrison becomes a regular"}],"tags":["Dive Bar","Morrison"],"rel":["townhouse","venicewest","boardwalk","hinano"],"w":"Hinano_Cafe","s":"active"},{"id":"townhouse","h":"venice","n":"The Townhouse / Del Monte","t":"Speakeasy","c":"nightlife","lat":33.9871,"lng":-118.4726,"a":"52 Windward Ave","i":"🥃","d":"The building dates to 1915 — one of the oldest on the Venice boardwalk. During Prohibition, the basement operated as the Del Monte Speakeasy, one of Venice's most active illicit bars. Al Capone reportedly visited. The basement is now a bar called the Del Monte Speakeasy (they leaned into the history), with exposed brick, low ceilings, and the vibe of a place where illegal things happened. Upstairs is the Townhouse bar — a solid neighborhood hangout. Two bars, one building, 110 years of Venice drinking.","ys":1915,"tl":[{"y":"1915","x":"Building constructed"},{"y":"1920","x":"Del Monte Speakeasy operates in basement"}],"tags":["Speakeasy","Prohibition"],"w":"Townhouse_(Venice,_Los_Angeles)","s":"active"},{"id":"pacificocean","h":"venice","n":"Pacific Ocean Park","t":"Amusement Park","c":"culture","lat":34.0081,"lng":-118.4781,"a":"Ocean Park, Santa Monica/Venice","i":"🎡","d":"Opened in 1958 as a ten-million-dollar space-age amusement park on the Santa Monica-Venice border, designed to rival Disneyland with an ocean theme. Sea Circus rides, a Neptune's Courtyard, and a Diving Bells attraction that took riders underwater. It drew millions at first, then declined fast — maintenance costs, competition from Disneyland, and the neighborhood's economic slide killed it. Closed in 1967. The ruins sat rotting on their pilings for years, becoming a playground for surfers and trespassers. The Dogtown Z-Boys surfed the decaying pilings. POP failed as a theme park but succeeded as a ruin — its ghost defined Venice's derelict beauty in the 1970s.","ys":1958,"ye":1967,"tl":[{"y":"1958","x":"Opens — 0M space-age amusement park"},{"y":"1965","x":"Attendance drops sharply"},{"y":"1967","x":"Closes — ruins left standing"},{"y":"1975","x":"Z-Boys surf the decaying pilings"}],"tags":["Amusement Park","Z-Boys Inspiration"],"rel":["pop","smpier","boardwalk","marineland"],"w":"Pacific_Ocean_Park","s":"closed"},{"id":"venicewest","h":"venice","n":"Venice West Cafe","t":"Beatnik Coffeehouse","c":"culture","lat":33.99417,"lng":-118.47965,"a":"7 Dudley Ave, Venice","i":"☕","d":"The West Coast headquarters of the Beat Generation. Stuart Perkoff, Tony Scibella, and other Venice poets held readings and jazz sessions here through the late 1950s and early 60s. Lawrence Lipton wrote about Venice's beatnik scene in The Holy Barbarians (1959), much of it set in and around this cafe. The LAPD harassed the beatniks relentlessly — Vice Squad raids, loitering arrests, vagrancy charges. The city wanted the beats gone. The cafe closed, the beats scattered, but the DNA of Venice as a countercultural haven was set here. Every artist who moved to Venice afterward was following a trail the beats blazed.","ys":1958,"ye":1966,"tl":[{"y":"1958","x":"Opens — Beat poetry and jazz"},{"y":"1959","x":"Lipton publishes The Holy Barbarians"},{"y":"1962","x":"LAPD harassment drives beats out"},{"y":"1966","x":"Closes"}],"tags":["Beatnik","Poetry"],"rel":["beatgen","hinano","townhouse","abbotkinney","smallworld","sidewalkcafe"],"s":"closed"},{"id":"rosecafe","h":"venice","n":"Rose Cafe","t":"Restaurant & Gallery","c":"food","lat":33.9963,"lng":-118.4771,"a":"220 Rose Ave","i":"🌹","d":"Part restaurant, part art gallery since 1979. The original Rose Cafe was where Venice's creative class gathered — artists, writers, architects, surfers who cleaned up well enough for brunch. The walls rotated local art. The patio was the neighborhood's front porch. A 2014 renovation modernized everything and split opinions: some say it lost the old funky charm, others say the food finally caught up to the setting. Either way, it remains one of the few Venice institutions that survived from the pre-gentrification era into the Abbot Kinney era and remains standing.","ys":1979,"ye":2024,"tl":[{"y":"1979","x":"Opens as cafe and art gallery"},{"y":"2014","x":"Major renovation — modernized"},{"y":"2024","x":"Closed after 45 years — December 15, 2024"}],"tags":["Art Gallery","Brunch"],"s":"closed"},{"id":"cno","h":"venice","n":"C&O Trattoria","t":"Italian Restaurant","c":"food","lat":33.9792,"lng":-118.4668,"a":"31 Washington Blvd","i":"🍷","d":"Neighborhood Italian joint since 1992. The free garlic rolls arrive in a paper bag before you sit down, and they are the real draw — warm, buttery, limitless. The pasta portions are enormous and reasonably priced. The patio on Washington Blvd is where Venice celebrates birthdays, first dates, and Tuesday nights that turn into Thursday mornings. The Venice equivalent of a Roman trattoria: nothing fancy, everything satisfying, and you always leave with garlic on your breath and a smile.","ys":2002,"ye":2021,"tl":[{"y":"1992","x":"Singer family converts to Italian"},{"y":"2021","x":"Venice location closed during COVID — C&O Cucina continues nearby"}],"tags":["Italian","Date Night"],"rel":["rosecafe","sidewalkcafe","abbotkinney","masque","alsbar","cathaydg"],"s":"closed"},{"id":"rajis","h":"hollywood","n":"Raji's","t":"Punk/Rock Club","c":"music","lat":34.1013,"lng":-118.3244,"a":"6160 Hollywood Blvd","i":"🔥","d":"Legendary sweaty punk dive in the Hastings Hotel basement. GN'R, Jane's Addiction, Nirvana, Social Distortion, Redd Kross. Damaged by '94 Northridge quake, red-tagged, kept going 3 more months. Demolished. Danny 'Dobbs' Wilson booked it all.","ys":1985,"ye":1994,"tl":[{"y":"1985","x":"Opens beneath Hastings Hotel"},{"y":"1986","x":"GN'R, Jane's Addiction era"},{"y":"1989","x":"Nirvana plays to 30 people"},{"y":"1991","x":"Ownership change, decline begins"},{"y":"1992","x":"LA riots devastate area"},{"y":"1994","x":"Northridge quake damage, red-tagged"},{"y":"1994","x":"Fire marshal shuts it for good"}],"tags":["Punk","Demolished","Legendary Dive","Nirvana"],"w":"Raji%27s","s":"demolished"},{"id":"alsbar","h":"artsdistrict","n":"Al's Bar","t":"Art Bar / Punk Venue","c":"music","lat":34.0453,"lng":-118.2362,"a":"305 S Hewitt St","i":"🍺","d":"Downtown's legendary art-punk bar in the American Hotel, 1979-2001. The anchor of the LA underground. Beck played some of his earliest shows here. Also hosted poetry, performance art, and noise acts in the industrial no-man's-land of the Arts District before it was the Arts District.","ys":1979,"ye":2001,"tl":[{"y":"1979","x":"Opens in American Hotel"},{"y":"1985","x":"Anchor of DTLA underground"},{"y":"1994","x":"Beck early shows"},{"y":"2001","x":"Closes"}],"tags":["Art Punk","DIY","Arts District Pioneer"],"w":"Al%27s_Bar","s":"closed"},{"id":"wongs","h":"chinatown","n":"Madame Wong's","t":"Punk/New Wave Club","c":"music","lat":34.0652,"lng":-118.2374,"a":"949 Sun Mun Way","i":"🥢","d":"Esther Wong's Chinatown restaurant turned new wave/punk mecca. The Go-Go's, The Police, The Knack, Oingo Boingo, X. Esther booked with an iron fist — LA Times called her 'Godmother of Punk.' The Chinatown location and 'Madame Wong's West' on Wilshire were both crucial to the early '80s scene.","ys":1978,"ye":1985,"tl":[{"y":"1978","x":"Starts booking punk/new wave"},{"y":"1979","x":"Go-Go's, Police, Knack"},{"y":"1980","x":"Madame Wong's West opens on Wilshire Blvd in Santa Monica"},{"y":"1985","x":"Chinatown location closes"},{"y":"2005","x":"Esther Wong dies"}],"tags":["New Wave","Chinatown","Punk"],"rel":["masque","alsbar","rajis","cathaydg","madamewongs","musso"],"w":"Madame_Wong%27s","s":"closed"},{"id":"micelis","h":"hollywood","n":"Miceli's","t":"Italian Restaurant","c":"food","lat":34.1006,"lng":-118.336,"a":"1646 N Las Palmas Ave","i":"🍷","d":"Hollywood's oldest Italian restaurant (1949). Waiters sing opera. Chianti bottles hang from the ceiling in thick layers of wax. The kind of place that makes you forget what decade you're in.","ys":1949,"tl":[{"y":"1949","x":"Opens"},{"y":"1965","x":"Rat Pack era regulars"}],"tags":["Italian","Opera Waiters","Old Hollywood"],"w":"Miceli%27s","s":"active"},{"id":"pigwhistle","h":"hollywood","n":"Pig 'N Whistle","t":"Restaurant & Bar (Closed)","c":"food","lat":34.1014,"lng":-118.3367,"a":"6714 Hollywood Blvd","i":"🐷","d":"Opened 1927 next to the Egyptian Theatre as Hollywood's first family restaurant — hand-carved oak rafters, a pipe organ, and candy counters for kids. Spencer Tracy, Shirley Temple, Howard Hughes were regulars. Part of a major West Coast chain that died out, leaving only this location. Closed in the 1950s decline, sat empty for decades, then beautifully restored in 2001 with the original Gothic Revival woodwork and hand-painted ceilings. Closed again during COVID in 2020. In 2021, a new tenant gutted the interior without permits, covered the iconic facade pigs with skulls, and removed the neon sign. A stop-work order was issued but the damage was done. The sign was reportedly salvaged by the Valley Relics Museum.","ys":1927,"ye":2020,"tl":[{"y":"1927","x":"Opens next to Egyptian Theatre"},{"y":"1953","x":"Closes during Hollywood decline"},{"y":"2001","x":"Restored and reopened with original Gothic woodwork"},{"y":"2020","x":"Closes during COVID"},{"y":"2021","x":"Interior gutted without permits — facade pigs covered with skulls"}],"tags":["Gothic Revival","Classic Hollywood","Gutted","COVID Closure"],"rel":["musso","frolicroom","burgundyroom","threeclubs","egyptian"],"w":"Pig_%27n_Whistle","s":"closed"},{"id":"boardners","h":"hollywood","n":"Boardner's","t":"Dive Bar","c":"nightlife","lat":34.1007,"lng":-118.3349,"a":"1652 N Cherokee Ave","i":"🥃","d":"Hollywood dive since 1942. Errol Flynn drank here. Secret back room (The Bar) hosts DJs and dancing. The neon sign and dark wood interior are unchanged. Where Hollywood's ghosts drink.","ys":1942,"tl":[{"y":"1942","x":"Opens"},{"y":"1952","x":"Flynn, Bogart regulars"},{"y":"2005","x":"Back room DJ nights added"}],"tags":["Dive Bar","Errol Flynn","Neon"],"w":"Boardner%27s","s":"active"},{"id":"blackcat","h":"silverlake","n":"The Black Cat","t":"LGBTQ Landmark Tavern","c":"food","lat":34.0919,"lng":-118.2796,"a":"3909 W Sunset Blvd","i":"🐈‍⬛","d":"The building started as a 1939 Safeway market. By the mid-'60s it was a gay bar. At the stroke of midnight on New Year's Eve 1967, as the Rhythm Queens played Auld Lang Syne and balloons dropped, eight plainclothes LAPD officers began beating patrons who'd kissed at midnight. 14 arrested, 6 charged with lewd conduct for same-sex kissing. The response: over 200 people marched — two full years before Stonewall. Two men appealed, arguing for equal protection under the 14th Amendment — the first time gay men were defended in court as constitutional equals. They lost, but the legal argument would win decades later. The raid inspired the founding of The Advocate newspaper. Now California Historical Landmark #1063 — the first landmark for LGBTQ+ history in the state.","ys":1966,"tl":[{"y":"1939","x":"Built as a Safeway market"},{"y":"1966","x":"Opens as gay bar"},{"y":"1967","x":"New Year's Eve LAPD raid — 14 beaten, arrested"},{"y":"1967","x":"Feb 11: 200+ march — first major LGBTQ protest in US"},{"y":"1967","x":"First 14th Amendment defense of gay rights"},{"y":"1967","x":"Raid inspires founding of The Advocate"},{"y":"2008","x":"LA Historic-Cultural Monument"},{"y":"2023","x":"California Historical Landmark #1063 — first LGBTQ landmark"}],"tags":["LGBTQ History","Civil Rights","Landmark","Before Stonewall","The Advocate"],"w":"Black_Cat_Tavern","s":"active"},{"id":"sllounge","h":"silverlake","n":"Silverlake Lounge","t":"Indie Rock Dive","c":"music","lat":34.0829,"lng":-118.2736,"a":"2906 Sunset Blvd","i":"🎸","d":"Tiny dive that became the epicenter of LA's 2000s indie explosion. The bar dates to 1938. Silversun Pickups named themselves after the liquor store across the street. Black Rebel Motorcycle Club's launching pad. Elliott Smith played early shows here. Drag shows and burlesque too. New ownership took over in 2024, refurbished the interior, and reopened October 1 with restored terracotta floors and a new sound system.","ys":1975,"tl":[{"y":"1938","x":"Building opens as a bar"},{"y":"1975","x":"Becomes the Silverlake Lounge — drag and cabaret era begins"},{"y":"2001","x":"Indie rock scene ignites"},{"y":"2004","x":"Silversun Pickups era"},{"y":"2024","x":"New ownership — refurbished and reopened Oct 1"}],"tags":["Indie Rock","Dive Bar","Silversun Pickups","Elliott Smith"],"rel":["echo","satellite","zebulon","cafetropical","thirstycrow"],"w":"Silverlake_Lounge","s":"active"},{"id":"satellite","h":"silverlake","n":"Spaceland / The Satellite","t":"Indie Venue","c":"music","lat":34.0898,"lng":-118.2681,"a":"1717 Silver Lake Blvd","i":"🛸","d":"Opened as Spaceland in 1996, rebranded as The Satellite. One of the key venues of the Silver Lake indie scene alongside Silverlake Lounge. Monday night residencies launched Local Natives, Lord Huron, and others.","ys":1996,"ye":2020,"tl":[{"y":"1996","x":"Opens as Spaceland"},{"y":"2005","x":"Indie scene peak"},{"y":"2011","x":"Rebranded as The Satellite"}],"tags":["Indie","Residencies","Scene"],"w":"Spaceland","s":"closed"},{"id":"echo","h":"echopark","n":"The Echo & Echoplex","t":"Live Music","c":"music","lat":34.0778,"lng":-118.2601,"a":"1822 W Sunset Blvd","i":"📡","d":"Sister venues in Echo Park at the edge of Silver Lake. The Echo (upstairs) and Echoplex (basement) host everything from punk to Latin cumbia to electronic. Funky Sole nights are legendary.","ys":2001,"tl":[{"y":"2001","x":"The Echo opens"},{"y":"2007","x":"Echoplex basement opens"}],"tags":["Live Music","Echo Park","Funky Sole"],"w":"The_Echo_(music_venue)","s":"active"},{"id":"tikiti","h":"silverlake","n":"Tiki-Ti","t":"Tiki Bar","c":"nightlife","lat":34.0975,"lng":-118.2858,"a":"4427 Sunset Blvd","i":"🍹","d":"Family-owned Polynesian dive since 1961. Seats maybe 12 people. Hand-crafted tropical cocktails served by the founding Buhen family for three generations. Ray Buhen, the original owner, trained at Don the Beachcomber.","ys":1961,"tl":[{"y":"1961","x":"Ray Buhen opens"},{"y":"1995","x":"Second generation"},{"y":"2022","x":"Third generation runs it"}],"tags":["Tiki","Family-Owned","Tiny","Craft Cocktails"],"rel":["donbeach","kelbos","tailcock","elcid"],"w":"Tiki-Ti","s":"active"},{"id":"akbar","h":"silverlake","n":"Akbar","t":"Bar & Dance Floor","c":"nightlife","lat":34.0957,"lng":-118.2843,"a":"4356 W Sunset Blvd","i":"🪩","d":"Born New Year's Eve 1996 when Scott Craig bought a dying piano bar called Jolie's #2 because gay bars were disappearing from Silver Lake to AIDS and gentrification. The building had housed queer bars since the '70s — before Jolie's, it was the Silver Dollar Saloon (1976-86), a Western-themed gay bar with the Silver Saddle Spa bathhouse upstairs. The neighborhood around Hyperion and Sunset was once called 'The Swish Alps.' Now 27 years running, Akbar remains a vital creative space for queer life in LA.","ys":1996,"tl":[{"y":"1976","x":"Silver Dollar Saloon — Western gay bar"},{"y":"1986","x":"Becomes Jolie's #2 piano bar"},{"y":"1996","x":"Scott Craig buys it — Akbar is born Dec 31"},{"y":"2023","x":"Sold to its bartenders — tradition continues"}],"tags":["LGBTQ","Dance","Dive Bar","Swish Alps","Survivor"],"rel":["coles","thecircus","theabbey","akbar","clubfuck","smogcutter"],"s":"active"},{"id":"thirstycrow","h":"silverlake","n":"Thirsty Crow","t":"Whiskey Bar","c":"nightlife","lat":34.0837,"lng":-118.2738,"a":"2939 Sunset Blvd","i":"🥃","d":"Bourbon-focused bar at Sunset Junction. Father John Misty wrote a song about it. Small, dark, good whiskey selection. The kind of bar where you accidentally stay until 2 AM.","ys":2010,"tl":[{"y":"2009","x":"Opens"},{"y":"2015","x":"Father John Misty song"}],"tags":["Whiskey","Sunset Junction","FJM"],"s":"active"},{"id":"edendale","h":"silverlake","n":"Edendale","t":"Restaurant & Bar","c":"food","lat":34.1075,"lng":-118.2659,"a":"2838 Rowena Ave","i":"🚒","d":"Restaurant in a restored 1924 Fire Station No. 56 — opened as Edendale Grill in 2002. Galleries inside depict Silver Lake's silent film studio era. The architecture alone makes it worth visiting.","ys":2002,"tl":[{"y":"1924","x":"Fire Station 56 built at 2838 Rowena Ave"},{"y":"2002","x":"Opens as Edendale Grill & Mixville Bar"},{"y":"2010","x":"Eddie Ebell takes over — renamed Edendale"}],"tags":["Fire Station","Restored","Architecture"],"rel":["sennett","disneysl","holylandexhibition","slreservoir","edendale","griffith"],"s":"active"},{"id":"griffith","h":"losfeliz","n":"Griffith Observatory","t":"Observatory & Landmark","c":"culture","lat":34.1185,"lng":-118.3004,"a":"2800 E Observatory Rd","i":"🔭","d":"Free since 1935 per Griffith J. Griffith's will. Over 9 million people have looked through the Zeiss telescope — the most-viewed in the world. Featured in Rebel Without a Cause and La La Land. James Dean bust on the grounds.","ys":1935,"tl":[{"y":"1896","x":"Griffith donates parkland"},{"y":"1935","x":"Observatory opens — free forever"},{"y":"1955","x":"Rebel Without a Cause filmed"},{"y":"2006","x":"Major renovation"},{"y":"2016","x":"La La Land filmed"}],"tags":["Observatory","Free","Rebel Without a Cause","La La Land"],"rel":["hollywoodsign","greek","ennishouse","barnsdall","lazoo","hollywoodbowl"],"w":"Griffith_Observatory","s":"active"},{"id":"greek","h":"losfeliz","n":"Greek Theatre","t":"Outdoor Amphitheater","c":"music","lat":34.1198,"lng":-118.2961,"a":"2700 N Vermont Ave","i":"🏛️","d":"5,900-seat amphitheater in Griffith Park since 1929. Under the stars, against the hillside. Elton John, Aretha Franklin, Frank Sinatra all played here. One of the best outdoor music experiences in the world.","ys":1929,"tl":[{"y":"1929","x":"Built by City of LA"},{"y":"1955","x":"Major concert venue established"}],"tags":["Outdoor","Amphitheater","Concerts"],"w":"Greek_Theatre_(Los_Angeles)","s":"active"},{"id":"yerustic","h":"losfeliz","n":"Ye Rustic Inn","t":"Dive Bar","c":"nightlife","lat":34.1044,"lng":-118.2879,"a":"1831 Hillhurst Ave","i":"🍺","d":"Los Feliz dive bar on Hillhurst since 1971. Dark, rustic interior with antler chandeliers, deep red booths, and a hunting-lodge vibe. Family-owned since 1997. Opens early for weekend Bloody Mary breakfast. Their buffalo wings are legendary — regularly named the best in Los Angeles. Tuesday karaoke, Wednesday bingo, Sunday trivia. The kind of place where the surly staff is part of the charm.","ys":1971,"tl":[{"y":"1971","x":"Opens on Hillhurst"},{"y":"1997","x":"Current family takes over"}],"tags":["Dive Bar","Cash Only","Wings"],"rel":["dresden","drawingroom","goodluckbar","vista","figaro","brownderby"],"s":"active"},{"id":"housepies","h":"losfeliz","n":"House of Pies","t":"24-Hour Diner","c":"food","lat":34.1063,"lng":-118.2928,"a":"1869 N Vermont Ave","i":"🥧","d":"24-hour pie paradise since 1969. Post-bar, post-concert, post-breakup — everyone ends up at House of Pies eventually. Over 30 varieties. The banana cream is legendary.","ys":1969,"tl":[{"y":"1969","x":"Opens on Vermont Ave"}],"tags":["24-Hour","Pie","Late Night","Institution"],"s":"active"},{"id":"skylight","h":"losfeliz","n":"Skylight Books","t":"Independent Bookstore","c":"shop","lat":34.1045,"lng":-118.2919,"a":"1818 N Vermont Ave","i":"📚","d":"Beloved independent bookstore since 1996. Author readings, community hub, expertly curated shelves. The heart of Los Feliz's literary scene.","ys":1996,"tl":[{"y":"1996","x":"Opens on Vermont Ave"}],"tags":["Books","Indie","Author Readings"],"s":"active"},{"id":"figaro","h":"losfeliz","n":"Figaro Bistrot","t":"French Cafe","c":"food","lat":34.1042,"lng":-118.2916,"a":"1802 N Vermont Ave","i":"🥐","d":"Vintage Parisian bistrot that feels transported from the Marais. Opened in 1999 with zinc bar, cast-iron chandeliers, and French antiques. Outdoor seating, croque monsieurs, espresso. The quintessential Los Feliz cafe experience.","ys":1999,"tl":[{"y":"1999","x":"Opens on Vermont Ave as Parisian-style bistrot"}],"tags":["French","Cafe","Sidewalk Dining"],"rel":["housepies","brownderby","alcove","skylight","polo","chateau"],"s":"active"},{"id":"bhhotel","h":"bevhills","n":"Beverly Hills Hotel","t":"The Pink Palace","c":"hotel","lat":34.0818,"lng":-118.4138,"a":"9641 Sunset Blvd","i":"🌴","d":"The Pink Palace. Opened 1912, before Beverly Hills even existed as a city. Marilyn's bungalow. Howard Hughes lived here on and off for 30 years. The banana-leaf wallpaper in the Polo Lounge is Hollywood power incarnate.","ys":1912,"tl":[{"y":"1912","x":"Opens — Beverly Hills doesn't exist yet"},{"y":"1935","x":"Hollywood royalty moves in"},{"y":"1941","x":"Hughes takes up residence"},{"y":"1955","x":"Marilyn's favorite bungalows"}],"tags":["Pink Palace","Iconic","Polo Lounge","Hughes"],"w":"The_Beverly_Hills_Hotel","s":"active"},{"id":"greystone","h":"bevhills","n":"Greystone Mansion","t":"Historic Estate","c":"culture","lat":34.0921,"lng":-118.4002,"a":"905 Loma Vista Dr","i":"🏰","d":"55-room limestone mansion built 1928 for oil heir Ned Doheny. Site of a mysterious murder-suicide months after completion. Now a public park. Featured in The Big Lebowski, There Will Be Blood, and dozens more films.","ys":1928,"tl":[{"y":"1928","x":"Completed — most expensive home in CA"},{"y":"1929","x":"Ned Doheny found dead inside"},{"y":"1971","x":"Beverly Hills buys estate"},{"y":"2013","x":"National Register of Historic Places"}],"tags":["Mansion","Murder Mystery","Film Location"],"rel":["bhhotel","bwilshire","playboymans","weismanfoundation","saksbh","imagnin"],"w":"Greystone_Mansion","s":"active"},{"id":"rodeo","h":"bevhills","n":"Rodeo Drive","t":"Luxury Shopping","c":"shop","lat":34.0703,"lng":-118.4041,"a":"Rodeo Dr","i":"👜","d":"Three blocks that defined luxury retail worldwide. Pretty Woman was filmed here. Every major fashion house has a flagship. The cobblestone Via Rodeo added in 1990 mimics a European street.","ys":1925,"tl":[{"y":"1925","x":"Bridle path becomes shopping street"},{"y":"1975","x":"Luxury brands arrive"},{"y":"1990","x":"Via Rodeo opens"},{"y":"1990","x":"Pretty Woman filmed"}],"tags":["Luxury","Pretty Woman","Fashion"],"w":"Rodeo_Drive","s":"active"},{"id":"bwilshire","h":"bevhills","n":"Beverly Wilshire Hotel","t":"Luxury Hotel","c":"hotel","lat":34.0669,"lng":-118.4017,"a":"9500 Wilshire Blvd","i":"🏨","d":"Italian Renaissance landmark since 1928. Warren Beatty lived here for years. Elvis took a whole floor. The Pretty Woman hotel — Julia Roberts' balcony is real.","ys":1928,"tl":[{"y":"1928","x":"Opens as Beverly Wilshire"},{"y":"1965","x":"Warren Beatty moves in"},{"y":"1990","x":"Pretty Woman's hotel"}],"tags":["Pretty Woman","Historic Hotel","Elvis"],"rel":["bhhotel","polo","rodeo","chasens","bullockswilshire","farmersmarket"],"w":"Beverly_Wilshire_Hotel","s":"active"},{"id":"natenal","h":"bevhills","n":"Nate 'n Al's","t":"Deli","c":"food","lat":34.0704,"lng":-118.402,"a":"414 N Beverly Dr","i":"🥯","d":"Beverly Hills deli since 1945. Where agents close deals over pastrami. Larry King's daily booth. Every entertainment power player in town has eaten here. The lox platter could end a cold war.","ys":1945,"tl":[{"y":"1945","x":"Opens"},{"y":"1965","x":"Becomes industry canteen"},{"y":"2019","x":"Nearly closes, saved by new owners"}],"tags":["Deli","Power Lunch","Larry King"],"s":"active"},{"id":"witchhouse","h":"bevhills","n":"Spadena House","t":"The Witch's House","c":"culture","lat":34.0691,"lng":-118.4109,"a":"516 Walden Dr","i":"🧙‍♀️","d":"A storybook house that looks straight out of Hansel and Gretel. Built 1921 as a movie studio office/dressing room, moved to Beverly Hills in 1934. The most photographed private residence in Beverly Hills.","ys":1921,"tl":[{"y":"1921","x":"Built for Willat Studios"},{"y":"1934","x":"Moved to Beverly Hills"},{"y":"1998","x":"Major renovation"}],"tags":["Storybook","Architecture","Most Photographed"],"rel":["greystone","bhhotel","snowwhitecottages"],"w":"Spadena_House","s":"active"},{"id":"mrchow","h":"bevhills","n":"Mr Chow","t":"Chinese Restaurant","c":"food","lat":34.0681,"lng":-118.4033,"a":"344 N Camden Dr","i":"🥢","d":"Michael Chow's art-world Chinese restaurant since 1974. Warhol, Basquiat, Hockney were regulars. The hand-pulled noodles are theater. The place to see and be seen.","ys":1974,"tl":[{"y":"1974","x":"Opens"},{"y":"1985","x":"Warhol & Basquiat era"}],"tags":["Art World","Celebrity","Chinese"],"w":"Mr_Chow","s":"active"},{"id":"bevgardens","h":"bevhills","n":"Beverly Gardens Park","t":"Park & Landmark","c":"culture","lat":34.0669,"lng":-118.4107,"a":"Santa Monica Blvd","i":"🌹","d":"1.9-mile linear park along Santa Monica Blvd. The Beverly Hills Sign and Lily Pond are the most Instagrammed spots. Electric Fountain dates to 1931. Rose garden with 3,000 plants.","ys":1907,"tl":[{"y":"1907","x":"Park established"},{"y":"1931","x":"Electric Fountain installed"}],"tags":["Park","Beverly Hills Sign","Rose Garden"],"w":"Beverly_Gardens_Park","s":"active"},{"id":"spago2","h":"bevhills","n":"Spago Beverly Hills","t":"Celebrity Restaurant","c":"food","lat":34.0677,"lng":-118.3978,"a":"176 N Canon Dr","i":"🍽️","d":"Wolfgang Puck relocated from Sunset Strip in 1997. THE Oscar night dinner destination. The patio is where deals, breakups, and comebacks happen simultaneously.","ys":1997,"tl":[{"y":"1997","x":"Relocates from Sunset to BH"}],"tags":["Wolfgang Puck","Oscars","Fine Dining"],"rel":["bhhotel","polo","chasens","spago","bwilshire","spago2"],"w":"Spago","s":"active"},{"id":"polo","h":"bevhills","n":"The Polo Lounge","t":"Power Bar","c":"food","lat":34.082,"lng":-118.414,"a":"9641 Sunset Blvd (BH Hotel)","i":"🍸","d":"Inside the Beverly Hills Hotel. The single most important bar in Hollywood history for dealmaking. Studio heads, agents, and stars have been closing deals over martinis here since the 1940s. Booth 1 is the power seat.","ys":1941,"tl":[{"y":"1941","x":"Opens"},{"y":"1955","x":"Becomes THE power lunch spot"}],"tags":["Power Lunch","Dealmaking","Hollywood History"],"s":"active"},{"id":"troubadour","h":"weho","n":"The Troubadour","t":"Live Music","c":"music","lat":34.0819,"lng":-118.3893,"a":"9081 Santa Monica Blvd","i":"🎤","d":"Doug Weston's 1957 coffee house became the most important venue in LA. On Aug 25, 1970, Neil Diamond introduced a total unknown named Elton John to 300 people — he kicked over his piano bench and a star was born. Eagles' Don Henley and Glenn Frey met in the front bar and formed the band; they later wrote \"Sad Cafe\" about it. Lenny Bruce was arrested here in 1962 for saying \"schmuck.\" Lennon and Harry Nilsson were thrown out for heckling the Smothers Brothers. Springsteen went on third on the bill at 1:45 AM. Monday \"Hoot Night\" discovered Cheech & Chong and Steve Martin. BTS played a surprise free show here before going global.","ys":1957,"tl":[{"y":"1957","x":"Doug Weston opens as folk coffeehouse"},{"y":"1962","x":"Lenny Bruce arrested for saying \"schmuck\""},{"y":"1966","x":"Buffalo Springfield debut"},{"y":"1970","x":"Neil Diamond introduces Elton John — US debut"},{"y":"1970","x":"Henley & Frey meet in the bar → Eagles form"},{"y":"1974","x":"Lennon & Nilsson thrown out for heckling"},{"y":"1974","x":"Springsteen goes on at 1:45 AM, third on the bill"},{"y":"1991","x":"Pearl Jam's first show under that name"},{"y":"2018","x":"BTS surprise free show"}],"tags":["Legendary","Elton John","Eagles","Lenny Bruce","Springsteen","BTS"],"rel":["whisky","roxy","fonda","starwood","dangertana"],"w":"Troubadour_(West_Hollywood,_California)","s":"active"},{"id":"barneys","h":"weho","n":"Barney's Beanery","t":"Bar & Restaurant","c":"nightlife","lat":34.0905,"lng":-118.3737,"a":"8447 Santa Monica Blvd","i":"🫘","d":"Started in 1927 on Santa Monica Blvd — you could trade your license plates for a pint. Jim Morrison drank here nightly after recording at the Doors Workshop down the street, until he stood on the bar and urinated. There is now a plaque on his barstool reading 'Here sat Jim Morrison.' Janis Joplin ate her last bowl of chili Oct 3, 1970 in booth #34. She carved 'Janis 70' into the table — it now hangs from the ceiling. Tarantino wrote some of Pulp Fiction in a corner booth. Clara Bow, Gable, and James Dean were all regulars. Had a notorious homophobic sign until 1984 when WeHo's first mayor led a march inside and tore it down.","ys":1927,"tl":[{"y":"1927","x":"Opens in Berkeley"},{"y":"1927","x":"Moves to Route 66 in West Hollywood"},{"y":"1942","x":"Clara Bow, Clark Gable, Errol Flynn regulars"},{"y":"1967","x":"Morrison banned for peeing on the bar"},{"y":"1970","x":"Joplin's last meal — Oct 3, chili in booth #34"},{"y":"1984","x":"WeHo's first mayor removes homophobic sign"},{"y":"1994","x":"Tarantino writes Pulp Fiction in a booth"}],"tags":["Dive","Morrison","Joplin","Route 66","Tarantino","Civil Rights"],"rel":["saksbh","imagnin","rodeo","theabbey","musso","pigwhistle"],"w":"Barney%27s_Beanery","s":"active"},{"id":"formosa","h":"weho","n":"Formosa Cafe","t":"Historic Bar","c":"nightlife","lat":34.0906,"lng":-118.3462,"a":"7156 Santa Monica Blvd","i":"🍸","d":"Red trolley car turned bar in 1925. Right next to the old Samuel Goldwyn Studios (now The Lot). Sinatra, Monroe, Bogart, Elvis — everyone drank here. Gorgeously restored in 2019 with original photos and booths intact.","ys":1925,"tl":[{"y":"1925","x":"Opens in a Red Car trolley"},{"y":"1945","x":"Golden Age of Hollywood regular"},{"y":"2017","x":"Threatened with demolition"},{"y":"2019","x":"Saved and beautifully restored"}],"tags":["Trolley Car","Sinatra","Restored","Classic"],"w":"Formosa_Cafe","s":"active"},{"id":"groundlings","h":"weho","n":"The Groundlings","t":"Comedy Theatre","c":"culture","lat":34.0837,"lng":-118.349,"a":"7307 Melrose Ave","i":"😂","d":"Improv comedy school that built SNL. Phil Hartman, Lisa Kudrow, Will Ferrell, Melissa McCarthy, Kristen Wiig — all Groundlings alumni. The Sunday show is the best $20 you'll spend in LA.","ys":1974,"tl":[{"y":"1974","x":"Founded by Gary Austin"},{"y":"1979","x":"Moves to current theater"},{"y":"1985","x":"Phil Hartman, Pee-wee Herman era"},{"y":"2005","x":"Ferrell, McCarthy era"}],"tags":["Improv","SNL Pipeline","Comedy"],"rel":["comedy","laugh","catclub","eastwestplayers","theabbey","catchone"],"w":"The_Groundlings","s":"active"},{"id":"studioone","h":"weho","n":"Studio One / The Factory","t":"LGBTQ Nightclub","c":"music","lat":34.082,"lng":-118.3865,"a":"652 N La Peer Dr","i":"✨","d":"THE gay disco of the 1970s-80s. Studio One was massive, glamorous, and packed every night. Adjacent to The Factory (connected by a tunnel). Closed 1993 — nothing has replaced it.","ys":1974,"ye":1993,"tl":[{"y":"1974","x":"Opens"},{"y":"1977","x":"Peak disco era"},{"y":"1985","x":"AIDS crisis impacts community"},{"y":"1993","x":"Closes"}],"tags":["LGBTQ","Disco","Legendary","Closed"],"w":"Studio_One_(nightclub)","s":"closed"},{"id":"pdc","h":"weho","n":"Pacific Design Center","t":"Design & Architecture Hub","c":"culture","lat":34.0816,"lng":-118.3828,"a":"8687 Melrose Ave","i":"🟦","d":"Nicknamed \"The Blue Whale\" when it opened in 1975 — a massive blue glass building by Cesar Pelli that shocked West Hollywood. The Green Building followed in 1988, the Red in 2012. Contains 100+ design showrooms. Love it or hate it, it's the most impossible-to-miss building in WeHo.","ys":1975,"tl":[{"y":"1975","x":"\"The Blue Whale\" shocks West Hollywood"},{"y":"1988","x":"Green Building added"},{"y":"2012","x":"Red Building completes the trio"}],"tags":["Architecture","Design","Blue Whale","Cesar Pelli"],"rel":["sohoweho","wispa","studioone","theabbey","clubfuck"],"w":"Pacific_Design_Center","s":"active"},{"id":"catchone","h":"ktown","n":"Jewel's Catch One","t":"Historic Nightclub / Concert Venue","c":"music","lat":34.0478,"lng":-118.3241,"a":"4067 W Pico Blvd","i":"💎","d":"Jewel Thais-Williams — a Black lesbian woman who'd been working as a grocery clerk across the street — watched the Diana Ballroom refuse entry to Black patrons and decided to buy the building. A state law barred women from bartending unless they owned the venue, so Jewel raised the money and purchased it outright. She opened Catch One in 1973 inside the 1925 Mediterranean Revival structure: three dance floors, three bars, a stage upstairs, themed parties downstairs. The LAPD harassed the club almost nightly, parking outside and arresting patrons at random. Jewel kept the doors open anyway. Madonna played an early secret show. Whitney Houston, Luther Vandross, Janet Jackson, Chaka Khan, Rick James, Sammy Davis Jr., and Bette Midler all came through. People called it the Studio 54 of Los Angeles. During the AIDS crisis, Jewel and her wife Rue ran a support facility for women and children with HIV out of the building. The goth-industrial weekly Das Bunker — founded in 1996 as a nomadic club night — spent 18 years as a weekly at Catch One, making the building a rare crossroads of Black disco, LGBTQ+ nightlife, and underground industrial culture under one roof. Jewel retired and closed the club in July 2015 after 42 years. New owners briefly renamed it Union, then reverted to Catch One in 2018. Now an LA Historic-Cultural Monument operating as a concert and nightlife venue.","ys":1973,"tl":[{"y":"1973","x":"Jewel Thais-Williams opens Catch One — first large-scale Black LGBTQ+ disco in the US"},{"y":"1983","x":"Madonna plays early secret show"},{"y":"1996","x":"Das Bunker goth-industrial weekly begins 18-year residency"},{"y":"2015","x":"Jewel retires after 42 years — club closes in July"},{"y":"2016","x":"Purchased by Mitch Edelson — reopens as Union"},{"y":"2018","x":"Reverts to original name Catch One"}],"tags":["Black-Owned","LGBTQ","Disco Pioneer","Madonna","Das Bunker","Industrial","Goth","Historic-Cultural Monument"],"w":"Jewel%27s_Catch_One","s":"active"},{"id":"craigs","h":"weho","n":"Craig's","t":"Celebrity Restaurant","c":"food","lat":34.0806,"lng":-118.3864,"a":"8826 Melrose Ave","i":"📸","d":"The paparazzi-swarmed restaurant where celebrities go specifically to be photographed leaving. Opened 2011, instantly became the #1 spot for pap walks. The food is actually good too.","ys":2011,"tl":[{"y":"2011","x":"Opens on Melrose"}],"tags":["Celebrity","Paparazzi","Melrose"],"s":"active"},{"id":"sohoweho","h":"weho","n":"Soho House WeHo","t":"Members Club","c":"culture","lat":34.0898,"lng":-118.3928,"a":"9200 Sunset Blvd","i":"🔒","d":"Soho House's first LA location, perched atop 9200 Sunset Blvd with panoramic city views. Members-only club for entertainment industry types since 2010. The rooftop garden and screening room draw a creative crowd. Holloway House, a second WeHo outpost, opened in 2022 down the street.","ys":2010,"tl":[{"y":"2010","x":"Opens as first Soho House in Los Angeles"}],"tags":["Members Only","Rooftop","Industry"],"rel":["theabbey","formosa","barneys","pdc"],"s":"active"},{"id":"gowergulch","h":"hollywood","n":"Gower Gulch","t":"Poverty Row & Cowboy Casting","c":"culture","lat":34.0979,"lng":-118.3238,"a":"Sunset & Gower","i":"🤠","d":"Where Hollywood literally began. Nestor Studios opened here in 1911 — the first film studio in Hollywood — in a vacant tavern. By the 1930s, up to 50 cowboys in full costume gathered daily at the Columbia Drugstore on the corner, waiting by a phone booth connected to Central Casting. They called them \"drugstore cowboys\" — the slang entered the language from this very corner. Wyatt Earp himself hung out here trying to cash in on his legend before dying in 1929. In 1940, stuntman Blackjack Ward shot and killed Johnny Tyke with a .45 right here. Now a strip mall designed like an Old West set, with a medicine wagon painted \"Gower Gulch.\"","ys":1911,"tl":[{"y":"1911","x":"Nestor Studios — first Hollywood studio"},{"y":"1925","x":"Poverty Row studios cluster around Gower"},{"y":"1925","x":"\"Drugstore cowboy\" enters the language"},{"y":"1929","x":"Wyatt Earp dies — had been hanging out here"},{"y":"1935","x":"50 cowboys daily at Columbia Drugstore"},{"y":"1940","x":"Blackjack Ward shoots Johnny Tyke"},{"y":"1952","x":"Last B-westerns — cowboys disperse"},{"y":"1976","x":"Old West strip mall built on the site"}],"tags":["First Studio","Poverty Row","Cowboys","Wyatt Earp","Demolished"],"rel":["crossroads","columbiadrug","chaplin","paramount","gowergulch","schwabs"],"w":"Gower_Gulch","s":"active"},{"id":"columbiadrug","h":"hollywood","n":"Columbia Drugstore","t":"Soda Fountain & Casting","c":"shop","lat":34.0979,"lng":-118.3218,"a":"6070 Sunset Blvd","i":"💊","d":"Not to be confused with Schwab's — this was the OTHER famous drugstore. On the southeast corner of Sunset & Gower, its soda fountain was where young movie stars bought their hometown newspapers and cowboys waited for casting calls. The phone booth in back was a direct line to Central Casting. Gone now, but for decades it was Hollywood's real waiting room.","ys":1923,"ye":1955,"tl":[{"y":"1923","x":"Opens with soda fountain"},{"y":"1935","x":"Cowboys crowd the counter daily"},{"y":"1955","x":"Closes as westerns fade"}],"tags":["Drugstore","Casting","Cowboys","Demolished"],"s":"demolished"},{"id":"larryedmunds","h":"hollywood","n":"Larry Edmunds Bookshop","t":"Cinema & Theatre Bookstore","c":"shop","lat":34.1015,"lng":-118.3349,"a":"6644 Hollywood Blvd","i":"📚","d":"The world's oldest and largest bookshop dedicated to cinema and theater. Open since 1938. Movie posters, scripts, photos, rare books — if it's about Hollywood, it's here. Film students, directors, and historians all pilgrimage here. One of the very few original bookshops left on Hollywood Blvd.","ys":1938,"tl":[{"y":"1938","x":"Opens on Hollywood Blvd"}],"tags":["Bookstore","Cinema","Film History","Surviving"],"rel":["lastbookstore","booksoup","skylight","iliadbookshop","crossroads","larryedmunds"],"w":"Larry_Edmunds_Bookshop","s":"active"},{"id":"crossroads","h":"hollywood","n":"Crossroads of the World","t":"Historic Shopping Center","c":"shop","lat":34.0981,"lng":-118.3357,"a":"6671 Sunset Blvd","i":"🌐","d":"America's first outdoor shopping mall (1936). Designed by Robert Derrah as a miniature European village with a Streamline Moderne ocean liner tower topped by a spinning globe. Each cottage was a different international \"port.\" Now offices, but the architecture is fully intact — a Googie-adjacent time capsule. National Register landmark.","ys":1936,"tl":[{"y":"1936","x":"Opens — first outdoor mall in America"},{"y":"1985","x":"Converted to offices"}],"tags":["First Mall","Streamline Moderne","Architecture","Landmark"],"w":"Crossroads_of_the_World","s":"active"},{"id":"broadwayhwd","h":"hollywood","n":"The Broadway-Hollywood","t":"Department Store","c":"shop","lat":34.1013,"lng":-118.3267,"a":"6300 Hollywood Blvd","i":"🏬","d":"The flagship of Hollywood's shopping golden age. This 130,000-square-foot Art Deco building at Hollywood & Vine opened in 1928 as B.H. Dyas, became The Broadway in 1931. By 1930 Hollywood Blvd had over 300 stores. Aspiring actresses fresh off the bus would window-shop here dreaming of a life they'd seen in the movies. Closed 1982; converted to residential in 2007.","ys":1928,"ye":1982,"tl":[{"y":"1928","x":"Opens as B.H. Dyas department store"},{"y":"1931","x":"Becomes The Broadway-Hollywood"},{"y":"1935","x":"300 stores on Hollywood Blvd"},{"y":"1982","x":"Closes — end of Hollywood shopping"}],"tags":["Department Store","Art Deco","Hollywood & Vine","Closed"],"rel":["broadwaydtla","columbiadrug","crossroads","tower","towerrec","capitol"],"s":"closed"},{"id":"wallachlg","h":"hollywood","n":"Wallichs Music City","t":"Record Store","c":"shop","lat":34.0978,"lng":-118.3258,"a":"Sunset & Vine","i":"🎼","d":"Opened 1940 at Sunset & Vine by Glenn Wallichs, becoming the first major record store in Hollywood. Capitol Records was launched from an office upstairs — founders Johnny Mercer, Buddy DeSylva, and Glenn Wallichs literally pressed records and sold them downstairs. The building shaped an entire industry. Demolished 1960s.","ys":1940,"ye":1978,"tl":[{"y":"1940","x":"Opens — Hollywood's first major record store"},{"y":"1942","x":"Capitol Records launched from upstairs"},{"y":"1978","x":"Closes — building later razed"}],"tags":["Record Store","Capitol Records","First","Demolished"],"s":"demolished"},{"id":"shamrock","h":"sunset","n":"Shamrock Social Club","t":"Tattoo Parlor","c":"shop","lat":34.0904,"lng":-118.3886,"a":"9026 Sunset Blvd","i":"☘️","d":"Mark Mahoney's legendary tattoo shop. Stepping inside is like entering a 1950s rockabilly time warp — Mahoney never left that era. He tattooed a portrait of David Bowie on Lady Gaga. Johnny Depp, Cher, Angelina Jolie — all clients. The Strip's living museum of ink culture.","ys":2002,"tl":[{"y":"2002","x":"Mark Mahoney opens on Sunset Blvd"}],"tags":["Tattoo","Rockabilly","Lady Gaga","Johnny Depp"],"rel":["viper","towerrec","catclub","shamrock"],"w":"Mark_Mahoney_(tattoo_artist)","s":"active"},{"id":"gilturner","h":"sunset","n":"Gil Turner's Fine Wines & Spirits","t":"Liquor Store","c":"shop","lat":34.0978,"lng":-118.3688,"a":"8225 Sunset Blvd","i":"🍾","d":"The Strip's famous liquor store since the 1950s. At 2 AM, this is where every musician, comedian, and late-night creature converges. The neon sign is a Sunset Blvd landmark. More impromptu celebrity encounters have happened in this parking lot than at most clubs.","ys":1953,"tl":[{"y":"1955","x":"Opens on Sunset"}],"tags":["Liquor Store","Late Night","Neon","Still Open"],"s":"active"},{"id":"olverastreet","h":"downtown","n":"Olvera Street","t":"Historic Mexican Marketplace","c":"shop","lat":34.057,"lng":-118.2388,"a":"125 Paseo de la Plaza","i":"🇲🇽","d":"The birthplace of Los Angeles, restored in 1930 as a Mexican marketplace. The original Pueblo de Los Angeles was founded here in 1781. The Avila Adobe (1818) is the oldest building in LA. Stalls selling handmade goods, tamales, and pottery have operated continuously since the renovation. A direct line to LA's pre-Hollywood identity.","ys":1781,"tl":[{"y":"1781","x":"Pueblo de Los Angeles founded"},{"y":"1818","x":"Avila Adobe built — oldest building in LA"},{"y":"1930","x":"Restored as Mexican marketplace"}],"tags":["Birthplace","Mexican Heritage","1781","Oldest Building"],"rel":["olvera","unionstation","grandcentral","bradbury","eastern","biltmore","picohouse","mercedtheatre"],"w":"Olvera_Street","s":"active"},{"id":"missionsangabriel","h":"pasadena","n":"Mission San Gabriel Arcángel","t":"Spanish Mission","c":"culture","lat":34.097,"lng":-118.10657,"a":"428 S Mission Dr, San Gabriel","i":"⛪","d":"Founded September 8, 1870 — the fourth California mission and the oldest building in Los Angeles County. Called the Godmother of the Pueblo because the 44 settlers who founded LA in 1781 walked nine miles west from here. At its peak it controlled 1.5 million acres and was the wealthiest mission in the chain. The Tongva people, renamed Gabrieleños, were forced to build it and labor in its fields. The cemetery holds 6,000 indigenous dead. The fortress-style church, designed by Antonio Cruzado with capped buttresses inspired by the cathedral in Córdoba, Spain, is unlike any other mission in California. An arsonist destroyed the roof in July 2020. Restoration was completed in 2025.","ys":1870,"tl":[{"y":"1870","x":"Founded by Father Serra — fourth California mission"},{"y":"1775","x":"Moved to present site from original location"},{"y":"1805","x":"Current church completed"},{"y":"1833","x":"Secularized under Mexican rule — decline begins"},{"y":"2020","x":"Arsonist destroys roof"},{"y":"2025","x":"Restoration completed"}],"tags":["Mission","1870","Tongva","Oldest in LA County","Arson"],"rel":["missionsanfernando","olverastreet","campocahuenga","leonisadobe"],"w":"Mission_San_Gabriel_Arc%C3%A1ngel","s":"active"},{"id":"pershingsquare","h":"downtown","n":"Pershing Square","t":"Public Park","c":"culture","lat":34.0488,"lng":-118.2533,"a":"532 S Olive St","i":"🌳","d":"LA's first public park, established in 1866 on land so swampy it was home to frogs. Originally called Los Angeles Town Square, then 6th Street Park, then Central Park, and finally renamed for General John Pershing in 1918. Through the decades it has been a Victorian garden, a rallying point for labor movements, a Cold War underground parking garage, and a controversial 1994 Ricardo Legorreta redesign with a purple bell tower. Every era of LA has tried to remake this square in its own image. The latest redesign is happening now. The one constant: people argue about what it should be.","ys":1866,"tl":[{"y":"1866","x":"Established as LA Town Square — first park"},{"y":"1918","x":"Renamed for General Pershing"},{"y":"1952","x":"Bulldozed for underground parking garage"},{"y":"1994","x":"Legorreta redesign — purple tower, yellow walls"},{"y":"2024","x":"Latest redesign underway"}],"tags":["First Park","1866","Redesigned Endlessly","Underground Parking"],"rel":["biltmore","bradbury","grandcentral","angelsflight","broadwaydtla"],"w":"Pershing_Square","s":"active"},{"id":"picohouse","h":"downtown","n":"Pico House","t":"Historic Hotel","c":"hotel","lat":34.05613,"lng":-118.23947,"a":"430 N Main St","i":"🏨","d":"The first luxury hotel in Southern California, built in 1870 by Pío Pico — the last Mexican governor of Alta California. Pico and his brother sold most of their vast San Fernando Valley landholdings to finance it. Architect Ezra F. Kysor designed an Italianate Victorian with 82 bedrooms, 21 parlors, a French restaurant, a courtyard fountain, and an aviary of exotic birds. Gas lighting and running water — unheard of in an LA that was a dusty town of 5,700 people. It was the grandest building in the city. By 1880, Pico lost it to foreclosure. The Chinese Massacre of 1871 happened on the alley next door. Now part of El Pueblo Historic Monument, mostly vacant and haunted-looking despite two million visitors a year passing by on Olvera Street.","ys":1870,"tl":[{"y":"1870","x":"Opens — first luxury hotel in Southern California"},{"y":"1871","x":"Chinese Massacre occurs on adjacent alley"},{"y":"1876","x":"Southern Pacific Railroad brings guests"},{"y":"1880","x":"Pico loses hotel to foreclosure"},{"y":"1953","x":"State takes over building"}],"tags":["First Hotel","Pío Pico","1870","Italianate","Chinese Massacre"],"rel":["olverastreet","mercedtheatre","unionstation","alexandria","biltmore"],"w":"Pico_House","s":"active"},{"id":"mercedtheatre","h":"downtown","n":"Merced Theatre","t":"Historic Theater","c":"culture","lat":34.05604,"lng":-118.23968,"a":"420 N Main St","i":"🎭","d":"The first building in Los Angeles constructed specifically as a theater, erected in 1870 by William Abbot right next to the Pico House. Together they signaled that LA was trying to become a real city. The Merced hosted plays, concerts, and civic events for a population that had been making do with saloons and open-air plazas. Named for Abbot's wife, Maria Merced García. Like the Pico House, it's part of El Pueblo Historic Monument now and mostly sits empty — a ghost of the moment when downtown's Plaza was the center of everything.","ys":1870,"tl":[{"y":"1870","x":"Opens — first purpose-built theater in LA"},{"y":"1875","x":"Hosts plays, concerts, civic events"},{"y":"1905","x":"Declines as city center moves south"}],"tags":["First Theater","1870","El Pueblo","William Abbot"],"rel":["picohouse","olverastreet","orpheum","pantages","latheater"],"w":"Merced_Theatre_(Los_Angeles)","s":"active"},{"id":"expositionpark","h":"southla","n":"Exposition Park","t":"Public Park & Museum Campus","c":"culture","lat":34.0153,"lng":-118.2866,"a":"700 Exposition Park Dr","i":"🏛️","d":"Started in 1872 as Agricultural Park — a 160-acre fairground where farmers showed livestock and produce, and the horse races drew gamblers and pickpockets. By the 1880s it had become so disreputable that the state took it over and cleaned it up, rededicating it as Exposition Park in 1913. The Coliseum was built here in 1923. The Natural History Museum opened in 1913. The Rose Garden, planted in 1928, has 20,000 bushes and is free. The California Science Center housed the Space Shuttle Endeavour. Lucas Museum of Narrative Art is rising on the old Sports Arena site. One hundred and fifty years from livestock shows to space shuttles.","ys":1872,"tl":[{"y":"1872","x":"Opens as Agricultural Park — livestock and horse racing"},{"y":"1913","x":"Rededicated as Exposition Park — Natural History Museum opens"},{"y":"1923","x":"LA Memorial Coliseum built"},{"y":"1928","x":"Rose Garden planted — 20,000 bushes"},{"y":"2012","x":"Space Shuttle Endeavour arrives"}],"tags":["Agricultural Park","1872","Coliseum","Natural History Museum","Rose Garden"],"rel":["coliseum","sportsarena","nhm","lucasmuseum"],"w":"Exposition_Park_(Los_Angeles)","s":"active"},{"id":"oldchinatown","h":"downtown","n":"Old Chinatown","t":"Historic Neighborhood (Destroyed)","c":"culture","lat":34.05816,"lng":-118.23714,"a":"Near Alameda & Macy (now Cesar Chavez Ave)","i":"🏮","d":"The first Chinatown, centered on Alameda and Macy Streets, was established in 1880 after thousands of Chinese railroad workers settled in LA. By 1890 it had grown to fifteen streets and two hundred buildings — a Chinese opera theater, three temples, a newspaper, a telephone exchange. In 1933, the entire community of 3,000 people was displaced to build Union Station. The remains were sealed under fourteen feet of fill dirt. In 1987, Metro Rail construction uncovered the buried neighborhood — archaeologists found one of the largest collections of Chinese American artifacts in the country. The community rebuilt as New Chinatown a few blocks north in 1938. The old one sleeps under the train tracks.","ys":1880,"ye":1933,"tl":[{"y":"1880","x":"First Chinatown established"},{"y":"1871","x":"Chinese Massacre — 19 killed by mob"},{"y":"1890","x":"Peak — 15 streets, 200 buildings, 3 temples"},{"y":"1933","x":"Destroyed for Union Station — 3,000 displaced"},{"y":"1987","x":"Metro Rail construction uncovers buried remains"}],"tags":["Chinatown","Destroyed","Union Station","Buried","Chinese Massacre"],"rel":["unionstation","olverastreet","picohouse","newchinatown"],"w":"Old_Chinatown%2C_Los_Angeles","s":"closed"},{"id":"usc","h":"southla","n":"University of Southern California","t":"University","c":"culture","lat":34.02734,"lng":-118.28401,"a":"University Park, Los Angeles","i":"🎓","d":"Founded in 1880 when LA was a frontier town of 11,000 with no paved streets, no electric lights, and no fire alarm system. Judge Robert Widney secured donations from three men who between them represented every faction of early LA — a Protestant nurseryman, an Irish Catholic ex-governor, and a German Jewish banker. Tuition was fifteen dollars a term. The first class had 53 students. The Widney Alumni House, built that year, is the oldest university building in Southern California and stands. USC is now the largest private employer in the city. The campus went up on an open plain south of downtown that everyone thought was too far from anything. They were wrong.","ys":1880,"tl":[{"y":"1880","x":"Founded — 53 students, $15 tuition, unpaved streets"},{"y":"1880","x":"Widney Alumni House built — oldest university building in SoCal"},{"y":"1923","x":"Coliseum opens next door"},{"y":"1969","x":"Joins Association of American Universities"}],"tags":["1880","Oldest Private University in CA","Trojans","Widney House"],"rel":["coliseum","expositionpark","sportsarena","nhm"],"w":"University_of_Southern_California","s":"active"},{"id":"macarthurpark","h":"ktown","n":"MacArthur Park (Westlake Park)","t":"Historic Park","c":"culture","lat":34.06011,"lng":-118.27808,"a":"2230 W 6th St","i":"🦢","d":"In 1886, the City of Los Angeles received a thirty-five-acre mudhole and refuse dump in a land swap with George S. Patton Sr. — father of the WWII general. They turned it into Westlake Park, the most fashionable outdoor retreat in early LA. The lake is fed by natural springs. By the 1890s it was surrounded by luxury hotels and the neighborhood was called the Champs-Élysées of Los Angeles. In 1934, Wilshire Boulevard was pushed through the middle, splitting the lake in two. Renamed MacArthur Park in 1942 because William Randolph Hearst thought it might help the general's presidential ambitions. Jimmy Webb wrote that someone left the cake out in the rain here. The park declined, revived, declined again, and keeps coming back. The paddle boats returned.","ys":1886,"tl":[{"y":"1886","x":"Opens as Westlake Park — a swamp turned civic treasure"},{"y":"1895","x":"Surrounded by luxury hotels — the Champs-Élysées of LA"},{"y":"1934","x":"Wilshire Blvd viaduct splits the lake in two"},{"y":"1942","x":"Renamed MacArthur Park"},{"y":"1968","x":"Jimmy Webb writes MacArthur Park"},{"y":"2007","x":"Levitt Pavilion opens — free concerts return"}],"tags":["1886","Westlake","Natural Springs","Jimmy Webb","Paddle Boats"],"rel":["langers","ambassador","bullockswilshire","biltmore","pershingsquare"],"w":"MacArthur_Park","s":"active"},{"id":"springst","h":"downtown","n":"Spring Street Financial District","t":"Historic Banking Row","c":"culture","lat":34.0473,"lng":-118.2497,"a":"Spring St between 4th & 7th","i":"🏦","d":"Known as the \"Wall Street of the West\" from the 1900s through the 1950s. Beaux-Arts bank buildings lined both sides — the grandest financial district west of Chicago. Banks left for Bunker Hill in the '60s, and Spring Street decayed for decades. Now it's the heart of DTLA's revival, with the old bank lobbies becoming bars, galleries, and co-working spaces.","ys":1900,"tl":[{"y":"1900","x":"\"Wall Street of the West\""},{"y":"1925","x":"Beaux-Arts towers rise"},{"y":"1965","x":"Banks flee to Bunker Hill"},{"y":"2015","x":"Revival — bank lobbies become bars"}],"tags":["Wall Street of the West","Banking","Beaux-Arts","Revival"],"w":"Spring_Street_(Los_Angeles)","s":"active"},{"id":"imagnin","h":"bevhills","n":"I. Magnin","t":"Luxury Department Store","c":"shop","lat":34.067,"lng":-118.4044,"a":"9634 Wilshire Blvd","i":"👗","d":"The grande dame of Beverly Hills luxury retail. San Francisco-based I. Magnin opened its Beverly Hills store in 1943 with white marble floors and personal shoppers who called clients by name. The \"white building\" on Wilshire was where studio heads bought furs for their mistresses and wives bought gowns for premieres. Closed 1994 when the parent company collapsed.","ys":1943,"ye":1994,"tl":[{"y":"1943","x":"I. Magnin opens Beverly Hills store on Wilshire Blvd"},{"y":"1988","x":"R.H. Macy acquires I. Magnin chain"},{"y":"1994","x":"Chain collapses — store closes"}],"tags":["Luxury","Department Store","Old Money","Closed"],"rel":["bullockswilshire","saksbh","jwrobinsons","rodeo","imagnin","barneys"],"w":"I._Magnin","s":"closed"},{"id":"saksbh","h":"bevhills","n":"Saks Fifth Avenue","t":"Luxury Department Store","c":"shop","lat":34.0668,"lng":-118.4037,"a":"9600 Wilshire Blvd","i":"🛍️","d":"Opened 1938, cementing Beverly Hills as a luxury shopping capital to rival Fifth Avenue. When Saks arrived, it confirmed what Rodeo Drive would become. Stars have had standing accounts here since FDR was president.","ys":1938,"tl":[{"y":"1938","x":"Opens on Wilshire — luxury comes west"}],"tags":["Luxury","Department Store","Flagship"],"w":"Saks_Fifth_Avenue","s":"active"},{"id":"sennett","h":"silverlake","n":"Mack Sennett Studios","t":"Film Studio","c":"culture","lat":34.0847,"lng":-118.2598,"a":"1712 Glendale Blvd","i":"🎬","d":"Mack Sennett built his Keystone Studios near here in 1912, creating the Keystone Cops and launching Charlie Chaplin, Fatty Arbuckle, and Harold Lloyd. Silver Lake's Edendale neighborhood was the epicenter of early slapstick comedy — before Hollywood. The area had more studios per block than anywhere in the world.","ys":1912,"ye":1928,"tl":[{"y":"1912","x":"Keystone Studios — Chaplin, Keystone Cops"},{"y":"1917","x":"Sennett moves to larger lot"},{"y":"1928","x":"Era ends — studios consolidate in Hollywood"}],"tags":["Keystone Cops","Chaplin","First Studios","Slapstick"],"rel":["chaplin","disneysl","edendale","musicbox","blackcat","theabbey"],"w":"Mack_Sennett","s":"closed"},{"id":"clubfuck","h":"silverlake","n":"Club Fuck!","t":"Underground Party","c":"music","lat":34.0921,"lng":-118.2798,"a":"3909 Sunset Blvd","i":"⚡","d":"A weekly party at Basgo's Disco (the same address as the Black Cat) from 1989 to 1993. In direct opposition to the fear of the AIDS crisis, Club FUCK! celebrated modified, tattooed, and pierced bodies. It challenged the terror of contagion while reveling in the temporary nature of the human body. One of the most defiant cultural acts of the epidemic years.","ys":1989,"ye":1993,"tl":[{"y":"1989","x":"Begins at Basgo's Disco"},{"y":"1993","x":"Ends"}],"tags":["Underground","AIDS Era","Defiant","Body Culture"],"w":"Club_Fuck!","s":"closed"},{"id":"lovell","h":"losfeliz","n":"Lovell Health House","t":"Architecture Landmark","c":"culture","lat":34.1182,"lng":-118.2879,"a":"4616 Dundee Dr","i":"🏠","d":"Richard Neutra's 1929 masterpiece, considered one of the most important houses of the 20th century. Steel-frame, glass walls, cantilevered over the hillside. Built for naturopath Philip Lovell, it was the first steel-frame residence in America. You can see it from the street but can't go in — which makes it more mysterious.","ys":1929,"tl":[{"y":"1929","x":"Built — first steel-frame house in America"},{"y":"1971","x":"National Historic Landmark"}],"tags":["Neutra","Modernism","Architecture","Landmark"],"rel":["hollyhock","ennis","sowden","neutravdl","cafetropical","casitadel"],"w":"Lovell_Health_House","s":"active"},{"id":"elcid","h":"silverlake","n":"El Cid","t":"Flamenco Supper Club","c":"food","lat":34.0938,"lng":-118.2824,"a":"4212 Sunset Blvd","i":"💃","d":"Started as a speakeasy in 1925 during Prohibition. In 1963 it became the Spanish supper club it remains today — flamenco dancers, live guitar, sangria, paella. One of the oldest continuously operating nightlife venues in Silver Lake. The building has survived nearly a century of LA reinvention without once losing its identity.","ys":1962,"tl":[{"y":"1925","x":"Opens as a Prohibition speakeasy"},{"y":"1963","x":"Becomes Spanish supper club"}],"tags":["Speakeasy","Flamenco","Prohibition","Surviving"],"w":"El_Cid_(nightclub)","s":"active"},{"id":"disneysl","h":"silverlake","n":"Walt Disney's Hyperion Studio","t":"Animation Studio (Site)","c":"culture","lat":34.1071,"lng":-118.2723,"a":"2719 Hyperion Ave","i":"🏰","d":"Walt Disney built his first major studio here in 1926 on Hyperion Avenue. Snow White and the Seven Dwarfs — the first feature-length animated film — was made in this building. Steamboat Willie, Fantasia storyboards, the Silly Symphonies. The studio outgrew the space and moved to Burbank in 1939. Now a Gelson's supermarket. A plaque and the street name are all that remain of the place where animation was invented.","ys":1926,"ye":1939,"tl":[{"y":"1926","x":"Disney moves studio to Hyperion Ave"},{"y":"1928","x":"Steamboat Willie produced here"},{"y":"1937","x":"Snow White made here — first animated feature"},{"y":"1939","x":"Studio moves to Burbank"},{"y":"1966","x":"Building demolished"}],"tags":["Disney","Snow White","Animation","Demolished"],"rel":["disneysl","disneystudios","sennett","edendale","sllounge","echo"],"w":"Walt_Disney_Studios_(Hyperion_Avenue)","s":"demolished"},{"id":"redlion","h":"silverlake","n":"Red Lion Tavern","t":"German Beer Hall","c":"nightlife","lat":34.0993,"lng":-118.2591,"a":"2366 Glendale Blvd","i":"🍺","d":"A German beer hall in Silver Lake since 1959, built by the same guys who owned Cole's downtown. Waitresses in dirndls serve potato pancakes and Franziskaners. The interior is dark wood, steins on shelves, and a patio strung with lights. A place where time simply stopped — which is exactly the point.","ys":1959,"tl":[{"y":"1959","x":"Opens as German tavern"}],"tags":["German","Beer Hall","Time Capsule"],"rel":["elcid","casitadel","thirstycrow","coles","amoeba","rhino"],"s":"active"},{"id":"rockaway","h":"silverlake","n":"Rockaway Records","t":"Vinyl & Collectibles","c":"shop","lat":34.0999,"lng":-118.2594,"a":"2395 Glendale Blvd","i":"💿","d":"Over 40 years of rare vinyl, memorabilia, and music ephemera. Worldwide customers seek out Rockaway for impossible-to-find pressings, concert posters, and autographed items. Not just a record store — a museum you can buy from.","ys":1979,"tl":[{"y":"1979","x":"Founded as mail-order record business in Brea"},{"y":"1982","x":"Buys Rainbow Records — first Silver Lake retail store"},{"y":"1992","x":"Moves to current 9,000 sq ft location on Glendale Blvd"}],"tags":["Records","Vinyl","Rare","Collectibles"],"w":"Rockaway_Records","s":"active"},{"id":"musicbox","h":"silverlake","n":"Music Box Steps","t":"Laurel & Hardy Film Site","c":"culture","lat":34.083,"lng":-118.2753,"a":"923-925 Vendome St","i":"🎬","d":"133 concrete steps connecting Vendome Street to Descanso Drive in Silver Lake — focal point of Laurel and Hardy's 1932 short film The Music Box, in which Stan and Ollie attempt to haul a piano up the staircase. The film won the first Academy Award for Best Live Action Short (Comedy) and was selected for the National Film Registry in 1997. The steps had appeared earlier in Charley Chase's Isn't Life Terrible? (1925). A commemorative plaque is set into one of the lower steps. The block is designated Laurel and Hardy Park.","ys":1932,"tl":[{"y":"1932","x":"Laurel and Hardy film The Music Box on Vendome Street steps — wins first Academy Award for Best Short Comedy"},{"y":"1997","x":"The Music Box selected for National Film Registry by Library of Congress"}],"tags":["Laurel and Hardy","Film Location","Silver Lake","Academy Award","National Film Registry","Staircase"],"rel":["sennett","chaplin","paramount","reservoir","edendale","griffith"],"w":"The_Music_Box","s":"active"},{"id":"slreservoir","h":"silverlake","n":"Silver Lake Reservoir","t":"Neighborhood Landmark","c":"culture","lat":34.0897,"lng":-118.2682,"a":"Silver Lake Blvd","i":"💧","d":"The neighborhood's namesake, built in 1907 under water commissioner Herman Silver. The 2.2-mile walking path around the reservoir is where every Silver Lake resident eventually ends up — joggers, strollers, dog walkers, and brooding screenwriters. The surrounding hills are a who's-who of modernist architecture. Drained in 2008 due to EPA regulations, refilled, and now the meadow on the east side is the closest thing Silver Lake has to a town square.","ys":1907,"tl":[{"y":"1907","x":"Reservoir completed"},{"y":"2008","x":"Drained for EPA compliance"},{"y":"2011","x":"Meadow park opens on east side"}],"tags":["Reservoir","Walking Path","Neighborhood Heart"],"w":"Silver_Lake_Reservoir","s":"active"},{"id":"lyrichyp","h":"silverlake","n":"Lyric Hyperion Theatre","t":"Theater & Cafe","c":"culture","lat":34.0988,"lng":-118.2739,"a":"2106 Hyperion Ave","i":"🎭","d":"The building has been a stage since the 1970s when it housed the Frog Pond, a popular gay restaurant. Then it became home to the Company of Angels theater troupe, co-founded by Leonard Nimoy and Richard Chamberlain. Now a scrappy 85-seat venue for comedy, improv, storytelling, and experimental performance. The on-site cafe makes it Silver Lake's living room for creative types.","ys":1975,"tl":[{"y":"1975","x":"The Frog Pond — gay restaurant"},{"y":"1985","x":"Company of Angels (Nimoy co-founded)"},{"y":"2015","x":"Lyric Hyperion opens"}],"tags":["Theater","Leonard Nimoy","Comedy","Indie"],"rel":["disneysl","sennett","echo","hollyhock","sowden","lovell"],"w":"The_Lyric_Hyperion_Theatre_%26_Cafe","s":"active"},{"id":"ennis","h":"losfeliz","n":"Ennis House","t":"Frank Lloyd Wright Landmark","c":"culture","lat":34.1161,"lng":-118.2931,"a":"2607 Glendower Ave","i":"🏛️","d":"Frank Lloyd Wright's 1924 Mayan Revival fortress on a Los Feliz hilltop. Built from 27,000 patterned concrete blocks, it looks like a temple from another civilization. Over 80 screen appearances — it's the building in Blade Runner, the vampire lair in Buffy, the mansion in House on Haunted Hill. Earthquakes and rain nearly destroyed it. Private residence. You can see it from the street and it will stop you cold.","ys":1924,"tl":[{"y":"1924","x":"Built — 27,000 concrete textile blocks"},{"y":"1959","x":"House on Haunted Hill filmed here"},{"y":"1982","x":"Blade Runner uses it as inspiration"},{"y":"2019","x":"Sold for $18M after near-collapse"}],"tags":["Frank Lloyd Wright","Blade Runner","Mayan Revival","Landmark"],"w":"Ennis_House","s":"active"},{"id":"vistatheater","h":"losfeliz","n":"Vista Theatre","t":"Movie Palace","c":"culture","lat":34.0984,"lng":-118.2869,"a":"4473 Sunset Blvd","i":"🎬","d":"A 1923 vaudeville and movie theater with an Egyptian-themed interior that rivals Grauman's Chinese. Single-screen, ornate, magical. Now owned by Quentin Tarantino, who screens films on actual celluloid. No digital projection. No multiplex nonsense. The last real movie palace experience in LA, and Tarantino bought it to make sure it stays that way.","ys":1923,"tl":[{"y":"1923","x":"Opens as vaudeville theater"},{"y":"2021","x":"Tarantino buys it"}],"tags":["Tarantino","Movie Palace","Film Only","Egyptian"],"rel":["vista","chinese","greek","afi","egyptian","housepies"],"w":"Vista_Theatre","s":"active"},{"id":"brownderby","h":"losfeliz","n":"Los Feliz Brown Derby","t":"Historic Restaurant / Nightclub","c":"food","lat":34.1113,"lng":-118.2876,"a":"4500 Los Feliz Blvd","i":"🎩","d":"Cecil B. DeMille bought this building in 1940 and turned it into a Brown Derby — the legendary chain where the Cobb salad was invented. The distinctive dome ceiling survived when it became The Derby in the '90s, launching the swing revival. Big Bad Voodoo Daddy played here. The \"Swingers\" movie filmed here. Now divided between Mess Hall Kitchen and a Chase bank — the dome split in half between them.","ys":1941,"ye":2009,"tl":[{"y":"1940","x":"DeMille converts to Brown Derby"},{"y":"1992","x":"Becomes The Derby — swing revival"},{"y":"1996","x":"Swingers filmed here"},{"y":"2009","x":"Derby closes"},{"y":"2012","x":"Dome split between restaurant and bank"}],"tags":["Brown Derby","Swing Revival","Swingers","DeMille"],"w":"Brown_Derby","s":"closed"},{"id":"sowden","h":"losfeliz","n":"Sowden House","t":"Architecture / True Crime","c":"culture","lat":34.1056,"lng":-118.3013,"a":"5121 Franklin Ave","i":"🔮","d":"Designed in 1926 by Lloyd Wright (Frank's son) in a Mayan Revival style with a massive jaw-like entrance. Beautiful and deeply creepy. Former home of Dr. George Hodel, the prime suspect in the Black Dahlia murder of 1947. His son wrote a bestselling book making the case. The LAPD never charged Hodel. The house watches Franklin Avenue with the expression of a building that knows things.","ys":1926,"tl":[{"y":"1926","x":"Lloyd Wright designs Mayan Revival house"},{"y":"1945","x":"George Hodel moves in"},{"y":"1947","x":"Black Dahlia murdered — Hodel suspected"},{"y":"2003","x":"Steve Hodel publishes Black Dahlia Avenger"}],"tags":["Lloyd Wright","Black Dahlia","Mayan Revival","True Crime"],"rel":["hollyhock","ennis","lovell","griffith","snowwhitecottages","barnsdall"],"w":"John_Sowden_House","s":"active"},{"id":"hollyhock","h":"losfeliz","n":"Hollyhock House","t":"Frank Lloyd Wright / Art Park","c":"culture","lat":34.1005,"lng":-118.2945,"a":"4800 Hollywood Blvd","i":"🌺","d":"Frank Lloyd Wright's first LA commission (1919-1921), built for oil heiress Aline Barnsdall. Named for her favorite flower, which Wright abstracted into the concrete ornamentation. Barnsdall donated it and 11 acres to the city in 1927 as a public art park. UNESCO World Heritage Site since 2019. The hilltop views of Griffith Observatory and the Hollywood Sign are among the best vantage points in the city.","ys":1921,"tl":[{"y":"1921","x":"Built for Aline Barnsdall"},{"y":"1927","x":"Donated to city as art park"},{"y":"2019","x":"UNESCO World Heritage Site"}],"tags":["Frank Lloyd Wright","UNESCO","Art Park","Hollyhock"],"w":"Hollyhock_House","s":"active"},{"id":"afi","h":"losfeliz","n":"American Film Institute","t":"Film School","c":"culture","lat":34.1084,"lng":-118.31,"a":"2021 N Western Ave","i":"🎓","d":"The AFI campus sits in a historic Spanish Colonial Revival building where David Lynch, Terrence Malick, and Darren Aronofsky learned their craft. Founded in 1967, it's trained more major directors than any other school. The annual AFI Fest is LA's premier film festival. The campus is technically closed to the public, which makes it more cinematic.","ys":1967,"tl":[{"y":"1967","x":"AFI founded"},{"y":"1975","x":"Lynch, Malick attend"}],"tags":["Film School","David Lynch","Terrence Malick"],"rel":["nuart","vistatheater","greek","barnsdall","hollyhock","griffith"],"w":"American_Film_Institute","s":"active"},{"id":"barnsdall","h":"losfeliz","n":"Barnsdall Art Park","t":"Public Art Park","c":"culture","lat":34.101,"lng":-118.2946,"a":"4800 Hollywood Blvd","i":"🎨","d":"Aline Barnsdall's hilltop estate became LA's first municipal art park in 1927. Beyond Hollyhock House, the park hosts the Los Angeles Municipal Art Gallery, a Junior Arts Center, and rotating exhibitions. Free. Quiet. The olive trees and city views make it one of the best-kept secrets in a neighborhood full of them.","ys":1927,"tl":[{"y":"1927","x":"Donated as public park"}],"tags":["Free","Art Gallery","Hilltop","Barnsdall"],"s":"active"},{"id":"dresden","h":"losfeliz","n":"The Dresden","t":"Lounge & Supper Club","c":"nightlife","lat":34.1039,"lng":-118.2916,"a":"1760 N Vermont Ave","i":"🍸","d":"The mahogany bar, red booths, and the house duo Marty & Elayne have been unchanged since 1954. Marty & Elayne have played jazz and lounge standards here every Tuesday through Saturday since 1982 — over 40 years at the same gig. The bar was featured in Swingers (1996). It's the platonic ideal of a mid-century LA cocktail lounge.","ys":1954,"tl":[{"y":"1954","x":"Opens on Vermont"},{"y":"1982","x":"Marty & Elayne begin residency"},{"y":"1996","x":"Featured in Swingers"}],"tags":["Marty & Elayne","Swingers","Mid-Century","Lounge"],"rel":["goodluckbar","drawingroom","yerustic","vista"],"s":"active"},{"id":"largehall","h":"weho","n":"Largo at the Coronet","t":"Performance Venue","c":"music","lat":34.0776,"lng":-118.3765,"a":"366 N La Cienega Blvd","i":"🎤","d":"The intimate venue where the best comedians and musicians in LA play when they want to try new material. Aimee Mann's monthly residency. Jon Brion's legendary Friday nights. Sarah Silverman working out new bits. Zach Galifianakis before The Hangover. Originally on Fairfax, moved to the Coronet Theatre in 2008. No phones allowed. The audience is the show's collaborator.","ys":1989,"tl":[{"y":"1989","x":"Opens on Fairfax Ave"},{"y":"2005","x":"Jon Brion Friday nights, Aimee Mann residency"},{"y":"2008","x":"Moves to Coronet Theatre"}],"tags":["Comedy","Jon Brion","Intimate","No Phones"],"w":"Largo_(nightclub)","s":"active"},{"id":"theabbey","h":"weho","n":"The Abbey","t":"LGBTQ Bar & Restaurant","c":"nightlife","lat":34.0834,"lng":-118.3851,"a":"692 N Robertson Blvd","i":"🏳️‍🌈","d":"Started as a small coffeehouse in 1991 and grew into the most famous gay bar in America. Multiple dance floors, outdoor patios, and a restaurant. Voted \"Best Gay Bar in the World\" by Logo TV. Every major Pride event routes past it. It's the anchor of WeHo's Boys Town and the place where LGBTQ culture in LA comes to celebrate.","ys":1991,"tl":[{"y":"1991","x":"Opens as coffeehouse"},{"y":"2005","x":"Expands into mega-venue"}],"tags":["LGBTQ","Pride","Boys Town","Iconic"],"rel":["studioone","catchone","clubfuck","thecircus","blackcat","akbar"],"w":"The_Abbey_(bar)","s":"active"},{"id":"sunsetplaza","h":"weho","n":"Sunset Plaza","t":"Sidewalk Cafe District","c":"food","lat":34.0923,"lng":-118.3791,"a":"8600 Sunset Blvd","i":"☕","d":"The only stretch of Sunset Blvd with European-style sidewalk dining. Le Petit Four, Chin Chin — the tables face the street so you can watch Ferraris and tourists. In the '90s it was ground zero for the \"ladies who lunch\" culture. Agents closed deals over salads. It's the Strip's daytime personality — the glamour that comes before the debauchery.","ys":1985,"tl":[{"y":"1985","x":"Sidewalk cafes arrive"},{"y":"1995","x":"Power lunch capital of the Strip"}],"tags":["Sidewalk Dining","Power Lunch","Strip"],"s":"active"},{"id":"wehocityhall","h":"weho","n":"West Hollywood City Hall","t":"City of WeHo","c":"culture","lat":34.0905,"lng":-118.3707,"a":"8300 Santa Monica Blvd","i":"🏛️","d":"West Hollywood incorporated as a city in 1984, immediately becoming one of the first cities in the US with a majority-openly-gay city council. It passed one of the nation's first rent control laws and domestic partner registries. The city is only 1.9 square miles but punches absurdly above its weight in cultural influence.","ys":1984,"tl":[{"y":"1984","x":"WeHo incorporates — first majority-gay council"},{"y":"1985","x":"First rent control and domestic partner laws"}],"tags":["LGBTQ","Rent Control","Incorporation","Civil Rights"],"rel":["theabbey","studioone","pdc","lovell","neutravdl"],"s":"active"},{"id":"whiskyweho","h":"weho","n":"Schindler House","t":"R.M. Schindler Landmark","c":"culture","lat":34.086,"lng":-118.3718,"a":"835 N Kings Rd","i":"🏗️","d":"R.M. Schindler built this house in 1922 as both his home and studio, and it's considered the first truly modern house in America. Concrete walls, sleeping porches open to the sky, no bedrooms in the traditional sense. Now the MAK Center for Art and Architecture. Open to the public. It predates Neutra, predates the International Style, predates everything we think of as \"modern\" in residential design.","ys":1922,"tl":[{"y":"1922","x":"Built — first modern house in America"},{"y":"1994","x":"Becomes MAK Center for Art"}],"tags":["Schindler","Modernism","First","MAK Center"],"w":"Schindler_House_(West_Hollywood,_California)","s":"active"},{"id":"thecircus","h":"weho","n":"Circus of Books","t":"Legendary Adult Bookstore","c":"shop","lat":34.0906,"lng":-118.3682,"a":"8230 Santa Monica Blvd","i":"📕","d":"For decades THE adult bookstore and video store in Boys Town, run by Karen and Barry Mason — a straight couple who became unlikely pillars of the gay community. During the AIDS crisis, it was one of the few businesses that didn't flee. Subject of a 2019 Netflix documentary. Closed 2019 after 39 years. The Netflix doc revealed Karen and Barry's kids didn't know what their parents did for a living.","ys":1982,"ye":2019,"tl":[{"y":"1980","x":"Opens on Santa Monica Blvd"},{"y":"1985","x":"Anchor of Boys Town during AIDS crisis"},{"y":"2019","x":"Closes — Netflix documentary released"}],"tags":["Boys Town","AIDS Era","Netflix Doc","LGBTQ"],"rel":["theabbey","blackcat","akbar","poseur","dantanas","troubadour"],"w":"Circus_of_Books","s":"closed"},{"id":"dangertana","h":"weho","n":"Dan Tana's","t":"Italian Restaurant","c":"food","lat":34.0818,"lng":-118.3891,"a":"9071 Santa Monica Blvd","i":"🍝","d":"Red leather booths, checkered tablecloths, and waiters who've been here since the Carter administration. Open since 1964 next door to the Troubadour. Every agent, producer, and rock star in LA has eaten the chicken parm. Phil Hartman's last meal was here. The portions are enormous and the vibe hasn't changed since Vietnam.","ys":1964,"tl":[{"y":"1964","x":"Opens next to the Troubadour"}],"tags":["Italian","Red Booths","Old Hollywood","Phil Hartman"],"w":"Dan_Tana%27s","s":"active"},{"id":"venicecanals","h":"venice","n":"Venice Canals","t":"Historic Canal District","c":"culture","lat":33.9847,"lng":-118.4673,"a":"Dell Ave & Venice Blvd","i":"🛶","d":"Ab
