<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Era Maps — Los Angeles</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--nb:#00d4ff;--sf:#13131a;--red:#f85149}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
#map{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.leaflet-control-zoom a{background:rgba(26,26,36,.85)!important;color:var(--tx)!important;border-color:var(--bd)!important;backdrop-filter:blur(12px);width:30px!important;height:30px!important;line-height:30px!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:rgba(40,40,55,.95)!important;color:var(--np)!important}
.leaflet-control-zoom{border:1px solid var(--bd)!important;border-radius:8px!important;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.4)!important;margin-bottom:100px!important;margin-right:14px!important}
.leaflet-tile-pane{filter:saturate(0.15) brightness(0.45) contrast(1.3) invert(1) hue-rotate(200deg) sepia(0);transition:filter 1.6s ease}
#intro{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity .6s}
#intro.hidden{opacity:0;pointer-events:none}
.it{font-size:56px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--np),var(--na));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.is{color:var(--ts);font-size:14px;margin:12px 0 28px;letter-spacing:3px;text-transform:uppercase}
.ib{background:linear-gradient(135deg,var(--np),var(--na));border:none;color:var(--bg);padding:14px 40px;border-radius:30px;font-size:15px;cursor:pointer;font-weight:700;letter-spacing:1px}
.ib:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(255,45,123,.4)}
.tl-logo{position:absolute;left:20px;bottom:18px;font-size:30px;font-weight:900;letter-spacing:-0.5px;text-transform:uppercase;background:linear-gradient(135deg,var(--np),var(--na));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;pointer-events:none;line-height:1;white-space:nowrap}
#listToggle{position:fixed;top:14px;left:14px;z-index:201;width:36px;height:36px;border-radius:8px;background:rgba(26,26,36,.85);backdrop-filter:blur(12px);border:1px solid var(--bd);color:var(--ts);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;padding:0}
#listToggle:hover{background:rgba(40,40,55,.95);color:var(--np)}
#listToggle.active{border-color:var(--np);color:var(--np)}
#listOverlay{display:none;position:fixed;inset:0;z-index:199}
#listOverlay.show{display:block}
#listPanel{position:fixed;top:0;left:0;bottom:0;width:230px;z-index:200;background:rgba(13,13,20,.97);backdrop-filter:blur(20px);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;mask-image:linear-gradient(to right,black 82%,transparent 100%);-webkit-mask-image:linear-gradient(to right,black 82%,transparent 100%)}
#citySelect{background:rgba(26,26,36,.85);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:20px;color:var(--ts);font-size:10px;letter-spacing:1px;cursor:pointer;padding:4px 8px;-webkit-appearance:none;appearance:none;outline:none}
#citySelect option{background:var(--cd);color:var(--tx)}
.ln-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--tm);margin-bottom:6px;font-weight:600}
#listPanel.open{transform:translateX(0)}
#listPanelHeader{display:none;padding:10px 14px 12px;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--bd)}
#listPanel.open #listPanelHeader{display:flex}
#listClose{background:rgba(26,26,36,.7);border:1px solid var(--bd);color:var(--ts);cursor:pointer;width:28px;height:28px;border-radius:6px;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;font-family:inherit;transition:.15s}
#listClose:hover{border-color:var(--np);color:var(--np)}
#listPanelHeader span{font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(135deg,var(--np),var(--na));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
#listPanel.open~#timeline .tl-logo{display:none}
.hc{padding:5px 8px;border-radius:10px;background:rgba(26,26,36,.7);border:1px solid transparent;font-size:11px;font-weight:600;cursor:pointer;transition:.2s;display:flex;justify-content:space-between;align-items:center}
.hc:hover{border-color:var(--bd);background:rgba(26,26,36,.9)}
.hc.active{background:linear-gradient(135deg,rgba(255,45,123,.15),rgba(255,179,71,.1));border-color:var(--np);color:var(--tx)}
.hc.active .hcc{color:#fff;opacity:.9}
.hcc{font-size:10px;opacity:.5;font-weight:400;color:var(--ts)}
.rg-hdr{display:flex;justify-content:space-between;align-items:center;padding:5px 8px 3px;margin-top:6px;cursor:pointer;border-radius:6px;transition:.2s}
.rg-hdr:hover{background:rgba(255,255,255,.04)}
.rg-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--tm);text-transform:uppercase}
.rg-arrow{font-size:9px;color:var(--tm);opacity:.7}
.cat-dd{width:auto}.cat-dd-list{min-width:120px}
.fsel{padding:4px 20px 4px 8px!important}
.cat-dd-btn{padding:4px 24px 4px 10px!important}
#searchWrap{position:fixed;top:14px;left:60px;z-index:101;display:flex;gap:6px;align-items:center}
#controlsWrap{position:fixed;top:14px;right:14px;z-index:101;display:flex;gap:6px;align-items:center}
#searchBox{width:0;padding:0;background:rgba(26,26,36,.92);backdrop-filter:blur(16px);border:1px solid var(--bd);border-radius:20px;color:var(--tx);font-size:13px;transition:width .3s,padding .3s;overflow:hidden;outline:none}
#searchBox.open{width:240px;padding:8px 16px}
#searchBox::placeholder{color:var(--tm)}
#searchResults{position:fixed;top:58px;left:60px;z-index:101;width:280px;max-height:340px;overflow-y:auto;background:rgba(19,19,26,.95);backdrop-filter:blur(16px);border:1px solid var(--bd);border-radius:14px;display:none;box-shadow:0 20px 40px rgba(0,0,0,.5)}
#searchResults.show{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bd);transition:.15s}
.sr-item:hover{background:rgba(255,45,123,.06)}
.sr-item:last-child{border-bottom:none}
.sr-name{font-size:13px;font-weight:700}.sr-hood{font-size:10px;color:var(--ts)}
.sr-closed{color:var(--red);font-size:10px;margin-left:4px}
#timeline{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(transparent,rgba(10,10,15,.95) 30%);padding:14px 20px 16px;pointer-events:none}
.tc{pointer-events:auto;max-width:700px;margin:0 auto}
.tyd{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.ty{font-size:48px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--np),var(--na));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tel{font-size:11px;color:var(--ts);flex:1;min-height:16px;letter-spacing:1px}
.vc{font-size:10px;color:var(--tm);white-space:nowrap;letter-spacing:1px}
.sc{position:relative;height:24px;margin:2px 0}
.st{position:relative;height:3px;background:var(--bd);border-radius:2px;cursor:pointer;top:10px}
.sf{height:100%;background:linear-gradient(90deg,var(--np),var(--na));border-radius:2px;box-shadow:0 0 12px rgba(255,45,123,.3);pointer-events:none}
.sth{position:absolute;top:-6px;width:18px;height:18px;background:var(--tx);border-radius:50%;cursor:grab;transform:translateX(-50%);box-shadow:0 0 20px rgba(255,45,123,.5),0 0 40px rgba(255,45,123,.2)}
.sth:hover{box-shadow:0 0 24px rgba(255,45,123,.7);transform:translateX(-50%) scale(1.15)}
.stk{display:flex;justify-content:space-between;margin-top:6px}
.stk span{font-size:9px;color:var(--tm);cursor:pointer;letter-spacing:1px}
.stk span:hover{color:var(--ts)}
.sp{position:fixed;top:0;right:-380px;width:360px;max-width:85vw;height:100%;background:var(--sf);z-index:200;transition:right .3s;overflow-y:auto;border-left:1px solid var(--bd)}
.sp.open{right:0}
.sph{position:relative;width:100%;height:200px;overflow:hidden}
.spc{position:absolute;top:10px;right:10px;z-index:10;background:rgba(0,0,0,.5);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer}
.spb{padding:16px}
.spt{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:4px}
.spn{font-size:22px;font-weight:800;margin-bottom:2px}
.spa{font-size:12px;color:var(--ts)}
.spcl{display:inline-block;color:var(--red);font-size:11px;border:1px solid var(--red);padding:2px 8px;border-radius:8px;margin-top:6px}
.sst{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ts);margin:16px 0 8px;font-weight:700}
.spd{font-size:13px;line-height:1.6;color:var(--ts)}
.stl>div{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:.15s}
.stl>div:hover{background:rgba(255,45,123,.06);margin:0 -16px;padding:6px 16px}
.stly{font-size:12px;font-weight:700;color:var(--na);min-width:50px;transition:.15s}
.stl>div:hover .stly{color:var(--np)}
.stlx{font-size:12px;color:var(--ts)}
.stl>div:hover .stlx{color:var(--tx)}
.stly-hint{font-size:8px;color:var(--tm);margin-left:4px;opacity:0;transition:.15s}
.stl>div:hover .stly-hint{opacity:1}
.stg{display:flex;flex-wrap:wrap;gap:6px}
.stgi{padding:3px 10px;border-radius:12px;font-size:10px;background:var(--cd);border:1px solid var(--bd);color:var(--ts)}
.rel-link{transition:all .2s;border-width:1.5px;cursor:pointer}.rel-link:hover{background:rgba(255,255,255,.1);transform:scale(1.05)}
.hero-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity .5s}
.hero-img.loaded{opacity:1}
.hero-img.loaded+.hero-icon{opacity:0!important;transition:opacity .3s}
.hero-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(transparent 30%,var(--sf));z-index:1}
.hero-fade{position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,var(--cd))}
.user-dot{width:14px;height:14px;background:#fff;border:3px solid var(--np);border-radius:50%;box-shadow:0 0 8px rgba(255,45,123,.7)}
.user-pulse{width:40px;height:40px;border-radius:50%;background:rgba(255,45,123,.15);border:1px solid rgba(255,45,123,.25);animation:userPulse 2s ease-out infinite}
@keyframes userPulse{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes markerPulse{0%{r:7;stroke-opacity:.9}50%{r:14;stroke-opacity:.3}100%{r:7;stroke-opacity:.9}}
.marker-active{animation:markerPulse 1.5s ease-in-out infinite}
@keyframes markerPop{0%{r:0;fill-opacity:0}60%{r:9;fill-opacity:1}100%{r:7;fill-opacity:.85}}
.marker-enter{animation:markerPop .35s ease-out forwards}
.gallery{display:flex;gap:6px;overflow-x:auto;padding:4px 0;margin:4px 0}
.gallery::-webkit-scrollbar{height:4px}.gallery::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.gallery img{height:90px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:.2s;flex-shrink:0;object-fit:cover}
.gallery img:hover,.gallery img.sel{border-color:var(--np)}
.pb{padding:12px}.pt{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.pn{font-size:16px;font-weight:800;margin:2px 0}.pa{font-size:11px;color:var(--ts)}
.pop-img{height:100px;background-size:cover;background-position:center;position:relative}
.pop-img-fade{position:absolute;bottom:0;left:0;right:0;height:40px;opacity:0.6;mask-image:linear-gradient(transparent,black);-webkit-mask-image:linear-gradient(transparent,black)}
.pop-yr{font-size:10px;color:var(--tm);margin-top:4px;font-weight:600;letter-spacing:0.5px}
.pd{font-size:12px;color:var(--ts);margin:8px 0;line-height:1.4}
.pf{display:flex;align-items:center;gap:8px;margin-top:8px}
.pyt{font-size:10px;padding:3px 8px;border-radius:8px;border:1px solid}
.pm{font-size:11px;color:var(--np);cursor:pointer;font-weight:600}
#addBtn{background:linear-gradient(135deg,var(--np),var(--na));border:none;color:var(--bg);width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(255,45,123,.4);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
#addBtn:hover{transform:scale(1.1)}
#addPanel{position:fixed;top:70px;right:14px;z-index:150;width:300px;background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px;display:none;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#addPanel.show{display:block}
#addPanel h3{font-size:14px;margin-bottom:10px;background:linear-gradient(135deg,var(--np),var(--na));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#addPanel input,#addPanel textarea,#addPanel select{width:100%;padding:7px 10px;margin-bottom:6px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:11px;font-family:inherit}
#addPanel textarea{height:50px;resize:vertical}
.abr{display:flex;gap:8px;margin-top:4px}
.abr button{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.ab-save{background:linear-gradient(135deg,var(--np),var(--na));color:var(--bg)}
.ab-cancel{background:var(--cd);color:var(--ts);border:1px solid var(--bd)!important}
.ab-help{font-size:10px;color:var(--tm);margin-bottom:8px;line-height:1.4}
.user-badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:6px;background:var(--np);color:white;margin-left:6px;vertical-align:middle}
.spn2{font-size:10px;color:var(--tm);margin-top:16px;text-align:center}
.wiki-link{display:block;margin:16px 0 4px;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:8px;color:var(--np);text-decoration:none;font-size:12px;text-align:center;transition:background .2s}
.wiki-link:hover{background:rgba(255,255,255,.08);text-decoration:none}
.photo-upload{margin:10px 0;background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:10px;transition:.2s}
.photo-upload.dragover{border-color:var(--np);background:rgba(255,45,123,.05)}
.pu-row{display:flex;gap:6px;align-items:center}
.pu-input{flex:1;padding:5px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:11px;outline:none}
.pu-input:focus{border-color:var(--np)}
.pu-btn{padding:5px 10px;background:linear-gradient(135deg,var(--np),var(--na));border:none;color:var(--bg);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.pu-or{text-align:center;font-size:10px;color:var(--tm);margin:6px 0}
.pu-drop{border:1px dashed var(--bd);border-radius:6px;padding:12px;text-align:center;font-size:11px;color:var(--tm);cursor:pointer;transition:.2s}
.pu-drop:hover{border-color:var(--np);color:var(--np)}
.pu-status{font-size:10px;margin-top:4px;min-height:14px}
.pu-ok{color:#4caf50}.pu-err{color:var(--red)}
#radiusSelect:disabled{opacity:0.35;cursor:not-allowed}
#gpsBtn{position:fixed;bottom:25px;right:110px;z-index:101;width:40px;height:40px;border-radius:8px;background:rgba(26,26,36,.85);backdrop-filter:blur(12px);border:1px solid var(--bd);color:var(--ts);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4)}
#gpsBtn:hover{background:rgba(40,40,55,.95);color:var(--np)}
#gpsBtn.loading{border-color:var(--ts);color:var(--ts);animation:gpsPulse 1s ease-in-out infinite}
#gpsBtn.tracking{border-color:var(--np);color:var(--np)}
@keyframes gpsPulse{0%,100%{opacity:1}50%{opacity:0.35}}
#listCount{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tm);padding:14px 14px 8px;flex-shrink:0;border-bottom:1px solid var(--bd)}
#listContent{overflow-y:auto;flex:1;padding:8px 8px 16px;scrollbar-width:none}
#listContent::-webkit-scrollbar{display:none}
.lv-item{background:rgba(26,26,36,.5);border:1px solid transparent;border-radius:10px;padding:8px 10px;margin-bottom:5px;cursor:pointer;transition:.15s}
.lv-item:hover{border-color:var(--bd);background:rgba(26,26,36,.9)}
.lv-top{display:flex;align-items:flex-start;gap:8px}
.lv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid}
.lv-c-food{background:#5c7cfa;border-color:#5c7cfa}
.lv-c-music{background:#ff2d7b;border-color:#ff2d7b}
.lv-c-nightlife{background:#7c4dff;border-color:#7c4dff}
.lv-c-culture{background:#42a5f5;border-color:#42a5f5}
.lv-c-shop{background:#26c6da;border-color:#26c6da}
.lv-c-hotel{background:#ffb347;border-color:#ffb347}
.lv-c-community{background:#66bb6a;border-color:#66bb6a}
.lv-info{flex:1;min-width:0}
.lv-name{font-size:12px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lv-meta{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.lv-status{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px}
.lv-type{font-size:10px;color:var(--ts)}
.lv-dist{font-size:10px;color:var(--np);font-weight:700;white-space:nowrap}
</style>
</head>
<body>
<div id="map"></div>
<div id="intro"><div class="it">ERA MAPS</div><div class="is">Los Angeles Through Time</div><div id="introC" style="color:var(--ts);font-size:13px;margin-bottom:20px"></div><button class="ib" id="enterBtn">EXPLORE</button></div>
<button id="listToggle" title="Venue list">☰</button>
<div id="listOverlay"></div>
<div id="listPanel"><div id="listPanelHeader"><button id="listClose">✕</button><span>ERA MAPS</span></div><div id="listCount"></div><div id="listContent"></div></div>
<div id="searchWrap"><input type="text" id="searchBox" placeholder="Search places..."><button id="searchBtn">🔍</button></div>
<div id="controlsWrap"><select id="citySelect"><option value="la" selected>🌴 Los Angeles</option><option value="ny" disabled>🗽 New York</option><option value="lon" disabled>🇬🇧 London</option><option value="tok" disabled>⛩️ Tokyo</option></select><div class="cat-dd" id="catDd"><div class="cat-dd-btn" id="catDdBtn" tabindex="0"><span class="cd-label">All types</span></div><div class="cat-dd-list" id="catDdList"><div class="cat-dd-item selected" data-val="all">All types</div><div class="cat-dd-item" data-val="food"><span class="cd-dot" style="background:#5c7cfa"></span>Food</div><div class="cat-dd-item" data-val="music"><span class="cd-dot" style="background:#ff2d7b"></span>Music</div><div class="cat-dd-item" data-val="nightlife"><span class="cd-dot" style="background:#7c4dff"></span>Nightlife</div><div class="cat-dd-item" data-val="culture"><span class="cd-dot" style="background:#42a5f5"></span>Culture</div><div class="cat-dd-item" data-val="shop"><span class="cd-dot" style="background:#26c6da"></span>Shops</div><div class="cat-dd-item" data-val="hotel"><span class="cd-dot" style="background:#ffb347"></span>Hotels</div><div class="cat-dd-item" data-val="community"><span class="cd-dot" style="background:#66bb6a"></span>Community</div></div></div><select class="fsel" id="statusSelect"><option value="all">All status</option><option value="active">🌈 Still here</option><option value="closed">🩶 Gone</option><option value="demolished">🟤 Demolished</option><option value="transformed">🔄 Transformed</option></select><select id="radiusSelect" class="fsel" disabled><option value="999">All distances</option><option value="0.5">½ mile</option><option value="1">1 mile</option><option value="3">3 miles</option><option value="5">5 miles</option><option value="10">10 miles</option></select><select id="hoodSelect" class="fsel"></select><button id="addBtn" title="Add a location">+</button></div>

function preloadWikiImages(){
  var all=V.concat(userVenues);
  var queue=all.filter(function(v){return v.w&&imgCache[v.w]===undefined;});
  var i=0;
  function next(){
    if(i>=queue.length)return;
    var v=queue[i++];
    loadWikiImg(v.w,function(){setTimeout(next,80);});
  }
  // Run 3 parallel streams for faster loading
  next();setTimeout(next,30);setTimeout(next,60);
}

            if(cUrl){imgCache[cKey]=cUrl;if(m.isPopupOpen()){var imgHdr='<div class="pop-img" style="background-image:url(\''+cUrl+'\')"><div class="pop-img-fade" style="background:'+v.g+'"></div></div>';m.setPopupContent(imgHdr+bodyHtml);}}
            else{imgCache[cKey]=null;}
          });
        }
      }
    });
    m.on('mouseout',function(){closeTimer=setTimeout(function(){m.closePopup();},350);});
    allMkrs[v.id]=m;
  });
}

var activeMarkerId=null;

function pulseMarker(id){
  clearPulse();
  activeMarkerId=id;
  var m=allMkrs[id];if(!m)return;
  var el=m.getElement?m.getElement():null;
  if(el){var circle=el.querySelector('path')||el;circle.classList.add('marker-active');}
  m.setRadius(9);m.setStyle({weight:3,fillOpacity:1});
}

function clearPulse(){
  if(activeMarkerId&&allMkrs[activeMarkerId]){
    var m=allMkrs[activeMarkerId];
    var el=m.getElement?m.getElement():null;
    if(el){var circle=el.querySelector('path')||el;circle.classList.remove('marker-active');}
    m.setRadius(7);m.setStyle({weight:2,fillOpacity:0.85});
  }
  activeMarkerId=null;
}

function placeUserDot(lat,lng){
  userLat=lat;userLng=lng;
  if(!hasGPS&&gpsTracking){
    hasGPS=true;
    var btn=document.getElementById('gpsBtn');
    btn.classList.remove('loading');
    btn.classList.add('tracking');
    map.flyTo([lat,lng],15,{duration:1.5});
    document.getElementById('radiusSelect').disabled=false;
  }else if(!hasGPS){
    hasGPS=true;
  }
  if(userDotMarker){
    userDotMarker.setLatLng([lat,lng]);
    userPulseMarker.setLatLng([lat,lng]);
  }else{
    userPulseMarker=L.marker([lat,lng],{icon:L.divIcon({className:'user-pulse',iconSize:[40,40],iconAnchor:[20,20]}),zIndexOffset:9999}).addTo(map);
    userDotMarker=L.marker([lat,lng],{icon:L.divIcon({className:'user-dot',iconSize:[14,14],iconAnchor:[7,7]}),zIndexOffset:10000}).addTo(map);
  }
  if(radius<900)updateVis();
}

function navToVenue(id){
  var allV=V.concat(userVenues);
  var v=allV.find(function(x){return x.id===id});
  if(!v)return;
  if(v.h!==cH){
    sw(v.h);
    setTimeout(function(){
      setY(v.ys);updateSV();updateVis();
      openSP(id);highlightMarker(id);
      var m=allMkrs[id];if(m&&map.hasLayer(m))map.panTo(m.getLatLng());
    },1200);
  } else {
    setY(v.ys);updateSV();updateVis();
    openSP(id);highlightMarker(id);
    var m=allMkrs[id];if(m&&map.hasLayer(m))map.panTo(m.getLatLng());
  }
}
function highlightMarker(id){
  var m=allMkrs[id];if(!m)return;
  pulseMarker(id);
  // Brief flash effect
  m.setRadius(14);m.setStyle({weight:3,color:'#ff2d7b',fillOpacity:1});
  setTimeout(function(){
    if(activeMarkerId===id){m.setRadius(9);m.setStyle({weight:3,color:'#fff',fillOpacity:1});}
  },400);
}

function updateVis(){
  var all=V.concat(userVenues);var vis=0,hc=allView?all.length:all.filter(function(v){return v.h===cH}).length;
  all.forEach(function(v){
    if(!v||!v.id)return;
    v._ghost=!!(v.ye&&v.ye<cY);
    var m=allMkrs[v.id];if(!m)return;
    var shouldShow=isVis(v);
    var onMap=map.hasLayer(m);
    var fc=v._ghost?'#8b7355':dotColors[v.c]||'#888';
    var fo=v._ghost?0.70:0.85;
    if(shouldShow&&!onMap){
      vis++;m.addTo(map);
      m.setStyle({fillColor:fc,fillOpacity:fo});
      // Entrance animation
      var el=m.getElement?m.getElement():null;
      if(el){var path=el.querySelector('path')||el;path.classList.add('marker-enter');
        setTimeout(function(){path.classList.remove('marker-enter')},400);}
    }else if(shouldShow&&onMap){vis++;m.setStyle({fillColor:fc,fillOpacity:fo});}
    else if(!shouldShow&&onMap){map.removeLayer(m);}
  });
  document.getElementById('vC').textContent=vis+'/'+hc+' visible';
  if(listOpen)renderListPanel();
}

function submitPhotoUrl(venueId){
  var inp=document.getElementById('puUrl');var url=(inp?inp.value:'').trim();
  var st=document.getElementById('puStatus');
  if(!url||!/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp)/i.test(url)){
    if(st)st.innerHTML='<span class="pu-err">Enter a valid image URL (.jpg, .png, etc.)</span>';return;
  }
  addUserPhoto(venueId,url);
  if(inp)inp.value='';
  if(st)st.innerHTML='<span class="pu-ok">✓ Photo added!</span>';
  setTimeout(function(){if(st)st.textContent=''},2000);
}

function setupDropZone(venueId){
  var drop=document.getElementById('puDrop');var zone=document.getElementById('puZone');
  if(!drop||!zone)return;
  var fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='image/*';fileInput.style.display='none';
  zone.appendChild(fileInput);
  drop.onclick=function(){fileInput.click()};
  fileInput.onchange=function(){if(fileInput.files[0])readFile(fileInput.files[0],venueId)};
  zone.ondragover=function(e){e.preventDefault();zone.classList.add('dragover')};
  zone.ondragleave=function(){zone.classList.remove('dragover')};
  zone.ondrop=function(e){e.preventDefault();zone.classList.remove('dragover');
    var f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))readFile(f,venueId);
    else{var st=document.getElementById('puStatus');if(st)st.innerHTML='<span class="pu-err">Not an image file</span>';}
  };
}

function readFile(file,venueId){
  var st=document.getElementById('puStatus');
  if(file.size>10*1024*1024){if(st)st.innerHTML='<span class="pu-err">File too large (max 10MB)</span>';return;}
  if(st)st.textContent='Processing...';
  var r=new FileReader();
  r.onload=function(){
    // Resize via canvas to avoid base64 storage bloat
    var img=new Image();
    img.onload=function(){
      var maxW=600,maxH=400,w=img.width,h=img.height;
      if(w>maxW){h=h*(maxW/w);w=maxW;}if(h>maxH){w=w*(maxH/h);h=maxH;}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      var ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
      var small=c.toDataURL('image/jpeg',0.7);
      addUserPhoto(venueId,small);
      if(st)st.innerHTML='<span class="pu-ok">✓ Photo added!</span>';
      setTimeout(function(){if(st)st.textContent=''},2000);
    };
    img.onerror=function(){if(st)st.innerHTML='<span class="pu-err">Failed to load image</span>';};
    img.src=r.result;
  };
  r.onerror=function(){if(st)st.innerHTML='<span class="pu-err">Failed to read file</span>';};
  r.readAsDataURL(file);
}

function addUserPhoto(venueId,url){
  if(!userPhotos[venueId])userPhotos[venueId]=[];
  // Guard against storage overflow — estimate total size
  var total=JSON.stringify(userPhotos).length+url.length;
  if(total>4*1024*1024){
    var st=document.getElementById('puStatus');
    if(st)st.innerHTML='<span class="pu-err">Photo storage full. Remove some photos to add more.</span>';
    return;
  }
  userPhotos[venueId].push(url);saveUserData();
  // Add to gallery immediately
  var row=document.getElementById('galRow');
  if(row){var im=document.createElement('img');im.src=url;im.onclick=function(){swapHero(url)};im.onerror=function(){im.remove()};row.appendChild(im);}
}

      (v.t&&v.t.toLowerCase().indexOf(q)!==-1)||

  res.innerHTML=matches.map(function(v){

function initS(){
  var tr=document.getElementById('sT'),th=document.getElementById('sTh');
  function gY(x){var r=tr.getBoundingClientRect();return Math.round(MN+Math.max(0,Math.min(1,(x-r.left)/r.width))*(MX-MN));}
  function oM(e){if(!drag)return;setY(gY(e.touches?e.touches[0].clientX:e.clientX));updateSV();updateVis();}
  function oU(){drag=false;document.removeEventListener('mousemove',oM);document.removeEventListener('mouseup',oU);document.removeEventListener('touchmove',oM);document.removeEventListener('touchend',oU);}
  th.onmousedown=function(e){drag=true;e.preventDefault();document.addEventListener('mousemove',oM);document.addEventListener('mouseup',oU);};

}

// === ERA TINTING — overlay + dynamic tile filter ===
var eraTintEl=null;
var ERA_TINTS=[
  {y:1890,bg:'rgba(140,100,30,0.20)'},
  {y:1920,bg:'rgba(100,80,20,0.18)'},
  {y:1940,bg:'rgba(20,40,100,0.22)'},
  {y:1955,bg:'rgba(20,90,90,0.18)'},
  {y:1965,bg:'rgba(90,20,110,0.16)'},
  {y:1975,bg:'rgba(110,60,20,0.14)'},
  {y:1985,bg:'rgba(0,0,0,0)'},
  {y:1995,bg:'rgba(10,30,60,0.10)'},
  {y:2010,bg:'rgba(25,25,40,0.06)'}
];
// Filter stops: [year, saturate, brightness, contrast, hue-rotate, sepia]
// invert(1) is always applied — it's what makes the dark map work
var ERA_FILTERS=[
  {y:1870, sat:0.06, bri:0.50, con:1.15, hue:165, sep:0.20},
  {y:1910, sat:0.08, bri:0.48, con:1.20, hue:175, sep:0.15},
  {y:1930, sat:0.10, bri:0.40, con:1.45, hue:220, sep:0.05},
  {y:1950, sat:0.22, bri:0.47, con:1.25, hue:185, sep:0.03},
  {y:1965, sat:0.28, bri:0.48, con:1.22, hue:175, sep:0.04},
  {y:1978, sat:0.18, bri:0.46, con:1.30, hue:190, sep:0.02},
  {y:1990, sat:0.15, bri:0.45, con:1.30, hue:200, sep:0.00},
  {y:2005, sat:0.20, bri:0.43, con:1.35, hue:212, sep:0.00},
  {y:2025, sat:0.28, bri:0.42, con:1.40, hue:222, sep:0.00}
];
var lastEraTint=-1;
var lastEraFilter=-1;
function initEraTint(){
  var pane=map.getPane('tilePane');
  if(!pane||!pane.parentNode)return;
  eraTintEl=document.createElement('div');
  eraTintEl.style.cssText='position:absolute;top:-1000px;left:-1000px;width:10000px;height:10000px;pointer-events:none;z-index:250;transition:background-color 1.4s ease;';
  pane.parentNode.appendChild(eraTintEl);
}
function lerpFilter(y){
  var f=ERA_FILTERS;
  if(y<=f[0].y)return f[0];
  if(y>=f[f.length-1].y)return f[f.length-1];
  for(var i=0;i<f.length-1;i++){
    if(y>=f[i].y&&y<=f[i+1].y){
      var t=(y-f[i].y)/(f[i+1].y-f[i].y);
      return {
        sat:f[i].sat+(f[i+1].sat-f[i].sat)*t,
        bri:f[i].bri+(f[i+1].bri-f[i].bri)*t,
        con:f[i].con+(f[i+1].con-f[i].con)*t,
        hue:f[i].hue+(f[i+1].hue-f[i].hue)*t,
        sep:f[i].sep+(f[i+1].sep-f[i].sep)*t
      };
    }
  }
  return f[f.length-1];
}
function updateEraTint(){
  if(!eraTintEl)return;
  var t=ERA_TINTS[0];
  for(var i=0;i<ERA_TINTS.length;i++){if(cY>=ERA_TINTS[i].y)t=ERA_TINTS[i];}
  if(lastEraTint!==t.y){lastEraTint=t.y;eraTintEl.style.backgroundColor=t.bg;}
  // Dynamic tile filter — interpolate continuously
  var roundY=Math.round(cY/3)*3; // throttle to every 3 years to avoid excessive updates
  if(lastEraFilter!==roundY){
    lastEraFilter=roundY;
    var ef=lerpFilter(cY);
    var pane=map.getPane('tilePane');
    if(pane)pane.style.filter='saturate('+ef.sat.toFixed(3)+') brightness('+ef.bri.toFixed(3)+') contrast('+ef.con.toFixed(3)+') invert(1) hue-rotate('+ef.hue.toFixed(1)+'deg) sepia('+ef.sep.toFixed(3)+')';
  }
}

function updateSV(){var p=((cY-MN)/(MX-MN))*100;document.getElementById('sF').style.width=p+'%';document.getElementById('sTh').style.left=p+'%';}

function setY(y){
  cY=Math.max(MN,Math.min(MX,y));document.getElementById('yD').textContent=cY;
  var eras=EL[cH]||{};var ds=Object.keys(eras).map(Number).sort(function(a,b){return a-b});
  var c=ds[0]||1920;for(var i=0;i<ds.length;i++){if(cY>=ds[i])c=ds[i];}
  var e=eras[c]||{l:'',b:H[cH].name};
  document.getElementById('eL').textContent=e.l;
  updateEraTint();
  var isPast=cY<MX;setStatusDisabled(isPast);if(isPast)aS='all';
}

function toggleAdd(){
  addMode=!addMode;document.getElementById('addPanel').classList.toggle('show',addMode);
  document.getElementById('addBtn').textContent=addMode?'\u2715':'+';
  document.getElementById('addBtn').style.background=addMode?'var(--bd)':'linear-gradient(135deg,var(--np),var(--na))';
  if(addMode)document.getElementById('ap-hood').value=cH;
}
window.toggleAdd=toggleAdd;

function saveUserVenue(){
  var n=document.getElementById('ap-name').value.trim();
  var coords=document.getElementById('ap-coords').value.trim();
  if(!n){alert('Enter a name');return;}if(!coords){alert('Click map to set location');return;}
  var pts=coords.split(',').map(function(s){return parseFloat(s.trim())});
  if(pts.length!==2||isNaN(pts[0])||isNaN(pts[1])){alert('Invalid coords');return;}
  var cat=document.getElementById('ap-cat').value;
  var icons={music:'\uD83C\uDFB5',food:'\uD83C\uDF78',hotel:'\uD83C\uDFE8',culture:'\uD83C\uDFAD',shop:'\uD83D\uDECD\uFE0F'};
  var v={id:'u_'+Date.now(),h:document.getElementById('ap-hood').value,n:n,
    t:document.getElementById('ap-cat').selectedOptions[0].text.replace(/^.\s/,''),c:cat,
    lat:pts[0],lng:pts[1],a:document.getElementById('ap-addr').value||'',
    i:icons[cat]||'\uD83D\uDCCD',co:'#ff2d7b',g:'linear-gradient(135deg,#2e0a1a,#6b1a3a,#a83060)',
    d:document.getElementById('ap-desc').value||'Community-added.',
    tl:[{y:String(document.getElementById('ap-year').value||'?'),x:'Founded'}],
    tags:['Community'],ys:parseInt(document.getElementById('ap-year').value)||2000,user:true};
  var ey=document.getElementById('ap-endyr').value;if(ey)v.ye=parseInt(ey);
  var w=document.getElementById('ap-wiki').value.trim();if(w)v.w=w;
  userVenues.push(v);createAllMarkers();buildHB();updateVis();saveUserData();updateSearchCount();
  ['ap-name','ap-addr','ap-year','ap-endyr','ap-desc','ap-wiki','ap-coords'].forEach(function(id){document.getElementById(id).value='';});
  toggleAdd();
}
window.saveUserVenue=saveUserVenue;

function saveUserData(){
  try{if(!window.storage)return;
    window.storage.set('eramaps-venues',JSON.stringify(userVenues),true).catch(function(){});
    window.storage.set('eramaps-photos',JSON.stringify(userPhotos),true).catch(function(){});
  }catch(e){}
}
function loadUserData(){
  try{if(!window.storage)return;
    window.storage.get('eramaps-venues',true).then(function(r){
      if(r&&r.value){userVenues=JSON.parse(r.value);userVenues.forEach(function(v){v.user=true});createAllMarkers();buildHB();updateVis();updateSearchCount();}
    }).catch(function(){});
    window.storage.get('eramaps-photos',true).then(function(r){
      if(r&&r.value)userPhotos=JSON.parse(r.value);
    }).catch(function(){});
  }catch(e){}
}

document.addEventListener('DOMContentLoaded',function(){waitForLeaflet(init)});
</script>
</body>
</html>
